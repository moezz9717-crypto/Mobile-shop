<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>نظام محل الموبايلات</title>

<!-- إعدادات تثبيت التطبيق (PWA) -->
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#15406B">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="محل الموبايلات">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" type="image/png" href="icon-192.png">

<!-- مكتبة Supabase (لازمة للمزامنة وتسجيل الدخول) -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<!-- مكتبة قراءة الباركود (Quagga2 - قوية مع باركود المنتجات) -->
<script src="https://cdn.jsdelivr.net/npm/@ericblade/quagga2/dist/quagga.min.js"></script>

<!-- خط عربي نظيف -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
/* ========== الإعدادات: الزق مفتاحك في السطر المعلّم تحت ========== */
:root{
  --bg:#EDF1F7; --surface:#FFFFFF; --surface-2:#F6F8FC;
  --ink:#102136; --muted:#6B7A90; --line:#E3E9F2;
  --navy:#15406B; --navy-700:#1C4E80; --navy-900:#0C2A49;
  --gold:#E39A0C; --pos:#138A5E; --neg:#C0392B;
  --shadow:0 10px 30px rgba(16,33,54,.08);
  --radius:18px;
}
[data-theme="dark"]{
  --bg:#0E1621; --surface:#16212E; --surface-2:#1E2A38;
  --ink:#E7EDF3; --muted:#93A2B3; --line:#2A3848;
  --navy:#1C4E80; --navy-700:#2360A0; --navy-900:#13314F;
  --gold:#E8A622; --pos:#1BA873; --neg:#E05a4b;
  --shadow:0 8px 24px rgba(0,0,0,.45);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;overscroll-behavior:none}
body{
  font-family:'Cairo',system-ui,'Segoe UI',Tahoma,sans-serif;
  background:var(--bg); color:var(--ink);
  font-variant-numeric:tabular-nums; -webkit-font-smoothing:antialiased;
  transition:background .2s, color .2s;
}
/* ظبط الخانات: مفيش زوم (16px)، محدّدة عند الكتابة */
input,select,textarea{font-size:16px}
input:focus,select:focus,textarea:focus{
  outline:none;border-color:var(--gold) !important;
  box-shadow:0 0 0 3px rgba(227,154,12,.20);
}
input[type="text" inputmode="decimal" dir="ltr"],input[inputmode="decimal"]{text-align:center}
.num{font-variant-numeric:tabular-nums; letter-spacing:.2px}
button{font-family:inherit;cursor:pointer}
input{font-family:inherit}
.hidden{display:none !important}

/* ===================== شاشة الدخول ===================== */
#auth{
  min-height:100dvh; display:flex; align-items:center; justify-content:center;
  padding:24px;
  background:radial-gradient(120% 120% at 80% -10%, #1C4E80 0%, #0C2A49 55%, #081d33 100%);
  position:relative; overflow:hidden;
}
/* موتيف أعمدة الشبكة (إشارة الموبايل) خلفية خفيفة */
.signal{position:absolute; bottom:-20px; left:-10px; display:flex; gap:14px; align-items:flex-end; opacity:.07}
.signal i{width:26px; background:#fff; border-radius:6px; display:block}
.signal i:nth-child(1){height:60px}.signal i:nth-child(2){height:110px}
.signal i:nth-child(3){height:170px}.signal i:nth-child(4){height:240px}
.auth-card{
  position:relative; z-index:2; width:100%; max-width:400px;
  background:var(--surface); border-radius:24px; padding:30px 24px 26px;
  box-shadow:0 24px 60px rgba(0,0,0,.35);
}
.brand{display:flex; flex-direction:column; align-items:center; gap:12px; margin-bottom:22px}
.brand .mark{
  width:64px;height:64px;border-radius:18px;
  background:linear-gradient(150deg,var(--navy-700),var(--navy-900));
  display:flex;align-items:center;justify-content:center;color:#fff;font-size:30px;
  box-shadow:var(--shadow);
}
.brand h1{margin:0;font-size:21px;font-weight:800;color:var(--navy-900)}
.brand p{margin:0;font-size:13px;color:var(--muted)}
.field{margin-bottom:14px}
.field label{display:block;font-size:13px;font-weight:600;margin-bottom:7px;color:var(--ink)}
.field input{
  width:100%;padding:13px 15px;border:1.5px solid var(--line);border-radius:13px;
  font-size:15px;background:var(--surface-2);transition:border-color .15s, background .15s;
}
.field input:focus{outline:none;border-color:var(--navy-700);background:var(--surface)}
.btn{
  width:100%;padding:14px;border:none;border-radius:13px;font-size:16px;font-weight:700;
  background:var(--navy);color:#fff;transition:transform .06s, background .15s; margin-top:6px;
}
.btn:active{transform:scale(.99)}
.btn:disabled{opacity:.6}
.btn-gold{background:var(--gold)}
.link-row{display:flex;justify-content:space-between;margin-top:16px;font-size:13.5px}
.link-row a{color:var(--navy-700);text-decoration:none;font-weight:600;cursor:pointer}
.msg{font-size:13.5px;padding:11px 13px;border-radius:11px;margin-bottom:14px;display:none}
.msg.show{display:block}
.msg.err{background:#FDECEA;color:#9B2D20;border:1px solid #F5C6C0}
.msg.ok{background:#E7F6EF;color:#0E6B49;border:1px solid #BDE6D3}

/* ===================== الهيكل العام للتطبيق ===================== */
#app{min-height:100dvh;display:flex;flex-direction:column}
.topbar{
  background:linear-gradient(120deg,var(--navy),var(--navy-900));
  color:#fff;padding:13px 16px;display:flex;align-items:center;gap:12px;
  position:sticky;top:0;z-index:30;
  padding-top:calc(13px + env(safe-area-inset-top));
}
.topbar .menu-btn{
  background:rgba(255,255,255,.14);border:none;color:#fff;width:40px;height:40px;
  border-radius:11px;font-size:20px;display:flex;align-items:center;justify-content:center;
}
.topbar .title{flex:1;font-weight:800;font-size:17px;display:flex;align-items:center;gap:8px}
.topbar .title .ttl-refresh{background:rgba(255,255,255,.16);border:none;color:#fff;width:30px;height:30px;border-radius:9px;font-size:15px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.topbar .user{display:flex;align-items:center;gap:9px}
.avatar{width:38px;height:38px;border-radius:50%;background:var(--gold);color:#3a2700;
  display:flex;align-items:center;justify-content:center;font-weight:800;font-size:16px}
.user .who{display:flex;flex-direction:column;line-height:1.2}
.user .who b{font-size:13.5px}
.user .who span{font-size:11px;opacity:.8}

.layout{flex:1;display:flex}
/* الشريط الجانبي (كمبيوتر) */
.sidebar{
  width:248px;background:var(--surface);border-inline-start:1px solid var(--line);
  padding:14px 12px;position:sticky;top:64px;height:calc(100dvh - 64px);overflow-y:auto;
}
.nav-item{
  display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:12px;
  font-weight:600;font-size:15px;color:var(--ink);cursor:pointer;margin-bottom:4px;
  border:none;background:none;width:100%;text-align:start;transition:background .12s;
}
.nav-item .ic{font-size:19px;width:24px;text-align:center}
.nav-item:hover{background:var(--surface-2)}
.nav-item.active{background:var(--navy);color:#fff}
.content{flex:1;padding:18px 16px 90px;max-width:1100px;margin:0 auto;width:100%}

/* درج الموبايل */
.overlay{position:fixed;inset:0;background:rgba(8,22,40,.5);z-index:40;opacity:0;
  pointer-events:none;transition:opacity .2s}
.overlay.show{opacity:1;pointer-events:auto}
.drawer{
  position:fixed;top:0;right:0;height:100dvh;width:270px;background:var(--surface);z-index:50;
  transform:translateX(100%);transition:transform .25s ease;padding:16px 12px;overflow-y:auto;
  box-shadow:-12px 0 30px rgba(8,22,40,.18);
}
.drawer.show{transform:translateX(0)}
.drawer .dhead{display:flex;align-items:center;gap:10px;padding:6px 10px 16px;border-bottom:1px solid var(--line);margin-bottom:12px}
.drawer .dhead .mark{width:42px;height:42px;border-radius:12px;background:linear-gradient(150deg,var(--navy-700),var(--navy-900));color:#fff;display:flex;align-items:center;justify-content:center;font-size:21px}
.drawer .dhead b{font-size:15px}
.drawer .dhead span{font-size:11.5px;color:var(--muted);display:block}

/* ===================== لوحة التحكم ===================== */
.page-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;gap:10px}
.page-head h2{margin:0;font-size:20px;font-weight:800}
.page-head .date{font-size:13px;color:var(--muted)}
.refresh{background:var(--surface);border:1.5px solid var(--line);border-radius:11px;
  padding:9px 14px;font-weight:600;font-size:14px;display:flex;align-items:center;gap:7px;color:var(--ink)}

/* أبطال: الخزنة وصافي الربح */
.hero{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
.hero-card{border-radius:var(--radius);padding:18px;color:#fff;box-shadow:var(--shadow);position:relative;overflow:hidden}
.hero-card .lbl{font-size:13px;opacity:.9;margin-bottom:8px;font-weight:600}
.hero-card .val{font-size:26px;font-weight:800}
.hero-card.treasury{background:linear-gradient(135deg,var(--navy-700),var(--navy-900))}
.hero-card.net{background:linear-gradient(135deg,#13855a,#0c5f40)}
.hero-card .coin{position:absolute;left:14px;bottom:6px;font-size:54px;opacity:.16}

/* بطاقات الإحصائيات */
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
.stat{background:var(--surface);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);
  border-top:3px solid var(--navy)}
.stat.s-sales{border-top-color:var(--navy)}
.stat.s-profit{border-top-color:var(--pos)}
.stat.s-maint{border-top-color:#7A4FD0}
.stat.s-voda{border-top-color:#E2231A}
.stat.s-fawry{border-top-color:var(--gold)}
.stat.s-exp{border-top-color:var(--neg)}
.stat.s-stock{border-top-color:#0E8A8A}
.stat .top{display:flex;align-items:center;gap:9px;margin-bottom:10px}
.stat .top .ic{font-size:18px}
.stat .top .t{font-size:13px;color:var(--muted);font-weight:600}
.stat .v{font-size:21px;font-weight:800}
.stat .v small{font-size:13px;color:var(--muted);font-weight:600}

/* الرسم البياني */
.chart-card{background:var(--surface);border-radius:var(--radius);padding:18px;box-shadow:var(--shadow);margin-top:14px}
.chart-card h3{margin:0 0 4px;font-size:16px;font-weight:800}
.chart-card .sub{font-size:12.5px;color:var(--muted);margin-bottom:14px}
.bars{display:flex;align-items:flex-end;justify-content:space-between;gap:8px;height:150px}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;height:100%;justify-content:flex-end}
.bar{width:100%;max-width:34px;background:linear-gradient(180deg,var(--navy-700),var(--navy));
  border-radius:8px 8px 0 0;min-height:4px;transition:height .4s ease}
.bar-col .d{font-size:11px;color:var(--muted)}
.bar-col .a{font-size:10.5px;color:var(--ink);font-weight:700}

/* صفحة قريبًا */
.soon{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow);
  padding:46px 22px;text-align:center}
.soon .ic{font-size:46px;margin-bottom:12px}
.soon h3{margin:0 0 6px;font-size:20px;font-weight:800}
.soon p{margin:0;color:var(--muted);font-size:14px;line-height:1.7}

/* ===================== أدوات القسم (toolbar) ===================== */
.toolbar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px;align-items:center}
.toolbar.chips{gap:7px;margin-bottom:6px}
.tool-btn{background:var(--surface);border:1.5px solid var(--line);border-radius:11px;
  padding:10px 13px;font-weight:600;font-size:13.5px;color:var(--ink);display:flex;
  align-items:center;gap:6px;white-space:nowrap}
.tool-btn.sm{padding:7px 11px;font-size:12.5px;border-radius:9px;gap:5px}
.tool-btn.primary{background:var(--navy);color:#fff;border-color:var(--navy)}
.tool-btn.gold{background:var(--gold);color:#3a2700;border-color:var(--gold)}
.btn-wholesale{background:#FDECEA;border:1.5px solid #E7A399;color:var(--neg);border-radius:9px;
  padding:7px 11px;font-weight:700;font-size:12.5px;display:flex;align-items:center;gap:5px;white-space:nowrap}
.btn-wholesale.on{background:#E7F6EF;border-color:#9BD3BA;color:var(--pos)}
.search-wrap{flex:1;min-width:150px;position:relative}
.search-wrap input{width:100%;padding:11px 38px 11px 38px;border:1.5px solid var(--line);
  border-radius:11px;font-size:14px;background:var(--surface)}
.search-wrap input:focus{outline:none;border-color:var(--navy-700)}
.search-wrap .si{position:absolute;inset-inline-start:12px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none}
.search-clear{position:absolute;inset-inline-end:8px;top:50%;transform:translateY(-50%);
  background:var(--line);border:none;border-radius:50%;width:24px;height:24px;display:none;
  align-items:center;justify-content:center;color:var(--ink);cursor:pointer;padding:0}
.search-clear.show{display:flex}
.filter-sel{padding:8px 10px;border:1.5px solid var(--line);border-radius:9px;background:var(--surface);
  font-size:12.5px;font-family:inherit;color:var(--ink);font-weight:600;flex:1;min-width:0}

/* تنبيه نقص المخزون */
.alert-bar{background:#FFF7E6;border:1px solid #F3D58A;color:#8A5B00;border-radius:13px;
  padding:12px 14px;margin-bottom:14px;display:flex;align-items:center;gap:10px;font-size:13.5px;font-weight:600}
.alert-bar button{margin-inline-start:auto;background:var(--gold);color:#3a2700;border:none;
  border-radius:9px;padding:7px 12px;font-weight:700;font-size:12.5px}

/* قائمة المنتجات */
.plist{display:grid;grid-template-columns:1fr;gap:10px}
.pcard{background:var(--surface);border-radius:14px;box-shadow:var(--shadow);padding:13px 14px;
  display:flex;align-items:center;gap:13px}
.pcard .thumb{width:50px;height:50px;border-radius:11px;background:var(--surface-2);
  display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0;
  overflow:hidden;border:1px solid var(--line)}
.pcard .thumb img{width:100%;height:100%;object-fit:cover}
.pcard .info{flex:1;min-width:0}
.pcard .info .nm{font-weight:700;font-size:15px;margin-bottom:3px;line-height:1.3;word-break:break-word}
.pcard .info .meta{font-size:12px;color:var(--muted);display:flex;gap:10px;flex-wrap:wrap}
.pcard .info .meta b{color:var(--ink)}
.pcard .info .meta .q{color:var(--ink);font-weight:700}
.pcard .info .meta .q.low{color:var(--neg)}
.pcard .price-box{text-align:center;flex-shrink:0;padding-inline:6px;min-width:64px}
.pcard .price-box .n{font-weight:800;font-size:16px;color:var(--pos)}
.pcard .price-box .l{font-size:10.5px;color:var(--muted)}
.badge-low{display:inline-block;background:#FDECEA;color:#B0271A;font-size:10px;font-weight:700;
  padding:2px 7px;border-radius:20px;margin-inline-start:6px}
.pcard .acts{display:flex;flex-direction:column;gap:6px;flex-shrink:0}
.pcard .acts button{border:none;background:var(--surface-2);width:34px;height:34px;border-radius:9px;
  display:flex;align-items:center;justify-content:center;color:var(--navy)}
.pcard .acts .del{background:#FDECEA;color:var(--neg)}
.pcard .chk{width:24px;height:24px;border-radius:7px;border:2px solid var(--line);flex-shrink:0;
  display:flex;align-items:center;justify-content:center;color:#fff;background:var(--surface)}
.pcard.sel{border:2px solid var(--navy);box-shadow:0 0 0 3px rgba(21,64,107,.12)}
.pcard.sel .chk{background:var(--navy);border-color:var(--navy)}
.sel-bar{position:fixed;left:14px;right:14px;bottom:calc(14px + env(safe-area-inset-bottom));z-index:55;
  background:var(--navy);color:#fff;border-radius:14px;padding:12px 16px;display:flex;align-items:center;gap:12px;
  box-shadow:0 10px 30px rgba(0,0,0,.3)}
.sel-bar .c{flex:1;font-weight:700;font-size:14.5px}
.sel-bar button{border:none;border-radius:10px;padding:9px 14px;font-family:inherit;font-weight:700;font-size:13.5px}
.sel-bar .del{background:var(--neg);color:#fff}
.sel-bar .cancel{background:rgba(255,255,255,.2);color:#fff}

.empty{background:var(--surface);border-radius:14px;box-shadow:var(--shadow);
  padding:40px 20px;text-align:center;color:var(--muted)}
.empty .ic{font-size:40px;margin-bottom:10px}

/* ===================== النوافذ المنبثقة (Modal) ===================== */
.modal-bg{position:fixed;inset:0;background:rgba(8,22,40,.55);z-index:60;display:flex;
  align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
.modal-bg.show{opacity:1;pointer-events:auto}
.modal{background:var(--surface);width:100%;max-width:520px;border-radius:22px 22px 0 0;
  max-height:92dvh;overflow-y:auto;transform:translateY(20px);transition:transform .25s}
.modal-bg.show .modal{transform:translateY(0)}
.modal-head{position:sticky;top:0;background:var(--surface);padding:16px 18px 12px;
  border-bottom:1px solid var(--line);display:flex;align-items:center;gap:10px;z-index:2}
.modal-head h3{margin:0;font-size:18px;font-weight:800;flex:1}
.modal-head .x{background:var(--surface-2);border:none;width:34px;height:34px;border-radius:10px;font-size:18px;color:var(--muted)}
.modal-body{padding:16px 18px 20px}
.modal-body .field{margin-bottom:13px}
.modal-body label{display:block;font-size:13px;font-weight:600;margin-bottom:6px}
.modal-body input,.modal-body select,.modal-body textarea{
  width:100%;padding:11px 13px;border:1.5px solid var(--line);border-radius:11px;font-size:15px;
  background:var(--surface-2);font-family:inherit}
.modal-body input:focus,.modal-body select:focus,.modal-body textarea:focus{outline:none;border-color:var(--navy-700);background:var(--surface)}
.modal-body textarea{resize:vertical;min-height:60px}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.row3 .field label{font-size:11.5px}
.row3 select{padding:9px 6px;font-size:12.5px}
.inline-add{display:flex;gap:8px}
.inline-add select{flex:1}
.inline-add button{background:var(--navy);color:#fff;border:none;border-radius:11px;width:46px;font-size:20px;flex-shrink:0}
.modal-foot{display:flex;gap:10px;margin-top:8px}
.modal-foot button{flex:1;padding:13px;border:none;border-radius:12px;font-weight:700;font-size:15px}
.modal-foot .save{background:var(--navy);color:#fff}
.modal-foot .cancel{background:var(--surface-2);color:var(--ink)}
.mini-list{margin-top:4px}
.mini-row{display:flex;align-items:center;gap:10px;padding:11px 12px;border:1px solid var(--line);
  border-radius:11px;margin-bottom:8px}
.mini-row .t{flex:1;font-weight:600;font-size:14px}
.mini-row .t span{display:block;font-size:12px;color:var(--muted);font-weight:400}
.mini-row button{background:#FDECEA;color:var(--neg);border:none;width:32px;height:32px;border-radius:9px;font-size:14px}

/* تنبيه صغير (toast) */
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(80px);
  background:var(--navy-900);color:#fff;padding:12px 20px;border-radius:30px;font-size:14px;font-weight:600;
  z-index:80;opacity:0;transition:all .25s;box-shadow:0 8px 24px rgba(0,0,0,.3);max-width:90vw;text-align:center}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}
.toast.ok{background:#0c5f40}.toast.err{background:#8A2018}

/* صورة المنتج + الماسح */
.photo-box{margin-bottom:14px}
.photo-add{width:100%;border:2px dashed var(--line);background:var(--surface-2);border-radius:14px;
  padding:22px;display:flex;flex-direction:column;align-items:center;gap:8px;color:var(--muted);
  font-weight:600;font-size:14px}
.photo-prev{width:100%;max-height:200px;object-fit:contain;background:var(--surface-2);
  border-radius:14px;border:1px solid var(--line);display:block}
.photo-acts{display:flex;gap:9px;margin-top:9px}
.photo-acts button{flex:1;padding:10px;border:1.5px solid var(--line);background:var(--surface);

function toEnDigits(s){ return String(s==null?'':s)
  .replace(/[\u0660-\u0669]/g,d=>String(d.charCodeAt(0)-0x0660))
  .replace(/[\u06F0-\u06F9]/g,d=>String(d.charCodeAt(0)-0x06F0)); }

// بحث ذكي: كل كلمة لازم تتواجد (بأي ترتيب)
function smartMatch(text, query){
  const t=toEnDigits(text||'').toLowerCase();
  const tokens=toEnDigits(query||'').toLowerCase().trim().split(/\s+/).filter(Boolean);
  if(!tokens.length) return true;
  return tokens.every(tok=>t.includes(tok));
}

  document.getElementById('signupForm').classList.remove('hidden'); document.getElementById('authSub').textContent='إنشاء حساب جديد'; }

/* ==================== الدخول / التسجيل / الخروج ==================== */
async function doLogin(){
  clearAuthMsg();
  const email=document.getElementById('loginEmail').value.trim();
  const pass=document.getElementById('loginPass').value;
  if(!email||!pass){ authMsg('اكتب البريد وكلمة المرور'); return; }
  const btn=document.getElementById('loginBtn'); btn.disabled=true; btn.textContent='جارٍ الدخول...';
  const { error } = await db.auth.signInWithPassword({ email, password:pass });
  btn.disabled=false; btn.textContent='دخول';
  if(error){ authMsg(translateAuthError(error.message)); return; }
  await startApp();
}

async function doSignup(){
  clearAuthMsg();
  const name=document.getElementById('suName').value.trim();
  const email=document.getElementById('suEmail').value.trim();
  const pass=document.getElementById('suPass').value;
  if(!name||!email||!pass){ authMsg('اكمل كل الخانات'); return; }
  if(pass.length<6){ authMsg('كلمة المرور لازم ٦ حروف على الأقل'); return; }
  const btn=document.getElementById('suBtn'); btn.disabled=true; btn.textContent='جارٍ الإنشاء...';
  const { data, error } = await db.auth.signUp({
    email, password:pass, options:{ data:{ full_name:name } }
  });
  btn.disabled=false; btn.textContent='إنشاء الحساب';
  if(error){ authMsg(translateAuthError(error.message)); return; }
  if(data.session){ await startApp(); }           // دخول مباشر (لو تأكيد الإيميل مقفول)
  else { showLogin(); authMsg('تم إنشاء الحساب سجّل دخولك دلوقتي','ok'); }
}

async function doForgot(){
  clearAuthMsg();
  const email=document.getElementById('loginEmail').value.trim();
  if(!email){ authMsg('اكتب بريدك في خانة البريد الأول'); return; }
  const { error } = await db.auth.resetPasswordForEmail(email,{ redirectTo:location.href });
  if(error){ authMsg(translateAuthError(error.message)); return; }
  authMsg('بعتنا رابط استعادة كلمة المرور على بريدك','ok');
}

async function doLogout(){ await db.auth.signOut(); location.reload(); }

function translateAuthError(m){
  m=(m||'').toLowerCase();
  if(m.includes('invalid login')) return 'البريد أو كلمة المرور غير صحيحة';
  if(m.includes('email not confirmed')) return 'لازم تأكيد البريد — أو اقفل تأكيد الإيميل من إعدادات Supabase';
  if(m.includes('already registered')) return 'البريد ده مسجّل قبل كده';
  if(m.includes('rate limit')) return 'محاولات كتير — استنى شوية وحاول تاني';
  return 'حصل خطأ: '+m;
}

/* ==================== بدء التطبيق بعد الدخول ==================== */
async function startApp(){
  const { data:{ user } } = await db.auth.getUser();
  if(!user) return;
  CURRENT.user = user;

  // جلب الملف الشخصي (الاسم + الصلاحية)
  let { data:profile } = await db.from('profiles').select('*').eq('id',user.id).single();
  if(!profile){ // احتياطي لو الـ trigger متأخر
    await db.from('profiles').insert({ id:user.id, full_name:user.email });
    profile = { id:user.id, full_name:user.email, role:'sales' };
  }
  CURRENT.profile = profile;

  // عرض بيانات المستخدم
  const nm = profile.full_name || user.email;
  const role = ROLE_AR[profile.role] || profile.role;
  document.getElementById('uName').textContent = nm;
  document.getElementById('uRole').textContent = role;
  document.getElementById('uAvatar').textContent = (nm[0]||'؟').toUpperCase();
  document.getElementById('dName').textContent = nm;
  document.getElementById('dRole').textContent = role;

  buildNav(profile.role);
  document.getElementById('auth').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  navigate('dashboard');
  startAutoRefresh();
}

let AUTO_TIMER=null;
function startAutoRefresh(){ if(AUTO_TIMER) clearInterval(AUTO_TIMER); AUTO_TIMER=setInterval(quietRefresh,12000); }
function quietRefresh(){
  if(document.hidden) return;
  const mo=document.getElementById('modalBg'), so=document.getElementById('sheetBg');
  if((mo&&mo.classList.contains('show'))||(so&&so.classList.contains('show'))) return;
  const ae=document.activeElement;
  if(ae&&['INPUT','TEXTAREA','SELECT'].includes(ae.tagName)) return;
  try{
    if(CURRENT_PAGE==='dashboard') loadStats();
    else if(CURRENT_PAGE==='inventory') quietReloadInventory();
    else if(CURRENT_PAGE==='day') renderDay();
  }catch(e){ console.warn(e); }
}
async function quietReloadInventory(){
  try{
    const { data:prods } = await db.from('products').select('*').order('name');
    if(prods){ INV.products=prods; const y=window.scrollY; renderProducts(); window.scrollTo(0,y); }
  }catch(e){}
}

async function loadStats(){
  const t0 = todayStartISO();
  const set=(id,v)=>{ const el=document.getElementById(id); if(el) el.textContent=v; };
  const sum=async(fn)=>{ try{ return await fn(); }catch(e){ console.warn(e); return 0; } };
  try{
    // مبيعات + ربح الاكسسوارات اليوم
    const { data:sales=[] } = await db.from('sales').select('total,profit')
      .gte('created_at',t0).eq('status','completed');
    const salesSum = sales.reduce((s,r)=>s+Number(r.total||0),0);
    const accProfit = sales.reduce((s,r)=>s+Number(r.profit||0),0);
    set('kSales',money(salesSum)); set('kProfit',money(accProfit));

    // عدد عمليات الصيانة اليوم
    const maintCount = await sum(async()=>{ const {count}=await db.from('repairs').select('id',{count:'exact',head:true}).gte('received_at',t0); return count||0; });
    set('kMaint', maintCount+' عملية');

    // عمولات الرصيد اليوم من اليوم المقفول النهارده
    const rechargeC = await sum(async()=>{ const {data}=await db.from('business_days').select('recharge_commission').gte('closed_at',t0).eq('status','closed'); return (data||[]).reduce((s,r)=>s+Number(r.recharge_commission||0),0); });
    set('kRecharge',money(rechargeC));

    // مصروفات اليوم
    const expSum = await sum(async()=>{ const {data}=await db.from('expenses').select('amount').gte('created_at',t0).eq('status','active'); return (data||[]).reduce((s,r)=>s+Number(r.amount||0),0); });
    set('kExp',money(expSum));

    // ربح الصيانة اليوم (المسلّمة) للصافي
    const maintProfit = await sum(async()=>{ const {data}=await db.from('repairs').select('profit').gte('delivered_at',t0).eq('status','delivered'); return (data||[]).reduce((s,r)=>s+Number(r.profit||0),0); });
    set('kVoda',money(maintProfit));

    // قيمة المخزون
    const { data:prods=[] } = await db.from('products').select('quantity,wholesale_price');
    const stockVal = prods.reduce((s,r)=>s+Number(r.quantity||0)*Number(r.wholesale_price||0),0);
    set('kStock',money(stockVal));

    // الدرج من اليوم المفتوح أو آخر يوم
    const drawer = await sum(async()=>{
      const o=await getOpenDay(); if(o) return Number(o.drawer_open||0);
      const l=await getLastClosedDay(); return l?Number(l.drawer_close||0):0;
    });
    set('kTreasury',money(drawer)); set('kVfBal',money(rechargeC));

    // صافي ربح اليوم
    const net = accProfit + maintProfit + rechargeC - expSum;
    set('kNet',money(net));

    loadChart();
  }catch(e){
    console.error(e);
    ['kSales','kProfit','kRecharge','kVoda','kExp','kStock','kTreasury','kVfBal','kNet']
      .forEach(id=>set(id,'—'));
    set('kMaint','—');
  }
}

async function loadChart(){
  const days=[]; const now=new Date();
  for(let i=6;i>=0;i--){ const d=new Date(now); d.setDate(now.getDate()-i); d.setHours(0,0,0,0); days.push(d); }
  const startISO = days[0].toISOString();
  const { data:sales=[] } = await db.from('sales').select('total,created_at')
    .gte('created_at',startISO).eq('status','completed');
  const totals = days.map(d=>{
    const next=new Date(d); next.setDate(d.getDate()+1);
    return sales.filter(s=>{ const t=new Date(s.created_at); return t>=d && t<next; })
               .reduce((sum,s)=>sum+Number(s.total||0),0);
  });
  const max=Math.max(...totals,1);
  const names=['الأحد','الإثنين','الثلاثاء','الأربعاء','الخميس','الجمعة','السبت'];
  document.getElementById('bars').innerHTML = days.map((d,i)=>{
    const h=Math.round((totals[i]/max)*100);
    return `<div class="bar-col">
      <div class="a">${totals[i]?Math.round(totals[i]):''}</div>
      <div class="bar" style="height:${totals[i]?Math.max(h,4):4}%"></div>
      <div class="d">${names[d.getDay()]}</div></div>`;
  }).join('');
}

  // 2) حدّث من النت في الخلفية
  try{
    const [{data:cats},{data:sups},{data:prods}] = await Promise.all([
      db.from('categories').select('*').order('name'),

      db.from('products').select('*').order('name'),

    if(!cp) document.getElementById('invList').innerHTML=`<div class="empty"><div class="ic">${ic('warn',32)}</div>مفيش نت ومفيش نسخة محفوظة</div>`;

let _sheetDrag=null;
function initSheetDrag(){
  const s=document.getElementById('sheet'); if(!s||s._dragInit) return; s._dragInit=true;
  s.addEventListener('touchstart',e=>{
    if(s.scrollTop>0) return;
    _sheetDrag={y:e.touches[0].clientY}; s.style.transition='none';
  },{passive:true});
  s.addEventListener('touchmove',e=>{
    if(!_sheetDrag) return;
    const dy=e.touches[0].clientY-_sheetDrag.y;
    if(dy>0){ s.style.transform=`translateY(${dy}px)`; if(e.cancelable) e.preventDefault(); }
  },{passive:false});
  s.addEventListener('touchend',e=>{
    if(!_sheetDrag) return;
    const dy=e.changedTouches[0].clientY-_sheetDrag.y;
    s.style.transition='';
    if(dy>110){ closeSheet(); } else { s.style.transform=''; }
    _sheetDrag=null;
  });
}

function resizeImage(file,max,q){
  return new Promise((res,rej)=>{
    const img=new Image(); const url=URL.createObjectURL(file);
    img.onload=()=>{ let w=img.width,h=img.height;
      if(w>h && w>max){ h=Math.round(h*max/w); w=max; }
      else if(h>=w && h>max){ w=Math.round(w*max/h); h=max; }
      const cv=document.createElement('canvas'); cv.width=w; cv.height=h;
      cv.getContext('2d').drawImage(img,0,0,w,h);
      cv.toBlob(b=>{ URL.revokeObjectURL(url); b?res(b):rej(new Error('blob')); },'image/jpeg',q);
    };
    img.onerror=()=>{ URL.revokeObjectURL(url); rej(new Error('img')); };
    img.src=url;
  });
}

}

/* ---------- مسح الباركود بالكاميرا ----------
   على آيفون الكاميرا الحيّة بتبوظ أحيانًا (خصوصًا في التطبيق المثبّت)،
   فبنوفّر بديل مضمون: «صوّر الباركود» ويتقرا من الصورة.            */
let SCAN_CB = null;
let SCAN_DONE = false;

const BARCODE_READERS = ['ean_reader','ean_8_reader','upc_reader','upc_e_reader','code_128_reader'];

// تحقق من صحة الباركود (خانة المراجعة) — يرفض القراءات الغلط
function validBarcode(code){
  if(!/^\d+$/.test(code)) return true;             // أكواد غير رقمية (Code128) نقبلها
  if([8,12,13].includes(code.length)){
    const digits = code.split('').map(Number);
    const check = digits.pop();
    let sum = 0;
    digits.reverse().forEach((n,i)=> sum += n * (i%2===0 ? 3 : 1));
    return ((10 - (sum % 10)) % 10) === check;
  }
  return code.length >= 6;                          // أرقام بأطوال تانية: نقبل لو طولها معقول
}

function openScanner(onDecode){
  SCAN_CB = onDecode; SCAN_DONE = false;
  document.getElementById('scanBg').innerHTML = `
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-head"><h3>${ic('camera',18)} مسح الباركود</h3><button class="x" onclick="closeScanner()">${ic('close',18)}</button></div>
      <div class="modal-body">
        <div id="reader" class="reader"></div>
        <p style="text-align:center;color:var(--muted);font-size:13px;margin:10px 0 14px">
          خلّي الباركود جوه الإطار وقرّب لحد ما يتقرا</p>
        <button class="tool-btn gold" style="width:100%;justify-content:center;font-size:15px;padding:14px"
          onclick="document.getElementById('snapInput').click()">${ic('camera',18)} صوّر الباركود (الأضمن)</button>
        <input type="file" id="snapInput" accept="image/*" capture="environment" class="hidden" onchange="snapDecode(this)">
      </div>
    </div>`;
  document.getElementById('scanBg').classList.add('show');
  setTimeout(startLiveScan, 300);
}

function startLiveScan(){
  if(typeof Quagga==='undefined'){ liveFallback(); return; }
  const target=document.getElementById('reader'); if(!target) return;
  try{
    Quagga.init({
      inputStream:{ name:'Live', type:'LiveStream', target,
        constraints:{ facingMode:'environment', width:{ideal:1280}, height:{ideal:720} } },
      locator:{ patchSize:'medium', halfSample:true },
      numOfWorkers: 0,
      frequency:10,
      decoder:{ readers:BARCODE_READERS },
      locate:true
    }, (err)=>{
      if(err){ console.error('quagga live init',err); liveFallback(); return; }
      SCANNER=true; Quagga.start();
      setTimeout(applyCameraZoom, 700);
    });
    Quagga.onDetected(onLiveDetected);
  }catch(e){ console.error(e); liveFallback(); }
}
// زوم الكاميرا 4x (لو الجهاز بيدعم) عشان الباركود الصغير
function applyCameraZoom(){
  try{
    const v=document.querySelector('#reader video');
    const stream=v&&v.srcObject; if(!stream) return;
    const track=stream.getVideoTracks()[0]; if(!track) return;
    const caps=track.getCapabilities?track.getCapabilities():{};
    if(caps && caps.zoom){
      const target=Math.min(4, caps.zoom.max||4);
      track.applyConstraints({ advanced:[{ zoom:target }] }).catch(()=>{});
    }
  }catch(e){ /* مش مدعوم */ }
}
function onLiveDetected(result){
  const code = result && result.codeResult && result.codeResult.code;
  if(code && validBarcode(String(code).trim())) onScanResult(String(code).trim());
}
function liveFallback(){
  const r=document.getElementById('reader');
  if(r) r.innerHTML = `<div style="color:#fff;text-align:center;padding:34px 16px;font-size:14px;line-height:1.8">
    ${ic('camera',18)} الكاميرا الحيّة مش متاحة هنا<br>
    <span style="color:#cdd6e4;font-size:13px">اضغط «صوّر الباركود» تحت — بيشتغل ١٠٠٪</span></div>`;
}

function onScanResult(text){
  if(SCAN_DONE) return; SCAN_DONE=true;
  stopScanner();
  const cb=SCAN_CB; SCAN_CB=null;
  hideScanBg();
  if(cb) cb(text);
}

async function snapDecode(input){
  const file = input.files && input.files[0]; if(!file) return; input.value='';
  if(typeof Quagga==='undefined'){ toast('مكتبة الباركود مش محمّلة — اتأكد من النت وافتح الصفحة تاني','err'); return; }
  toast('جارٍ قراءة الباركود...');
  stopScanner();
  try{
    // نجرّب القراءة في ٤ اتجاهات عشان نتغلب على مشكلة اتجاه صور الآيفون
    for(const deg of [0,90,270,180]){
      if(SCAN_DONE) return;
      const dataUrl = await fileToOrientedDataURL(file, 1400, deg);
      const code = await decodeOnce(dataUrl);
      if(code && validBarcode(code)){ onScanResult(code); return; }
    }
    toast('مقدرش يقرا الباركود — قرّب الباركود يملا الصورة، مستقيم وإضاءة كويسة','err');
    if(!SCAN_DONE) setTimeout(startLiveScan,300);
  }catch(e){ console.error('snap error',e);
    toast('حصل خطأ في قراءة الصورة — جرّب تاني','err');
    if(!SCAN_DONE) setTimeout(startLiveScan,300); }
}

// تحويل الصورة لاتجاه صحيح + تدويرها بزاوية معيّنة، وإرجاع dataURL
async function fileToOrientedDataURL(file, maxW, deg){
  let bmp;
  try{ bmp = await createImageBitmap(file, { imageOrientation:'from-image' }); }
  catch(e){ bmp = await createImageBitmap(file); }
  let w=bmp.width, h=bmp.height;
  if(Math.max(w,h) > maxW){ const s=maxW/Math.max(w,h); w=Math.round(w*s); h=Math.round(h*s); }
  const cv=document.createElement('canvas');
  if(deg===90 || deg===270){ cv.width=h; cv.height=w; } else { cv.width=w; cv.height=h; }
  const ctx=cv.getContext('2d');
  ctx.fillStyle='#fff'; ctx.fillRect(0,0,cv.width,cv.height);
  ctx.translate(cv.width/2, cv.height/2);
  ctx.rotate(deg*Math.PI/180);
  ctx.drawImage(bmp, -w/2, -h/2, w, h);
  return cv.toDataURL('image/jpeg', 0.92);
}

// قراءة باركود واحدة من صورة (Promise)
function decodeOnce(src){
  return new Promise(resolve=>{
    Quagga.decodeSingle({
      src, numOfWorkers:0, locate:true,
      inputStream:{ size:1400 },
      locator:{ patchSize:'medium', halfSample:false },
      decoder:{ readers:BARCODE_READERS }
    }, (result)=>{
      const code = result && result.codeResult && result.codeResult.code;
      resolve(code ? String(code).trim() : null);
    });
  });
}

function stopScanner(){
  if(SCANNER){ try{ Quagga.offDetected(onLiveDetected); Quagga.stop(); }catch(e){} SCANNER=null; }
}
function hideScanBg(){ const b=document.getElementById('scanBg'); b.classList.remove('show'); b.innerHTML=''; }
function closeScanner(){ SCAN_CB=null; SCAN_DONE=true; stopScanner(); hideScanBg(); }

async function saveProduct(id){
  const name=document.getElementById('pName').value.trim();
  if(!name){ toast('اكتب اسم المنتج','err'); return; }
  const num=v=>Number(toEnDigits(v||'')||0);
  const rec = {
    name,
    category_id: document.getElementById('pCat').value || null,
    quantity: num(document.getElementById('pQty').value),
    min_stock: num(document.getElementById('pMin').value),
    wholesale_price: num(document.getElementById('pCost').value),
    sale_price: num(document.getElementById('pSale').value),
    barcode: document.getElementById('pBar').value.trim() || null,
    supplier_id: document.getElementById('pSup').value || null,
    kind: document.getElementById('pKind').value || 'accessory',
    image_url: PROD_IMG || null,
    notes: document.getElementById('pNotes').value.trim() || null,
  };
  const btn=document.querySelector('.modal-foot .save'); if(btn){ btn.disabled=true; btn.textContent='جارٍ الحفظ...'; }
  try{
    if(id){
      rec.updated_at = new Date().toISOString();
      const { error } = await db.from('products').update(rec).eq('id',id);
      if(error) throw error;
      // تحديث محلي فوري
      const i=INV.products.findIndex(x=>x.id===id);
      if(i>=0) INV.products[i]={ ...INV.products[i], ...rec };
      logAudit('update','products',id,{name});
      cacheSet('products',INV.products);
      closeSheet(); renderProducts(); toast('تم تعديل المنتج','ok');
    }else{
      const { data, error } = await db.from('products').insert(rec).select().single();
      if(error) throw error;
      INV.products.push(data);
      INV.products.sort((a,b)=>(a.name||'').localeCompare(b.name||'','ar'));
      logAudit('create','products',data.id,{name});
      cacheSet('products',INV.products);
      closeSheet(); renderProducts(); toast('تم إضافة المنتج','ok');
    }
  }catch(e){ console.error(e); toast('خطأ في الحفظ: '+(e.message||''),'err');
    if(btn){ btn.disabled=false; btn.textContent='حفظ'; } }
}

/* ---------- تصدير / استيراد CSV (يفتح في Excel) ---------- */
function exportCSV(){
  const rows=[['الاسم','التصنيف','الباركود','الكمية','الحد الأدنى','سعر الجملة','سعر البيع','المورد','ملاحظات']];
  INV.products.forEach(p=>rows.push([
    p.name, catName(p.category_id), p.barcode||'', p.quantity, p.min_stock,
    p.wholesale_price, p.sale_price, supName(p.supplier_id), p.notes||''
  ]));
  const csv='\uFEFF'+rows.map(r=>r.map(c=>`"${String(c==null?'':c).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download='المخزون-'+new Date().toISOString().slice(0,10)+'.csv'; a.click();
  toast('تم تصدير الملف','ok');
}

async function importCSV(file){
  if(!file) return;
  const text=await file.text();
  const lines=text.replace(/^\uFEFF/,'').split(/\r?\n/).filter(l=>l.trim());
  if(lines.length<2){ toast('الملف فاضي','err'); return; }
  const parseLine=(l)=>{ const out=[]; let cur='',q=false;
    for(let i=0;i<l.length;i++){ const ch=l[i];
      if(q){ if(ch==='"'){ if(l[i+1]==='"'){cur+='"';i++;} else q=false; } else cur+=ch; }
      else { if(ch==='"') q=true; else if(ch===','){ out.push(cur); cur=''; } else cur+=ch; } }
    out.push(cur); return out; };
  let added=0,failed=0;
  for(let i=1;i<lines.length;i++){
    const f=parseLine(lines[i]); if(!f[0]||!f[0].trim()) continue;
    let catId=null; const cn=(f[1]||'').trim();
    if(cn){ let c=INV.categories.find(x=>x.name===cn);
      if(!c){ const{data}=await db.from('categories').insert({name:cn}).select().single(); if(data){c=data;INV.categories.push(data);} }
      catId=c?c.id:null; }
    const rec={ name:f[0].trim(), category_id:catId, barcode:(f[2]||'').trim()||null,
      quantity:Number(f[3]||0), min_stock:Number(f[4]||0),
      wholesale_price:Number(f[5]||0), sale_price:Number(f[6]||0), notes:(f[8]||'').trim()||null };
    const { error } = await db.from('products').insert(rec);
    if(error) failed++; else added++;
  }
  await logAudit('import','products','',{added,failed});
  toast(`تم استيراد ${added} منتج${failed?` (${failed} فشل)`:''}`, failed?'err':'ok');
  document.getElementById('csvFile').value='';
  await loadInventory();
}

function addToCart(productId, finalPrice, keepSearch){
  const p=CASHIER.products.find(x=>x.id===productId); if(!p) return;
  const list=Number(p.sale_price);
  const price=(finalPrice!=null && finalPrice!=='')?Math.max(0,Number(toEnDigits(finalPrice))):list;
  let item=CART.find(i=>i.product_id===productId);
  if(item){ item.qty++; if(finalPrice!=null) item.unit_price=price; }
  else{ CART.push({ product_id:p.id, name:p.name, image_url:p.image_url||'', qty:1,
        list_price:list, unit_price:price, wholesale_price:Number(p.wholesale_price), stock:Number(p.quantity), kind:p.kind||'accessory' }); }
  if(Number(p.quantity) < (item?item.qty:1)) toast('تنبيه: الكمية أكبر من المتاح في المخزون','err');
  if(!keepSearch){ CASHIER.search=''; const inp=document.getElementById('cashInput'); if(inp){ inp.value=''; inp.focus(); } renderCashResults(); }
  renderCart();
}
function changeQty(i,delta){
  CART[i].qty=Math.max(1,CART[i].qty+delta);
  if(CART[i].qty>CART[i].stock) toast('تنبيه: أكبر من المتاح بالمخزون','err');

function renderCart(){

  box.innerHTML=CART.map((i,idx)=>{

    return `<div class="cart-item">

        <div class="stepper">

function setUnitPrice(i,val){
  CART[i].unit_price=Math.max(0,Number(toEnDigits(val)||0));
  const lt=document.getElementById('lt-'+i); if(lt) lt.textContent=money(CART[i].qty*CART[i].unit_price);

function renderTotals(){
  const box=document.getElementById('totalsBox'); if(!box) return;
  box.innerHTML=`
    <div class="row"><span>الإجمالي قبل الخصم</span><b class="num" id="cashSub">—</b></div>
    <div class="row"><span>خصم إضافي</span>
      <input type="text" inputmode="decimal" dir="ltr" value="${CASHIER.discount||''}" placeholder="0" oninput="setDiscount(this.value)"></div>
    <div class="row"><span>إجمالي الخصم</span><b class="num" id="cashDisc" style="color:var(--neg)">—</b></div>
    <div class="row big"><span>المطلوب</span><b class="num" id="cashTot" style="color:var(--pos)">—</b></div>
    <button class="btn-confirm" id="confirmBtn" style="margin-top:14px" onclick="confirmSale()">${ic('check',44)} إتمام البيع</button>`;
  updateTotalsDisplay();
}
function updateTotalsDisplay(){
  // الإجمالي قبل الخصم = على سعر القائمة الأصلي
  const subtotal=CART.reduce((s,i)=>s+i.qty*Number(i.list_price??i.unit_price),0);
  // خصم الأسعار = فرق (سعر القائمة − السعر النهائي) لكل صنف
  const itemsDisc=CART.reduce((s,i)=>s+i.qty*(Number(i.list_price??i.unit_price)-Number(i.unit_price)),0);
  const totalDisc=itemsDisc+Number(CASHIER.discount||0);
  const total=Math.max(0,subtotal-totalDisc);
  const set=(id,v)=>{ const e=document.getElementById(id); if(e) e.textContent=v; };
  set('cashSub',money(subtotal)); set('cashDisc',money(totalDisc)); set('cashTot',money(total));
  const btn=document.getElementById('confirmBtn'); if(btn) btn.disabled=(!DAY||!CART.length);
}
function setDiscount(v){ CASHIER.discount=Math.max(0,Number(toEnDigits(v)||0)); updateTotalsDisplay(); }

// حساب عمولات الوردية بالفرق — الأساس = قفل آخر وردية (استمرارية)
async function computeShiftClose(shift, cl){
  const sum=async(fn)=>{ try{ return await fn(); }catch(e){ console.warn(e); return 0; } };
  const accessory=await sum(async()=>{ const {data}=await db.from('sales').select('total').eq('shift_id',shift.id).eq('status','completed'); return (data||[]).reduce((s,r)=>s+Number(r.total||0),0); });
  const expenses =await sum(async()=>{ const {data}=await db.from('expenses').select('amount').gte('created_at',shift.opened_at).eq('status','active'); return (data||[]).reduce((s,r)=>s+Number(r.amount||0),0); });
  const maint    =await sum(async()=>{ const {data}=await db.from('repairs').select('total').eq('status','delivered').gte('delivered_at',shift.opened_at); return (data||[]).reduce((s,r)=>s+Number(r.total||0),0); });
  const prev=await getLastClosed();
  const mainBase = prev ? Number(prev.closing_cash||0)+Number(prev.closing_credit||0) : Number(shift.opening_cash||0)+Number(shift.opening_credit||0);
  const vfBase   = prev ? Number(prev.closing_vf_liquidity||0)+Number(prev.closing_vf_wallet||0) : Number(shift.opening_vf_liquidity||0)+Number(shift.opening_vf_wallet||0);
  const mainClose=cl.cash+cl.credit;
  const recharge=(mainClose-mainBase)-accessory-maint+expenses;
  const vf=(cl.vfLiq+cl.vfWallet)-vfBase;
  return { accessory, expenses, maint, recharge, vf };
}

async function doCloseShift(btn){
  if(btn){ btn.disabled=true; btn.textContent='جارٍ الحساب...'; }
  const v=id=>Number(toEnDigits(document.getElementById(id).value)||0);
  const cl={ cash:v('cCash'), credit:v('cCredit'), vfLiq:v('cVfLiq'), vfWallet:v('cVfWallet') };
  try{
    const r=await computeShiftClose(SHIFT,cl);
    const { error }=await db.from('cashier_shifts').update({
      status:'closed', closed_at:new Date().toISOString(),
      closing_cash:cl.cash, closing_credit:cl.credit,
      closing_vf_liquidity:cl.vfLiq, closing_vf_wallet:cl.vfWallet,
      recharge_commission:r.recharge, vf_commission:r.vf, accessory_sales:r.accessory

}

let SALE_BUSY=false;
async function confirmSale(){
  if(SALE_BUSY) return;
  if(!DAY){ toast('افتح اليوم الأول','err'); return; }
  if(!CART.length){ toast('السلة فاضية','err'); return; }
  SALE_BUSY=true;
  const btn=document.getElementById('confirmBtn'); if(btn){ btn.disabled=true; btn.textContent='جارٍ الحفظ...'; }
  const subtotal=CART.reduce((s,i)=>s+i.qty*Number(i.list_price??i.unit_price),0);
  const itemsDisc=CART.reduce((s,i)=>s+i.qty*(Number(i.list_price??i.unit_price)-Number(i.unit_price)),0);
  const discount=itemsDisc+Number(CASHIER.discount||0);
  const total=Math.max(0,subtotal-discount);
  const cogs=CART.reduce((s,i)=>s+i.qty*i.wholesale_price,0);
  const profit=total-cogs;
  try{
    const { data:sale, error }=await db.from('sales').insert({
      day_id:DAY.id, category:'mixed', subtotal, discount, total, cogs, profit,
      payment_method:'cash', status:'completed',
      user_id:CURRENT.user.id, user_name:CURRENT.profile.full_name
    }).select().single();
    if(error) throw error;
    const items=CART.map(i=>({ sale_id:sale.id, product_id:i.product_id, product_name:i.name,
      quantity:i.qty, unit_price:i.unit_price, wholesale_price:i.wholesale_price, line_total:i.qty*i.unit_price,
      kind:i.kind||'accessory' }));
    const { error:e2 }=await db.from('sale_items').insert(items); if(e2) throw e2;
    for(const i of CART){
      if(i.product_id==null) continue;
      const { data:p }=await db.from('products').select('quantity').eq('id',i.product_id).single();
      await db.from('products').update({ quantity:Number(p?.quantity||0)-i.qty }).eq('id',i.product_id);
    }
    logAudit('sale','sales',sale.id,{ invoice:sale.invoice_no, total, category:CASHIER.category });
    const receipt={ invoice_no:sale.invoice_no, created_at:sale.created_at, items:CART.slice(), subtotal, discount, total };
    CART=[]; CASHIER.discount=0;
    refreshCashierProducts();
    saleSuccessModal(receipt);
  }catch(e){ console.error(e); toast('خطأ في إتمام البيع: '+(e.message||''),'err');
    if(btn){ btn.disabled=false; btn.textContent='إتمام البيع'; }
  }finally{ SALE_BUSY=false; }
}

  const { data } = await db.from('products').select('id,name,barcode,sale_price,wholesale_price,quantity,image_url,kind').order('name');
  CASHIER.products=data||[];
}

async function returnSale(saleId){
  if(!confirm('تأكيد مرتجع الفاتورة؟ هيرجّع الكمية للمخزون ويخصم القيمة من الخزنة.')) return;
  try{
    const { data:sale }=await db.from('sales').select('*').eq('id',saleId).single();
    const { data:items }=await db.from('sale_items').select('*').eq('sale_id',saleId);
    // ترجيع المخزون
    for(const it of (items||[])){
      const { data:p }=await db.from('products').select('quantity').eq('id',it.product_id).single();
      if(p) await db.from('products').update({ quantity:Number(p.quantity)+Number(it.quantity) }).eq('id',it.product_id);
    }
    // خصم من الخزنة (خرج) + سجل مرتجع + تغيير الحالة
    await db.from('treasury').insert({ direction:'out', category:'مرتجع مبيعات', amount:Number(sale.total),
      description:`مرتجع فاتورة #${sale.invoice_no}`, reference_type:'return', reference_id:String(sale.id),

    await db.from('sales').update({ status:'returned' }).eq('id',saleId);
    await logAudit('return','sales',saleId,{ invoice:sale.invoice_no, total:sale.total });
    toast('تم المرتجع','ok');

}

async function getLatestShift(){
  const { data }=await db.from('cashier_shifts').select('*').order('opened_at',{ascending:false}).limit(1);
  return (data&&data[0])||null;
}
function balancesOf(s){
  if(!s) return { cash:0, credit:0, vfLiq:0, vfWallet:0, open:false };
  if(s.status==='open') return { cash:+s.opening_cash||0, credit:+s.opening_credit||0, vfLiq:+s.opening_vf_liquidity||0, vfWallet:+s.opening_vf_wallet||0, open:true };
  return { cash:+s.closing_cash||0, credit:+s.closing_credit||0, vfLiq:+s.closing_vf_liquidity||0, vfWallet:+s.closing_vf_wallet||0, open:false };
}

let PROFIT_RANGE='today';
function renderProfit(){
  document.getElementById('content').innerHTML=`
    <div class="page-head"><h2>${ic('money',22)} سجل الربح</h2></div>
    <div class="seg" id="pfSeg">
      <button data-r="today" onclick="setProfitRange('today')">اليوم</button>
      <button data-r="week" onclick="setProfitRange('week')">الأسبوع</button>
      <button data-r="month" onclick="setProfitRange('month')">الشهر</button>

    </div>
    <div id="pfCustom" style="display:none;gap:10px;margin-bottom:14px">
      <div class="field2"><label>من</label><input id="pfFrom" type="date"></div>

function setProfitRange(r){
  PROFIT_RANGE=r;
  document.querySelectorAll('#pfSeg button').forEach(b=>b.classList.toggle('on',b.dataset.r===r));
  const cust=document.getElementById('pfCustom');
  if(r==='custom'){ cust.style.display='flex'; return; }
  cust.style.display='none';
  const now=new Date(); let from=new Date(now);
  if(r==='today'){ from.setHours(0,0,0,0); }
  else if(r==='week'){ from.setDate(now.getDate()-6); from.setHours(0,0,0,0); }
  else if(r==='month'){ from.setDate(now.getDate()-29); from.setHours(0,0,0,0); }
  loadProfit(from.toISOString(), new Date().toISOString());
}
function loadProfitCustom(){
  const f=document.getElementById('pfFrom').value, t=document.getElementById('pfTo').value;
  if(!f||!t){ toast('اختر الفترة','err'); return; }
  const from=new Date(f+'T00:00:00').toISOString();
  const to=new Date(t+'T23:59:59').toISOString();
  loadProfit(from,to);
}
async function loadProfit(from,to){
  const el=document.getElementById('pfBody'); if(el) el.innerHTML=`<div class="empty"><div class="ic">${ic('clock',32)}</div>جارٍ الحساب...</div>`;
  const sum=async(fn)=>{ try{ return await fn(); }catch(e){ console.warn(e); return 0; } };
  const sales=await sum(async()=>{ const {data}=await db.from('sales').select('id').gte('created_at',from).lte('created_at',to).eq('status','completed'); return data||[]; })||[];
  const ids=sales.map(s=>s.id);
  let items=[];
  if(ids.length){ items=await sum(async()=>{ const {data}=await db.from('sale_items').select('kind,line_total,quantity,wholesale_price').in('sale_id',ids); return data||[]; })||[]; }
  const kindProfit=(k)=>items.filter(it=>(it.kind||'accessory')===k).reduce((s,it)=>s+(Number(it.line_total||0)-Number(it.quantity||0)*Number(it.wholesale_price||0)),0);
  const accProfit=kindProfit('accessory'), zeroProfit=kindProfit('zero'), usedProfit=kindProfit('used');
  const maintProfit=await sum(async()=>{ const {data}=await db.from('repairs').select('profit').gte('delivered_at',from).lte('delivered_at',to).eq('status','delivered'); return (data||[]).reduce((s,r)=>s+Number(r.profit||0),0); });
  const rechargeC=await sum(async()=>{ const {data}=await db.from('business_days').select('recharge_commission').gte('closed_at',from).lte('closed_at',to).eq('status','closed'); return (data||[]).reduce((s,r)=>s+Number(r.recharge_commission||0),0); });
  const expenses=await sum(async()=>{ const {data}=await db.from('expenses').select('amount').gte('created_at',from).lte('created_at',to).eq('status','active'); return (data||[]).reduce((s,r)=>s+Number(r.amount||0),0); });
  const net=accProfit+zeroProfit+usedProfit+maintProfit+rechargeC-expenses;
  if(!el) return;
  el.innerHTML=`
    <div class="pf-net"><div class="l">صافي الربح</div><div class="v num">${money(net)}</div></div>
    ${pfRow('bag','ربح الاكسسوارات',accProfit)}
    ${pfRow('phone','ربح الزيرو',zeroProfit)}
    ${pfRow('used','ربح المستعمل',usedProfit)}
    ${pfRow('wrench','ربح الصيانة',maintProfit)}
    ${pfRow('card','عمولة الرصيد',rechargeC)}
    ${pfRow('receipt','المصروفات',-expenses,true)}`;
}
function pfRow(icon,name,val,neg){
  return `<div class="pf-row"><div class="l"><span class="e">${ic(icon,18)}</span>${name}</div>
    <div class="am num" style="color:${neg?'var(--neg)':'var(--ink)'}">${money(val)}</div></div>`;
}

async function dayProfitData(day){
  const sum=async(fn)=>{ try{ return await fn(); }catch(e){ console.warn(e); return null; } };
  const sales=await sum(async()=>{ const {data}=await db.from('sales').select('id,total').eq('day_id',day.id).eq('status','completed'); return data||[]; })||[];
  const ids=sales.map(s=>s.id);
  let items=[];
  if(ids.length){ items=await sum(async()=>{ const {data}=await db.from('sale_items').select('kind,line_total,quantity,wholesale_price').in('sale_id',ids); return data||[]; })||[]; }
  const kindProfit=(k)=>items.filter(it=>(it.kind||'accessory')===k)
    .reduce((s,it)=>s+(Number(it.line_total||0)-Number(it.quantity||0)*Number(it.wholesale_price||0)),0);
  const win=day.closed_at||new Date().toISOString();
  const maintRows=await sum(async()=>{ const {data}=await db.from('repairs').select('total,profit').eq('status','delivered').gte('delivered_at',day.opened_at).lte('delivered_at',win); return data||[]; })||[];
  const expRows=await sum(async()=>{ const {data}=await db.from('expenses').select('amount').gte('created_at',day.opened_at).lte('created_at',win).eq('status','active'); return data||[]; })||[];
  return {
    accessory:kindProfit('accessory'), zero:kindProfit('zero'), used:kindProfit('used'),
    maint:maintRows.reduce((s,r)=>s+Number(r.profit||0),0),
    salesTotal:sales.reduce((s,r)=>s+Number(r.total||0),0),
    maintCollected:maintRows.reduce((s,r)=>s+Number(r.total||0),0),
    expenses:expRows.reduce((s,r)=>s+Number(r.amount||0),0)
  };
}

async function doCloseDay(btn){
  if(btn){ btn.disabled=true; btn.textContent='جارٍ الحساب...'; }
  try{
    const drawerClose=Number(toEnDigits(document.getElementById('dCloseDrawer').value)||0);
    const repPay=Number(toEnDigits(document.getElementById('dRepPay').value)||0);
    const closes=[...document.querySelectorAll('.mClose')].map(i=>({ bid:Number(i.dataset.bid), val:Number(toEnDigits(i.value)||0) }));
    const { data:mb }=await db.from('day_machine_balances').select('*').eq('day_id',DAY.id);
    let machineConsumed=0;
    for(const b of (mb||[])){
      const c=closes.find(x=>x.bid===b.id); const closing=c?c.val:Number(b.opening||0);
      machineConsumed += Number(b.opening||0)-closing;   // اللي اتصرف من الرصيد (دخل الدرج)
      await db.from('day_machine_balances').update({ closing }).eq('id',b.id);
    }
    const d=await dayProfitData({ ...DAY, closed_at:new Date().toISOString() });
    // الدرج المتوقع = درج البداية + المصروف من الرصيد + المبيعات الكاملة + الصيانة − مدفوع للمندوب − المصروفات
    const expected=Number(DAY.drawer_open||0)+machineConsumed+d.salesTotal+d.maintCollected-repPay-d.expenses;
    // العمولة = فرق الدرج (المعدود − المتوقع)
    const recharge=drawerClose-expected;
    const net=recharge + d.accessory + d.zero + d.used + d.maint - d.expenses;
    const { error }=await db.from('business_days').update({
      status:'closed', closed_at:new Date().toISOString(),
      drawer_close:drawerClose, drawer_expected:expected, drawer_diff:recharge,
      recharge_commission:recharge, accessory_profit:d.accessory, zero_profit:d.zero, used_profit:d.used,
      maint_profit:d.maint, expenses_total:d.expenses, net_profit:net
    }).eq('id',DAY.id);
    if(error) throw error;
    logAudit('close_day','business_days',DAY.id,{ net, recharge });
    const r={ recharge, ...d, net, expected, drawerClose, repPay, machineConsumed };
    DAY=null; closeModal(); renderDay(); daySummaryModal(r);
  }catch(e){ console.error(e); toast('خطأ في قفل اليوم','err'); if(btn){ btn.disabled=false; btn.textContent='اقفل واحسب'; } }
}
function daySummaryModal(r){

    <div class="modal-body">
      <div class="sum-row"><span>${ic('card',18)} المصروف من الرصيد</span><b class="num">${money(r.machineConsumed)}</b></div>
      <div class="sum-row"><span>${ic('cart',18)} المبيعات (كامل)</span><b class="num">${money(r.salesTotal+r.maintCollected)}</b></div>
      <div class="sum-row"><span>${ic('truck',18)} مدفوع للمندوب</span><b class="num" style="color:var(--neg)">${money(r.repPay)}</b></div>
      <div class="sum-row"><span>الدرج المتوقع</span><b class="num">${money(r.expected)}</b></div>
      <div class="sum-row"><span>الدرج المعدود</span><b class="num">${money(r.drawerClose)}</b></div>
      <div class="sum-row big" style="background:#FFF6E5;border-radius:10px;padding:8px 10px"><span>${ic('card',18)} عمولة الماكينات (الفرق)</span><b class="num" style="color:var(--gold)">${money(r.recharge)}</b></div>
      <div style="height:12px"></div>
      <div class="sum-row"><span>${ic('bag',18)} ربح الاكسسوارات</span><b class="num">${money(r.accessory)}</b></div>
      <div class="sum-row"><span>${ic('phone',18)} ربح الزيرو</span><b class="num">${money(r.zero)}</b></div>
      <div class="sum-row"><span>${ic('used',18)} ربح المستعمل</span><b class="num">${money(r.used)}</b></div>
      <div class="sum-row"><span>${ic('wrench',18)} ربح الصيانة</span><b class="num">${money(r.maint)}</b></div>
      <div class="sum-row"><span>${ic('receipt',18)} مصروفات</span><b class="num" style="color:var(--neg)">${money(r.expenses)}</b></div>
      <div class="sum-row big"><span>صافي ربح اليوم</span><b class="num" style="color:var(--pos)">${money(r.net)}</b></div>
      <div class="modal-foot"><button class="save" onclick="closeModal()">تمام</button></div>
    </div>`);

/* ---------- المصروفات ---------- */
async function expensesModal(){
  openModal(`<div class="modal-head"><h3>${ic('receipt',18)} مصروفات اليوم</h3><button class="x" onclick="closeModal()">${ic('close',18)}</button></div>
    <div class="modal-body">
      <div class="row2">
        <div class="field"><label>المبلغ</label><input id="expAmount" type="text" inputmode="decimal" dir="ltr" placeholder="0"></div>
        <div class="field"><label>البيان</label><input id="expNote" placeholder="مثال: قطعة غيار"></div>
      </div>
      <button class="save" style="width:100%" onclick="doAddExpense()">＋ إضافة مصروف</button>
      <div id="expList" style="margin-top:14px"></div>
    </div>`);
  loadExpensesList();
}
async function loadExpensesList(){
  const el=document.getElementById('expList'); if(!el||!DAY) return;
  const { data }=await db.from('expenses').select('*').gte('created_at',DAY.opened_at).eq('status','active').order('created_at',{ascending:false});
  if(!data||!data.length){ el.innerHTML=`<div style="text-align:center;color:var(--muted);padding:10px">مفيش مصروفات اليوم</div>`; return; }
  el.innerHTML=data.map(e=>`<div class="mini-row"><div class="t">${esc(e.description||'مصروف')}<span>${new Date(e.created_at).toLocaleTimeString('ar-EG',{hour:'2-digit',minute:'2-digit'})}</span></div>
    <b class="num" style="color:var(--neg)">${money(e.amount)}</b></div>`).join('');
}
async function doAddExpense(){
  const amount=Number(toEnDigits(document.getElementById('expAmount').value)||0);
  const note=document.getElementById('expNote').value.trim();
  if(amount<=0){ toast('اكتب مبلغ','err'); return; }
  try{
    await db.from('expenses').insert({ amount, description:note||'مصروف', category:'عام', status:'active',
      user_id:CURRENT.user.id, user_name:CURRENT.profile.full_name });
    logAudit('expense','expenses','',{amount});
    document.getElementById('expAmount').value=''; document.getElementById('expNote').value='';
    toast('اتسجّل المصروف','ok'); loadExpensesList();
  }catch(e){ console.error(e); toast('خطأ في تسجيل المصروف','err'); }
}

/* ---------- الماكينات ---------- */
async function machinesModal(){
  await loadMachines();
  openModal(`<div class="modal-head"><h3>${ic('gear',18)} ماكينات الرصيد</h3><button class="x" onclick="closeModal()">${ic('close',18)}</button></div>
    <div class="modal-body">
      <div class="inline-add"><input id="newMachine" placeholder="اسم ماكينة جديدة (مثال: فودافون)"><button onclick="addMachine()">${ic('plus',16)}</button></div>
      <div id="machineList" style="margin-top:12px">${MACHINES.map(m=>`<div class="mini-row"><div class="t">${esc(m.name)}</div>
        <button style="background:#FDECEA;color:var(--neg);border:none;border-radius:8px;padding:6px 10px" onclick="removeMachine(${m.id})">${ic('trash',15)}</button></div>`).join('')||'<div style="text-align:center;color:var(--muted)">مفيش ماكينات</div>'}</div>
    </div>`);
}
async function addMachine(){
  const name=document.getElementById('newMachine').value.trim(); if(!name) return;
  try{ await db.from('recharge_machines').insert({ name, sort_order:MACHINES.length+1 }); toast('اتضافت','ok'); machinesModal(); }
  catch(e){ console.error(e); toast('خطأ','err'); }
}
async function removeMachine(id){
  if(!confirm('حذف الماكينة؟')) return;
  try{ await db.from('recharge_machines').update({ active:false }).eq('id',id); toast('اتشالت','ok'); machinesModal(); }
  catch(e){ console.error(e); toast('خطأ','err'); }
}

/* ==================== إدارة البيانات (مدير فقط) ==================== */
// الجداول وأعمدة التاريخ بتاعتها (الترتيب مهم بسبب الروابط)
const TX_TABLES = [
  ['sales_returns','created_at'], ['sales','created_at'],
  ['treasury','created_at'], ['expenses','created_at'],
  ['vodafone_cash','created_at'], ['fawry','created_at'],
  ['repairs','received_at'], ['purchases','created_at'],
  ['stock_adjustments','created_at'], ['stock_counts','started_at'],
  ['cashier_shifts','opened_at'], ['business_days','opened_at']
];

function renderDataMgmt(){
  if(CURRENT.profile.role!=='admin'){ renderSoon('datamgmt'); return; }
  const today=new Date().toISOString().slice(0,10);
  const month=today.slice(0,7);
  document.getElementById('content').innerHTML = `
    <div class="page-head"><h2>${ic('trash',22)} إدارة البيانات</h2></div>
    <div class="alert-bar" style="background:#FDECEA;border-color:#F5C6C0;color:#9B2D20">
      ${ic('warn',18)} <span>الحذف نهائي ومينفعش يتراجع فيه. رصيد الخزنة والتقارير هيتعدّلوا حسب اللي اتمسح.</span></div>

    <div class="totals" style="margin-bottom:14px">
      <h3 style="margin:0 0 12px;font-size:16px">مسح سجلات يوم</h3>
      <div class="field"><label>اختر اليوم</label>
        <input id="delDay" type="date" value="${today}" style="width:100%;padding:11px;border:1.5px solid var(--line);border-radius:11px;background:var(--surface-2);font-family:inherit"></div>
      <button class="btn-confirm" style="background:var(--neg)" onclick="confirmDeleteDay()">احذف سجلات اليوم ده</button>
    </div>

    <div class="totals" style="margin-bottom:14px">
      <h3 style="margin:0 0 12px;font-size:16px">مسح سجلات شهر</h3>
      <div class="field"><label>اختر الشهر</label>
        <input id="delMonth" type="month" value="${month}" style="width:100%;padding:11px;border:1.5px solid var(--line);border-radius:11px;background:var(--surface-2);font-family:inherit"></div>
      <button class="btn-confirm" style="background:var(--neg)" onclick="confirmDeleteMonth()">احذف سجلات الشهر ده</button>
    </div>

    <div class="totals">
      <h3 style="margin:0 0 6px;font-size:16px">بداية نضيفة</h3>
      <p style="color:var(--muted);font-size:13px;margin:0 0 12px;line-height:1.6">يمسح <b>كل</b> العمليات (مبيعات، خزنة، صيانة، فودافون، فوري، مصروفات، ورديات...) للتشغيل من جديد. منتجاتك وتصنيفاتك بتفضل زي ما هي.</p>
      <button class="btn-confirm" style="background:#7a1f17" onclick="confirmResetAll()">مسح كل بيانات التجربة</button>
    </div>`;
}

function rangeForDay(d){ const from=new Date(d+'T00:00:00'); const to=new Date(from); to.setDate(from.getDate()+1);
  return [from.toISOString(), to.toISOString()]; }
function rangeForMonth(m){ const from=new Date(m+'-01T00:00:00'); const to=new Date(from); to.setMonth(from.getMonth()+1);
  return [from.toISOString(), to.toISOString()]; }

function confirmDeleteDay(){
  const d=document.getElementById('delDay').value; if(!d) return;
  const [from,to]=rangeForDay(d);
  confirmDanger(`هتمسح كل سجلات يوم ${d} نهائيًا. متأكد؟`, ()=>deleteRange(from,to,`يوم ${d}`));
}
function confirmDeleteMonth(){
  const m=document.getElementById('delMonth').value; if(!m) return;
  const [from,to]=rangeForMonth(m);
  confirmDanger(`هتمسح كل سجلات شهر ${m} نهائيًا. متأكد؟`, ()=>deleteRange(from,to,`شهر ${m}`));
}
function confirmResetAll(){
  confirmDanger('هتمسح كل العمليات من البداية للنهاية نهائيًا. متأكد؟', ()=>deleteRange(null,null,'كل البيانات'));
}

function confirmDanger(msg, onYes){
  window._dangerYes = onYes;
  openModal(`<div class="modal-head"><h3>تأكيد الحذف</h3><button class="x" onclick="closeModal()">${ic('close',18)}</button></div>
    <div class="modal-body">
      <p style="font-size:15px;line-height:1.7;color:#9B2D20"><b>${ic('warn',18)} ${esc(msg)}</b></p>
      <p style="color:var(--muted);font-size:13px">الحذف نهائي. العملية نفسها هتتسجّل في سجل النشاط.</p>
      <div class="modal-foot">
        <button class="cancel" onclick="closeModal()">رجوع</button>
        <button class="save" style="background:var(--neg)" onclick="runDanger()">أكّد الحذف</button>
      </div>
    </div>`);
}
async function runDanger(){ const fn=window._dangerYes; window._dangerYes=null; closeModal(); if(fn) await fn(); }

async function deleteRange(from,to,label){
  toast('جارٍ الحذف...');
  let ok=0, fail=0;
  for(const [table,col] of TX_TABLES){
    try{
      let q=db.from(table).delete();
      if(from && to){ q=q.gte(col,from).lt(col,to); }
      else{ q=q.gte('id',0); }     // كل الصفوف
      const { error }=await q;
      if(error){ console.error(table,error); fail++; } else ok++;
    }catch(e){ console.error(table,e); fail++; }
  }
  await logAudit('delete_data','admin','',{ label, ok, fail });
  toast(fail? `اتمسح ${label} (مع ${fail} جدول فيه مشكلة)` : `اتمسح ${label} ${ic('check',44)}`, fail?'err':'ok');
}

/* ==================== الإعدادات / الوضع الليلي / الأسماء ==================== */
function getTheme(){ try{ return localStorage.getItem('theme')||'light'; }catch(e){ return 'light'; } }
function applyTheme(t){
  document.documentElement.setAttribute('data-theme', t==='dark'?'dark':'light');
  const meta=document.querySelector('meta[name="theme-color"]'); if(meta) meta.setAttribute('content', t==='dark'?'#0E1621':'#0C2A49');
}
function setTheme(t){ try{ localStorage.setItem('theme',t); }catch(e){} applyTheme(t); }

function getAppName(){ try{ return localStorage.getItem('appName')||'محل الموبايلات'; }catch(e){ return 'محل الموبايلات'; } }
function applyAppName(){
  const n=getAppName();
  const a=document.getElementById('appTitle'); if(a) a.textContent=n;
  const b=document.getElementById('brandTitle'); if(b) b.textContent=n;
}

function renderSettings(){
  const isAdmin=CURRENT.profile.role==='admin';
  const dark=getTheme()==='dark';
  document.getElementById('content').innerHTML=`
    <div class="page-head"><h2>${ic('gear',22)} الإعدادات</h2></div>

    <div class="totals" style="margin-bottom:14px">
      <div class="set-row">
        <div><b style="font-size:15px">الوضع الليلي</b><div style="color:var(--muted);font-size:13px">مظهر غامق مريح لليل</div></div>
        <button class="switch ${dark?'on':''}" id="themeSwitch" onclick="toggleTheme()"><span class="knob"></span></button>
      </div>
    </div>

    ${isAdmin?`<div class="totals" style="margin-bottom:14px">
      <h3 style="margin:0 0 10px;font-size:16px">اسم التطبيق</h3>
      <div class="field"><input id="setAppName" value="${esc(getAppName())}" placeholder="اسم التطبيق">
        <p style="color:var(--muted);font-size:12.5px;margin:8px 0 0">يظهر فوق وفي شاشة الدخول.</p></div>
      <button class="save" style="margin-top:10px" onclick="saveAppName()">حفظ الاسم</button>
    </div>`:''}

    <div class="totals">
      <h3 style="margin:0 0 4px;font-size:16px">عن البرنامج</h3>
      <p style="color:var(--muted);font-size:13px;line-height:1.7;margin:0">
        مستخدم: ${esc(CURRENT.profile.full_name||'')}<br>الصلاحية: ${esc(CURRENT.profile.role||'')}</p>
    </div>`;
}
function toggleTheme(){
  const next=getTheme()==='dark'?'light':'dark';
  setTheme(next);
  const sw=document.getElementById('themeSwitch'); if(sw) sw.classList.toggle('on',next==='dark');
}
function saveAppName(){
  const v=(document.getElementById('setAppName').value||'').trim(); if(!v){ toast('اكتب اسم','err'); return; }
  try{ localStorage.setItem('appName',v); }catch(e){}
  applyAppName(); toast('اتحفظ الاسم','ok');
}

// تحويل الأرقام العربي لإنجليزي تلقائيًا في أي خانة
document.addEventListener('input',e=>{
  const el=e.target;
  if(!el||(el.tagName!=='INPUT'&&el.tagName!=='TEXTAREA')) return;
  const v=el.value, c=toEnDigits(v);
  if(c!==v){ let p=null; try{p=el.selectionStart;}catch(_){}
    el.value=c; if(p!=null){ try{ el.setSelectionRange(p,p); }catch(_){} } }
},true);

/* ==================== التشغيل الأول: استعادة الجلسة ==================== */
(async function init(){
  applyTheme(getTheme()); applyAppName();
  if(SUPABASE_KEY.startsWith('ضع_')){
    authMsg('لسه محطّتش مفتاح Publishable في كود الصفحة','err'); return;
  }
  const { data:{ session } } = await db.auth.getSession();
  if(session){ await startApp(); }
})();
</script>
