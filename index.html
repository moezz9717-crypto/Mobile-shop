<style>
/* ========== الإعدادات: الزق مفتاحك في السطر المعلّم تحت ========== */
:root{
  --bg:#FFFFFF; --surface:#FFFFFF; --surface-2:#F2F5FA;
  --ink:#102136; --muted:#6B7A90; --line:#E3E9F2; --field-bd:#BCC9DA;
  --navy:#1a1a1a; --navy-700:#0d0d0d; --navy-900:#000000; --on-navy:#FFD700;
  --gold:#E39A0C; --pos:#138A5E; --neg:#C0392B;
  --shadow:0 10px 30px rgba(16,33,54,.08);
  --radius:18px;
}
[data-theme="dark"]{
  --bg:#0a1c24; --surface:rgba(255,255,255,.055); --surface-2:rgba(255,255,255,.10);
  --ink:#e9f3f2; --muted:#9db4b6; --line:rgba(255,255,255,.12); --field-bd:rgba(255,255,255,.16);
  --navy:#1a1a1a; --navy-700:#2a2a2a; --navy-900:#000000; --on-navy:#FFD700;
  --gold:#E8A622; --pos:#22c58c; --neg:#ff6a5c;
  --shadow:0 14px 36px rgba(0,0,0,.42);
}
/* خلفية متدرّجة زجاجية */
html[data-theme="dark"]{background:#07131b !important}
html[data-theme="dark"] body{background-color:#07131b}
[data-theme="dark"] body{
  background:
    radial-gradient(115% 75% at 8% -6%, rgba(35,200,182,.26), transparent 46%),
    radial-gradient(95% 65% at 98% 6%, rgba(30,130,160,.20), transparent 44%),
    radial-gradient(120% 90% at 50% 108%, rgba(12,90,110,.28), transparent 50%),
    linear-gradient(168deg, #0c2732 0%, #0a1c26 48%, #07131b 100%) !important;
  background-attachment:fixed !important;
}
/* لمسة الزجاج المصنفر على العناصر الرئيسية (قليلة عشان الأداء) */
[data-theme="dark"] .topbar,
[data-theme="dark"] .home-card,
[data-theme="dark"] .st-box,
[data-theme="dark"] .sup-hero{
  -webkit-backdrop-filter:blur(16px) saturate(1.3);
  backdrop-filter:blur(16px) saturate(1.3);
}
/* الصفحات المنزلقة والنوافذ: خلفية شبه معتمة عشان الفتح يبقى سلس من غير نطّ */
[data-theme="dark"] .sheet,[data-theme="dark"] .modal{background:rgba(14,30,39,.975)}
[data-theme="dark"] .modal-head{background:#0e1e27;border-bottom-color:transparent}
[data-theme="dark"] .alert-bar{background:rgba(232,166,34,.14);border-color:rgba(232,166,34,.34);color:#f1c979}
[data-theme="dark"] .alert-bar button{background:rgba(232,166,34,.9);color:#241a04}
[data-theme="dark"] .inv-sticky,
[data-theme="dark"] .debt-search-row{
  background:transparent;
  -webkit-backdrop-filter:none;
  backdrop-filter:none;
}
[data-theme="dark"] .topbar{background:linear-gradient(180deg,rgba(10,30,39,.78),rgba(9,24,32,.32))}
[data-theme="dark"] .topbar::after,[data-theme="dark"] .topbar::before{display:none}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;touch-action:manipulation;-webkit-user-select:none;user-select:none}
input,textarea,[contenteditable="true"]{-webkit-user-select:text;user-select:text;-webkit-touch-callout:default}
input:not([type=checkbox]):not([type=radio]):not([type=color]),textarea,select{color:var(--ink);background:var(--surface-2)}
input::placeholder,textarea::placeholder{color:var(--muted);opacity:1}
input:-webkit-autofill,input:-webkit-autofill:hover,input:-webkit-autofill:focus,input:-webkit-autofill:active{
  -webkit-box-shadow:0 0 0 1000px var(--surface-2) inset !important;
  -webkit-text-fill-color:var(--ink) !important;
  caret-color:var(--ink);transition:background-color 9999s ease-in-out 0s}
input[type=search]{-webkit-appearance:none;appearance:none}
input[type=search]::-webkit-search-cancel-button,
input[type=search]::-webkit-search-decoration{-webkit-appearance:none;appearance:none;display:none}
html,body{margin:0;padding:0;overscroll-behavior:none;overflow-x:hidden;max-width:100vw;min-height:100dvh}
html{background:#eef2f7}
.inv-sticky{position:sticky;top:var(--tbh,58px);z-index:25;background:var(--bg);padding-top:6px;margin-bottom:2px}
.to-top{position:fixed;inset-inline-start:16px;bottom:calc(22px + env(safe-area-inset-bottom));z-index:58;
  width:46px;height:46px;border-radius:50%;background:var(--navy);color:var(--on-navy);border:none;
  box-shadow:0 6px 18px rgba(12,33,54,.35);display:flex;align-items:center;justify-content:center;cursor:pointer;
  opacity:0;transform:translateY(14px) scale(.85);pointer-events:none;transition:opacity .26s ease,transform .26s ease}
.to-top.show{opacity:1;transform:none;pointer-events:auto}
.add-fab{position:fixed;inset-inline-end:16px;bottom:calc(22px + env(safe-area-inset-bottom));z-index:59;
  width:56px;height:56px;border-radius:50%;background:var(--navy);color:var(--on-navy);border:none;
  box-shadow:0 8px 22px rgba(12,33,54,.42);display:flex;align-items:center;justify-content:center;cursor:pointer;
  opacity:0;transform:translateY(14px) scale(.85);pointer-events:none;transition:opacity .26s ease,transform .26s ease}
.add-fab.show{opacity:1;transform:none;pointer-events:auto}
.wh-fab{position:fixed;inset-inline-end:16px;bottom:calc(86px + env(safe-area-inset-bottom));z-index:59;
  width:52px;height:52px;border-radius:50%;background:var(--surface);color:var(--neg);border:1.5px solid #E7A399;
  box-shadow:0 8px 22px rgba(0,0,0,.18);display:flex;align-items:center;justify-content:center;cursor:pointer;
  opacity:0;transform:translateY(14px) scale(.85);pointer-events:none;transition:opacity .26s ease,transform .26s ease}
.wh-fab.show{opacity:1;transform:none;pointer-events:auto}
.wh-fab.on{background:var(--pos);color:#fff;border-color:var(--pos)}
.stk-row{display:flex;align-items:center;gap:10px;background:var(--surface);border:1.5px solid var(--line);
  border-radius:12px;padding:9px 12px;margin-bottom:8px}
.stk-row.ok{border-color:#9BD3BA}
.stk-row.diff{border-color:#E7A399}
.stk-nm{flex:1;font-weight:600;font-size:13.5px;display:flex;flex-direction:column;gap:2px;min-width:0}
.stk-nm span{font-size:11px;color:var(--muted);font-weight:500}
.stk-in{width:72px;padding:9px 6px;text-align:center;border:1.5px solid var(--line);border-radius:9px;
  font-size:15px;background:var(--surface-2);font-family:inherit;flex-shrink:0}
.stk-in:focus{outline:none;border-color:var(--navy-700)}
.stk-diff{width:40px;text-align:center;font-weight:800;font-size:15px;flex-shrink:0}
.stk-sum{display:flex;align-items:center;gap:12px;background:var(--surface);border:1.5px solid var(--line);
  border-radius:12px;padding:9px 13px;margin-bottom:6px}
.stk-sum>div{display:flex;flex-direction:column;align-items:center;line-height:1.15}
.stk-sum>div b{font-size:16px} .stk-sum>div span{font-size:10px;color:var(--muted)}
.stk-apply{margin-inline-start:auto;background:var(--pos);color:#fff;border:none;border-radius:10px;
  padding:10px 13px;font-family:inherit;font-weight:700;font-size:12.5px;display:flex;align-items:center;gap:5px;white-space:nowrap}
.stk-apply:disabled{opacity:.45}
.inv-sentinel{text-align:center;color:var(--muted);font-size:13px;padding:16px 10px;font-weight:600}
.sel-fab{position:fixed;inset-inline-end:16px;bottom:calc(18px + env(safe-area-inset-bottom));z-index:61;
  display:flex;flex-direction:column;align-items:flex-end;gap:0;max-width:72vw;
  opacity:0;transform:translateX(70px);pointer-events:none;
  transition:opacity .5s ease,transform .5s cubic-bezier(.22,.61,.36,1)}
.sel-fab.show{opacity:1;transform:none;pointer-events:auto}
.sel-fab > *{margin-bottom:9px}
.sel-fab > *:last-child{margin-bottom:0}
.sel-fab .sf-info{background:var(--navy);color:var(--on-navy);border-radius:14px;padding:8px 14px;text-align:center;
  box-shadow:0 8px 22px rgba(12,33,54,.4);display:flex;flex-direction:column;gap:1px;line-height:1.25}
.sel-fab .sf-info b{font-size:13.5px} .sel-fab .sf-info span{font-size:10.5px;opacity:.85}
.sel-fab .sf-pill{display:flex;align-items:center;gap:7px;padding:12px 17px;border-radius:26px;border:none;
  font-family:inherit;font-weight:700;font-size:14px;color:#fff;box-shadow:0 6px 18px rgba(0,0,0,.22);white-space:nowrap}
.sel-fab .sf-pill.all{background:var(--navy)}
.sel-fab .sf-pill.pdf{background:var(--gold);color:#3a2700}
.sel-fab .sf-pill.del{background:var(--neg)}
.sel-fab .sf-pill.cancel{background:var(--surface);color:var(--ink);border:1.5px solid var(--line)}
.sel-fab .sf-collapsible{opacity:0;transform:translateX(40px) scale(.92);max-height:0;
  padding-top:0;padding-bottom:0;margin-bottom:0;overflow:hidden;
  transition:opacity .5s ease,transform .5s cubic-bezier(.22,.61,.36,1),max-height .5s ease,padding .5s ease,margin .5s ease}
.sel-fab .sf-collapsible.on{opacity:1;transform:none;max-height:56px;padding-top:12px;padding-bottom:12px;margin-bottom:9px}
.sheet-fab{position:fixed;inset-inline-end:14px;bottom:calc(18px + env(safe-area-inset-bottom));z-index:66;
  display:flex;flex-direction:column;align-items:flex-end;gap:11px;
  opacity:0;transform:translateX(70px);pointer-events:none;
  transition:opacity .5s ease,transform .5s cubic-bezier(.22,.61,.36,1)}
.sheet-fab.show{opacity:1;transform:translateX(0);pointer-events:auto}
.sheet-fab button{width:54px;height:54px;border-radius:50%;border:none;color:#fff;
  display:flex;align-items:center;justify-content:center;box-shadow:0 6px 18px rgba(0,0,0,.28);position:relative}
.sheet-fab button .lb{position:absolute;inset-inline-end:62px;white-space:nowrap;background:rgba(20,38,58,.9);color:#fff;
  font-size:11.5px;font-weight:700;padding:4px 9px;border-radius:8px;opacity:0;transition:opacity .2s}
.sheet-fab button.b-pdf{background:var(--gold);color:#3a2700}
.sheet-fab button.b-edit{background:var(--navy)}
.sheet-fab button.b-save{background:var(--pos)}
.sheet-fab button.b-del{background:var(--neg)}
.sheet-fab button.b-close{background:var(--surface);color:var(--ink);border:1.5px solid var(--line)}
.ps-round{display:flex;justify-content:center;gap:20px;margin:20px 0 4px;flex-wrap:wrap}
.psr-item{display:flex;flex-direction:column;align-items:center;gap:7px}
.psr-item span{font-size:12px;font-weight:600;color:var(--muted)}
.psr{width:58px;height:58px;border-radius:50%;border:none;color:#fff;display:flex;align-items:center;justify-content:center;box-shadow:0 6px 18px rgba(0,0,0,.26)}
.psr.b-pdf{background:var(--gold);color:#3a2700}
.psr.b-edit{background:var(--navy)}
.psr.b-del{background:var(--neg)}
.psr.b-close{background:var(--surface);color:var(--ink);border:1.5px solid var(--line)}
.psr:active{transform:scale(.92)}
.qstep{display:flex;align-items:stretch;gap:6px}
.qstep input{flex:1;text-align:center}
.qstep button{width:42px;flex-shrink:0;border:1.5px solid var(--line);background:var(--surface-2);
  border-radius:11px;font-size:22px;font-weight:700;color:var(--navy);line-height:1;display:flex;align-items:center;justify-content:center}
.qstep button.st-minus{color:var(--neg)}
.qstep button:active{background:var(--line)}
.inp-red{border-color:#E7A399!important;color:var(--neg)!important;font-weight:700}
.inp-green{border-color:#9BD3BA!important;color:var(--pos)!important;font-weight:700}
.sync-badge{position:fixed;left:50%;transform:translateX(-50%) translateY(14px);bottom:calc(16px + env(safe-area-inset-bottom));
  z-index:57;background:var(--gold);color:#3a2700;font-weight:700;font-size:12.5px;padding:9px 16px;border-radius:22px;
  box-shadow:0 6px 18px rgba(0,0,0,.22);display:flex;align-items:center;gap:6px;white-space:nowrap;
  opacity:0;pointer-events:none;transition:opacity .35s ease,transform .35s ease}
.sync-badge.show{opacity:1;transform:translateX(-50%) translateY(0);pointer-events:auto}
.user-card{display:flex;align-items:center;gap:12px;background:var(--surface);border:1.5px solid var(--line);
  border-radius:14px;padding:12px 14px;margin-bottom:10px;box-shadow:var(--shadow)}
.user-card .u-av{width:46px;height:46px;border-radius:50%;background:var(--gold);color:#3a2700;
  display:flex;align-items:center;justify-content:center;font-weight:800;font-size:18px;flex-shrink:0}
.user-card .u-info{flex:1;min-width:0}
.user-card .u-nm{font-weight:700;font-size:15px;display:flex;align-items:center;gap:6px}
.user-card .u-you{font-size:10.5px;background:var(--navy);color:var(--on-navy);padding:1px 7px;border-radius:8px;font-weight:700}
.user-card .u-meta{display:flex;gap:8px;align-items:center;margin-top:3px}
.user-card .u-role{font-size:12.5px;color:var(--muted);font-weight:600}
.user-card .u-dot{font-size:11px;font-weight:700;padding:1px 8px;border-radius:8px}
.user-card .u-dot.on{background:#E7F5EE;color:var(--pos)}
.user-card .u-dot.off{background:#FDECEA;color:var(--neg)}
.perm-row{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:10px 2px;font-size:14px}
.perm-list .perm-row{border-bottom:1px solid var(--line)}
.perm-list .perm-row:last-child{border-bottom:none}
.perm-chk,#uActive{width:22px;height:22px;accent-color:var(--navy);flex-shrink:0}
.theme-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.theme-sw{background:transparent;border:none;padding:0;display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;font-family:inherit}
.theme-sw .sw-dot{width:54px;height:54px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 12px rgba(0,0,0,.18);border:3px solid transparent;transition:transform .15s ease,border-color .15s ease}
.theme-sw.on .sw-dot{border-color:var(--ink);transform:scale(1.06)}
.theme-sw .sw-nm{font-size:12px;font-weight:600;color:var(--muted)}
.theme-sw.on .sw-nm{color:var(--ink);font-weight:700}
.theme-sw:active .sw-dot{transform:scale(.94)}
.recv-sup-box{background:var(--surface);border:1.5px solid var(--line);border-radius:14px;padding:14px;margin-bottom:14px;box-shadow:var(--shadow)}
.recv-search{position:relative;margin-bottom:14px;z-index:30}
.recv-sup-box label{display:block;font-weight:700;font-size:14px;margin-bottom:8px}
.recv-sup-box select{width:100%;padding:12px;border:1.5px solid var(--line);border-radius:11px;background:var(--surface-2);font-family:inherit;font-size:15px;color:var(--ink)}
.recv-sup-row{display:flex;gap:8px;align-items:stretch}
.recv-sup-row select{flex:1}
.recv-add-sup{flex-shrink:0;background:var(--navy);color:var(--on-navy);border:none;border-radius:11px;padding:0 14px;font-family:inherit;font-weight:700;font-size:13.5px;display:flex;align-items:center;gap:5px;cursor:pointer}
.recv-add-sup:active{transform:scale(.96)}
#recvList .r .r-img{width:62px;height:62px;border-radius:12px;font-size:26px}
.recv-cart{background:var(--surface);border:1.5px solid var(--line);border-radius:14px;padding:14px;box-shadow:var(--shadow);margin-top:4px}
.recv-cart-head{display:flex;justify-content:space-between;align-items:center;font-weight:700;font-size:14px;margin-bottom:12px;color:var(--navy)}
.recv-cart-head span:last-child{font-size:12px;color:var(--muted);font-weight:600}
.recv-cart-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--line)}
.rci-del{flex-shrink:0;background:#FDECEA;border:none;color:var(--neg);width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center}
.rci-info{flex:1;min-width:0}
.rci-nm{font-weight:600;font-size:14px}
.rci-meta{font-size:12px;color:var(--muted);margin-top:2px}
.rci-lt{font-weight:700;color:var(--navy);flex-shrink:0}
.recv-cart-total{display:flex;justify-content:space-between;align-items:center;padding-top:12px;font-size:17px;font-weight:800}
.recv-register-btn{background:#111214!important;border:1.5px solid #C9A24B!important;color:#EED9A0!important}
.recv-cart .pinv-table tbody tr{cursor:pointer}
.recv-cart-total b{color:var(--pos)}
.pinv-card{background:var(--surface);border:1.5px solid var(--line);border-radius:13px;padding:13px 14px;margin-bottom:10px;box-shadow:var(--shadow)}
.pinv-top{display:flex;justify-content:space-between;align-items:center}
.pinv-sup{font-weight:700;font-size:14.5px;display:flex;align-items:center;gap:6px}
.pinv-tot{font-weight:800;color:var(--pos)}
.pinv-sub{font-size:12px;color:var(--muted);margin-top:5px}
.pinv-items{margin:14px 0}
.pinv-meta{background:var(--surface-2);border-radius:12px;padding:12px 14px;margin-bottom:14px}
.pinv-meta-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;font-size:13.5px}
.pinv-meta-row span{color:var(--muted);display:flex;align-items:center;gap:6px}
.pir{background:var(--surface);border:1.5px solid var(--line);border-radius:12px;padding:12px 13px;margin-bottom:9px}
.pir-nm{font-weight:700;font-size:14.5px;margin-bottom:7px}
.pir-line{display:flex;justify-content:space-between;align-items:center;font-size:13.5px}
.pir-calc{color:var(--muted)}
.pir-lt{font-weight:800;color:var(--navy)}
.pir-badge{margin-top:8px;font-size:12px;font-weight:700;padding:5px 9px;border-radius:8px;display:inline-block}
.pir-badge.up{background:#FDECEA;color:var(--neg)}
.pir-badge.down{background:#E7F6EF;color:var(--pos)}
.pir-badge.ok,.pir-badge.neutral{background:var(--surface-2);color:var(--muted)}

.pinv-table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;border:1.5px solid var(--line);border-radius:12px}
.pinv-table{width:100%;border-collapse:collapse;font-size:12.5px;min-width:480px;table-layout:fixed}
.pinv-table th{background:var(--surface-2);color:var(--muted);font-weight:800;font-size:11.5px;padding:8px 6px;text-align:center;border-bottom:1.5px solid var(--line);white-space:nowrap}
.pinv-table td{padding:8px 6px;text-align:center;border-bottom:1px solid var(--line);vertical-align:middle;height:58px}
.pinv-table tr:last-child td{border-bottom:none}
.pt-num{color:var(--muted);font-weight:700}
.pt-imgbox{position:relative;width:46px;height:46px;margin:0 auto;border-radius:9px;overflow:hidden;background:var(--surface-2)}
.pt-imgbox img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block;cursor:zoom-in}
.pt-noimg{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:var(--muted)}
.pt-nm{text-align:right;font-weight:700;white-space:normal;word-break:break-word;line-height:1.35}
.pt-qty{font-weight:700}
.pt-price{white-space:nowrap}
.pt-sub{font-size:10px;font-weight:700;margin-top:2px}
.pt-sub.up{color:var(--neg)}
.pt-sub.down{color:var(--pos)}
.pt-total{font-weight:800;color:var(--navy)}
.pt-del{background:none;border:none;color:var(--neg);padding:6px;display:flex;align-items:center;justify-content:center}
.popup-img-wrap{display:flex;align-items:center;justify-content:center;margin-top:4px}
.popup-img-wrap img{max-width:100%;max-height:60vh;border-radius:12px;object-fit:contain}
.pinv-grand{display:flex;justify-content:space-between;align-items:center;padding:14px 4px 4px;font-size:19px;font-weight:800;border-top:2px solid var(--line);margin-top:4px}
.pinv-grand-top{background:var(--surface-2);border:1.5px solid var(--line);border-radius:14px;padding:14px 16px;border-top:none;margin:0 0 14px}
.pinv-pdf-btn{width:100%;display:flex;align-items:center;justify-content:center;gap:8px;
  background:#111214;border:1.5px solid #C9A24B;color:#EED9A0;font-weight:800;font-size:14px;
  padding:12px 0;border-radius:14px;margin-bottom:12px}
.pinv-grand b{color:var(--pos)}
.home-head{margin-bottom:20px}
.home-head h2{font-size:22px;font-weight:800}
.home-head .date{color:var(--muted);font-size:13px;margin-top:5px}
.dash-head{display:flex;align-items:center;justify-content:flex-start;gap:9px;margin:6px 2px 14px}
.dash-head .dh-ic{color:var(--navy);display:flex}
.dash-head h2{margin:0;font-size:19px;font-weight:800;color:var(--ink)}
.home-grid{display:grid;grid-template-columns:1fr 1fr;gap:15px}
.home-card{position:relative;border:1px solid var(--hc-bd,rgba(120,140,170,.18));border-radius:23px;padding:16px 15px;min-height:168px;
  display:flex;flex-direction:column;justify-content:space-between;text-align:right;
  cursor:pointer;font-family:inherit;transition:transform .08s;color:var(--ink);overflow:hidden;box-shadow:0 10px 26px rgba(8,18,32,.16)}
.home-card:active{transform:scale(.96)}
.hc-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
.hc-badge{width:54px;height:54px;border-radius:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0;
  background:var(--cc-bg);color:var(--cc);box-shadow:0 0 26px -6px var(--cc)}
.hc-titles{display:flex;flex-direction:column;gap:3px;align-items:flex-end;min-width:0}
.hc-t{font-weight:800;font-size:16.5px;color:var(--ink);line-height:1.3}
.hc-desc{font-size:12px;color:var(--muted);font-weight:600}
.hc-bottom{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-top:12px}
.hc-val{font-size:21px;font-weight:800;color:var(--ink);white-space:nowrap}
.hc-arrow{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;
  background:var(--cc-bg);color:var(--cc)}
.c-inv{--cc:#3F8FD0;--cc-bg:rgba(63,143,208,.16);background:radial-gradient(135% 95% at 12% 4%,rgba(63,143,208,.22),transparent 60%),var(--surface)}
.c-pur{--cc:#E08A2E;--cc-bg:rgba(224,138,46,.16);background:radial-gradient(135% 95% at 12% 4%,rgba(224,138,46,.22),transparent 60%),var(--surface)}
.c-rep{--cc:#1CA877;--cc-bg:rgba(28,168,119,.16);background:radial-gradient(135% 95% at 12% 4%,rgba(28,168,119,.22),transparent 60%),var(--surface)}
.c-out{--cc:#8B6CF0;--cc-bg:rgba(139,108,240,.16);background:radial-gradient(135% 95% at 12% 4%,rgba(139,108,240,.22),transparent 60%),var(--surface)}
.c-vf{--cc:#E25563;--cc-bg:rgba(226,85,99,.16);background:radial-gradient(135% 95% at 12% 4%,rgba(226,85,99,.22),transparent 60%),var(--surface)}
.c-usr{--cc:#D6A526;--cc-bg:rgba(214,165,38,.16);background:radial-gradient(135% 95% at 12% 4%,rgba(214,165,38,.22),transparent 60%),var(--surface)}
.c-set{--cc:#5E83A8;--cc-bg:rgba(94,131,168,.16);background:radial-gradient(135% 95% at 12% 4%,rgba(94,131,168,.22),transparent 60%),var(--surface)}
/* كارت Bondk Store النيون */
.bondk-hero{background:transparent;box-shadow:none;padding:16px 10px 8px;text-align:center;margin-bottom:14px}
.bondk-neon{font-size:32px;font-weight:900;color:#FFEB3B;font-family:'Trebuchet MS','Segoe UI',Tahoma,Arial,sans-serif;text-shadow:0 0 10px currentColor,0 0 22px currentColor;animation:neonPulse 2.4s ease-in-out infinite;will-change:opacity;backface-visibility:hidden;transform:translateZ(0)}
@keyframes neonPulse{
  0%,100%{opacity:.82}
  50%{opacity:1}
}
/* كارت الحساب تحت */
.home-account{width:100%;margin-top:14px;padding:12px 16px;border:1.5px solid var(--line);border-radius:16px;
  background:var(--surface);font-family:inherit;display:flex;align-items:center;gap:12px;cursor:pointer;box-shadow:var(--shadow)}
.home-account:active{transform:scale(.98)}
.acc-av{width:44px;height:44px;border-radius:50%;background:var(--gold);color:#3a2700;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:18px;flex-shrink:0}
.acc-info{display:flex;flex-direction:column;line-height:1.3;text-align:start}
.acc-info b{font-size:14.5px;color:var(--ink)}
.acc-info small{font-size:12px;color:var(--muted)}
.home-logout{width:100%;margin-top:22px;padding:15px;border:1.5px solid var(--line);border-radius:14px;
  background:var(--surface);color:var(--neg);font-weight:700;font-size:15px;font-family:inherit;
  display:flex;align-items:center;justify-content:center;gap:8px;cursor:pointer}
.home-logout:active{transform:scale(.98)}
/* فودافون كاش */
.vf-card{background:var(--surface);border:1.5px solid var(--line);border-radius:14px;padding:14px;box-shadow:var(--shadow);margin-bottom:14px}
.vf-lbl{display:flex;align-items:center;gap:6px;font-weight:700;font-size:14px;margin-bottom:10px}
.vf-base-row{display:flex;gap:8px}
.vf-base-row input{flex:1;padding:12px;border:1.5px solid var(--line);border-radius:11px;background:var(--surface-2);font-family:inherit;font-size:16px;font-weight:700;color:var(--ink)}
.vf-save-base{flex-shrink:0;background:var(--navy);color:var(--on-navy);border:none;border-radius:11px;padding:0 20px;font-family:inherit;font-weight:700;font-size:14px}
.vf-filters{display:flex;gap:7px;margin-bottom:14px;overflow-x:auto;padding-bottom:2px}
.vf-topbar{display:flex;gap:9px;margin-bottom:14px;align-items:stretch}
.vf-unit-sel{flex-shrink:0;padding:11px 14px;border:1.5px solid var(--line);border-radius:12px;background:var(--navy);color:var(--on-navy);font-family:inherit;font-weight:700;font-size:14px;cursor:pointer}
.vf-datenav{flex:1;display:flex;align-items:center;justify-content:space-between;background:var(--surface);border:1.5px solid var(--line);border-radius:12px;padding:4px 6px;box-shadow:var(--shadow)}
.vf-datenav button{width:38px;height:38px;border:none;background:var(--surface-2);border-radius:10px;color:var(--navy);display:flex;align-items:center;justify-content:center;cursor:pointer}
.vf-datenav button:active{transform:scale(.92)}
.vf-date-lbl{font-weight:700;font-size:14px;text-align:center;flex:1}
.vf-custom-inline{flex:1;display:flex;align-items:center;gap:6px;background:var(--surface);border:1.5px solid var(--line);border-radius:12px;padding:6px 10px}
.vf-custom-inline input{flex:1;min-width:0;border:none;background:transparent;font-family:inherit;color:var(--ink);font-size:12.5px}
.vf-custom-inline span{color:var(--muted)}
.vf-fbtn{flex-shrink:0;padding:9px 16px;border:1.5px solid var(--line);border-radius:10px;background:var(--surface);color:var(--muted);font-family:inherit;font-weight:700;font-size:13.5px}
.vf-fbtn.on{background:var(--navy);color:var(--on-navy);border-color:var(--navy)}
.vf-custom{display:flex;gap:10px;margin-bottom:14px}
.vf-custom>div{flex:1}
.vf-custom label{font-size:12px;color:var(--muted);display:block;margin-bottom:4px}
.vf-custom input{width:100%;padding:10px;border:1.5px solid var(--line);border-radius:10px;background:var(--surface-2);font-family:inherit;color:var(--ink)}
.vf-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px;margin-bottom:14px}
.vf-stat{background:var(--surface);border:1.5px solid var(--line);border-radius:12px;padding:12px 8px;text-align:center;box-shadow:var(--shadow)}
.vf-stat span{display:block;font-size:11.5px;color:var(--muted);margin-bottom:5px}
.vf-stat b{font-size:15px}
.vf-stat small{display:block;font-size:9.5px;color:var(--muted);margin-top:3px}
.vf-stat.s-comm b{color:var(--pos)}
.vf-stat.s-wd b{color:var(--neg)}
.vf-stat.s-dep b{color:#2563EB}
.vf-close-h{font-weight:800;font-size:15px;display:flex;align-items:center;gap:6px;margin-bottom:12px;color:var(--navy)}
.vf-line{display:flex;justify-content:space-between;align-items:center;padding:8px 0;font-size:14px}
.vf-line-tot{border-top:1.5px solid var(--line);margin-top:4px;padding-top:12px;font-size:16px;font-weight:800}
.vf-line-tot b{color:var(--navy)}

.pinv-irow:last-child{border-bottom:none}
.recv-hint{color:var(--muted);font-size:12px;margin:8px 0 0}
.recv-plus{width:42px;height:42px;border-radius:12px;background:var(--surface-2);color:var(--pos);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.recv-prod{font-size:18px;font-weight:800;margin-bottom:6px}
.recv-cur{font-size:13.5px;color:var(--muted);margin-bottom:16px;line-height:1.7}
.recv-sup-tag{background:var(--surface-2);border:1.5px solid var(--line);border-radius:11px;padding:11px 13px;font-size:13.5px;margin:6px 0 14px;display:flex;align-items:center;gap:6px}
.btn.pos{background:var(--pos);display:flex;align-items:center;justify-content:center;gap:8px}
.u-del{flex-shrink:0;background:#FDECEA;border:none;color:var(--neg);width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;cursor:pointer}
.u-del:active{transform:scale(.92)}
.btn.primary{background:var(--navy);display:flex;align-items:center;justify-content:center;gap:8px}
body{
  font-family:'Cairo',system-ui,'Segoe UI',Tahoma,sans-serif;
  background:var(--bg); color:var(--ink);
  font-variant-numeric:tabular-nums; -webkit-font-smoothing:antialiased;
  transition:background .2s, color .2s;
}
/* ظبط الخانات: مفيش زوم (16px)، محدّدة عند الكتابة */
input,select,textarea{font-size:16px}
input:focus,select:focus,textarea:focus{
  outline:none;border-color:var(--gold) !important;
  box-shadow:0 0 0 3px rgba(227,154,12,.20);
}
input[type="text" inputmode="decimal" dir="ltr"],input[inputmode="decimal"]{text-align:center}
.num{font-variant-numeric:tabular-nums; letter-spacing:.2px}
button{font-family:inherit;cursor:pointer}
input{font-family:inherit}
.hidden{display:none !important}

/* ===================== شاشة الدخول ===================== */
#auth{
  min-height:100dvh; display:flex; flex-direction:column; align-items:center; justify-content:center;
  padding:24px;
  background:
    radial-gradient(120% 80% at 88% -8%, var(--navy-700) 0%, transparent 46%),
    radial-gradient(110% 90% at 6% 112%, var(--navy-900) 0%, transparent 48%),
    linear-gradient(165deg, #0c1c26 0%, #0a141d 55%, #070e15 100%);
  position:relative; overflow:hidden; color:#fff;
}
/* أعمدة الإشارة الخفيفة فوق على الشمال */
.signal{position:absolute; top:6%; inset-inline-start:8%; display:flex; gap:14px; align-items:flex-end; opacity:.06}
.signal i{width:24px; background:#fff; border-radius:7px; display:block}
.signal i:nth-child(1){height:70px}.signal i:nth-child(2){height:130px}
.signal i:nth-child(3){height:190px}.signal i:nth-child(4){height:250px}
.auth-card{
  position:relative; z-index:2; width:100%; max-width:400px;
  background:rgba(255,255,255,.035); border:1px solid rgba(255,255,255,.08);
  border-radius:26px; padding:30px 22px 26px;
  box-shadow:0 30px 70px rgba(0,0,0,.45); backdrop-filter:blur(8px);
}
.brand{display:flex; flex-direction:column; align-items:center; gap:12px; margin-bottom:24px}
.brand .mark{
  width:78px;height:78px;border-radius:22px;
  background:linear-gradient(150deg,var(--navy-700),var(--navy-900));
  display:flex;align-items:center;justify-content:center;color:#fff;font-size:30px;
  box-shadow:0 14px 30px rgba(0,0,0,.4);
}
.brand h1{margin:0;font-size:26px;font-weight:800;color:#fff;letter-spacing:.3px}
.brand p{margin:0;font-size:13.5px;color:rgba(255,255,255,.55);text-align:center}
#auth .field{margin-bottom:16px}
#auth .field label{display:block;font-size:14px;font-weight:700;margin-bottom:9px;color:rgba(255,255,255,.92)}
.inp-wrap{position:relative;display:flex;align-items:center}
.inp-wrap .inp-ic{position:absolute;left:15px;color:var(--navy-700);display:flex;align-items:center;pointer-events:none}
.inp-wrap .inp-eye{position:absolute;right:15px;color:rgba(255,255,255,.5);display:flex;align-items:center;cursor:pointer;padding:4px}
#auth .field input{
  width:100%;padding:15px 48px;border:1.5px solid rgba(255,255,255,.12);border-radius:15px;
  font-size:15px;background:rgba(255,255,255,.05);color:#fff;transition:border-color .15s, background .15s;
}
#auth .field input::placeholder{color:rgba(255,255,255,.38)}
#auth .field input:focus{outline:none;border-color:var(--navy-700);background:rgba(255,255,255,.08)}
#auth .btn{
  width:100%;padding:16px;border:none;border-radius:15px;font-size:16.5px;font-weight:800;
  background:linear-gradient(135deg,var(--navy-700),var(--navy));color:var(--on-navy);
  transition:transform .06s, filter .15s; margin-top:8px; box-shadow:0 12px 26px rgba(0,0,0,.3);
}
#auth .btn:active{transform:scale(.99)}
#auth .btn:disabled{opacity:.6}
.btn-ghost{
  width:100%;padding:15px;border:1.5px solid rgba(255,255,255,.16);border-radius:15px;font-size:15.5px;font-weight:700;
  background:transparent;color:#fff;display:flex;align-items:center;justify-content:center;gap:9px;cursor:pointer;transition:background .15s;
}
.btn-ghost:active{background:rgba(255,255,255,.06)}
.auth-forgot{text-align:start;margin:-4px 0 4px}
.auth-forgot a{color:var(--navy-700);font-size:13.5px;font-weight:700;cursor:pointer;text-decoration:none}
.auth-or{display:flex;align-items:center;gap:14px;margin:22px 0 16px;color:rgba(255,255,255,.4);font-size:13.5px;font-weight:600}
.auth-or::before,.auth-or::after{content:'';flex:1;height:1px;background:rgba(255,255,255,.12)}
.link-row{display:flex;justify-content:center;margin-top:16px;font-size:13.5px}
.link-row a{color:var(--navy-700);text-decoration:none;font-weight:700;cursor:pointer}
.app-footer{text-align:center;color:var(--muted);font-size:12.5px;font-weight:600;line-height:1.6;padding:16px 14px 22px;opacity:.85}
#auth .app-footer{color:rgba(255,255,255,.5);position:relative;z-index:2;margin-top:6px}
/* ستايل عام للخانات والأزرار في باقي التطبيق */
.field{margin-bottom:14px}
.field label{display:block;font-size:13px;font-weight:600;margin-bottom:7px;color:var(--ink)}
.field input,.field select,.field textarea{
  width:100%;padding:13px 15px;border:1.5px solid var(--field-bd);border-radius:13px;
  font-size:15px;background:var(--surface-2);color:var(--ink);transition:border-color .15s, background .15s;
}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--navy-700);background:var(--surface)}
.btn{
  width:100%;padding:14px;border:none;border-radius:13px;font-size:16px;font-weight:700;
  background:var(--navy);color:var(--on-navy);transition:transform .06s, background .15s; margin-top:6px;
}
.btn:active{transform:scale(.99)}
.btn:disabled{opacity:.6}
.btn-gold{background:var(--gold)}
.msg{font-size:13.5px;padding:11px 13px;border-radius:11px;margin-bottom:14px;display:none}
.msg.show{display:block}
.msg.err{background:#FDECEA;color:#9B2D20;border:1px solid #F5C6C0}
.msg.ok{background:#E7F6EF;color:#0E6B49;border:1px solid #BDE6D3}

/* ===================== الهيكل العام للتطبيق ===================== */
#app{min-height:100dvh;display:flex;flex-direction:column;padding-top:var(--tbh,62px)}
.topbar{
  background:linear-gradient(120deg,#000,#000);
  color:#fff;padding:13px 16px;display:flex;align-items:center;gap:12px;
  position:fixed;top:0;left:0;right:0;z-index:35;
  padding-top:calc(13px + env(safe-area-inset-top));
}
.topbar::after{content:'';position:absolute;left:0;right:0;bottom:-14px;height:14px;
  background:linear-gradient(to bottom,var(--navy-900),transparent);opacity:.16;pointer-events:none}
.topbar::before{content:'';position:absolute;left:0;right:0;bottom:0;height:14px;
  background:linear-gradient(to bottom,transparent,var(--bg));opacity:.45;pointer-events:none}
.topbar .menu-btn{
  background:rgba(255,255,255,.14);border:none;color:#fff;width:40px;height:40px;
  border-radius:11px;font-size:20px;display:flex;align-items:center;justify-content:center;
}
.topbar .title{flex:1;min-width:0;font-weight:800;font-size:17px;display:flex;align-items:center;gap:8px;min-height:40px}
.topbar .title #appTitle{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0}
.topbar .title .ttl-refresh{background:rgba(255,255,255,.16);border:none;color:#fff;width:30px;height:30px;border-radius:9px;font-size:15px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.brand-neon{font-family:'Trebuchet MS','Segoe UI',Tahoma,Arial,sans-serif;font-weight:900;font-size:21px;color:#FFEB3B;white-space:nowrap;flex-shrink:0;margin-inline-start:6px;animation:neonPulse 2.4s ease-in-out infinite;will-change:opacity;backface-visibility:hidden;transform:translateZ(0)}
@keyframes spin360{to{transform:rotate(360deg)}}
@keyframes pgInR{from{opacity:0;transform:translateX(42px)}to{opacity:1;transform:translateX(0)}}
@keyframes pgInL{from{opacity:0;transform:translateX(-42px)}to{opacity:1;transform:translateX(0)}}
#content.pg-in-r{animation:pgInR .3s cubic-bezier(.22,.61,.36,1)}
#content.pg-in-l{animation:pgInL .3s cubic-bezier(.22,.61,.36,1)}
.ttl-refresh.spin svg{animation:spin360 .75s linear}
.topbar .user{display:flex;align-items:center;gap:9px}
.avatar{width:38px;height:38px;border-radius:50%;background:var(--gold);color:#3a2700;
  display:flex;align-items:center;justify-content:center;font-weight:800;font-size:16px}
.user .who{display:flex;flex-direction:column;line-height:1.2}
.user .who b{font-size:13.5px}
.user .who span{font-size:11px;opacity:.8}

.layout{flex:1;display:flex}
/* الشريط الجانبي (كمبيوتر) */
.sidebar{
  width:248px;background:var(--surface);border-inline-start:1px solid var(--line);
  padding:14px 12px;position:sticky;top:64px;height:calc(100dvh - 64px);overflow-y:auto;
}
.nav-item{
  display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:12px;
  font-weight:600;font-size:15px;color:var(--ink);cursor:pointer;margin-bottom:4px;
  border:none;background:none;width:100%;text-align:start;transition:background .12s;
}
.nav-item .ic{font-size:19px;width:24px;text-align:center}
.nav-item:hover{background:var(--surface-2)}
.nav-item.active{background:var(--navy);color:var(--on-navy)}
.content{flex:1;padding:18px 16px 90px;max-width:1100px;margin:0 auto;width:100%}

/* درج الموبايل */
.overlay{position:fixed;inset:0;background:rgba(8,22,40,.5);z-index:40;opacity:0;
  pointer-events:none;transition:opacity .2s}
.overlay.show{opacity:1;pointer-events:auto}
.drawer{
  position:fixed;top:0;right:0;height:100dvh;width:270px;background:var(--surface);z-index:50;
  transform:translateX(100%);transition:transform .25s ease;padding:16px 12px;overflow-y:auto;
  box-shadow:-12px 0 30px rgba(8,22,40,.18);
}
.drawer.show{transform:translateX(0)}
.drawer .dhead{display:flex;align-items:center;gap:10px;padding:6px 10px 16px;border-bottom:1px solid var(--line);margin-bottom:12px}
.drawer .dhead .mark{width:42px;height:42px;border-radius:12px;background:linear-gradient(150deg,var(--navy-700),var(--navy-900));color:var(--on-navy);display:flex;align-items:center;justify-content:center;font-size:21px}
.drawer .dhead b{font-size:15px}
.drawer .dhead span{font-size:11.5px;color:var(--muted);display:block}

/* ===================== لوحة التحكم ===================== */
.page-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;gap:10px}
.inv-onerow{display:flex;gap:7px;margin-bottom:8px;align-items:stretch}
.inv-onerow select{flex:1;min-width:0;padding:10px 8px;border:1.5px solid var(--field-bd);border-radius:11px;background:var(--surface-2);color:var(--ink);font-family:inherit;font-size:13px;font-weight:600}
.ior-btn{flex-shrink:0;width:42px;border:1.5px solid var(--field-bd);border-radius:11px;background:var(--surface-2);color:var(--navy);display:flex;align-items:center;justify-content:center;cursor:pointer}
.ior-btn:active{transform:scale(.94)}
.page-head h2{display:none}
.page-head:has(>h2:only-child){display:none}
.page-head h2{margin:0;font-size:20px;font-weight:800}
.page-head .date{font-size:13px;color:var(--muted)}
.refresh{background:var(--surface);border:1.5px solid var(--line);border-radius:11px;
  padding:9px 14px;font-weight:600;font-size:14px;display:flex;align-items:center;gap:7px;color:var(--ink)}

/* أبطال: الخزنة وصافي الربح */
.hero{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
.hero-card{border-radius:var(--radius);padding:18px;color:#fff;box-shadow:var(--shadow);position:relative;overflow:hidden}
.hero-card .lbl{font-size:13px;opacity:.9;margin-bottom:8px;font-weight:600}
.hero-card .val{font-size:26px;font-weight:800}
.hero-card.treasury{background:linear-gradient(135deg,var(--navy-700),var(--navy-900))}
.hero-card.net{background:linear-gradient(135deg,#13855a,#0c5f40)}
.hero-card .coin{position:absolute;left:14px;bottom:6px;font-size:54px;opacity:.16}

/* بطاقات الإحصائيات */
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
.stat{background:var(--surface);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);
  border-top:3px solid var(--navy)}
.stat.s-sales{border-top-color:var(--navy)}
.stat.s-profit{border-top-color:var(--pos)}
.stat.s-maint{border-top-color:#7A4FD0}
.stat.s-voda{border-top-color:#E2231A}
.stat.s-fawry{border-top-color:var(--gold)}
.stat.s-exp{border-top-color:var(--neg)}
.stat.s-stock{border-top-color:#0E8A8A}
.stat .top{display:flex;align-items:center;gap:9px;margin-bottom:10px}
.stat .top .ic{font-size:18px}
.stat .top .t{font-size:13px;color:var(--muted);font-weight:600}
.stat .v{font-size:21px;font-weight:800}
.stat .v small{font-size:13px;color:var(--muted);font-weight:600}

/* الرسم البياني */
.chart-card{background:var(--surface);border-radius:var(--radius);padding:18px;box-shadow:var(--shadow);margin-top:14px}
.chart-card h3{margin:0 0 4px;font-size:16px;font-weight:800}
.chart-card .sub{font-size:12.5px;color:var(--muted);margin-bottom:14px}
.bars{display:flex;align-items:flex-end;justify-content:space-between;gap:8px;height:150px}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;height:100%;justify-content:flex-end}
.bar{width:100%;max-width:34px;background:linear-gradient(180deg,var(--navy-700),var(--navy));
  border-radius:8px 8px 0 0;min-height:4px;transition:height .4s ease}
.bar-col .d{font-size:11px;color:var(--muted)}
.bar-col .a{font-size:10.5px;color:var(--ink);font-weight:700}

/* صفحة قريبًا */
.soon{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow);
  padding:46px 22px;text-align:center}
.soon .ic{font-size:46px;margin-bottom:12px}
.soon h3{margin:0 0 6px;font-size:20px;font-weight:800}
.soon p{margin:0;color:var(--muted);font-size:14px;line-height:1.7}

/* ===================== أدوات القسم (toolbar) ===================== */
.toolbar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px;align-items:center}
.toolbar.chips{gap:7px;margin-bottom:6px}
.tool-btn{background:var(--surface);border:1.5px solid var(--line);border-radius:11px;
  padding:10px 13px;font-weight:600;font-size:13.5px;color:var(--ink);display:flex;
  align-items:center;gap:6px;white-space:nowrap}
.tool-btn.sm{padding:7px 11px;font-size:12.5px;border-radius:9px;gap:5px}
.tool-btn.primary{background:var(--navy);color:var(--on-navy);border-color:var(--navy)}
.tool-btn.gold{background:var(--gold);color:#3a2700;border-color:var(--gold)}
.btn-wholesale{background:#FDECEA;border:1.5px solid #E7A399;color:var(--neg);border-radius:9px;
  padding:7px 11px;font-weight:700;font-size:12.5px;display:flex;align-items:center;gap:5px;white-space:nowrap}
.btn-wholesale.on{background:#E7F6EF;border-color:#9BD3BA;color:var(--pos)}
.search-wrap{flex:1;min-width:150px;position:relative}
.search-wrap input{width:100%;padding:11px 38px 11px 38px;border:1.5px solid var(--line);
  border-radius:11px;font-size:14px;background:var(--surface)}
.search-wrap input:focus{outline:none;border-color:var(--navy-700)}
.search-wrap .si{position:absolute;inset-inline-start:12px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none}
.search-clear{position:absolute;inset-inline-end:8px;top:50%;transform:translateY(-50%);
  background:var(--line);border:none;border-radius:50%;width:24px;height:24px;display:flex;
  align-items:center;justify-content:center;color:var(--ink);cursor:pointer;padding:0}
.search-wrap input:placeholder-shown ~ .search-clear{display:none}
.search-clear.show{display:flex}
.filter-sel{padding:8px 10px;border:1.5px solid var(--line);border-radius:9px;background:var(--surface);
  font-size:12.5px;font-family:inherit;color:var(--ink);font-weight:600;flex:1;min-width:0}

/* تنبيه نقص المخزون */
.alert-bar{background:#FFF7E6;border:1px solid #F3D58A;color:#8A5B00;border-radius:13px;
  padding:12px 14px;margin-bottom:14px;display:flex;align-items:center;gap:10px;font-size:13.5px;font-weight:600}
.alert-bar button{margin-inline-start:auto;background:var(--gold);color:#3a2700;border:none;
  border-radius:9px;padding:7px 12px;font-weight:700;font-size:12.5px}

/* قائمة المنتجات */
.plist{display:grid;grid-template-columns:1fr;gap:10px}
.pcard{background:var(--surface);border-radius:14px;box-shadow:var(--shadow);padding:13px 14px;
  -webkit-user-select:none;user-select:none;-webkit-touch-callout:none;
  display:flex;align-items:center;gap:13px}
.pcard .thumb{width:82px;height:82px;border-radius:13px;background:var(--surface-2);
  display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0;
  overflow:hidden;border:1px solid var(--line)}
.pcard .thumb img{width:100%;height:100%;object-fit:cover}
.pcard .info{flex:1;min-width:0}
.pcard .info .nm{font-weight:700;font-size:15px;margin-bottom:3px;line-height:1.3;word-break:break-word}
.pcard .info .meta{font-size:12px;color:var(--muted);display:flex;gap:10px;flex-wrap:wrap}
.pcard .info .meta b{color:var(--ink)}
.pcard .info .meta .q{color:var(--ink);font-weight:700}
.pcard .info .meta .q.low{color:var(--neg)}
.pcard .price-box{text-align:center;flex-shrink:0;padding-inline:6px;min-width:64px}
.pcard .price-box .n{font-weight:800;font-size:16px;color:var(--pos)}
.pcard .price-box .l{font-size:10.5px;color:var(--muted)}
.badge-low{display:inline-block;background:#FDECEA;color:#B0271A;font-size:10px;font-weight:700;
  padding:2px 7px;border-radius:20px;margin-inline-start:6px}
.pcard .acts{display:flex;flex-direction:column;gap:6px;flex-shrink:0}
.pcard .acts button{border:none;background:var(--surface-2);width:34px;height:34px;border-radius:9px;
  display:flex;align-items:center;justify-content:center;color:var(--navy)}
.pcard .acts .del{background:#FDECEA;color:var(--neg)}
.pcard.sel{background:var(--navy-700);border-color:var(--navy-700)}
.pcard.sel .info .nm{color:#fff}
.pcard.sel .info .meta,.pcard.sel .info .meta span,.pcard.sel .info .meta .q,.pcard.sel .info .meta .q.low{color:#d4e1f0}
.pcard.sel .price-box .n,.pcard.sel .price-box .n.num{color:#fff!important}
.pcard.sel .price-box .l{color:#bcd2ea}
.pcard.sel .thumb{background:rgba(255,255,255,.14);border-color:rgba(255,255,255,.22);color:#fff}
.pcard.sel .badge-low{background:rgba(255,255,255,.22);color:#fff}
.pwrap{position:relative;border-radius:14px;overflow:hidden;touch-action:pan-y}
.pw-l,.pw-r{position:absolute;top:0;bottom:0;display:flex;align-items:center;gap:7px;color:#fff;font-weight:800;font-size:15px;padding:0 22px;z-index:1;opacity:0}
.pwrap.swiping .pw-l,.pwrap.swiping .pw-r{opacity:1}
.pw-l{left:0;background:var(--pos)}
.pw-r{right:0;background:var(--neg)}
.pwrap .pcard{position:relative;z-index:2;background:var(--surface)}

.sel-bar{position:fixed;left:14px;right:14px;bottom:calc(14px + env(safe-area-inset-bottom));z-index:55;
  background:var(--navy);color:var(--on-navy);border-radius:14px;padding:12px 16px;display:flex;align-items:center;gap:12px;
  box-shadow:0 10px 30px rgba(0,0,0,.3)}
.sel-bar .c{flex:1;font-weight:700;font-size:14.5px}
.sel-bar button{border:none;border-radius:10px;padding:9px 14px;font-family:inherit;font-weight:700;font-size:13.5px}
.sel-bar .del{background:var(--neg);color:#fff}
.sel-bar .cancel{background:rgba(255,255,255,.2);color:#fff}

.empty{background:var(--surface);border-radius:14px;box-shadow:var(--shadow);
  padding:40px 20px;text-align:center;color:var(--muted)}
.empty .ic{font-size:40px;margin-bottom:10px}

/* ===================== النوافذ المنبثقة (Modal) ===================== */
.modal-bg{position:fixed;inset:0;background:rgba(8,22,40,.55);z-index:80;display:flex;
  align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .5s ease}
.popup-bg{position:fixed;inset:0;background:rgba(8,14,20,.6);z-index:85;display:flex;
  align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .3s ease;padding:20px}
.popup-bg.show{opacity:1;pointer-events:auto}
.popup-card{position:relative;background:var(--surface);color:var(--ink);width:100%;max-width:340px;
  border-radius:20px;padding:20px 18px 16px;box-shadow:0 20px 60px rgba(0,0,0,.4);
  transform:scale(.9);opacity:0;transition:transform .28s cubic-bezier(.22,.61,.36,1),opacity .28s ease}
.popup-bg.show .popup-card{transform:scale(1);opacity:1}
.popup-x{position:absolute;left:10px;top:10px;background:var(--surface-2);border:none;width:32px;height:32px;
  border-radius:10px;color:var(--muted);display:flex;align-items:center;justify-content:center}
.popup-title{text-align:center;font-size:16px;font-weight:800;margin:2px 0 16px}
.popup-row{display:flex;align-items:center;justify-content:space-between;padding:9px 2px;border-bottom:1px dashed var(--line);font-size:13.5px}
.popup-row:last-of-type{border-bottom:none}
.popup-row span{color:var(--muted)}
.popup-row b{font-weight:800}
.popup-actions{display:flex;gap:10px;margin-top:16px}
.popup-btn{flex:1;padding:12px 0;border-radius:13px;border:none;font-weight:800;font-size:13.5px;display:flex;align-items:center;justify-content:center;gap:6px}
.popup-btn.edit{background:var(--surface-2);color:var(--ink)}
.popup-btn.del{background:var(--neg);color:#fff}
.modal-bg.show{opacity:1;pointer-events:auto}
.modal{background:var(--surface);width:100%;max-width:520px;border-radius:22px 22px 0 0;
  max-height:92dvh;overflow-y:auto;-webkit-overflow-scrolling:touch;transform:translateY(100%);transition:transform .5s cubic-bezier(.22,.61,.36,1)}
.modal-bg.show .modal{transform:translateY(0)}
.modal-head{position:sticky;top:0;background:var(--surface);padding:16px 18px 12px;
  border-bottom:1px solid var(--line);display:flex;align-items:center;gap:10px;z-index:2}
.modal-head h3{margin:0;font-size:18px;font-weight:800;flex:1}
.modal-head .x{background:var(--surface-2);border:none;width:34px;height:34px;border-radius:10px;font-size:18px;color:var(--muted)}
.modal-body{padding:16px 18px 20px}
.selbar{position:fixed;left:12px;right:12px;bottom:calc(12px + env(safe-area-inset-bottom));z-index:60;
  background:var(--navy);color:var(--on-navy);border-radius:16px;padding:11px 14px;box-shadow:0 10px 30px rgba(12,33,54,.35);
  display:flex;flex-direction:column;gap:9px}
.selbar .sb-info{display:flex;flex-direction:column;gap:2px;font-size:13.5px}
.selbar .sb-info span{font-size:12px;opacity:.85;font-weight:600}
.selbar .sb-btns{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.selbar .sb-btns button{border:none;border-radius:11px;padding:12px 8px;font-family:inherit;
  font-weight:700;font-size:13.5px;display:flex;align-items:center;justify-content:center;gap:5px;color:#fff}
.selbar .sb-cancel{background:rgba(255,255,255,.16)}
.selbar .sb-all{background:rgba(255,255,255,.16)}
.selbar .sb-pdf{background:var(--gold);color:#3a2700}
.selbar .sb-del{background:var(--neg)}
.modal-body .field{margin-bottom:13px}
.modal-body label{display:block;font-size:13px;font-weight:600;margin-bottom:6px}
.modal-body input,.modal-body select,.modal-body textarea{
  width:100%;padding:11px 13px;border:1.5px solid var(--line);border-radius:11px;font-size:15px;
  background:var(--surface-2);font-family:inherit}
.modal-body input:focus,.modal-body select:focus,.modal-body textarea:focus{outline:none;border-color:var(--navy-700);background:var(--surface)}
.modal-body textarea{resize:vertical;min-height:60px}

.head-actions{display:flex;gap:6px;flex-shrink:0}
.head-actions button{background:var(--surface);border:1.5px solid var(--line);border-radius:10px;
  padding:7px 9px;font-family:inherit;font-weight:600;font-size:11.5px;color:var(--ink);
  display:flex;align-items:center;gap:4px;white-space:nowrap}
.filter-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.filter-row select{width:100%;padding:11px 12px;border:1.5px solid var(--line);border-radius:11px;
  background:var(--surface);font-size:13.5px;font-family:inherit;color:var(--ink);font-weight:600}
.inv-actions{display:flex;flex-direction:column;gap:8px}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.row3 .field label{font-size:11.5px}
.row3 select{padding:9px 6px;font-size:12.5px}
.inline-add{display:flex;gap:8px}
.inline-add select{flex:1}
.inline-add button{background:var(--navy);color:var(--on-navy);border:none;border-radius:11px;width:46px;font-size:20px;flex-shrink:0}
.modal-foot{display:flex;gap:10px;margin-top:8px}
.modal-foot button{flex:1;padding:13px;border:none;border-radius:12px;font-weight:700;font-size:15px}
.modal-foot .save{background:var(--navy);color:var(--on-navy)}
.modal-foot .cancel{background:var(--surface-2);color:var(--ink)}
.mini-list{margin-top:4px;max-height:56vh;overflow-y:auto;-webkit-overflow-scrolling:touch}
.mini-row{display:flex;align-items:center;gap:10px;padding:11px 12px;border:1px solid var(--line);
  border-radius:11px;margin-bottom:8px}
.mini-row .t{flex:1;font-weight:600;font-size:14px}
.mini-row .t span{display:block;font-size:12px;color:var(--muted);font-weight:400}
.mini-row button{background:#FDECEA;color:var(--neg);border:none;width:32px;height:32px;border-radius:9px;font-size:14px}
.mini-acts{display:flex;gap:6px;flex-shrink:0}
.mini-row .mini-acts button:first-child{background:var(--surface-2);color:var(--navy);border:1.5px solid var(--line)}

/* تنبيه صغير (toast) */
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(80px);
  background:var(--navy-900);color:var(--on-navy);padding:12px 20px;border-radius:30px;font-size:14px;font-weight:600;
  z-index:95;opacity:0;transition:all .25s;box-shadow:0 8px 24px rgba(0,0,0,.3);max-width:90vw;text-align:center}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}
.toast.ok{background:#0c5f40}.toast.err{background:#8A2018}

/* صورة المنتج + الماسح */
.photo-box{margin-bottom:14px}
.photo-add{width:100%;border:2px dashed var(--line);background:var(--surface-2);border-radius:14px;
  padding:22px;display:flex;flex-direction:column;align-items:center;gap:8px;color:var(--muted);
  font-weight:600;font-size:14px}
.photo-prev{width:100%;max-height:200px;object-fit:contain;background:var(--surface-2);
  border-radius:14px;border:1px solid var(--line);display:block}
.photo-acts{display:flex;gap:9px;margin-top:9px}
.photo-acts button{flex:1;padding:10px;border:1.5px solid var(--line);background:var(--surface);
  border-radius:11px;font-weight:600;font-size:13.5px;color:var(--ink)}
.photo-acts .rm{background:#FDECEA;color:var(--neg);border-color:#F5C6C0}
.reader{position:relative;width:100%;height:40vh;min-height:190px;max-height:330px;border-radius:14px;overflow:hidden;background:#000}
.scan-frame{position:absolute;inset:18% 14%;border:3px solid rgba(255,255,255,.9);border-radius:16px;
  box-shadow:0 0 0 2000px rgba(0,0,0,.28);pointer-events:none}
.scan-frame::after{content:"";position:absolute;left:6%;right:6%;top:50%;height:2px;background:rgba(227,154,12,.95);
  box-shadow:0 0 8px rgba(227,154,12,.8);animation:scanline 1.8s ease-in-out infinite}
@keyframes scanline{0%,100%{top:14%}50%{top:86%}}
.scan-torch{position:absolute;top:12px;inset-inline-end:12px;width:42px;height:42px;border-radius:50%;
  background:rgba(0,0,0,.45);border:1.5px solid rgba(255,255,255,.5);color:#fff;display:flex;
  align-items:center;justify-content:center;cursor:pointer;backdrop-filter:blur(4px)}
.scan-torch.on{background:var(--gold);border-color:var(--gold);color:#3a2700}
.reader video,.reader canvas{width:100%!important;height:100%!important;object-fit:cover;display:block}
.reader canvas.drawingBuffer{position:absolute;top:0;left:0}

/* ===================== الكاشير ===================== */
.shift-bar{border-radius:14px;padding:14px 16px;margin-bottom:14px;display:flex;align-items:center;gap:12px;color:#fff}
.shift-bar.closed{background:linear-gradient(135deg,#8a6d1e,#6b5212)}
.shift-bar.open{background:linear-gradient(135deg,#13855a,#0c5f40)}
.shift-bar .si{font-size:24px}
.shift-bar .txt{flex:1;font-size:13.5px}
.shift-bar .txt b{display:block;font-size:15px;margin-bottom:2px}
.shift-bar button{background:rgba(255,255,255,.2);border:none;color:#fff;padding:9px 14px;border-radius:10px;font-weight:700;font-size:13.5px}

.cash-search{position:relative;margin-bottom:8px;display:flex;gap:8px}
.cash-input-wrap{position:relative;flex:1;display:flex}
.cash-input-wrap input{padding-inline-end:40px!important}
.cash-dropdown{position:absolute;top:calc(100% + 6px);left:0;right:0;z-index:40}
#recvList.cash-dropdown{position:static;margin-top:8px}
#recvList.cash-dropdown:empty{margin-top:0}
#recvList .cash-results{background:var(--surface-2)}
.cash-dropdown .cash-results{box-shadow:0 12px 30px rgba(16,33,54,.18);max-height:340px;overflow-y:auto}
.cash-search input{flex:1;padding:13px 15px;border:1.5px solid var(--line);border-radius:12px;font-size:15px;background:var(--surface)}
.cash-search input:focus{outline:none;border-color:var(--navy-700)}
.cash-results{background:var(--surface);border-radius:12px;box-shadow:var(--shadow);margin-bottom:14px;overflow:hidden}
.cash-results .r{display:flex;align-items:center;gap:10px;padding:12px 14px;border-bottom:1px solid var(--line)}
.cash-results .r:last-child{border-bottom:none}
.cash-results .r .nm{flex:1;font-weight:600;font-size:14.5px;line-height:1.35}
.cash-results .r .r-img{width:42px;height:42px;border-radius:9px;background:var(--surface-2);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:20px;overflow:hidden;border:1px solid var(--line)}
.cash-results .r .r-img img{width:100%;height:100%;object-fit:cover}
.cash-results .r .pr{font-weight:700;color:var(--navy)}
.cash-results .r .pr.green{color:var(--pos)}
.cash-results .r .st{font-size:11px;color:var(--muted)}
.cash-results .r button{background:var(--navy);color:var(--on-navy);border:none;border-radius:9px;width:38px;height:38px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ci-thumb{width:40px;height:40px;border-radius:9px;background:var(--surface-2);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:19px;overflow:hidden;border:1px solid var(--line)}
.ci-thumb img{width:100%;height:100%;object-fit:cover}

.cart{background:var(--surface);border-radius:14px;box-shadow:var(--shadow);overflow:hidden;margin-bottom:14px}
.cart-empty{padding:34px 18px;text-align:center;color:var(--muted)}
.cart-item{display:flex;flex-direction:column;gap:10px;padding:13px 14px;border-bottom:1px solid var(--line)}
.cart-item:last-child{border-bottom:none}
.ci-top{display:flex;align-items:flex-start;gap:10px}
.ci-name{flex:1;font-size:14.5px;font-weight:700;line-height:1.35;word-break:break-word}
.ci-bot{display:flex;align-items:center;gap:10px}
.ci-price{display:flex;align-items:center;gap:6px;font-size:12.5px;color:var(--muted)}
.price-edit{width:78px;padding:7px 8px;border:1.5px solid var(--line);border-radius:9px;text-align:center;font-size:14px;background:var(--surface-2);font-family:inherit}
.price-edit:focus{outline:none;border-color:var(--navy-700);background:var(--surface)}
.stepper{display:flex;align-items:center;border:1.5px solid var(--line);border-radius:10px;overflow:hidden}
.stepper button{background:var(--surface-2);border:none;width:32px;height:34px;font-size:18px;color:var(--ink)}
.stepper .q{width:36px;text-align:center;font-weight:700;font-size:15px}
.cart-item .lt{font-weight:800;font-size:14.5px;margin-inline-start:auto;text-align:left}
.cart-item .rm{background:#FDECEA;color:var(--neg);border:none;width:32px;height:32px;border-radius:8px;font-size:13px;flex-shrink:0}

.totals{background:var(--surface);border-radius:14px;box-shadow:var(--shadow);padding:16px;margin-bottom:14px}
.totals .row{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;font-size:14.5px}
.totals .row.big{font-size:20px;font-weight:800;margin-bottom:0;padding-top:10px;border-top:2px solid var(--line)}
.totals input{width:110px;padding:8px 10px;border:1.5px solid var(--line);border-radius:9px;text-align:center;font-size:15px;background:var(--surface-2)}
.btn-confirm{width:100%;padding:16px;border:none;border-radius:14px;background:var(--pos);color:#fff;font-size:17px;font-weight:800}
.btn-confirm:disabled{opacity:.5}
.btn-line{display:flex;gap:10px;margin-top:10px}
.btn-line button{flex:1;padding:12px;border:1.5px solid var(--line);background:var(--surface);border-radius:11px;font-weight:600;font-size:14px;color:var(--ink)}

.sale-ok{text-align:center;padding:10px 4px}
.sale-ok .ic{font-size:54px;margin-bottom:6px}
.sale-ok .t{font-size:17px;font-weight:800;margin-bottom:4px}
.sale-ok .amt{font-size:30px;font-weight:800;color:var(--pos);margin:8px 0}

/* الطباعة */
#printArea{display:none}
@media print{
  body *{visibility:hidden}
  #printArea,#printArea *{visibility:visible}
  #printArea{display:block;position:absolute;top:0;right:0;left:0;padding:8px;font-family:'Cairo',sans-serif}
}

/* الصيانة */
.status-pill{display:inline-block;color:#fff;font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px}
.rcard{background:var(--surface);border-radius:14px;box-shadow:var(--shadow);padding:14px;margin-bottom:10px}
.rcard .rtop{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.rcard .rno{font-weight:800;font-size:14px;color:var(--navy)}
.rcard .rtot{margin-inline-start:auto;font-weight:800}
.rcard .rmid{font-size:14px;font-weight:600;margin-bottom:3px}
.rcard .rsub{font-size:12.5px;color:var(--muted);line-height:1.5}
.status-sel{width:100%;padding:11px;border:1.5px solid var(--line);border-radius:11px;background:var(--surface-2);font-family:inherit;font-size:15px;font-weight:600}

/* الخزينتين / الربح */
.acc-box{background:var(--surface-2);border:1.5px solid var(--line);border-radius:12px;padding:12px;margin-bottom:12px}
.acc-box.vf{background:#F2EEFB;border-color:#E0D5F5}
.acc-title{font-weight:700;font-size:14px;margin-bottom:10px}
.acc-row{display:flex;gap:10px}
.field2{flex:1}
.field2 label{display:block;font-size:12.5px;color:var(--muted);margin-bottom:5px}
.field2 input{width:100%;padding:11px;border:1.5px solid var(--line);border-radius:10px;background:var(--surface);font-family:inherit;font-size:16px;text-align:center}
.field2 input:focus{outline:none;border-color:var(--navy-700)}
.sum-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--line);font-size:14.5px}
.sum-row:last-of-type{border-bottom:none}
.sum-row.big{font-size:17px;font-weight:800;border-top:2px solid var(--line);border-bottom:none;margin-top:4px;padding-top:12px}

.tcard{border-radius:16px;padding:16px;margin-bottom:12px;color:#fff}
.tcard.main{background:linear-gradient(135deg,#15406B,#0C2A49)}
.tcard.vf{background:linear-gradient(135deg,#5B3FA0,#3C2870)}
.tcard .tlbl{font-size:13.5px;opacity:.9}
.tcard .ttot{font-size:30px;font-weight:800;margin:4px 0 12px}
.tcard .tcols{display:flex;gap:10px}
.tcard .tcol{flex:1;background:rgba(255,255,255,.15);border-radius:11px;padding:10px 12px}
.tcard .tcol .k{font-size:12px;opacity:.85}
.tcard .tcol .v{font-size:17px;font-weight:700;margin-top:2px}

.seg{display:flex;gap:6px;background:var(--surface-2);border-radius:12px;padding:5px;margin-bottom:14px}
.seg button{flex:1;border:none;background:transparent;padding:9px;border-radius:9px;font-family:inherit;font-size:13.5px;font-weight:600;color:var(--muted)}
.seg button.on{background:var(--surface);color:var(--navy);box-shadow:var(--shadow)}
.pf-row{display:flex;justify-content:space-between;align-items:center;background:var(--surface);border-radius:12px;box-shadow:var(--shadow);padding:14px 16px;margin-bottom:8px}
.pf-row .l{display:flex;align-items:center;gap:10px;font-size:14.5px;font-weight:600}
.pf-row .l .e{font-size:20px}
.pf-row .am{font-weight:800;font-size:15px}
.pf-net{background:linear-gradient(135deg,#138A5E,#0c5f40);color:#fff;border-radius:16px;padding:18px;text-align:center;margin-bottom:14px}
.pf-net .l{font-size:14px;opacity:.9}
.pf-net .v{font-size:32px;font-weight:800;margin-top:4px}

/* الإعدادات */
.set-row{display:flex;align-items:center;justify-content:space-between;gap:12px}
.switch{width:52px;height:30px;border-radius:30px;border:none;background:var(--line);position:relative;transition:background .2s;flex-shrink:0}
.switch.on{background:var(--pos)}
.switch .knob{position:absolute;top:3px;right:3px;width:24px;height:24px;border-radius:50%;background:#fff;transition:transform .2s;box-shadow:0 1px 3px rgba(0,0,0,.3)}
.switch.on .knob{transform:translateX(-22px)}

/* الصفحة المنزلقة (bottom sheet) */
.sheet-bg{position:fixed;inset:0;background:rgba(3,10,15,.62);z-index:60;opacity:0;pointer-events:none;transition:opacity .42s ease}

/* كيبورد الأرقام المخصص */
.numpad-overlay{position:fixed;inset:0;z-index:300;background:rgba(3,10,15,.45);display:flex;align-items:flex-end;
  opacity:0;pointer-events:none;transition:opacity .25s ease}
.numpad-overlay.show{opacity:1;pointer-events:auto}
.numpad-panel{width:100%;background:var(--surface);border-radius:20px 20px 0 0;padding:10px 12px calc(10px + env(safe-area-inset-bottom));
  max-width:420px;margin:0 auto;transform:translateY(100%);transition:transform .28s cubic-bezier(.22,.61,.36,1);
  box-shadow:0 -10px 40px rgba(0,0,0,.25);border:1px solid var(--line);border-bottom:none}
[data-theme="dark"] .numpad-panel{background:var(--bg)}
.numpad-overlay.show .numpad-panel{transform:translateY(0)}
.numpad-top{display:flex;align-items:center;justify-content:space-between;padding:3px 6px 10px;
  border-bottom:1px solid var(--line);margin-bottom:9px;gap:6px}
.numpad-label{color:var(--muted);font-size:12px;font-weight:700}
.numpad-expr{color:var(--muted);font-size:13px;font-weight:700;flex:1;text-align:center;direction:ltr}
.numpad-preview{color:var(--navy-700);font-size:19px;font-weight:800;direction:ltr}
.numpad-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;direction:ltr}
.numpad-grid button{background:var(--surface-2);border:none;color:var(--ink);font-size:16px;font-weight:700;
  font-family:inherit;border-radius:12px;padding:11px 0;transition:background .12s ease}
.numpad-grid button:active{background:var(--line)}
.numpad-grid .numpad-op{color:var(--navy-700);font-size:15px}
.numpad-grid .numpad-empty{background:transparent;pointer-events:none}
.numpad-grid .numpad-done{background:var(--navy-900);color:var(--on-navy);font-size:17px}
.numpad-grid .numpad-done:active{background:var(--navy-700)}
/* ارفع الشيت/المودال/الصفحة لفوق وقت فتح الكيبورد عشان الخانة تفضل باينة فوقه */
body.numpad-open .sheet{padding-bottom:340px}
body.numpad-open .modal{padding-bottom:340px}
body.numpad-open #app{padding-bottom:320px}
.sheet-bg.show{opacity:1;pointer-events:auto}
.sheet{position:fixed;left:0;right:0;bottom:0;z-index:61;background:var(--surface);color:var(--ink);
  border-radius:24px 24px 0 0;padding:6px 18px calc(14px + env(safe-area-inset-bottom));
  transform:translateY(100%);transition:transform .5s cubic-bezier(.22,.61,.36,1);
  max-height:90vh;overflow-y:auto;overscroll-behavior:contain;box-shadow:0 -10px 40px rgba(0,0,0,.25)}
.sheet.show{transform:translateY(0)}
/* إخفاء الأزرار العائمة فورًا وقت فتح أي صفحة منزلقة/نافذة (يمنع النطّة) */
body:has(.sheet-bg.show) .add-fab,
body:has(.modal-bg.show) .add-fab,
body:has(.sheet-bg.show) .to-top,
body:has(.modal-bg.show) .to-top{opacity:0!important;transform:translateY(14px) scale(.85)!important;pointer-events:none!important;transition:none!important}
.sheet .grab{width:44px;height:5px;border-radius:5px;background:var(--line);margin:8px auto 16px}

/* ===== التقويم الذكي ===== */
.vfs-wrap{background:#0b0b0d;margin:-6px -18px calc(-14px - env(safe-area-inset-bottom));padding:18px 16px calc(22px + env(safe-area-inset-bottom));border-radius:24px 24px 0 0;color:#f2f2f2}
.vfs-head{text-align:center;margin-bottom:12px}
.vfs-title{font-size:19px;font-weight:900;background:linear-gradient(135deg,#EED9A0,#C9A24B);-webkit-background-clip:text;background-clip:text;color:transparent}
.vfs-sub{font-size:12.5px;color:#9a9a9f;margin-top:3px}
.vfs-legend{display:flex;justify-content:center;gap:16px;font-size:12px;color:#c7c7cc;margin-bottom:14px}
.vfs-legend span{display:flex;align-items:center;gap:5px}
.vfs-dot{width:9px;height:9px;border-radius:50%;display:inline-block}
.vfs-dot.vfs-red{background:#E4483B}.vfs-dot.vfs-blue{background:#3B82F6}.vfs-dot.vfs-gray{background:#5b5b60}
.vfs-dow{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-bottom:6px}

.vfs-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
.vfs-day{aspect-ratio:1;border:none;border-radius:12px;background:#1b1b1e;color:#d8d8dc;font-weight:800;font-size:13.5px;
  display:flex;align-items:center;justify-content:center;cursor:pointer;transition:transform .15s ease}
.vfs-day:active{transform:scale(.9)}
.vfs-day.vfs-empty{background:transparent;pointer-events:none}
.vfs-day.vfs-red{background:linear-gradient(150deg,#E4483B,#9c261c);color:#fff}
.vfs-day.vfs-blue{background:linear-gradient(150deg,#3B82F6,#1a4fa8);color:#fff}
.vfs-day.vfs-gray{background:#232326;color:#8b8b90}
.vfs-day.vfs-today{box-shadow:0 0 0 2px #C9A24B inset}
.vfs-day.sel{box-shadow:0 0 0 2.5px #fff inset;transform:scale(1.06)}
.vfs-detail{margin-top:16px;background:#1b1b1e;border-radius:16px;padding:14px 14px;font-size:13px;color:#9a9a9f;text-align:center;min-height:20px}
.vfs-detail.show{text-align:right;color:#e6e6e9}
.vfs-detail-head{display:flex;align-items:center;gap:8px;font-size:14.5px;margin-bottom:6px}
.vfs-detail-ic{font-size:18px}
.vfs-detail-body{font-size:12.5px;line-height:1.7;color:#b8b8bd}
.vfs-detail.vfs-red .vfs-detail-head b{color:#ff8478}
.vfs-detail.vfs-blue .vfs-detail-head b{color:#7fb0ff}
.vfs-detail.vfs-gray .vfs-detail-head b{color:#cfcfd3}
.vfs-note{margin-top:12px;font-size:11.5px;color:#8b8b90;text-align:center;line-height:1.6}
.vfs-wrap .vrep-section-h{margin-top:18px}
.vfs-wrap .vrep-smart-box{background:#1b1b1e;border-color:#2a2a2e}
.vfs-wrap .vrep-smart-item{color:#cfcfd3;border-color:#2a2a2e}
.ps-img{width:100%;height:auto;min-height:170px;max-height:62vh;border-radius:16px;object-fit:contain;background:var(--surface-2);margin-bottom:0;display:flex;align-items:center;justify-content:center;font-size:60px}
.ps-imgwrap{position:relative;margin-bottom:14px}
.ps-price-tag{position:absolute;inset-inline-end:14px;bottom:14px;background:var(--pos);color:#fff;
  font-weight:800;font-size:21px;padding:9px 17px;border-radius:14px;border:2.5px solid rgba(255,255,255,.9);
  box-shadow:0 6px 20px rgba(0,0,0,.42);white-space:nowrap}
.ps-name{font-size:20px;font-weight:800;margin-bottom:4px}
.ps-meta{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}
.ps-chip{background:var(--surface-2);border-radius:20px;padding:6px 12px;font-size:12.5px;color:var(--muted)}
.ps-row{display:flex;align-items:center;justify-content:space-between;padding:14px 0;border-bottom:1px solid var(--line)}
.ps-row:last-of-type{border-bottom:none}
.ps-row .lbl{font-size:15px;font-weight:600}
.ps-row .pv{font-size:20px;font-weight:800}
.pv.green{color:var(--pos)} .pv.red{color:var(--neg)} .pv.orange{color:var(--gold)}
.reveal{border:1.5px solid var(--line);background:var(--surface-2);color:var(--ink);
  padding:9px 16px;border-radius:11px;font-family:inherit;font-size:13.5px;font-weight:700}
.reveal.red{border-color:#F3C9C2;color:var(--neg)}
.reveal.orange{border-color:#F3DDA6;color:#9A6A00}
.ps-actions{display:flex;gap:10px;margin-top:18px}
.ps-actions button{flex:1;padding:13px;border-radius:12px;font-family:inherit;font-weight:700;font-size:15px;border:none}
.ps-actions .edit{background:var(--navy);color:var(--on-navy)}
.ps-actions .close{background:var(--surface-2);color:var(--ink);border:1.5px solid var(--line)}
.ps-del{width:100%;margin-top:10px;padding:13px;border-radius:12px;font-family:inherit;font-weight:700;font-size:15px;
  border:1.5px solid #F1B7B0;background:#FDECEA;color:var(--neg);display:flex;align-items:center;justify-content:center;gap:6px}

.sel-bar{position:fixed;left:14px;right:14px;bottom:calc(14px + env(safe-area-inset-bottom));z-index:55;
  background:var(--surface);box-shadow:0 8px 30px rgba(0,0,0,.25);border-radius:14px;
  display:flex;align-items:center;justify-content:space-between;gap:10px;padding:10px 12px}
.sel-bar span{font-weight:700;font-size:14px}
.sel-bar .cancel{background:var(--surface-2);border:1.5px solid var(--line);color:var(--ink);padding:9px 14px;border-radius:10px;font-family:inherit;font-weight:600}
.sel-bar .danger{background:var(--neg);border:none;color:#fff;padding:9px 14px;border-radius:10px;font-family:inherit;font-weight:700;display:flex;align-items:center;gap:6px}
.tool-btn.on{background:var(--navy);color:var(--on-navy);border-color:var(--navy)}
.tool-btn svg,.tool-btn.primary svg{vertical-align:-3px}
.pcard .acts button svg{display:block}
.meta svg{vertical-align:-2px;opacity:.7}

.sheet .modal-head{margin-bottom:6px}
.sheet-form{padding-bottom:6px}

/* responsive */
@media (max-width:760px){
  .sidebar{display:none}

}

  .menu-btn{display:none}
  .grid{grid-template-columns:repeat(4,1fr)}
}

/* ==================== صفحة التقارير والإحصائيات (فودافون كاش) ==================== */
.vrep{padding-bottom:10px}
.vrep-head{position:relative;z-index:5;background:var(--surface);
  margin:2px 0 16px;padding:16px 15px 18px;border-radius:22px;color:var(--ink);
  border:1.5px solid var(--line);box-shadow:var(--shadow)}
.vrep-head-row{display:flex;align-items:center;justify-content:space-between;gap:10px}
.vrep-head-row h3{margin:0;font-size:18px;font-weight:800;display:flex;align-items:center;gap:8px;color:var(--ink)}
.vrep-back,.vrep-filter{background:var(--surface-2);border:none;color:var(--navy-900);width:36px;height:36px;border-radius:11px;
  display:flex;align-items:center;justify-content:center;flex-shrink:0}
.vrep-back{transform:scaleX(-1)}
.vrep-sub{font-size:12.5px;color:var(--muted);margin-top:5px;display:flex;align-items:center;gap:5px}
.vrep-units{display:flex;gap:6px;margin-top:14px;background:var(--surface-2);border-radius:13px;padding:4px}
.vrep-units button{flex:1;background:transparent;border:none;color:var(--muted);opacity:1;font-family:inherit;font-weight:700;
  font-size:13px;padding:8px 4px;border-radius:10px}
.vrep-units button.on{background:var(--navy-900);color:var(--on-navy);box-shadow:0 4px 10px rgba(0,0,0,.30)}
.vrep-tabs{display:flex;gap:8px;margin-top:14px}
.vrep-tabs button{flex:1;background:var(--surface-2);border:1px solid var(--line);color:var(--muted);
  font-family:inherit;font-weight:700;font-size:12.5px;padding:9px 6px;border-radius:12px}
.vrep-tabs button.on{background:var(--navy-900);color:var(--on-navy);box-shadow:0 4px 10px rgba(0,0,0,.30);border-color:var(--navy-900)}
.vrep-nav{display:flex;align-items:center;justify-content:center;gap:14px;margin-top:12px}
.vrep-nav button{background:var(--surface-2);border:none;color:var(--navy-900);width:30px;height:30px;border-radius:9px;display:flex;align-items:center;justify-content:center}
.vrep-nav span{font-weight:700;font-size:13.5px;color:var(--ink)}

.vrep-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-bottom:16px}
.vrep-card{background:var(--surface);border:1.5px solid var(--line);border-radius:16px;padding:13px 11px;box-shadow:var(--shadow)}
.vrep-card .vc-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.vrep-card .vc-lbl{font-size:11.5px;color:var(--muted);font-weight:700}
.vrep-card .vc-ic{width:26px;height:26px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.vrep-card .vc-val{font-size:16.5px;font-weight:800;margin-bottom:3px}
.vrep-card .vc-avg{font-size:10.5px;color:var(--muted)}
.vc-wd .vc-ic{background:rgba(192,57,43,.13);color:var(--neg)}
.vc-wd .vc-val{color:var(--neg)}
.vc-dep .vc-ic{background:rgba(37,99,235,.13);color:#2563EB}
.vc-dep .vc-val{color:#2563EB}
.vc-comm .vc-ic{background:rgba(19,138,94,.13);color:var(--pos)}
.vc-comm .vc-val{color:var(--pos)}
.vc-grow{display:inline-block;font-size:9.5px;font-weight:700;margin-top:4px}
.vc-grow.up{color:var(--pos)} .vc-grow.down{color:var(--neg)} .vc-grow.neutral{color:var(--muted)}
.vrep-q .vc-grow{display:block;margin-top:4px;font-size:9px}

.vrep-chart-box{background:var(--surface);border:1.5px solid var(--line);border-radius:18px;padding:14px 12px;
  box-shadow:var(--shadow);margin-bottom:16px}
.vrep-chart-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;flex-wrap:wrap;gap:8px}
.vrep-chart-h b{font-size:14px;display:flex;align-items:center;gap:6px}
.vrep-legend{display:flex;gap:10px;flex-wrap:wrap}
.vrep-legend label{display:flex;align-items:center;gap:5px;font-size:11.5px;font-weight:700;color:var(--muted);cursor:pointer}
.vrep-legend input{accent-color:currentColor;width:14px;height:14px}
.vrep-legend .lg-wd{color:var(--neg)} .vrep-legend .lg-dep{color:#2563EB} .vrep-legend .lg-comm{color:var(--pos)}
.vrep-canvas-wrap{width:100%;overflow:hidden;border-radius:10px;position:relative;touch-action:pan-y}
.vrep-tip{position:absolute;display:none;min-width:118px;background:var(--surface);border:1.5px solid var(--line);
  border-radius:12px;padding:8px 10px;box-shadow:0 6px 18px rgba(0,0,0,.16);z-index:5;pointer-events:none}
.vrep-tip b{display:block;font-size:11px;color:var(--ink);margin-bottom:4px}
.vrep-tip .vt-row{font-size:10.5px;font-weight:700;padding:1px 0}
.vrep-tip .t-wd{color:var(--neg)} .vrep-tip .t-dep{color:#2563EB} .vrep-tip .t-comm{color:var(--pos)}
canvas.vrep-line{width:100%;height:220px;display:block}
canvas.vrep-bar{width:100%;height:160px;display:block}
canvas.vrep-doughnut{width:100%;height:170px;display:block}

.vrep-stat6{display:grid;grid-template-columns:repeat(2,1fr);gap:9px;margin-bottom:16px}
.vrep-s6{background:var(--surface);border:1.5px solid var(--line);border-radius:15px;padding:11px;box-shadow:var(--shadow)}
.vrep-s6 .s6-top{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--muted);font-weight:700;margin-bottom:5px}
.vrep-s6 .s6-ic{width:20px;height:20px;border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:11px;font-weight:800}
.vrep-s6 .s6-ic.t-wd{background:rgba(220,38,38,.12);color:var(--neg)}
.vrep-s6 .s6-ic.t-dep{background:rgba(37,99,235,.12);color:#2563EB}
.vrep-s6 .s6-ic.t-comm{background:rgba(22,163,74,.12);color:var(--pos)}
.vrep-s6 .s6-val{font-size:15px;font-weight:800}
.vrep-s6 .s6-date{font-size:10.5px;color:var(--muted);margin-bottom:4px}
canvas.vrep-spark{width:100%;height:28px;display:block;margin-top:4px}

.vrep-quick{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px}
.vrep-q{background:var(--surface);border:1.5px solid var(--line);border-radius:14px;padding:11px 8px;text-align:center;box-shadow:var(--shadow)}
.vrep-q .q-val{font-size:14.5px;font-weight:800;color:var(--navy-900)}
.vrep-q .q-lbl{font-size:10px;color:var(--muted);margin-top:3px;font-weight:600}

.vrep-section-h{font-size:14.5px;font-weight:800;margin:4px 2px 10px;display:flex;align-items:center;gap:6px}
.vrep-table-box{background:var(--surface);border:1.5px solid var(--line);border-radius:16px;overflow:hidden;
  box-shadow:var(--shadow);margin-bottom:16px}
.vrep-table{width:100%;border-collapse:collapse;font-size:11.5px}
.vrep-table thead{background:var(--navy-900);color:var(--on-navy)}
.vrep-table th{padding:9px 6px;font-weight:700;white-space:nowrap;font-size:11px}
.vrep-table td{padding:8px 6px;text-align:center;border-bottom:1px solid var(--line);white-space:nowrap}
.vrep-table tbody tr{cursor:pointer}
.vrep-table tbody tr:active{background:var(--surface-2)}
.vrep-table .t-wd{color:var(--neg);font-weight:700}
.vrep-table .t-dep{color:#2563EB;font-weight:700}
.vrep-table .t-comm{color:var(--pos);font-weight:700}

.vrep-insight-box{background:var(--surface);border:1.5px solid var(--line);border-radius:16px;padding:14px;margin-bottom:16px;box-shadow:var(--shadow)}
