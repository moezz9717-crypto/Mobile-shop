<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>نظام محل الموبايلات</title>

<!-- إعدادات تثبيت التطبيق (PWA) -->
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#15406B">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="محل الموبايلات">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" type="image/png" href="icon-192.png">

<!-- مكتبة Supabase (لازمة للمزامنة وتسجيل الدخول) -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<!-- مكتبة قراءة الباركود بالكاميرا -->
<script src="https://cdn.jsdelivr.net/npm/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>

<!-- خط عربي نظيف -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
/* ========== الإعدادات: الزق مفتاحك في السطر المعلّم تحت ========== */
:root{
  --bg:#EDF1F7; --surface:#FFFFFF; --surface-2:#F6F8FC;
  --ink:#102136; --muted:#6B7A90; --line:#E3E9F2;
  --navy:#15406B; --navy-700:#1C4E80; --navy-900:#0C2A49;
  --gold:#E39A0C; --pos:#138A5E; --neg:#C0392B;
  --shadow:0 10px 30px rgba(16,33,54,.08);
  --radius:18px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{
  font-family:'Cairo',system-ui,'Segoe UI',Tahoma,sans-serif;
  background:var(--bg); color:var(--ink);
  font-variant-numeric:tabular-nums; -webkit-font-smoothing:antialiased;
}
.num{font-variant-numeric:tabular-nums; letter-spacing:.2px}
button{font-family:inherit;cursor:pointer}
input{font-family:inherit}
.hidden{display:none !important}

/* ===================== شاشة الدخول ===================== */
#auth{
  min-height:100dvh; display:flex; align-items:center; justify-content:center;
  padding:24px;
  background:radial-gradient(120% 120% at 80% -10%, #1C4E80 0%, #0C2A49 55%, #081d33 100%);
  position:relative; overflow:hidden;
}
/* موتيف أعمدة الشبكة (إشارة الموبايل) خلفية خفيفة */
.signal{position:absolute; bottom:-20px; left:-10px; display:flex; gap:14px; align-items:flex-end; opacity:.07}
.signal i{width:26px; background:#fff; border-radius:6px; display:block}
.signal i:nth-child(1){height:60px}.signal i:nth-child(2){height:110px}
.signal i:nth-child(3){height:170px}.signal i:nth-child(4){height:240px}
.auth-card{
  position:relative; z-index:2; width:100%; max-width:400px;
  background:var(--surface); border-radius:24px; padding:30px 24px 26px;
  box-shadow:0 24px 60px rgba(0,0,0,.35);
}
.brand{display:flex; flex-direction:column; align-items:center; gap:12px; margin-bottom:22px}
.brand .mark{
  width:64px;height:64px;border-radius:18px;
  background:linear-gradient(150deg,var(--navy-700),var(--navy-900));
  display:flex;align-items:center;justify-content:center;color:#fff;font-size:30px;
  box-shadow:var(--shadow);
}
.brand h1{margin:0;font-size:21px;font-weight:800;color:var(--navy-900)}
.brand p{margin:0;font-size:13px;color:var(--muted)}
.field{margin-bottom:14px}
.field label{display:block;font-size:13px;font-weight:600;margin-bottom:7px;color:var(--ink)}
.field input{
  width:100%;padding:13px 15px;border:1.5px solid var(--line);border-radius:13px;
  font-size:15px;background:var(--surface-2);transition:border-color .15s, background .15s;
}
.field input:focus{outline:none;border-color:var(--navy-700);background:#fff}
.btn{
  width:100%;padding:14px;border:none;border-radius:13px;font-size:16px;font-weight:700;
  background:var(--navy);color:#fff;transition:transform .06s, background .15s; margin-top:6px;
}
.btn:active{transform:scale(.99)}
.btn:disabled{opacity:.6}
.btn-gold{background:var(--gold)}
.link-row{display:flex;justify-content:space-between;margin-top:16px;font-size:13.5px}
.link-row a{color:var(--navy-700);text-decoration:none;font-weight:600;cursor:pointer}
.msg{font-size:13.5px;padding:11px 13px;border-radius:11px;margin-bottom:14px;display:none}
.msg.show{display:block}
.msg.err{background:#FDECEA;color:#9B2D20;border:1px solid #F5C6C0}
.msg.ok{background:#E7F6EF;color:#0E6B49;border:1px solid #BDE6D3}

/* ===================== الهيكل العام للتطبيق ===================== */
#app{min-height:100dvh;display:flex;flex-direction:column}
.topbar{
  background:linear-gradient(120deg,var(--navy),var(--navy-900));
  color:#fff;padding:13px 16px;display:flex;align-items:center;gap:12px;
  position:sticky;top:0;z-index:30;
  padding-top:calc(13px + env(safe-area-inset-top));
}
.topbar .menu-btn{
  background:rgba(255,255,255,.14);border:none;color:#fff;width:40px;height:40px;
  border-radius:11px;font-size:20px;display:flex;align-items:center;justify-content:center;
}
.topbar .title{flex:1;font-weight:800;font-size:17px}
.topbar .user{display:flex;align-items:center;gap:9px}
.avatar{width:38px;height:38px;border-radius:50%;background:var(--gold);color:#3a2700;
  display:flex;align-items:center;justify-content:center;font-weight:800;font-size:16px}
.user .who{display:flex;flex-direction:column;line-height:1.2}
.user .who b{font-size:13.5px}
.user .who span{font-size:11px;opacity:.8}

.layout{flex:1;display:flex}
/* الشريط الجانبي (كمبيوتر) */
.sidebar{
  width:248px;background:var(--surface);border-inline-start:1px solid var(--line);
  padding:14px 12px;position:sticky;top:64px;height:calc(100dvh - 64px);overflow-y:auto;
}
.nav-item{
  display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:12px;
  font-weight:600;font-size:15px;color:var(--ink);cursor:pointer;margin-bottom:4px;
  border:none;background:none;width:100%;text-align:start;transition:background .12s;
}
.nav-item .ic{font-size:19px;width:24px;text-align:center}
.nav-item:hover{background:var(--surface-2)}
.nav-item.active{background:var(--navy);color:#fff}
.content{flex:1;padding:18px 16px 90px;max-width:1100px;margin:0 auto;width:100%}

/* درج الموبايل */
.overlay{position:fixed;inset:0;background:rgba(8,22,40,.5);z-index:40;opacity:0;
  pointer-events:none;transition:opacity .2s}
.overlay.show{opacity:1;pointer-events:auto}
.drawer{
  position:fixed;top:0;right:0;height:100dvh;width:270px;background:var(--surface);z-index:50;
  transform:translateX(100%);transition:transform .25s ease;padding:16px 12px;overflow-y:auto;
  box-shadow:-12px 0 30px rgba(8,22,40,.18);
}
.drawer.show{transform:translateX(0)}
.drawer .dhead{display:flex;align-items:center;gap:10px;padding:6px 10px 16px;border-bottom:1px solid var(--line);margin-bottom:12px}
.drawer .dhead .mark{width:42px;height:42px;border-radius:12px;background:linear-gradient(150deg,var(--navy-700),var(--navy-900));color:#fff;display:flex;align-items:center;justify-content:center;font-size:21px}
.drawer .dhead b{font-size:15px}
.drawer .dhead span{font-size:11.5px;color:var(--muted);display:block}

/* ===================== لوحة التحكم ===================== */
.page-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;gap:10px}
.page-head h2{margin:0;font-size:20px;font-weight:800}
.page-head .date{font-size:13px;color:var(--muted)}
.refresh{background:var(--surface);border:1.5px solid var(--line);border-radius:11px;
  padding:9px 14px;font-weight:600;font-size:14px;display:flex;align-items:center;gap:7px;color:var(--ink)}

/* أبطال: الخزنة وصافي الربح */
.hero{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
.hero-card{border-radius:var(--radius);padding:18px;color:#fff;box-shadow:var(--shadow);position:relative;overflow:hidden}
.hero-card .lbl{font-size:13px;opacity:.9;margin-bottom:8px;font-weight:600}
.hero-card .val{font-size:26px;font-weight:800}
.hero-card.treasury{background:linear-gradient(135deg,var(--navy-700),var(--navy-900))}
.hero-card.net{background:linear-gradient(135deg,#13855a,#0c5f40)}
.hero-card .coin{position:absolute;left:14px;bottom:6px;font-size:54px;opacity:.16}

/* بطاقات الإحصائيات */
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
.stat{background:var(--surface);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);
  border-top:3px solid var(--navy)}
.stat.s-sales{border-top-color:var(--navy)}
.stat.s-profit{border-top-color:var(--pos)}
.stat.s-maint{border-top-color:#7A4FD0}
.stat.s-voda{border-top-color:#E2231A}
.stat.s-fawry{border-top-color:var(--gold)}
.stat.s-exp{border-top-color:var(--neg)}
.stat.s-stock{border-top-color:#0E8A8A}
.stat .top{display:flex;align-items:center;gap:9px;margin-bottom:10px}
.stat .top .ic{font-size:18px}
.stat .top .t{font-size:13px;color:var(--muted);font-weight:600}
.stat .v{font-size:21px;font-weight:800}
.stat .v small{font-size:13px;color:var(--muted);font-weight:600}

/* الرسم البياني */
.chart-card{background:var(--surface);border-radius:var(--radius);padding:18px;box-shadow:var(--shadow);margin-top:14px}
.chart-card h3{margin:0 0 4px;font-size:16px;font-weight:800}
.chart-card .sub{font-size:12.5px;color:var(--muted);margin-bottom:14px}
.bars{display:flex;align-items:flex-end;justify-content:space-between;gap:8px;height:150px}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;height:100%;justify-content:flex-end}
.bar{width:100%;max-width:34px;background:linear-gradient(180deg,var(--navy-700),var(--navy));
  border-radius:8px 8px 0 0;min-height:4px;transition:height .4s ease}
.bar-col .d{font-size:11px;color:var(--muted)}
.bar-col .a{font-size:10.5px;color:var(--ink);font-weight:700}

/* صفحة قريبًا */
.soon{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow);
  padding:46px 22px;text-align:center}
.soon .ic{font-size:46px;margin-bottom:12px}
.soon h3{margin:0 0 6px;font-size:20px;font-weight:800}
.soon p{margin:0;color:var(--muted);font-size:14px;line-height:1.7}

/* ===================== أدوات القسم (toolbar) ===================== */
.toolbar{display:flex;gap:9px;flex-wrap:wrap;margin-bottom:14px}
.tool-btn{background:var(--surface);border:1.5px solid var(--line);border-radius:11px;
  padding:10px 13px;font-weight:600;font-size:13.5px;color:var(--ink);display:flex;
  align-items:center;gap:6px;white-space:nowrap}
.tool-btn.primary{background:var(--navy);color:#fff;border-color:var(--navy)}
.tool-btn.gold{background:var(--gold);color:#3a2700;border-color:var(--gold)}
.search-wrap{flex:1;min-width:150px;position:relative}
.search-wrap input{width:100%;padding:11px 38px 11px 13px;border:1.5px solid var(--line);
  border-radius:11px;font-size:14px;background:var(--surface)}
.search-wrap input:focus{outline:none;border-color:var(--navy-700)}
.search-wrap .si{position:absolute;inset-inline-start:12px;top:50%;transform:translateY(-50%);color:var(--muted)}
.filter-sel{padding:10px 12px;border:1.5px solid var(--line);border-radius:11px;background:var(--surface);
  font-size:13.5px;font-family:inherit;color:var(--ink);font-weight:600}

/* تنبيه نقص المخزون */
.alert-bar{background:#FFF7E6;border:1px solid #F3D58A;color:#8A5B00;border-radius:13px;
  padding:12px 14px;margin-bottom:14px;display:flex;align-items:center;gap:10px;font-size:13.5px;font-weight:600}
.alert-bar button{margin-inline-start:auto;background:var(--gold);color:#3a2700;border:none;
  border-radius:9px;padding:7px 12px;font-weight:700;font-size:12.5px}

/* قائمة المنتجات */
.plist{display:grid;grid-template-columns:1fr;gap:10px}
.pcard{background:var(--surface);border-radius:14px;box-shadow:var(--shadow);padding:13px 14px;
  display:flex;align-items:center;gap:13px}
.pcard .thumb{width:50px;height:50px;border-radius:11px;background:var(--surface-2);
  display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0;
  overflow:hidden;border:1px solid var(--line)}
.pcard .thumb img{width:100%;height:100%;object-fit:cover}
.pcard .info{flex:1;min-width:0}
.pcard .info .nm{font-weight:700;font-size:15px;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pcard .info .meta{font-size:12px;color:var(--muted);display:flex;gap:10px;flex-wrap:wrap}
.pcard .info .meta b{color:var(--ink)}
.pcard .qty{text-align:center;flex-shrink:0;padding-inline:6px}
.pcard .qty .n{font-weight:800;font-size:18px}
.pcard .qty .l{font-size:10.5px;color:var(--muted)}
.qty.low .n{color:var(--neg)}
.badge-low{display:inline-block;background:#FDECEA;color:#B0271A;font-size:10px;font-weight:700;
  padding:2px 7px;border-radius:20px;margin-inline-start:6px}
.pcard .acts{display:flex;flex-direction:column;gap:6px;flex-shrink:0}
.pcard .acts button{border:none;background:var(--surface-2);width:34px;height:34px;border-radius:9px;font-size:15px}
.pcard .acts .del{background:#FDECEA;color:var(--neg)}

.empty{background:var(--surface);border-radius:14px;box-shadow:var(--shadow);
  padding:40px 20px;text-align:center;color:var(--muted)}
.empty .ic{font-size:40px;margin-bottom:10px}

/* ===================== النوافذ المنبثقة (Modal) ===================== */
.modal-bg{position:fixed;inset:0;background:rgba(8,22,40,.55);z-index:60;display:flex;
  align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
.modal-bg.show{opacity:1;pointer-events:auto}
.modal{background:var(--surface);width:100%;max-width:520px;border-radius:22px 22px 0 0;
  max-height:92dvh;overflow-y:auto;transform:translateY(20px);transition:transform .25s}
.modal-bg.show .modal{transform:translateY(0)}
.modal-head{position:sticky;top:0;background:var(--surface);padding:16px 18px 12px;
  border-bottom:1px solid var(--line);display:flex;align-items:center;gap:10px;z-index:2}
.modal-head h3{margin:0;font-size:18px;font-weight:800;flex:1}
.modal-head .x{background:var(--surface-2);border:none;width:34px;height:34px;border-radius:10px;font-size:18px;color:var(--muted)}
.modal-body{padding:16px 18px 20px}
.modal-body .field{margin-bottom:13px}
.modal-body label{display:block;font-size:13px;font-weight:600;margin-bottom:6px}
.modal-body input,.modal-body select,.modal-body textarea{
  width:100%;padding:11px 13px;border:1.5px solid var(--line);border-radius:11px;font-size:15px;
  background:var(--surface-2);font-family:inherit}
.modal-body input:focus,.modal-body select:focus,.modal-body textarea:focus{outline:none;border-color:var(--navy-700);background:#fff}
.modal-body textarea{resize:vertical;min-height:60px}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.inline-add{display:flex;gap:8px}
.inline-add select{flex:1}
.inline-add button{background:var(--navy);color:#fff;border:none;border-radius:11px;width:46px;font-size:20px;flex-shrink:0}
.modal-foot{display:flex;gap:10px;margin-top:8px}
.modal-foot button{flex:1;padding:13px;border:none;border-radius:12px;font-weight:700;font-size:15px}
.modal-foot .save{background:var(--navy);color:#fff}
.modal-foot .cancel{background:var(--surface-2);color:var(--ink)}
.mini-list{margin-top:4px}
.mini-row{display:flex;align-items:center;gap:10px;padding:11px 12px;border:1px solid var(--line);
  border-radius:11px;margin-bottom:8px}
.mini-row .t{flex:1;font-weight:600;font-size:14px}
.mini-row .t span{display:block;font-size:12px;color:var(--muted);font-weight:400}
.mini-row button{background:#FDECEA;color:var(--neg);border:none;width:32px;height:32px;border-radius:9px;font-size:14px}

/* تنبيه صغير (toast) */
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(80px);
  background:var(--navy-900);color:#fff;padding:12px 20px;border-radius:30px;font-size:14px;font-weight:600;
  z-index:80;opacity:0;transition:all .25s;box-shadow:0 8px 24px rgba(0,0,0,.3);max-width:90vw;text-align:center}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}
.toast.ok{background:#0c5f40}.toast.err{background:#8A2018}

/* صورة المنتج + الماسح */
.photo-box{margin-bottom:14px}
.photo-add{width:100%;border:2px dashed var(--line);background:var(--surface-2);border-radius:14px;
  padding:22px;display:flex;flex-direction:column;align-items:center;gap:8px;color:var(--muted);
  font-weight:600;font-size:14px}
.photo-prev{width:100%;max-height:200px;object-fit:contain;background:var(--surface-2);
  border-radius:14px;border:1px solid var(--line);display:block}
.photo-acts{display:flex;gap:9px;margin-top:9px}
.photo-acts button{flex:1;padding:10px;border:1.5px solid var(--line);background:var(--surface);
  border-radius:11px;font-weight:600;font-size:13.5px;color:var(--ink)}
.photo-acts .rm{background:#FDECEA;color:var(--neg);border-color:#F5C6C0}
.reader{width:100%;border-radius:14px;overflow:hidden;background:#000;min-height:240px}
.reader video{border-radius:14px}

/* responsive */
@media (max-width:760px){
  .sidebar{display:none}
  .hero{grid-template-columns:1fr}
  .content{padding:16px 13px 90px}
}
@media (min-width:761px){
  .menu-btn{display:none}
  .grid{grid-template-columns:repeat(4,1fr)}
}
@media (prefers-reduced-motion:reduce){*{transition:none !important}}
</style>
</head>
<body>

<!-- ===================== شاشة الدخول ===================== -->
<section id="auth">
  <div class="signal"><i></i><i></i><i></i><i></i></div>
  <div class="auth-card">
    <div class="brand">
      <div class="mark">📱</div>
      <h1>نظام محل الموبايلات</h1>
      <p id="authSub">سجّل دخولك للمتابعة</p>
    </div>

    <div id="authMsg" class="msg"></div>

    <!-- تسجيل الدخول -->
    <div id="loginForm">
      <div class="field">
        <label>البريد الإلكتروني</label>
        <input id="loginEmail" type="email" inputmode="email" placeholder="example@mail.com" autocomplete="username">
      </div>
      <div class="field">
        <label>كلمة المرور</label>
        <input id="loginPass" type="password" placeholder="••••••••" autocomplete="current-password">
      </div>
      <button class="btn" id="loginBtn" onclick="doLogin()">دخول</button>
      <div class="link-row">
        <a onclick="showSignup()">إنشاء حساب جديد</a>
        <a onclick="doForgot()">نسيت كلمة المرور؟</a>
      </div>
    </div>

    <!-- إنشاء حساب -->
    <div id="signupForm" class="hidden">
      <div class="field">
        <label>الاسم</label>
        <input id="suName" type="text" placeholder="اسمك بالكامل">
      </div>
      <div class="field">
        <label>البريد الإلكتروني</label>
        <input id="suEmail" type="email" inputmode="email" placeholder="example@mail.com">
      </div>
      <div class="field">
        <label>كلمة المرور</label>
        <input id="suPass" type="password" placeholder="٦ حروف على الأقل">
      </div>
      <button class="btn btn-gold" id="suBtn" onclick="doSignup()">إنشاء الحساب</button>
      <div class="link-row" style="justify-content:center">
        <a onclick="showLogin()">عندي حساب — رجوع للدخول</a>
      </div>
    </div>
  </div>
</section>

<!-- ===================== التطبيق ===================== -->
<div id="app" class="hidden">
  <header class="topbar">
    <button class="menu-btn" onclick="openDrawer()">☰</button>
    <div class="title">📱 محل الموبايلات</div>
    <div class="user">
      <div class="who" style="text-align:start">
        <b id="uName">—</b><span id="uRole">—</span>
      </div>
      <div class="avatar" id="uAvatar">؟</div>
    </div>
  </header>

  <div class="layout">
    <aside class="sidebar" id="sidebar"></aside>
    <main class="content" id="content"></main>
  </div>
</div>

<!-- درج الموبايل -->
<div class="overlay" id="overlay" onclick="closeDrawer()"></div>

  <div class="dhead">

function money(n){ return new Intl.NumberFormat('en-US',{maximumFractionDigits:2}).format(n||0)+' ج.م'; }

function authMsg(text,type){ const m=document.getElementById('authMsg'); m.textContent=text; m.className='msg show '+(type||'err'); }
function clearAuthMsg(){ document.getElementById('authMsg').className='msg'; }

/* ==================== تبديل نماذج الدخول ==================== */

/* ==================== الدخول / التسجيل / الخروج ==================== */
async function doLogin(){
  clearAuthMsg();
  const email=document.getElementById('loginEmail').value.trim();
  const pass=document.getElementById('loginPass').value;
  if(!email||!pass){ authMsg('اكتب البريد وكلمة المرور'); return; }
  const btn=document.getElementById('loginBtn'); btn.disabled=true; btn.textContent='جارٍ الدخول...';
  const { error } = await db.auth.signInWithPassword({ email, password:pass });
  btn.disabled=false; btn.textContent='دخول';
  if(error){ authMsg(translateAuthError(error.message)); return; }
  await startApp();
}

async function doSignup(){
  clearAuthMsg();
  const name=document.getElementById('suName').value.trim();
  const email=document.getElementById('suEmail').value.trim();
  const pass=document.getElementById('suPass').value;
  if(!name||!email||!pass){ authMsg('اكمل كل الخانات'); return; }
  if(pass.length<6){ authMsg('كلمة المرور لازم ٦ حروف على الأقل'); return; }
  const btn=document.getElementById('suBtn'); btn.disabled=true; btn.textContent='جارٍ الإنشاء...';
  const { data, error } = await db.auth.signUp({
    email, password:pass, options:{ data:{ full_name:name } }
  });
  btn.disabled=false; btn.textContent='إنشاء الحساب';
  if(error){ authMsg(translateAuthError(error.message)); return; }
  if(data.session){ await startApp(); }           // دخول مباشر (لو تأكيد الإيميل مقفول)
  else { showLogin(); authMsg('تم إنشاء الحساب ✅ سجّل دخولك دلوقتي','ok'); }
}

async function doForgot(){
  clearAuthMsg();
  const email=document.getElementById('loginEmail').value.trim();
  if(!email){ authMsg('اكتب بريدك في خانة البريد الأول'); return; }
  const { error } = await db.auth.resetPasswordForEmail(email,{ redirectTo:location.href });
  if(error){ authMsg(translateAuthError(error.message)); return; }
  authMsg('بعتنا رابط استعادة كلمة المرور على بريدك 📧','ok');
}

async function doLogout(){ await db.auth.signOut(); location.reload(); }

function translateAuthError(m){
  m=(m||'').toLowerCase();
  if(m.includes('invalid login')) return 'البريد أو كلمة المرور غير صحيحة';
  if(m.includes('email not confirmed')) return 'لازم تأكيد البريد — أو اقفل تأكيد الإيميل من إعدادات Supabase';
  if(m.includes('already registered')) return 'البريد ده مسجّل قبل كده';
  if(m.includes('rate limit')) return 'محاولات كتير — استنى شوية وحاول تاني';
  return 'حصل خطأ: '+m;
}

/* ==================== بدء التطبيق بعد الدخول ==================== */
async function startApp(){
  const { data:{ user } } = await db.auth.getUser();
  if(!user) return;
  CURRENT.user = user;

  // جلب الملف الشخصي (الاسم + الصلاحية)
  let { data:profile } = await db.from('profiles').select('*').eq('id',user.id).single();
  if(!profile){ // احتياطي لو الـ trigger متأخر
    await db.from('profiles').insert({ id:user.id, full_name:user.email });
    profile = { id:user.id, full_name:user.email, role:'sales' };
  }
  CURRENT.profile = profile;

  // عرض بيانات المستخدم
  const nm = profile.full_name || user.email;
  const role = ROLE_AR[profile.role] || profile.role;
  document.getElementById('uName').textContent = nm;
  document.getElementById('uRole').textContent = role;
  document.getElementById('uAvatar').textContent = (nm[0]||'؟').toUpperCase();
  document.getElementById('dName').textContent = nm;
  document.getElementById('dRole').textContent = role;

  buildNav(profile.role);
  document.getElementById('auth').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  navigate('dashboard');
}

async function loadStats(){
  const t0 = todayStartISO();
  const set=(id,v)=>{ const el=document.getElementById(id); if(el) el.textContent=v; };
  try{
    // مبيعات + ربح اليوم
    const { data:sales=[] } = await db.from('sales').select('total,profit')
      .gte('created_at',t0).eq('status','completed');
    const salesSum = sales.reduce((s,r)=>s+Number(r.total||0),0);
    const profitSum = sales.reduce((s,r)=>s+Number(r.profit||0),0);
    set('kSales',money(salesSum)); set('kProfit',money(profitSum));

    // عدد عمليات الصيانة اليوم
    const { count:maintCount=0 } = await db.from('repairs')
      .select('id',{count:'exact',head:true}).gte('received_at',t0);
    set('kMaint', (maintCount||0)+' عملية');

    // عمولات فودافون + فوري اليوم
    const { data:voda=[] } = await db.from('vodafone_cash').select('commission')
      .gte('created_at',t0).eq('status','active');
    const vodaSum = voda.reduce((s,r)=>s+Number(r.commission||0),0);
    set('kVoda',money(vodaSum));

    const { data:fawry=[] } = await db.from('fawry').select('commission')
      .gte('created_at',t0).eq('status','active');
    const fawrySum = fawry.reduce((s,r)=>s+Number(r.commission||0),0);
    set('kFawry',money(fawrySum));

    // مصروفات اليوم
    const { data:exp=[] } = await db.from('expenses').select('amount')
      .gte('created_at',t0).eq('status','active');
    const expSum = exp.reduce((s,r)=>s+Number(r.amount||0),0);
    set('kExp',money(expSum));

    // ربح الصيانة اليوم (للصافي)
    const { data:rep=[] } = await db.from('repairs').select('profit')
      .gte('received_at',t0);
    const repProfit = rep.reduce((s,r)=>s+Number(r.profit||0),0);

    // قيمة المخزون = مجموع (الكمية × سعر الجملة)
    const { data:prods=[] } = await db.from('products').select('quantity,wholesale_price');
    const stockVal = prods.reduce((s,r)=>s+Number(r.quantity||0)*Number(r.wholesale_price||0),0);
    set('kStock',money(stockVal));

    // رصيد الخزنة = داخل - خارج (الحركات الفعّالة)
    const { data:tr=[] } = await db.from('treasury').select('direction,amount').eq('status','active');
    const treasury = tr.reduce((s,r)=>s+(r.direction==='in'?1:-1)*Number(r.amount||0),0);
    set('kTreasury',money(treasury));

    // صافي ربح اليوم
    const net = profitSum + repProfit + vodaSum + fawrySum - expSum;
    set('kNet',money(net));

    // رسم آخر ٧ أيام
    loadChart();
  }catch(e){
    console.error(e);
    ['kSales','kProfit','kVoda','kFawry','kExp','kStock','kTreasury','kNet']
      .forEach(id=>set(id,'—'));
    set('kMaint','—');
  }
}

async function loadChart(){
  const days=[]; const now=new Date();
  for(let i=6;i>=0;i--){ const d=new Date(now); d.setDate(now.getDate()-i); d.setHours(0,0,0,0); days.push(d); }
  const startISO = days[0].toISOString();
  const { data:sales=[] } = await db.from('sales').select('total,created_at')
    .gte('created_at',startISO).eq('status','completed');
  const totals = days.map(d=>{
    const next=new Date(d); next.setDate(d.getDate()+1);
    return sales.filter(s=>{ const t=new Date(s.created_at); return t>=d && t<next; })
               .reduce((sum,s)=>sum+Number(s.total||0),0);
  });
  const max=Math.max(...totals,1);
  const names=['الأحد','الإثنين','الثلاثاء','الأربعاء','الخميس','الجمعة','السبت'];
  document.getElementById('bars').innerHTML = days.map((d,i)=>{
    const h=Math.round((totals[i]/max)*100);
    return `<div class="bar-col">
      <div class="a">${totals[i]?Math.round(totals[i]):''}</div>
      <div class="bar" style="height:${totals[i]?Math.max(h,4):4}%"></div>
      <div class="d">${names[d.getDay()]}</div></div>`;
  }).join('');
}

function catName(id){ const c=INV.categories.find(x=>x.id===id); return c?c.name:'—'; }
function supName(id){ const s=INV.suppliers.find(x=>x.id===id); return s?s.name:''; }

function renderProducts(){
  let list = INV.products.slice();
  if(INV.cat) list = list.filter(p=>String(p.category_id)===String(INV.cat));
  if(INV.search){ const q=INV.search.trim().toLowerCase();
    list = list.filter(p=>(p.name||'').toLowerCase().includes(q) || (p.barcode||'').toLowerCase().includes(q)); }
  if(INV.onlyLow) list = list.filter(p=>Number(p.quantity)<=Number(p.min_stock));

  // تنبيه نقص المخزون
  const low = INV.products.filter(p=>Number(p.quantity)<=Number(p.min_stock));
  const al=document.getElementById('invAlert');
  if(al){ al.innerHTML = low.length
    ? `<div class="alert-bar">⚠️ <span>${low.length} منتج وصل الحد الأدنى ومحتاج إعادة طلب</span>
        <button onclick="toggleLow()">${INV.onlyLow?'عرض الكل':'اعرضهم'}</button></div>` : ''; }

  const el=document.getElementById('invList');
  if(!list.length){ el.innerHTML=`<div class="empty"><div class="ic">📦</div>
    ${INV.products.length?'مفيش نتائج للبحث':'مفيش منتجات لسه — اضغط «＋ منتج» عشان تضيف أول منتج'}</div>`; return; }

  el.className='plist';
  el.innerHTML = list.map(p=>{
    const isLow = Number(p.quantity)<=Number(p.min_stock);
    const thumb = p.image_url ? `<img src="${esc(p.image_url)}" onerror="this.parentNode.textContent='📦'">` : '📦';
    return `<div class="pcard">
      <div class="thumb">${thumb}</div>
      <div class="info">
        <div class="nm">${esc(p.name)}${isLow?'<span class="badge-low">نقص</span>':''}</div>
        <div class="meta">
          <span>🏷️ ${esc(catName(p.category_id))}</span>
          <span>بيع: <b>${money(p.sale_price)}</b></span>
          ${p.barcode?`<span># ${esc(p.barcode)}</span>`:''}
        </div>
      </div>
      <div class="qty ${isLow?'low':''}"><div class="n num">${Number(p.quantity)}</div><div class="l">بالمخزن</div></div>
      <div class="acts">
        <button onclick="productModal(${p.id})">✏️</button>
        <button class="del" onclick="deleteProduct(${p.id})">🗑️</button>
      </div>
    </div>`;
  }).join('');
}

function resizeImage(file,max,q){
  return new Promise((res,rej)=>{
    const img=new Image(); const url=URL.createObjectURL(file);
    img.onload=()=>{ let w=img.width,h=img.height;
      if(w>h && w>max){ h=Math.round(h*max/w); w=max; }
      else if(h>=w && h>max){ w=Math.round(w*max/h); h=max; }
      const cv=document.createElement('canvas'); cv.width=w; cv.height=h;
      cv.getContext('2d').drawImage(img,0,0,w,h);
      cv.toBlob(b=>{ URL.revokeObjectURL(url); b?res(b):rej(new Error('blob')); },'image/jpeg',q);
    };
    img.onerror=()=>{ URL.revokeObjectURL(url); rej(new Error('img')); };
    img.src=url;
  });
}
async function onProductPhoto(input){
  const file=input.files && input.files[0]; if(!file) return;
  input.value='';
  toast('جارٍ رفع الصورة...');
  try{
    const blob=await resizeImage(file,900,0.8);
    const path=`${CURRENT.user.id}/${Date.now()}.jpg`;
    const { error }=await db.storage.from('product-images').upload(path,blob,{contentType:'image/jpeg',upsert:false});
    if(error) throw error;
    PROD_IMG=db.storage.from('product-images').getPublicUrl(path).data.publicUrl;
    refreshPhotoBox(); toast('تم رفع الصورة ✅','ok');
  }catch(e){ console.error(e);
    toast('فشل رفع الصورة — اتأكد إنك عملت خطوة التخزين في Supabase','err'); }
}

/* ---------- مسح الباركود بالكاميرا ---------- */
function openScanner(onDecode){
  document.getElementById('scanBg').innerHTML = `
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-head"><h3>📷 مسح الباركود</h3><button class="x" onclick="closeScanner()">✕</button></div>
      <div class="modal-body">
        <div id="reader" class="reader"></div>
        <p style="text-align:center;color:var(--muted);font-size:13px;margin-top:12px">
          وجّه الكاميرا على الباركود وثبّتها لحظة</p>
      </div>
    </div>`;
  document.getElementById('scanBg').classList.add('show');
  setTimeout(async ()=>{
    if(typeof Html5Qrcode==='undefined'){ toast('مكتبة الكاميرا مش محمّلة — اتأكد من النت','err'); closeScanner(); return; }
    try{
      SCANNER=new Html5Qrcode("reader",{verbose:false});
      await SCANNER.start({facingMode:"environment"},
        {fps:10, qrbox:{width:260,height:170}},
        (txt)=>{ const v=String(txt).trim(); stopScanner().then(()=>{ hideScanBg(); onDecode(v); }); },
        ()=>{});
    }catch(e){ console.error(e);
      toast('مش قادر يفتح الكاميرا — اسمح بالكاميرا من إعدادات سفاري','err'); closeScanner(); }
  },200);
}
async function stopScanner(){ if(SCANNER){ try{ await SCANNER.stop(); SCANNER.clear(); }catch(e){} SCANNER=null; } }
function hideScanBg(){ document.getElementById('scanBg').classList.remove('show'); document.getElementById('scanBg').innerHTML=''; }
function closeScanner(){ stopScanner(); hideScanBg(); }

function scanProductBarcode(){
  openScanner(code=>{ const inp=document.getElementById('pBar'); if(inp) inp.value=code; toast('تم قراءة الباركود ✅','ok'); });
}
function scanSearch(){
  openScanner(code=>{
    const inp=document.getElementById('invSearch'); if(inp) inp.value=code;
    INV.search=code; renderProducts();
    const found=INV.products.find(p=>(p.barcode||'')===code);
    toast(found?('لقينا: '+found.name):'مفيش منتج بالباركود ده — تقدر تضيفه','ok');
  });
}

/* ---------- نافذة إضافة/تعديل منتج ---------- */
function productModal(id){

    INV.categories.map(c=>`<option value="${c.id}" ${p.category_id===c.id?'selected':''}>${esc(c.name)}</option>`).join('');
  const supOpts = `<option value="">— بدون —</option>` +
    INV.suppliers.map(s=>`<option value="${s.id}" ${p.supplier_id===s.id?'selected':''}>${esc(s.name)}</option>`).join('');
  openModal(`
    <div class="modal-head"><h3>${id?'تعديل منتج':'منتج جديد'}</h3><button class="x" onclick="closeModal()">✕</button></div>
    <div class="modal-body">
      <div class="photo-box" id="photoBox">${photoBoxInner()}</div>
      <input type="file" id="pPhoto" accept="image/*" class="hidden" onchange="onProductPhoto(this)">

      <div class="field"><label>اسم المنتج *</label><input id="pName" value="${esc(p.name)}" placeholder="مثال: شاحن سامسونج"></div>
      <div class="field"><label>التصنيف</label>
        <div class="inline-add"><select id="pCat">${catOpts}</select><button onclick="quickAddCategory()">＋</button></div></div>
      <div class="row2">
        <div class="field"><label>الكمية الحالية</label><input id="pQty" type="number" inputmode="numeric" value="${p.quantity??0}"></div>
        <div class="field"><label>الحد الأدنى</label><input id="pMin" type="number" inputmode="numeric" value="${p.min_stock??0}"></div>
      </div>
      <div class="row2">
        <div class="field"><label>سعر الجملة (التكلفة)</label><input id="pCost" type="number" inputmode="decimal" value="${p.wholesale_price??0}"></div>
        <div class="field"><label>سعر البيع</label><input id="pSale" type="number" inputmode="decimal" value="${p.sale_price??0}"></div>
      </div>
      <div class="field"><label>الباركود</label>
        <div class="inline-add">
          <input id="pBar" value="${esc(p.barcode)}" placeholder="اكتبه أو امسحه بالكاميرا">
          <button onclick="scanProductBarcode()" title="مسح بالكاميرا">📷</button>
        </div></div>
      <div class="field"><label>المورد</label>
        <div class="inline-add"><select id="pSup">${supOpts}</select><button onclick="quickAddSupplier()">＋</button></div></div>
      <div class="field"><label>ملاحظات</label><textarea id="pNotes" placeholder="اختياري">${esc(p.notes)}</textarea></div>
      <div class="modal-foot">
        <button class="cancel" onclick="closeModal()">إلغاء</button>

}
function photoBoxInner(){
  if(PROD_IMG){
    return `<img src="${esc(PROD_IMG)}" class="photo-prev">
      <div class="photo-acts">
        <button onclick="document.getElementById('pPhoto').click()">📷 تغيير</button>
        <button class="rm" onclick="removeProductPhoto()">🗑️ حذف</button>
      </div>`;
  }
  return `<button class="photo-add" onclick="document.getElementById('pPhoto').click()">
      <span style="font-size:30px">📷</span>
      <span>أضف صورة (كاميرا أو استوديو)</span></button>`;
}

async function saveProduct(id){
  const name=document.getElementById('pName').value.trim();
  if(!name){ toast('اكتب اسم المنتج','err'); return; }
  const rec = {
    name,
    category_id: document.getElementById('pCat').value || null,
    quantity: Number(document.getElementById('pQty').value||0),
    min_stock: Number(document.getElementById('pMin').value||0),
    wholesale_price: Number(document.getElementById('pCost').value||0),
    sale_price: Number(document.getElementById('pSale').value||0),
    barcode: document.getElementById('pBar').value.trim() || null,
    supplier_id: document.getElementById('pSup').value || null,
    image_url: PROD_IMG || null,
    notes: document.getElementById('pNotes').value.trim() || null,
  };
  try{
    if(id){
      rec.updated_at = new Date().toISOString();
      const { error } = await db.from('products').update(rec).eq('id',id);
      if(error) throw error;
      await logAudit('update','products',id,{name});
      toast('تم تعديل المنتج ✅','ok');
    }else{
      const { data, error } = await db.from('products').insert(rec).select().single();
      if(error) throw error;
      await logAudit('create','products',data.id,{name});
      toast('تم إضافة المنتج ✅','ok');
    }
    closeModal(); await loadInventory();
  }catch(e){ console.error(e); toast('خطأ في الحفظ: '+(e.message||''),'err'); }
}

async function deleteProduct(id){
  const p=INV.products.find(x=>x.id===id);
  openModal(`
    <div class="modal-head"><h3>حذف منتج</h3><button class="x" onclick="closeModal()">✕</button></div>
    <div class="modal-body">
      <p style="font-size:15px;line-height:1.7">متأكد إنك عايز تحذف <b>${esc(p?.name)}</b>؟<br>
      <span style="color:var(--muted);font-size:13px">الحذف ده نهائي للمنتج من المخزون.</span></p>
      <div class="modal-foot">
        <button class="cancel" onclick="closeModal()">رجوع</button>
        <button class="save" style="background:var(--neg)" onclick="confirmDeleteProduct(${id})">احذف</button>
      </div>
    </div>`);
}
async function confirmDeleteProduct(id){
  try{
    const p=INV.products.find(x=>x.id===id);
    const { error } = await db.from('products').delete().eq('id',id);
    if(error) throw error;
    await logAudit('delete','products',id,{name:p?.name});
    toast('تم حذف المنتج','ok'); closeModal(); await loadInventory();
  }catch(e){ console.error(e); toast('خطأ في الحذف','err'); }
}

/* ---------- إضافة سريعة لتصنيف/مورد من نافذة المنتج ---------- */
async function quickAddCategory(){

  sel.innerHTML=`<option value="">— اختر —</option>`+INV.categories.map(c=>`<option value="${c.id}">${esc(c.name)}</option>`).join('');

}
async function quickAddSupplier(){
  const name=prompt('اسم المورد الجديد:'); if(!name||!name.trim()) return;
  const { data, error } = await db.from('suppliers').insert({name:name.trim()}).select().single();
  if(error){ toast('خطأ','err'); return; }
  INV.suppliers.push(data); INV.suppliers.sort((a,b)=>a.name.localeCompare(b.name,'ar'));
  const sel=document.getElementById('pSup');
  sel.innerHTML=`<option value="">— بدون —</option>`+INV.suppliers.map(s=>`<option value="${s.id}">${esc(s.name)}</option>`).join('');
  sel.value=data.id; toast('تمت إضافة المورد','ok');
}

/* ---------- إدارة التصنيفات ---------- */
function categoriesModal(){
  openModal(`
    <div class="modal-head"><h3>🏷️ التصنيفات</h3><button class="x" onclick="closeModal()">✕</button></div>
    <div class="modal-body">
      <div class="inline-add" style="margin-bottom:14px">
        <input id="newCat" placeholder="اسم تصنيف جديد">

  if(error){ toast('خطأ','err'); return; }

  const { error } = await db.from('categories').delete().eq('id',id);

/* ---------- إدارة الموردين ---------- */
function suppliersModal(){
  openModal(`
    <div class="modal-head"><h3>🚚 الموردين</h3><button class="x" onclick="closeModal()">✕</button></div>
    <div class="modal-body">
      <div class="field"><label>اسم المورد</label><input id="newSupName" placeholder="اسم المورد"></div>

async function addSupplier(){

async function delSupplier(id){
  const { error } = await db.from('suppliers').delete().eq('id',id);
  if(error){ toast('مينفعش يتحذف (مرتبط ببيانات)','err'); return; }
  INV.suppliers=INV.suppliers.filter(s=>s.id!==id); renderSupList(); toast('تم الحذف','ok');
}

/* ---------- تصدير / استيراد CSV (يفتح في Excel) ---------- */
function exportCSV(){
  const rows=[['الاسم','التصنيف','الباركود','الكمية','الحد الأدنى','سعر الجملة','سعر البيع','المورد','ملاحظات']];
  INV.products.forEach(p=>rows.push([
    p.name, catName(p.category_id), p.barcode||'', p.quantity, p.min_stock,
    p.wholesale_price, p.sale_price, supName(p.supplier_id), p.notes||''
  ]));
  const csv='\uFEFF'+rows.map(r=>r.map(c=>`"${String(c==null?'':c).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download='المخزون-'+new Date().toISOString().slice(0,10)+'.csv'; a.click();
  toast('تم تصدير الملف ✅','ok');
}

async function importCSV(file){
  if(!file) return;
  const text=await file.text();
  const lines=text.replace(/^\uFEFF/,'').split(/\r?\n/).filter(l=>l.trim());
  if(lines.length<2){ toast('الملف فاضي','err'); return; }
  const parseLine=(l)=>{ const out=[]; let cur='',q=false;
    for(let i=0;i<l.length;i++){ const ch=l[i];
      if(q){ if(ch==='"'){ if(l[i+1]==='"'){cur+='"';i++;} else q=false; } else cur+=ch; }
      else { if(ch==='"') q=true; else if(ch===','){ out.push(cur); cur=''; } else cur+=ch; } }
    out.push(cur); return out; };
  let added=0,failed=0;
  for(let i=1;i<lines.length;i++){
    const f=parseLine(lines[i]); if(!f[0]||!f[0].trim()) continue;
    let catId=null; const cn=(f[1]||'').trim();
    if(cn){ let c=INV.categories.find(x=>x.name===cn);
      if(!c){ const{data}=await db.from('categories').insert({name:cn}).select().single(); if(data){c=data;INV.categories.push(data);} }
      catId=c?c.id:null; }
    const rec={ name:f[0].trim(), category_id:catId, barcode:(f[2]||'').trim()||null,
      quantity:Number(f[3]||0), min_stock:Number(f[4]||0),
      wholesale_price:Number(f[5]||0), sale_price:Number(f[6]||0), notes:(f[8]||'').trim()||null };
    const { error } = await db.from('products').insert(rec);
    if(error) failed++; else added++;
  }
  await logAudit('import','products','',{added,failed});
  toast(`تم استيراد ${added} منتج${failed?` (${failed} فشل)`:''}`, failed?'err':'ok');
  document.getElementById('csvFile').value='';
  await loadInventory();
}
