<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>نظام محل الموبايلات</title>

<!-- مكتبة Supabase (لازمة للمزامنة وتسجيل الدخول) -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<!-- خط عربي نظيف -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
/* ========== الإعدادات: الزق مفتاحك في السطر المعلّم تحت ========== */
:root{
  --bg:#EDF1F7; --surface:#FFFFFF; --surface-2:#F6F8FC;
  --ink:#102136; --muted:#6B7A90; --line:#E3E9F2;
  --navy:#15406B; --navy-700:#1C4E80; --navy-900:#0C2A49;
  --gold:#E39A0C; --pos:#138A5E; --neg:#C0392B;
  --shadow:0 10px 30px rgba(16,33,54,.08);
  --radius:18px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{
  font-family:'Cairo',system-ui,'Segoe UI',Tahoma,sans-serif;
  background:var(--bg); color:var(--ink);
  font-variant-numeric:tabular-nums; -webkit-font-smoothing:antialiased;
}
.num{font-variant-numeric:tabular-nums; letter-spacing:.2px}
button{font-family:inherit;cursor:pointer}
input{font-family:inherit}
.hidden{display:none !important}

/* ===================== شاشة الدخول ===================== */
#auth{
  min-height:100dvh; display:flex; align-items:center; justify-content:center;
  padding:24px;
  background:radial-gradient(120% 120% at 80% -10%, #1C4E80 0%, #0C2A49 55%, #081d33 100%);
  position:relative; overflow:hidden;
}
/* موتيف أعمدة الشبكة (إشارة الموبايل) خلفية خفيفة */
.signal{position:absolute; bottom:-20px; left:-10px; display:flex; gap:14px; align-items:flex-end; opacity:.07}
.signal i{width:26px; background:#fff; border-radius:6px; display:block}
.signal i:nth-child(1){height:60px}.signal i:nth-child(2){height:110px}
.signal i:nth-child(3){height:170px}.signal i:nth-child(4){height:240px}
.auth-card{
  position:relative; z-index:2; width:100%; max-width:400px;
  background:var(--surface); border-radius:24px; padding:30px 24px 26px;
  box-shadow:0 24px 60px rgba(0,0,0,.35);
}
.brand{display:flex; flex-direction:column; align-items:center; gap:12px; margin-bottom:22px}
.brand .mark{
  width:64px;height:64px;border-radius:18px;
  background:linear-gradient(150deg,var(--navy-700),var(--navy-900));
  display:flex;align-items:center;justify-content:center;color:#fff;font-size:30px;
  box-shadow:var(--shadow);
}
.brand h1{margin:0;font-size:21px;font-weight:800;color:var(--navy-900)}
.brand p{margin:0;font-size:13px;color:var(--muted)}
.field{margin-bottom:14px}
.field label{display:block;font-size:13px;font-weight:600;margin-bottom:7px;color:var(--ink)}
.field input{
  width:100%;padding:13px 15px;border:1.5px solid var(--line);border-radius:13px;
  font-size:15px;background:var(--surface-2);transition:border-color .15s, background .15s;
}
.field input:focus{outline:none;border-color:var(--navy-700);background:#fff}
.btn{
  width:100%;padding:14px;border:none;border-radius:13px;font-size:16px;font-weight:700;
  background:var(--navy);color:#fff;transition:transform .06s, background .15s; margin-top:6px;
}
.btn:active{transform:scale(.99)}
.btn:disabled{opacity:.6}
.btn-gold{background:var(--gold)}
.link-row{display:flex;justify-content:space-between;margin-top:16px;font-size:13.5px}
.link-row a{color:var(--navy-700);text-decoration:none;font-weight:600;cursor:pointer}
.msg{font-size:13.5px;padding:11px 13px;border-radius:11px;margin-bottom:14px;display:none}
.msg.show{display:block}
.msg.err{background:#FDECEA;color:#9B2D20;border:1px solid #F5C6C0}
.msg.ok{background:#E7F6EF;color:#0E6B49;border:1px solid #BDE6D3}

/* ===================== الهيكل العام للتطبيق ===================== */
#app{min-height:100dvh;display:flex;flex-direction:column}
.topbar{
  background:linear-gradient(120deg,var(--navy),var(--navy-900));
  color:#fff;padding:13px 16px;display:flex;align-items:center;gap:12px;
  position:sticky;top:0;z-index:30;
}
.topbar .menu-btn{
  background:rgba(255,255,255,.14);border:none;color:#fff;width:40px;height:40px;
  border-radius:11px;font-size:20px;display:flex;align-items:center;justify-content:center;
}
.topbar .title{flex:1;font-weight:800;font-size:17px}
.topbar .user{display:flex;align-items:center;gap:9px}
.avatar{width:38px;height:38px;border-radius:50%;background:var(--gold);color:#3a2700;
  display:flex;align-items:center;justify-content:center;font-weight:800;font-size:16px}
.user .who{display:flex;flex-direction:column;line-height:1.2}
.user .who b{font-size:13.5px}
.user .who span{font-size:11px;opacity:.8}

.layout{flex:1;display:flex}
/* الشريط الجانبي (كمبيوتر) */
.sidebar{
  width:248px;background:var(--surface);border-inline-start:1px solid var(--line);
  padding:14px 12px;position:sticky;top:64px;height:calc(100dvh - 64px);overflow-y:auto;
}
.nav-item{
  display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:12px;
  font-weight:600;font-size:15px;color:var(--ink);cursor:pointer;margin-bottom:4px;
  border:none;background:none;width:100%;text-align:start;transition:background .12s;
}
.nav-item .ic{font-size:19px;width:24px;text-align:center}
.nav-item:hover{background:var(--surface-2)}
.nav-item.active{background:var(--navy);color:#fff}
.content{flex:1;padding:18px 16px 90px;max-width:1100px;margin:0 auto;width:100%}

/* درج الموبايل */
.overlay{position:fixed;inset:0;background:rgba(8,22,40,.5);z-index:40;opacity:0;
  pointer-events:none;transition:opacity .2s}
.overlay.show{opacity:1;pointer-events:auto}
.drawer{
  position:fixed;top:0;right:0;height:100dvh;width:270px;background:var(--surface);z-index:50;
  transform:translateX(100%);transition:transform .25s ease;padding:16px 12px;overflow-y:auto;
  box-shadow:-12px 0 30px rgba(8,22,40,.18);
}
.drawer.show{transform:translateX(0)}
.drawer .dhead{display:flex;align-items:center;gap:10px;padding:6px 10px 16px;border-bottom:1px solid var(--line);margin-bottom:12px}
.drawer .dhead .mark{width:42px;height:42px;border-radius:12px;background:linear-gradient(150deg,var(--navy-700),var(--navy-900));color:#fff;display:flex;align-items:center;justify-content:center;font-size:21px}
.drawer .dhead b{font-size:15px}
.drawer .dhead span{font-size:11.5px;color:var(--muted);display:block}

/* ===================== لوحة التحكم ===================== */
.page-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;gap:10px}
.page-head h2{margin:0;font-size:20px;font-weight:800}
.page-head .date{font-size:13px;color:var(--muted)}
.refresh{background:var(--surface);border:1.5px solid var(--line);border-radius:11px;
  padding:9px 14px;font-weight:600;font-size:14px;display:flex;align-items:center;gap:7px;color:var(--ink)}

/* أبطال: الخزنة وصافي الربح */
.hero{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
.hero-card{border-radius:var(--radius);padding:18px;color:#fff;box-shadow:var(--shadow);position:relative;overflow:hidden}
.hero-card .lbl{font-size:13px;opacity:.9;margin-bottom:8px;font-weight:600}
.hero-card .val{font-size:26px;font-weight:800}
.hero-card.treasury{background:linear-gradient(135deg,var(--navy-700),var(--navy-900))}
.hero-card.net{background:linear-gradient(135deg,#13855a,#0c5f40)}
.hero-card .coin{position:absolute;left:14px;bottom:6px;font-size:54px;opacity:.16}

/* بطاقات الإحصائيات */
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
.stat{background:var(--surface);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);
  border-top:3px solid var(--navy)}
.stat.s-sales{border-top-color:var(--navy)}
.stat.s-profit{border-top-color:var(--pos)}
.stat.s-maint{border-top-color:#7A4FD0}
.stat.s-voda{border-top-color:#E2231A}
.stat.s-fawry{border-top-color:var(--gold)}
.stat.s-exp{border-top-color:var(--neg)}
.stat.s-stock{border-top-color:#0E8A8A}
.stat .top{display:flex;align-items:center;gap:9px;margin-bottom:10px}
.stat .top .ic{font-size:18px}
.stat .top .t{font-size:13px;color:var(--muted);font-weight:600}
.stat .v{font-size:21px;font-weight:800}
.stat .v small{font-size:13px;color:var(--muted);font-weight:600}

/* الرسم البياني */
.chart-card{background:var(--surface);border-radius:var(--radius);padding:18px;box-shadow:var(--shadow);margin-top:14px}
.chart-card h3{margin:0 0 4px;font-size:16px;font-weight:800}
.chart-card .sub{font-size:12.5px;color:var(--muted);margin-bottom:14px}
.bars{display:flex;align-items:flex-end;justify-content:space-between;gap:8px;height:150px}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;height:100%;justify-content:flex-end}
.bar{width:100%;max-width:34px;background:linear-gradient(180deg,var(--navy-700),var(--navy));
  border-radius:8px 8px 0 0;min-height:4px;transition:height .4s ease}
.bar-col .d{font-size:11px;color:var(--muted)}
.bar-col .a{font-size:10.5px;color:var(--ink);font-weight:700}

/* صفحة قريبًا */
.soon{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow);
  padding:46px 22px;text-align:center}
.soon .ic{font-size:46px;margin-bottom:12px}
.soon h3{margin:0 0 6px;font-size:20px;font-weight:800}
.soon p{margin:0;color:var(--muted);font-size:14px;line-height:1.7}

/* responsive */
@media (max-width:760px){
  .sidebar{display:none}
  .hero{grid-template-columns:1fr}
  .content{padding:16px 13px 90px}
}
@media (min-width:761px){
  .menu-btn{display:none}
  .grid{grid-template-columns:repeat(4,1fr)}
}
@media (prefers-reduced-motion:reduce){*{transition:none !important}}
</style>
</head>
<body>

<!-- ===================== شاشة الدخول ===================== -->
<section id="auth">
  <div class="signal"><i></i><i></i><i></i><i></i></div>
  <div class="auth-card">
    <div class="brand">
      <div class="mark">📱</div>
      <h1>نظام محل الموبايلات</h1>
      <p id="authSub">سجّل دخولك للمتابعة</p>
    </div>

    <div id="authMsg" class="msg"></div>

    <!-- تسجيل الدخول -->
    <div id="loginForm">
      <div class="field">
        <label>البريد الإلكتروني</label>
        <input id="loginEmail" type="email" inputmode="email" placeholder="example@mail.com" autocomplete="username">
      </div>
      <div class="field">
        <label>كلمة المرور</label>
        <input id="loginPass" type="password" placeholder="••••••••" autocomplete="current-password">
      </div>
      <button class="btn" id="loginBtn" onclick="doLogin()">دخول</button>
      <div class="link-row">
        <a onclick="showSignup()">إنشاء حساب جديد</a>
        <a onclick="doForgot()">نسيت كلمة المرور؟</a>
      </div>
    </div>

    <!-- إنشاء حساب -->
    <div id="signupForm" class="hidden">
      <div class="field">
        <label>الاسم</label>
        <input id="suName" type="text" placeholder="اسمك بالكامل">
      </div>
      <div class="field">
        <label>البريد الإلكتروني</label>
        <input id="suEmail" type="email" inputmode="email" placeholder="example@mail.com">
      </div>
      <div class="field">
        <label>كلمة المرور</label>
        <input id="suPass" type="password" placeholder="٦ حروف على الأقل">
      </div>
      <button class="btn btn-gold" id="suBtn" onclick="doSignup()">إنشاء الحساب</button>
      <div class="link-row" style="justify-content:center">
        <a onclick="showLogin()">عندي حساب — رجوع للدخول</a>
      </div>
    </div>
  </div>
</section>

<!-- ===================== التطبيق ===================== -->
<div id="app" class="hidden">
  <header class="topbar">
    <button class="menu-btn" onclick="openDrawer()">☰</button>
    <div class="title">📱 محل الموبايلات</div>
    <div class="user">
      <div class="who" style="text-align:start">
        <b id="uName">—</b><span id="uRole">—</span>
      </div>
      <div class="avatar" id="uAvatar">؟</div>
    </div>
  </header>

  <div class="layout">
    <aside class="sidebar" id="sidebar"></aside>
    <main class="content" id="content"></main>
  </div>
</div>

<!-- درج الموبايل -->
<div class="overlay" id="overlay" onclick="closeDrawer()"></div>
<nav class="drawer" id="drawer">
  <div class="dhead">
    <div class="mark">📱</div>
    <div><b id="dName">—</b><span id="dRole">—</span></div>
  </div>
  <div id="drawerNav"></div>
  <button class="nav-item" style="color:var(--neg);margin-top:8px" onclick="doLogout()">
    <span class="ic">⎋</span> تسجيل الخروج
  </button>
</nav>

<script>
/* ====================================================================
   الإعدادات — الزق مفتاح Publishable بتاعك في السطر اللي تحت
   ==================================================================== */
const SUPABASE_URL = "https://zcoqpfpxlgfqrurjzfzn.supabase.co";
const SUPABASE_KEY = "sb_publishable_UbfvZtgBPD3YDUR1fTHyGw_x5VSEXkN";

/* ==================== تهيئة ==================== */
const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
let CURRENT = { user:null, profile:null };

const ROLE_AR = { admin:'مدير', sales:'موظف مبيعات', technician:'فني صيانة', accountant:'محاسب' };

/* أقسام النظام + الصلاحيات المسموح لها */
const NAV = [
  { id:'dashboard', name:'لوحة التحكم', ic:'🏠', roles:['admin','sales','technician','accountant'] },
  { id:'cashier',   name:'الكاشير',     ic:'🛒', roles:['admin','sales'] },
  { id:'inventory', name:'المخزون',     ic:'📦', roles:['admin','sales','accountant'] },
  { id:'maintenance',name:'الصيانة',    ic:'🔧', roles:['admin','technician'] },
  { id:'vodafone',  name:'فودافون كاش', ic:'📲', roles:['admin','sales'] },
  { id:'fawry',     name:'فوري',        ic:'💳', roles:['admin','sales'] },
  { id:'treasury',  name:'الخزنة',      ic:'🏦', roles:['admin','accountant'] },
  { id:'expenses',  name:'المصروفات',   ic:'🧾', roles:['admin','accountant'] },
  { id:'stocktake', name:'الجرد',       ic:'📋', roles:['admin','accountant'] },
  { id:'reports',   name:'التقارير',    ic:'📊', roles:['admin','accountant'] },
  { id:'users',     name:'المستخدمين',  ic:'👥', roles:['admin'] },
  { id:'audit',     name:'سجل النشاط',  ic:'🛡️', roles:['admin'] },
];

/* ==================== أدوات مساعدة ==================== */
function money(n){ return new Intl.NumberFormat('en-US',{maximumFractionDigits:2}).format(n||0)+' ج.م'; }
function todayStartISO(){ const d=new Date(); d.setHours(0,0,0,0); return d.toISOString(); }
function authMsg(text,type){ const m=document.getElementById('authMsg'); m.textContent=text; m.className='msg show '+(type||'err'); }
function clearAuthMsg(){ document.getElementById('authMsg').className='msg'; }

/* ==================== تبديل نماذج الدخول ==================== */
function showSignup(){ clearAuthMsg(); document.getElementById('loginForm').classList.add('hidden');
  document.getElementById('signupForm').classList.remove('hidden'); document.getElementById('authSub').textContent='إنشاء حساب جديد'; }
function showLogin(){ clearAuthMsg(); document.getElementById('signupForm').classList.add('hidden');
  document.getElementById('loginForm').classList.remove('hidden'); document.getElementById('authSub').textContent='سجّل دخولك للمتابعة'; }

/* ==================== الدخول / التسجيل / الخروج ==================== */
async function doLogin(){
  clearAuthMsg();
  const email=document.getElementById('loginEmail').value.trim();
  const pass=document.getElementById('loginPass').value;
  if(!email||!pass){ authMsg('اكتب البريد وكلمة المرور'); return; }
  const btn=document.getElementById('loginBtn'); btn.disabled=true; btn.textContent='جارٍ الدخول...';
  const { error } = await db.auth.signInWithPassword({ email, password:pass });
  btn.disabled=false; btn.textContent='دخول';
  if(error){ authMsg(translateAuthError(error.message)); return; }
  await startApp();
}

async function doSignup(){
  clearAuthMsg();
  const name=document.getElementById('suName').value.trim();
  const email=document.getElementById('suEmail').value.trim();
  const pass=document.getElementById('suPass').value;
  if(!name||!email||!pass){ authMsg('اكمل كل الخانات'); return; }
  if(pass.length<6){ authMsg('كلمة المرور لازم ٦ حروف على الأقل'); return; }
  const btn=document.getElementById('suBtn'); btn.disabled=true; btn.textContent='جارٍ الإنشاء...';
  const { data, error } = await db.auth.signUp({
    email, password:pass, options:{ data:{ full_name:name } }
  });
  btn.disabled=false; btn.textContent='إنشاء الحساب';
  if(error){ authMsg(translateAuthError(error.message)); return; }
  if(data.session){ await startApp(); }           // دخول مباشر (لو تأكيد الإيميل مقفول)
  else { showLogin(); authMsg('تم إنشاء الحساب ✅ سجّل دخولك دلوقتي','ok'); }
}

async function doForgot(){
  clearAuthMsg();
  const email=document.getElementById('loginEmail').value.trim();
  if(!email){ authMsg('اكتب بريدك في خانة البريد الأول'); return; }
  const { error } = await db.auth.resetPasswordForEmail(email,{ redirectTo:location.href });
  if(error){ authMsg(translateAuthError(error.message)); return; }
  authMsg('بعتنا رابط استعادة كلمة المرور على بريدك 📧','ok');
}

async function doLogout(){ await db.auth.signOut(); location.reload(); }

function translateAuthError(m){
  m=(m||'').toLowerCase();
  if(m.includes('invalid login')) return 'البريد أو كلمة المرور غير صحيحة';
  if(m.includes('email not confirmed')) return 'لازم تأكيد البريد — أو اقفل تأكيد الإيميل من إعدادات Supabase';
  if(m.includes('already registered')) return 'البريد ده مسجّل قبل كده';
  if(m.includes('rate limit')) return 'محاولات كتير — استنى شوية وحاول تاني';
  return 'حصل خطأ: '+m;
}

/* ==================== بدء التطبيق بعد الدخول ==================== */
async function startApp(){
  const { data:{ user } } = await db.auth.getUser();
  if(!user) return;
  CURRENT.user = user;

  // جلب الملف الشخصي (الاسم + الصلاحية)
  let { data:profile } = await db.from('profiles').select('*').eq('id',user.id).single();
  if(!profile){ // احتياطي لو الـ trigger متأخر
    await db.from('profiles').insert({ id:user.id, full_name:user.email });
    profile = { id:user.id, full_name:user.email, role:'sales' };
  }
  CURRENT.profile = profile;

  // عرض بيانات المستخدم
  const nm = profile.full_name || user.email;
  const role = ROLE_AR[profile.role] || profile.role;
  document.getElementById('uName').textContent = nm;
  document.getElementById('uRole').textContent = role;
  document.getElementById('uAvatar').textContent = (nm[0]||'؟').toUpperCase();
  document.getElementById('dName').textContent = nm;
  document.getElementById('dRole').textContent = role;

  buildNav(profile.role);
  document.getElementById('auth').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  navigate('dashboard');
}

/* ==================== بناء القوائم حسب الصلاحية ==================== */
function buildNav(role){
  const items = NAV.filter(n=>n.roles.includes(role));
  const make = (target)=> items.map(n=>
    `<button class="nav-item" data-id="${n.id}" onclick="navigate('${n.id}')">
       <span class="ic">${n.ic}</span> ${n.name}
     </button>`).join('');
  document.getElementById('sidebar').innerHTML = make() +
    `<button class="nav-item" style="color:var(--neg);margin-top:10px" onclick="doLogout()">
       <span class="ic">⎋</span> تسجيل الخروج</button>`;
  document.getElementById('drawerNav').innerHTML = make();
}

function setActive(id){
  document.querySelectorAll('.nav-item[data-id]').forEach(b=>{
    b.classList.toggle('active', b.dataset.id===id);
  });
}

/* ==================== التنقل بين الأقسام ==================== */
function navigate(id){
  setActive(id); closeDrawer();
  if(id==='dashboard'){ renderDashboard(); }
  else{ renderSoon(id); }
}

/* ==================== الدرج (موبايل) ==================== */
function openDrawer(){ document.getElementById('drawer').classList.add('show');
  document.getElementById('overlay').classList.add('show'); }
function closeDrawer(){ document.getElementById('drawer').classList.remove('show');
  document.getElementById('overlay').classList.remove('show'); }

/* ==================== صفحة "قريبًا" للأقسام الجاية ==================== */
function renderSoon(id){
  const n = NAV.find(x=>x.id===id);
  document.getElementById('content').innerHTML = `
    <div class="page-head"><h2>${n.ic} ${n.name}</h2></div>
    <div class="soon">
      <div class="ic">${n.ic}</div>
      <h3>${n.name}</h3>
      <p>القسم ده جاهز في قاعدة البيانات، وهنبنيه في الخطوة الجاية.<br>كل قسم بنخلّصه بالكامل قبل ما ننتقل للي بعده.</p>
    </div>`;
}

/* ==================== لوحة التحكم ==================== */
async function renderDashboard(){
  const c=document.getElementById('content');
  const today = new Date().toLocaleDateString('ar-EG',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
  c.innerHTML = `
    <div class="page-head">
      <div><h2>لوحة التحكم</h2><div class="date">${today}</div></div>
      <button class="refresh" onclick="renderDashboard()"><span>↻</span> تحديث</button>
    </div>

    <div class="hero">
      <div class="hero-card treasury"><div class="lbl">رصيد الخزنة</div><div class="val num" id="kTreasury">…</div><div class="coin">🏦</div></div>
      <div class="hero-card net"><div class="lbl">صافي ربح اليوم</div><div class="val num" id="kNet">…</div><div class="coin">📈</div></div>
    </div>

    <div class="grid">
      ${statCard('s-sales','🛒','مبيعات اليوم','kSales')}
      ${statCard('s-profit','💰','ربح اليوم','kProfit')}
      ${statCard('s-maint','🔧','عمليات صيانة اليوم','kMaint')}
      ${statCard('s-voda','📲','عمولات فودافون','kVoda')}
      ${statCard('s-fawry','💳','عمولات فوري','kFawry')}
      ${statCard('s-exp','🧾','مصروفات اليوم','kExp')}
      ${statCard('s-stock','📦','قيمة المخزون','kStock')}
    </div>

    <div class="chart-card">
      <h3>مبيعات آخر ٧ أيام</h3>
      <div class="sub">إجمالي قيمة المبيعات المكتملة يوميًا</div>
      <div class="bars" id="bars"></div>
    </div>`;
  loadStats();
}
function statCard(cls,ic,title,id){
  return `<div class="stat ${cls}">
    <div class="top"><span class="ic">${ic}</span><span class="t">${title}</span></div>
    <div class="v num" id="${id}">…</div></div>`;
}

async function loadStats(){
  const t0 = todayStartISO();
  const set=(id,v)=>{ const el=document.getElementById(id); if(el) el.textContent=v; };
  try{
    // مبيعات + ربح اليوم
    const { data:sales=[] } = await db.from('sales').select('total,profit')
      .gte('created_at',t0).eq('status','completed');
    const salesSum = sales.reduce((s,r)=>s+Number(r.total||0),0);
    const profitSum = sales.reduce((s,r)=>s+Number(r.profit||0),0);
    set('kSales',money(salesSum)); set('kProfit',money(profitSum));

    // عدد عمليات الصيانة اليوم
    const { count:maintCount=0 } = await db.from('repairs')
      .select('id',{count:'exact',head:true}).gte('received_at',t0);
    set('kMaint', (maintCount||0)+' عملية');

    // عمولات فودافون + فوري اليوم
    const { data:voda=[] } = await db.from('vodafone_cash').select('commission')
      .gte('created_at',t0).eq('status','active');
    const vodaSum = voda.reduce((s,r)=>s+Number(r.commission||0),0);
    set('kVoda',money(vodaSum));

    const { data:fawry=[] } = await db.from('fawry').select('commission')
      .gte('created_at',t0).eq('status','active');
    const fawrySum = fawry.reduce((s,r)=>s+Number(r.commission||0),0);
    set('kFawry',money(fawrySum));

    // مصروفات اليوم
    const { data:exp=[] } = await db.from('expenses').select('amount')
      .gte('created_at',t0).eq('status','active');
    const expSum = exp.reduce((s,r)=>s+Number(r.amount||0),0);
    set('kExp',money(expSum));

    // ربح الصيانة اليوم (للصافي)
    const { data:rep=[] } = await db.from('repairs').select('profit')
      .gte('received_at',t0);
    const repProfit = rep.reduce((s,r)=>s+Number(r.profit||0),0);

    // قيمة المخزون = مجموع (الكمية × سعر الجملة)
    const { data:prods=[] } = await db.from('products').select('quantity,wholesale_price');
    const stockVal = prods.reduce((s,r)=>s+Number(r.quantity||0)*Number(r.wholesale_price||0),0);
    set('kStock',money(stockVal));

    // رصيد الخزنة = داخل - خارج (الحركات الفعّالة)
    const { data:tr=[] } = await db.from('treasury').select('direction,amount').eq('status','active');
    const treasury = tr.reduce((s,r)=>s+(r.direction==='in'?1:-1)*Number(r.amount||0),0);
    set('kTreasury',money(treasury));

    // صافي ربح اليوم
    const net = profitSum + repProfit + vodaSum + fawrySum - expSum;
    set('kNet',money(net));

    // رسم آخر ٧ أيام
    loadChart();
  }catch(e){
    console.error(e);
    ['kSales','kProfit','kVoda','kFawry','kExp','kStock','kTreasury','kNet']
      .forEach(id=>set(id,'—'));
    set('kMaint','—');
  }
}

async function loadChart(){
  const days=[]; const now=new Date();
  for(let i=6;i>=0;i--){ const d=new Date(now); d.setDate(now.getDate()-i); d.setHours(0,0,0,0); days.push(d); }
  const startISO = days[0].toISOString();
  const { data:sales=[] } = await db.from('sales').select('total,created_at')
    .gte('created_at',startISO).eq('status','completed');
  const totals = days.map(d=>{
    const next=new Date(d); next.setDate(d.getDate()+1);
    return sales.filter(s=>{ const t=new Date(s.created_at); return t>=d && t<next; })
               .reduce((sum,s)=>sum+Number(s.total||0),0);
  });
  const max=Math.max(...totals,1);
  const names=['الأحد','الإثنين','الثلاثاء','الأربعاء','الخميس','الجمعة','السبت'];
  document.getElementById('bars').innerHTML = days.map((d,i)=>{
    const h=Math.round((totals[i]/max)*100);
    return `<div class="bar-col">
      <div class="a">${totals[i]?Math.round(totals[i]):''}</div>
      <div class="bar" style="height:${totals[i]?Math.max(h,4):4}%"></div>
      <div class="d">${names[d.getDay()]}</div></div>`;
  }).join('');
}
