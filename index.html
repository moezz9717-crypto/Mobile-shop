async function loadStats(){
  const t0 = todayStartISO();
  const set=(id,v)=>{ const el=document.getElementById(id); if(el) el.textContent=v; };
  const sum=async(fn)=>{ try{ return await fn(); }catch(e){ console.warn(e); return 0; } };
  try{
    // مبيعات + ربح الاكسسوارات اليوم
    const { data:sales=[] } = await db.from('sales').select('total,profit')
      .gte('created_at',t0).eq('status','completed');
    const salesSum = sales.reduce((s,r)=>s+Number(r.total||0),0);
    const accProfit = sales.reduce((s,r)=>s+Number(r.profit||0),0);
    set('kSales',money(salesSum)); set('kProfit',money(accProfit));

    // عدد عمليات الصيانة اليوم
    const maintCount = await sum(async()=>{ const {count}=await db.from('repairs').select('id',{count:'exact',head:true}).gte('received_at',t0); return count||0; });
    set('kMaint', maintCount+' عملية');

    // عمولات الرصيد اليوم من اليوم المقفول النهارده
    const rechargeC = await sum(async()=>{ const {data}=await db.from('business_days').select('recharge_commission').gte('closed_at',t0).eq('status','closed'); return (data||[]).reduce((s,r)=>s+Number(r.recharge_commission||0),0); });
    set('kRecharge',money(rechargeC));

    // مصروفات اليوم
    const expSum = await sum(async()=>{ const {data}=await db.from('expenses').select('amount').gte('created_at',t0).eq('status','active'); return (data||[]).reduce((s,r)=>s+Number(r.amount||0),0); });
    set('kExp',money(expSum));

    // ربح الصيانة اليوم (المسلّمة) للصافي
    const maintProfit = await sum(async()=>{ const {data}=await db.from('repairs').select('profit').gte('delivered_at',t0).eq('status','delivered'); return (data||[]).reduce((s,r)=>s+Number(r.profit||0),0); });
    set('kVoda',money(maintProfit));

    // قيمة المخزون
    const { data:prods=[] } = await db.from('products').select('quantity,wholesale_price');
    const stockVal = prods.reduce((s,r)=>s+Number(r.quantity||0)*Number(r.wholesale_price||0),0);
    set('kStock',money(stockVal));

    // الدرج من اليوم المفتوح أو آخر يوم
    const drawer = await sum(async()=>{
      const o=await getOpenDay(); if(o) return Number(o.drawer_open||0);
      const l=await getLastClosedDay(); return l?Number(l.drawer_close||0):0;
    });
    set('kTreasury',money(drawer)); set('kVfBal',money(rechargeC));

    // صافي ربح اليوم
    const net = accProfit + maintProfit + rechargeC - expSum;
    set('kNet',money(net));

    loadChart();
  }catch(e){
    console.error(e);
    ['kSales','kProfit','kRecharge','kVoda','kExp','kStock','kTreasury','kVfBal','kNet']
      .forEach(id=>set(id,'—'));
    set('kMaint','—');
  }
}

async function loadChart(){
  const days=[]; const now=new Date();
  for(let i=6;i>=0;i--){ const d=new Date(now); d.setDate(now.getDate()-i); d.setHours(0,0,0,0); days.push(d); }
  const startISO = days[0].toISOString();
  const { data:sales=[] } = await db.from('sales').select('total,created_at')
    .gte('created_at',startISO).eq('status','completed');
  const totals = days.map(d=>{
    const next=new Date(d); next.setDate(d.getDate()+1);
    return sales.filter(s=>{ const t=new Date(s.created_at); return t>=d && t<next; })
               .reduce((sum,s)=>sum+Number(s.total||0),0);
  });
  const max=Math.max(...totals,1);
  const names=['الأحد','الإثنين','الثلاثاء','الأربعاء','الخميس','الجمعة','السبت'];
  document.getElementById('bars').innerHTML = days.map((d,i)=>{
    const h=Math.round((totals[i]/max)*100);
    return `<div class="bar-col">
      <div class="a">${totals[i]?Math.round(totals[i]):''}</div>
      <div class="bar" style="height:${totals[i]?Math.max(h,4):4}%"></div>
      <div class="d">${names[d.getDay()]}</div></div>`;
  }).join('');
}

let _lockCount=0, _lockY=0;
function lockScroll(){
  if(_lockCount++>0) return;
  _lockY = window.scrollY || window.pageYOffset || 0;
  document.body.style.position='fixed';
  document.body.style.top=`-${_lockY}px`;
  document.body.style.left='0'; document.body.style.right='0'; document.body.style.width='100%';
  document.documentElement.style.overflow='hidden';
}
function unlockScroll(){
  if(_lockCount>0) _lockCount--;
  if(_lockCount>0) return;
  document.body.style.position=''; document.body.style.top='';
  document.body.style.left=''; document.body.style.right=''; document.body.style.width='';
  document.documentElement.style.overflow='';
  window.scrollTo(0,_lockY);
}
function openModal(html){
  const bg=document.getElementById('modalBg');
  bg.innerHTML = `<div class="modal" onclick="event.stopPropagation()">${html}</div>`;
  void bg.offsetHeight;                 // reflow عشان الأنميشن يشتغل ويظهر صح على iOS
  requestAnimationFrame(()=>bg.classList.add('show'));
  lockScroll();
}
let MODAL_CLOSE_CB=null;
function closeModal(){ document.getElementById('modalBg').classList.remove('show'); unlockScroll(); const cb=MODAL_CLOSE_CB; MODAL_CLOSE_CB=null; if(cb){ try{ cb(); }catch(e){ console.warn(e); } } }
function toast(msg,type){
  const t=document.getElementById('toast');
  t.textContent=msg; t.className='toast show '+(type||'');
  clearTimeout(window._tt); window._tt=setTimeout(()=>t.className='toast '+(type||''),2400);
}

/* تخزين محلي (كاش) عشان الفتح يبقى فوري بدون انتظار النت */
function cacheSet(k,v){ try{ localStorage.setItem('cache:'+k, JSON.stringify(v)); }catch(e){} }
function cacheGet(k){ try{ const s=localStorage.getItem('cache:'+k); return s?JSON.parse(s):null; }catch(e){ return null; } }

function fillInvFilters(){
  const sel=document.getElementById('invCat');
  if(sel) sel.innerHTML = `<option value="">كل التصنيفات</option>` +
    INV.categories.map(c=>`<option value="${c.id}" ${String(INV.cat)===String(c.id)?'selected':''}>${esc(c.name)}</option>`).join('');

}

// يدمج التعديلات المعلّقة (اللي لسه بترفع) فوق بيانات السيرفر عشان متختفيش
function mergePending(list){
  list = list ? list.slice() : [];
  for(const op of outboxGet()){
    if(op.type==='insert'){ if(!list.some(p=>p.id===op.tmpId)) list.push({ ...op.payload, id:op.tmpId }); }
    else if(op.type==='update'){ const i=list.findIndex(p=>p.id===op.id); if(i>=0) list[i]={ ...list[i], ...op.payload }; }
    else if(op.type==='delete'){ list=list.filter(p=>p.id!==op.id); }
  }
  list.sort((a,b)=>(a.name||'').localeCompare(b.name||'','ar'));
  return list;
}
async function loadInventory(){
  // 1) اعرض فورًا من الكاش لو موجود (بدون انتظار النت)
  const cp=cacheGet('products');
  if(cp){ INV.products=cp; INV.categories=cacheGet('categories')||[]; INV.suppliers=cacheGet('suppliers')||[]; fillInvFilters(); renderProducts(); }
  // 2) حدّث من النت في الخلفية
  try{
    const [cRes,sRes,pRes] = await Promise.all([
      db.from('categories').select('*').order('name'),
      db.from('suppliers').select('*').order('name'),
      db.from('products').select('*').order('name'),
    ]);
    if(!cRes.error && cRes.data){ INV.categories=cRes.data; cacheSet('categories',INV.categories); }
    if(!sRes.error && sRes.data){ INV.suppliers=sRes.data; cacheSet('suppliers',INV.suppliers); }
    // المنتجات: ماتمسحش القايمة بنتيجة فيها خطأ أو فاضية مشبوهة
    if(!pRes.error && pRes.data && !(pRes.data.length===0 && ((cp&&cp.length)||outboxGet().length))){
      INV.products = mergePending(pRes.data);
      cacheSet('products',INV.products);
    }
    fillInvFilters(); renderProducts();
  }catch(e){ console.error(e);
    if(!cp) document.getElementById('invList').innerHTML=`<div class="empty"><div class="ic">${ic('warn',32)}</div>مفيش نت ومفيش نسخة محفوظة</div>`;
  }
}

function catName(id){ if(!id) return 'غير مصنف'; const c=INV.categories.find(x=>x.id===id); return c?c.name:'غير مصنف'; }
function supName(id){ const s=INV.suppliers.find(x=>x.id===id); return s?s.name:''; }

function invFiltered(){
  let list = INV.products.slice();
  if(INV.cat) list = list.filter(p=>String(p.category_id)===String(INV.cat));
  if(INV.supplier) list = list.filter(p=>String(p.supplier_id)===String(INV.supplier));
  if(INV.search){ list = list.filter(p=>smartMatch(p.name,INV.search) || smartMatch(p.barcode,INV.search)
    || smartMatch(p.barcode2,INV.search) || smartMatch(p.barcode3,INV.search)); }
  if(INV.onlyLow) list = list.filter(p=>Number(p.quantity)<=Number(p.min_stock));
  return list;
}

const INV_PAGE=40;
let _invMoreObs=null;
function _invObserveMore(){
  if(_invMoreObs) _invMoreObs.disconnect();
  const s=document.getElementById('invSentinel'); if(!s) return;
  _invMoreObs=new IntersectionObserver(es=>{
    if(es.some(e=>e.isIntersecting)){ INV._shown=(INV._shown||INV_PAGE)+INV_PAGE; renderProducts(); }
  },{rootMargin:'500px'});
  _invMoreObs.observe(s);
}

function renderProducts(){
  const list = invFiltered();

  // إعادة ضبط عدد المعروض عند تغيير الفلتر/البحث
  const key = `${INV.cat||''}|${INV.supplier||''}|${INV.search||''}|${INV.onlyLow?1:0}`;
  if(key!==INV._lastKey){ INV._lastKey=key; INV._shown=INV_PAGE; }
  if(!INV._shown) INV._shown=INV_PAGE;

  // تنبيه نقص المخزون
  const low = INV.products.filter(p=>Number(p.quantity)<=Number(p.min_stock));
  const al=document.getElementById('invAlert');
  if(al){ al.innerHTML = low.length
    ? `<div class="alert-bar">${ic('warn',18)} <span>${low.length} منتج وصل الحد الأدنى ومحتاج إعادة طلب</span>
        <button onclick="toggleLow()">${INV.onlyLow?'عرض الكل':'اعرضهم'}</button></div>` : ''; }

  const el=document.getElementById('invList');
  if(!list.length){ el.innerHTML=`<div class="empty"><div class="ic">${ic('box',32)}</div>
    ${INV.products.length?'مفيش نتائج للبحث':'مفيش منتجات لسه — اضغط زر + عشان تضيف أول منتج'}</div>`;
    const sf0=document.getElementById('selFab'); if(sf0 && !INV.selectMode) sf0.classList.remove('show');
    const fab0=document.getElementById('addFab'); if(fab0) fab0.classList.toggle('show', !INV.selectMode);
    const wf0=document.getElementById('whFab'); if(wf0) wf0.classList.toggle('show', !INV.selectMode);
    return; }

  el.className='plist';
  const sm=INV.selectMode;
  const shown=Math.min(INV._shown, list.length);
  el.innerHTML = list.slice(0,shown).map(p=>{
    const isLow = Number(p.quantity)<=Number(p.min_stock);
    const sel = INV.selected.has(p.id);
    const thumb = p.image_url ? `<img src="${esc(p.image_url)}" onerror="this.parentNode.textContent='📦'">` : ic('box',26);
    const tap = sm ? `toggleSelect(${p.id})` : `openProductSheet(${p.id})`;
    const card = `<div class="pcard ${sel?'sel':''}" data-id="${p.id}" onclick="${tap}">
      <div class="thumb">${thumb}</div>
      <div class="info">
        <div class="nm">${esc(p.name)}${isLow?'<span class="badge-low">نقص</span>':''}</div>
        <div class="meta">
          <span class="q ${isLow?'low':''}">${ic('box',16)} ${Number(p.quantity)} بالمخزن</span>
        </div>
      </div>
      <div class="price-box">${INV.priceMode==='wholesale'
        ? `<div class="n num" style="color:var(--neg)">${money(p.wholesale_price)}</div><div class="l">سعر الجملة</div>`
        : `<div class="n num">${money(p.sale_price)}</div><div class="l">سعر البيع</div>`}</div>
    </div>`;
    return card;
  }).join('') + (list.length>shown
    ? `<div id="invSentinel" class="inv-sentinel">${ic('clock',16)} تحميل المزيد... (${shown} من ${list.length})</div>`
    : '');
  _invObserveMore();

  // أزرار التحديد العائمة على الجانب
  const fab=document.getElementById('addFab'); if(fab) fab.classList.toggle('show', !sm);
  const wf=document.getElementById('whFab'); if(wf) wf.classList.toggle('show', !sm);
  const sf=document.getElementById('selFab');
  if(sf){
    if(sm){
      updateSelFab(list);
      sf.classList.add('show');
      const tt=document.getElementById('toTop'); if(tt) tt.classList.remove('show');
    } else {
      sf.classList.remove('show');
    }
  }
}

function ensureSelFab(){
  const sf=document.getElementById('selFab'); if(!sf) return null;
  if(sf._built) return sf;
  sf._built=true;
  sf.innerHTML=`
    <button class="sf-pill pdf sf-collapsible" id="sfPdf" onclick="exportSelectedPDF()">${ic('receipt',18)} PDF</button>
    <button class="sf-pill del sf-collapsible" id="sfDel" onclick="deleteSelected()">${ic('trash',18)} حذف</button>
    <div class="sf-info" id="sfInfo"></div>
    <button class="sf-pill all" id="sfAll" onclick="selectAllInv()"></button>
    <button class="sf-pill cancel" onclick="exitSelect()">${ic('close',18)} إلغاء</button>`;
  return sf;
}
function updateSelFab(list){
  const sf=ensureSelFab(); if(!sf) return;
  const selItems=INV.products.filter(p=>INV.selected.has(p.id));
  const totW=selItems.reduce((a,p)=>a+Number(p.wholesale_price||0)*Number(p.quantity||0),0);
  const totS=selItems.reduce((a,p)=>a+Number(p.sale_price||0)*Number(p.quantity||0),0);
  const size=INV.selected.size;
  const allSel=list.length && list.every(p=>INV.selected.has(p.id));
  const info=document.getElementById('sfInfo');
  if(info) info.innerHTML=`<b>${size} محدد</b>${size?`<span>جملة ${money(totW)}</span><span>بيع ${money(totS)}</span>`:'<span>اختر منتجات</span>'}`;
  const all=document.getElementById('sfAll');
  if(all) all.innerHTML=`${ic('check',18)} ${allSel?'إلغاء الكل':'تحديد الكل'}`;
  const pdf=document.getElementById('sfPdf'), del=document.getElementById('sfDel');
  if(pdf) pdf.classList.toggle('on', size>0);
  if(del) del.classList.toggle('on', size>0);
}

function selectAllInv(){
  const list=invFiltered();
  const allSel=list.length && list.every(p=>INV.selected.has(p.id));
  if(allSel){ list.forEach(p=>INV.selected.delete(p.id)); }
  else { list.forEach(p=>INV.selected.add(p.id)); }
  renderProducts();
}

let _suppressTap=false;
function bindInvLongPress(){
  const list=document.getElementById('invList'); if(!list || list._lpBound) return; list._lpBound=true;
  let timer=null, sx=0, sy=0, curId=null;
  const clear=()=>{ if(timer){ clearTimeout(timer); timer=null; } curId=null; };
  list.addEventListener('touchstart',e=>{
    if(INV.selectMode) return;                 // في وضع التحديد، اللمسة العادية بتحدّد
    const card=e.target.closest('.pcard'); if(!card || !card.dataset.id) return;
    curId=Number(card.dataset.id); sx=e.touches[0].clientX; sy=e.touches[0].clientY;
    clearTimeout(timer);
    timer=setTimeout(()=>{
      timer=null;
      if(navigator.vibrate){ try{ navigator.vibrate(25); }catch(_){} }
      INV.selectMode=true; INV.selected.add(curId); _suppressTap=true;
      setTimeout(()=>{ _suppressTap=false; }, 500);
      renderProducts();
    }, 460);
  },{passive:true});
  list.addEventListener('touchmove',e=>{
    if(!timer) return;
    const dx=Math.abs(e.touches[0].clientX-sx), dy=Math.abs(e.touches[0].clientY-sy);
    if(dx>10 || dy>10) clear();
  },{passive:true});
  list.addEventListener('touchend',clear);
  list.addEventListener('touchcancel',clear);
  // امنع فتح المنتج بعد الضغط المطوّل مباشرة
  list.addEventListener('click',e=>{ if(_suppressTap){ e.stopPropagation(); e.preventDefault(); _suppressTap=false; } }, true);
}

// طباعة HTML عبر iframe (يقدر المستخدم يحفظه PDF)
function printHTML(html){
  const old=document.getElementById('printFrame'); if(old) old.remove();
  const ifr=document.createElement('iframe'); ifr.id='printFrame';
  ifr.setAttribute('style','position:fixed;right:0;bottom:0;width:1px;height:1px;border:0;opacity:0;');
  document.body.appendChild(ifr);
  const d=ifr.contentWindow.document; d.open(); d.write(html); d.close();
  const go=()=>{ try{ ifr.contentWindow.focus(); ifr.contentWindow.print(); }catch(e){ console.error(e); } };
  // مايعتمدش على onload (أحيانًا مبيجيش على iOS)
  setTimeout(go, 250);
  setTimeout(()=>{ const f=document.getElementById('printFrame'); if(f) f.remove(); }, 120000);
}

let _sheetDrag=null;
function initSheetDrag(){
  const s=document.getElementById('sheet'); if(!s||s._dragInit) return; s._dragInit=true;
  s.addEventListener('touchstart',e=>{
    if(s.scrollTop>0) return;
    _sheetDrag={y:e.touches[0].clientY}; s.style.transition='none';
  },{passive:true});
  s.addEventListener('touchmove',e=>{
    if(!_sheetDrag) return;
    const dy=e.touches[0].clientY-_sheetDrag.y;
    if(dy>0){ s.style.transform=`translateY(${dy}px)`; if(e.cancelable) e.preventDefault(); }
  },{passive:false});
  s.addEventListener('touchend',e=>{
    if(!_sheetDrag) return;
    const dy=e.changedTouches[0].clientY-_sheetDrag.y;
    s.style.transition='';
    if(dy>110){ closeSheet(); } else { s.style.transform=''; }
    _sheetDrag=null;
  });
}
function openSheet(html){
  const bg=document.getElementById('sheetBg'), s=document.getElementById('sheet');

function squareImage(file,size,q){
  return new Promise((res,rej)=>{
    const img=new Image(); const url=URL.createObjectURL(file);
    img.onload=()=>{
      const cv=document.createElement('canvas'); cv.width=size; cv.height=size;
      const ctx=cv.getContext('2d');
      ctx.imageSmoothingEnabled=true; ctx.imageSmoothingQuality='high';
      // قص أكبر مربع من نص الصورة فتملا الخانة بالكامل (zero فراغ)
      const s=Math.min(img.width,img.height);
      const sx=(img.width-s)/2, sy=(img.height-s)/2;
      ctx.drawImage(img, sx,sy,s,s, 0,0,size,size);
      cv.toBlob(b=>{ URL.revokeObjectURL(url); b?res(b):rej(new Error('blob')); },'image/jpeg',q||0.85);
    };
    img.onerror=()=>{ URL.revokeObjectURL(url); rej(new Error('img')); };
    img.src=url;
  });
}
function resizeImage(file,max,q){
  return new Promise((res,rej)=>{
    const img=new Image(); const url=URL.createObjectURL(file);
    img.onload=()=>{ let w=img.width,h=img.height;
      if(w>h && w>max){ h=Math.round(h*max/w); w=max; }
      else if(h>=w && h>max){ w=Math.round(w*max/h); h=max; }
      const cv=document.createElement('canvas'); cv.width=w; cv.height=h;
      cv.getContext('2d').drawImage(img,0,0,w,h);
      cv.toBlob(b=>{ URL.revokeObjectURL(url); b?res(b):rej(new Error('blob')); },'image/jpeg',q);
    };
    img.onerror=()=>{ URL.revokeObjectURL(url); rej(new Error('img')); };
    img.src=url;
  });
}

/* ---------- مسح الباركود بالكاميرا ----------
   على آيفون الكاميرا الحيّة بتبوظ أحيانًا (خصوصًا في التطبيق المثبّت)،
   فبنوفّر بديل مضمون: «صوّر الباركود» ويتقرا من الصورة.            */
let SCAN_CB = null;
let SCAN_DONE = false;
let SCAN_LAST = '', SCAN_LASTCOUNT = 0;

const BARCODE_READERS = ['ean_reader','ean_8_reader','upc_reader','upc_e_reader','code_128_reader'];

// تحقق من صحة الباركود (خانة المراجعة) — يرفض القراءات الغلط
function validBarcode(code){
  if(!/^\d+$/.test(code)) return true;             // أكواد غير رقمية (Code128) نقبلها
  if([8,12,13].includes(code.length)){
    const digits = code.split('').map(Number);
    const check = digits.pop();
    let sum = 0;
    digits.reverse().forEach((n,i)=> sum += n * (i%2===0 ? 3 : 1));
    return ((10 - (sum % 10)) % 10) === check;
  }
  return code.length >= 6;                          // أرقام بأطوال تانية: نقبل لو طولها معقول
}

let _scanStream=null, _scanVideo=null, _scanCanvas=null, _scanTimer=null, _scanBusy=false, _torchOn=false;

function openScanner(onDecode){
  SCAN_CB = onDecode; SCAN_DONE = false; SCAN_LAST=''; SCAN_LASTCOUNT=0;
  document.getElementById('scanBg').innerHTML = `
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-head"><h3>${ic('camera',18)} مسح الباركود</h3><button class="x" onclick="closeScanner()">${ic('close',18)}</button></div>
      <div class="modal-body">
        <div id="reader" class="reader">
          <video id="scanVid" playsinline muted autoplay></video>
          <div class="scan-frame"></div>
          <button id="torchBtn" class="scan-torch" onclick="toggleTorch()" aria-label="فلاش">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
          </button>
        </div>
        <p id="scanHint" style="text-align:center;color:var(--muted);font-size:13px;margin:10px 0 12px">
          وجّه الكاميرا على الباركود — بيقرا لوحده وبأي اتجاه (مقلوب أو بالطول).</p>
        <button class="tool-btn" style="width:100%;justify-content:center;font-size:13px;padding:11px"
          onclick="document.getElementById('snapInput').click()">${ic('camera',16)} صوّر الباركود بدل الحي</button>
        <input type="file" id="snapInput" accept="image/*" capture="environment" class="hidden" onchange="snapDecode(this)">
      </div>
    </div>`;
  document.getElementById('scanBg').classList.add('show');
  startLiveScan();
}

async function startLiveScan(){
  if(typeof zbarWasm==='undefined'){ liveFallback(); return; }
  const v=document.getElementById('scanVid'); if(!v) return;
  try{
    _scanStream = await navigator.mediaDevices.getUserMedia({
      video:{ facingMode:{ ideal:'environment' }, width:{ideal:1280}, height:{ideal:720} }, audio:false });
    v.srcObject=_scanStream; _scanVideo=v;
    await v.play().catch(()=>{});
    setTimeout(applyCameraZoom, 600);
    _scanCanvas=document.createElement('canvas');
    _scanTick();
  }catch(e){ console.error('cam',e); liveFallback(); }
}

async function _scanTick(){
  if(SCAN_DONE) return;
  const v=_scanVideo, cv=_scanCanvas;
  if(v && cv && v.readyState>=2 && !_scanBusy){
    _scanBusy=true;
    try{
      const w=v.videoWidth, h=v.videoHeight;
      if(w && h){
        // نقرأ منطقة وسط الكادر (أسرع وأدق)
        const cw=Math.round(w*0.92), ch=Math.round(h*0.6);
        const sx=Math.round((w-cw)/2), sy=Math.round((h-ch)/2);
        cv.width=cw; cv.height=ch;
        const ctx=cv.getContext('2d',{ willReadFrequently:true });
        ctx.drawImage(v, sx,sy,cw,ch, 0,0,cw,ch);
        const img=ctx.getImageData(0,0,cw,ch);
        const symbols=await zbarWasm.scanImageData(img);
        if(symbols && symbols.length){
          const raw = symbols[0].decode ? symbols[0].decode() : (symbols[0].rawData||'');
          const c = String(raw||'').trim();
          if(c && validBarcode(c)){
            if(c===SCAN_LAST){ SCAN_LASTCOUNT++; } else { SCAN_LAST=c; SCAN_LASTCOUNT=1; }
            if(SCAN_LASTCOUNT>=2){
              if(navigator.vibrate){ try{ navigator.vibrate(40); }catch(_){} }
              _scanBusy=false; onScanResult(c); return;
            }
          }
        }
      }
    }catch(e){ /* تجاهل أخطاء الفريم */ }
    _scanBusy=false;
  }
  _scanTimer=setTimeout(_scanTick, 70);   // ~14 فريم/ث
}

function applyCameraZoom(){
  try{
    const track=_scanStream && _scanStream.getVideoTracks()[0]; if(!track) return;
    const caps=track.getCapabilities?track.getCapabilities():{};
    const adv=[];
    if(caps && caps.focusMode && caps.focusMode.includes && caps.focusMode.includes('continuous')) adv.push({ focusMode:'continuous' });
    if(adv.length) track.applyConstraints({ advanced:adv }).catch(()=>{});
    // زرار الفلاش يظهر بس لو مدعوم
    const tb=document.getElementById('torchBtn');
    if(tb) tb.style.display = (caps && caps.torch) ? 'flex' : 'none';
  }catch(e){}
}

async function toggleTorch(){
  try{
    const track=_scanStream && _scanStream.getVideoTracks()[0]; if(!track) return;
    const caps=track.getCapabilities?track.getCapabilities():{};
    if(!caps || !caps.torch){ toast('الفلاش مش مدعوم في المتصفح ده','err'); return; }
    _torchOn=!_torchOn;
    await track.applyConstraints({ advanced:[{ torch:_torchOn }] });
    const b=document.getElementById('torchBtn'); if(b) b.classList.toggle('on',_torchOn);
  }catch(e){ console.error(e); }
}

function liveFallback(){
  const r=document.getElementById('reader');
  if(r) r.innerHTML = `<div style="color:#fff;text-align:center;padding:34px 16px;font-size:14px;line-height:1.8">

    <span style="color:#cdd6e4;font-size:13px">اضغط «صوّر الباركود» تحت — بيشتغل ١٠٠٪</span></div>`;

function onScanResult(text){
  if(SCAN_DONE) return; SCAN_DONE=true;
  stopScanner();
  const cb=SCAN_CB; SCAN_CB=null;
  hideScanBg();
  if(cb) cb(text);
}

async function snapDecode(input){
  const file = input.files && input.files[0]; if(!file) return; input.value='';
  if(typeof zbarWasm==='undefined'){ toast('مكتبة الباركود مش محمّلة — اتأكد من النت وافتح الصفحة تاني','err'); return; }
  toast('جارٍ قراءة الباركود...');
  SCAN_DONE=true; stopScanner();
  try{
    let bmp;
    try{ bmp = await createImageBitmap(file, { imageOrientation:'from-image' }); }
    catch(e){ bmp = await createImageBitmap(file); }
    let w=bmp.width, h=bmp.height; const maxW=1600;
    if(Math.max(w,h)>maxW){ const s=maxW/Math.max(w,h); w=Math.round(w*s); h=Math.round(h*s); }
    const cv=document.createElement('canvas'); cv.width=w; cv.height=h;
    const ctx=cv.getContext('2d',{ willReadFrequently:true }); ctx.drawImage(bmp,0,0,w,h);
    const img=ctx.getImageData(0,0,w,h);
    const symbols=await zbarWasm.scanImageData(img);   // ZBar بيقرا أي اتجاه لوحده
    if(symbols && symbols.length){
      const c=String((symbols[0].decode?symbols[0].decode():symbols[0].rawData)||'').trim();
      if(c && validBarcode(c)){ SCAN_DONE=false; onScanResult(c); return; }
    }
    toast('مقدرش يقرا الباركود — قرّب الباركود يملا الصورة بإضاءة كويسة','err');
    SCAN_DONE=false; startLiveScan();
  }catch(e){ console.error('snap error',e);
    toast('حصل خطأ في قراءة الصورة — جرّب تاني','err');
    SCAN_DONE=false; startLiveScan(); }
}

/* ===== الحفظ الأوفلاين (طابور الرفع) ===== */
function outboxGet(){ try{ return JSON.parse(localStorage.getItem('outbox')||'[]'); }catch(e){ return []; } }
function outboxSet(q){ try{ localStorage.setItem('outbox', JSON.stringify(q)); }catch(e){} updateSyncBadge(); }
function outboxAdd(op){ const q=outboxGet(); q.push(op); outboxSet(q); }
function isNetErr(e){ return !!e && /load failed|failed to fetch|fetch|network|timeout|offline/i.test(e.message||String(e)); }
function updateSyncBadge(){
  const el=document.getElementById('syncBadge'); if(!el) return;
  const n=outboxGet().length;
  if(n>0){ el.innerHTML=`${ic('refresh',15)} ${n} في انتظار الرفع — اضغط للمحاولة`; el.classList.add('show'); }
  else el.classList.remove('show');
}
let _flushing=false;
async function flushOutbox(){
  if(_flushing) return;
  let q=outboxGet(); if(!q.length){ updateSyncBadge(); return; }
  if(navigator.onLine===false){ updateSyncBadge(); return; }
  _flushing=true; let processed=0;
  try{
    while(q.length){
      const op=q[0];
      try{
        if(op.type==='update'){ const { error }=await db.from('products').update(op.payload).eq('id',op.id); if(error) throw error; }
        else if(op.type==='delete'){ const { error }=await db.from('products').delete().eq('id',op.id); if(error) throw error; }
        else if(op.type==='insert'){ const { data, error }=await db.from('products').insert(op.payload).select().single(); if(error) throw error;
          const i=INV.products.findIndex(x=>x.id===op.tmpId);
          if(i>=0){ INV.products[i]=data; } else { INV.products.push(data); }
          cacheSet('products',INV.products);
        }
        else if(op.type==='vf'){
          if(op.tmpId){ const { data, error }=await db.from('vf_ops').insert(op.payload).select().single(); if(error) throw error;
            const k=(VF.all||[]).findIndex(x=>x.id===op.tmpId); if(k>=0) VF.all[k]=data;
            const i=(VF.ops||[]).findIndex(x=>x.id===op.tmpId); if(i>=0) VF.ops[i]=data;
          } else { const { error }=await db.from('vf_ops').insert(op.payload); if(error) throw error; }
        }
        else if(op.type==='vfconfig'){
          const { error }=await db.from('vf_config').update({ base_amount:op.payload.base_amount, updated_at:new Date().toISOString() }).eq('id',1); if(error) throw error;
        }
        else if(op.type==='purchase'){
          if(op.editId){
            const { error }=await db.from('purchases').update(op.payload.purchase).eq('id',op.editId); if(error) throw error;
            await db.from('purchase_items').delete().eq('purchase_id',op.editId);
            const items=op.payload.items.map(it=>({ ...it, purchase_id:op.editId }));
            const { error:e2 }=await db.from('purchase_items').insert(items); if(e2) throw e2;
          } else {
            const { data, error }=await db.from('purchases').insert(op.payload.purchase).select().single(); if(error) throw error;
            const items=op.payload.items.map(it=>({ ...it, purchase_id:data.id }));
            const { error:e2 }=await db.from('purchase_items').insert(items); if(e2) throw e2;
          }
        }
        q.shift(); outboxSet(q); processed++;
      }catch(e){
        if(isNetErr(e)){ break; }                 // النت لسه مش راجع — نأجل
        else { console.warn('outbox drop',e);      // خطأ دائم — نتخطّى العملية
          if(op.type==='purchase') toast('تعذّر حفظ فاتورة الاستلام — تأكد إنك شغّلت كود SQL','err');
          q.shift(); outboxSet(q); }
      }
    }
  } finally {
    _flushing=false;
    if(processed && CURRENT_PAGE==='inventory') renderProducts();   // تحديث المعرّفات المؤقتة للحقيقية
    updateSyncBadge();
  }
}
window.addEventListener('online', ()=>{ toast('النت رجع — بيرفع التعديلات...'); flushOutbox(); });

let _tmpSeq=0;
function _nextTmpId(){ return -(Date.now()) - (_tmpSeq++); }   // معرّف مؤقت سالب فريد للمنتج الجديد
function saveProduct(id){
  const name=document.getElementById('pName').value.trim();
  if(!name){ toast('اكتب اسم المنتج','err'); return; }
  const num=v=>Number(toEnDigits(v||'')||0);
  const rec = {
    name,
    category_id: document.getElementById('pCat').value || null,
    quantity: num(document.getElementById('pQty').value),
    min_stock: num(document.getElementById('pMin').value),
    wholesale_price: num(document.getElementById('pCost').value),
    sale_price: num(document.getElementById('pSale').value),
    barcode: document.getElementById('pBar').value.trim() || null,
    barcode2: document.getElementById('pBar2').value.trim() || null,
    barcode3: document.getElementById('pBar3').value.trim() || null,
    supplier_id: document.getElementById('pSup').value || null,
    kind: document.getElementById('pKind').value || 'accessory',
    image_url: PROD_IMG || null,
    notes: document.getElementById('pNotes').value.trim() || null,
  };
  // ===== حفظ محلي فوري (من غير انتظار السيرفر) =====
  if(id){
    rec.updated_at = new Date().toISOString();
    const i=INV.products.findIndex(x=>x.id===id);
    if(i>=0) INV.products[i]={ ...INV.products[i], ...rec };
    const q=outboxGet();
    if(id<0){
      // منتج جديد لسه ماترفعش -> عدّل بيانات إضافته نفسها
      const op=q.find(o=>o.type==='insert'&&o.tmpId===id);
      if(op){ const p2={...op.payload,...rec}; delete p2.updated_at; op.payload=p2; outboxSet(q); }
      else { outboxAdd({ type:'update', id, payload:rec }); }
    }else{
      // لو فيه تعديل معلّق لنفس المنتج ادمجه
      const op=q.find(o=>o.type==='update'&&o.id===id);
      if(op){ op.payload={...op.payload,...rec}; outboxSet(q); }
      else { outboxAdd({ type:'update', id, payload:rec }); }
    }
    toast('تم حفظ التعديل','ok');
  }else{
    const tmpId=_nextTmpId();
    INV.products.push({ ...rec, id:tmpId });
    INV.products.sort((a,b)=>(a.name||'').localeCompare(b.name||'','ar'));
    outboxAdd({ type:'insert', tmpId, payload:rec });
    toast('تم حفظ المنتج','ok');
  }
  cacheSet('products',INV.products);
  closeSheet(); renderProducts();
  flushOutbox();   // الرفع في الخلفية لوحده
}

function confirmDeleteProduct(id){
  const p=INV.products.find(x=>x.id===id);
  INV.products=INV.products.filter(x=>x.id!==id); cacheSet('products',INV.products);
  const q=outboxGet();
  if(typeof id==='number' && id<0){
    // منتج لسه ماترفعش -> امسح إضافته وأي تعديل معلّق
    outboxSet(q.filter(op=>!((op.type==='insert'&&op.tmpId===id)||(op.type==='update'&&op.id===id))));
  }else{
    const q2=q.filter(op=>!(op.type==='update'&&op.id===id));  // شيل تعديلاته المعلّقة
    q2.push({ type:'delete', id }); outboxSet(q2);
  }
  closeModal(); renderProducts(); toast('تم حذف المنتج','ok'); flushOutbox();
}

// قراءة الصفوف من CSV أو Excel
async function rowsFromFile(file){
  const nameL=(file.name||'').toLowerCase();
  if(nameL.endsWith('.xlsx')||nameL.endsWith('.xls')){
    if(typeof XLSX==='undefined') throw new Error('مكتبة Excel مش محمّلة — افتح الصفحة والنت شغّال');
    const buf=await file.arrayBuffer();
    const wb=XLSX.read(buf,{type:'array'});
    const ws=wb.Sheets[wb.SheetNames[0]];
    return XLSX.utils.sheet_to_json(ws,{header:1,blankrows:false,defval:''}).map(r=>r.map(c=>String(c==null?'':c)));
  }
  // CSV
  const text=await file.text();
  const lines=text.replace(/^\uFEFF/,'').split(/\r?\n/).filter(l=>l.trim());
  const parseLine=(l)=>{ const out=[]; let cur='',q=false;
    for(let i=0;i<l.length;i++){ const ch=l[i];
      if(q){ if(ch==='"'){ if(l[i+1]==='"'){cur+='"';i++;} else q=false; } else cur+=ch; }
      else { if(ch==='"') q=true; else if(ch===','){ out.push(cur); cur=''; } else cur+=ch; } }
    out.push(cur); return out; };
  return lines.map(parseLine);
}

async function importCSV(file){
  if(!file) return;
  let rows;
  try{ rows=await rowsFromFile(file); }
  catch(e){ console.error(e); toast(e.message||'مش قادر أقرا الملف','err'); document.getElementById('csvFile').value=''; return; }
  if(!rows||rows.length<2){ toast('الملف فاضي','err'); document.getElementById('csvFile').value=''; return; }

  // التعرّف على الأعمدة من صف العناوين
  const header=rows[0].map(h=>String(h||'').trim().toLowerCase());
  const find=(keys)=>{ for(let i=0;i<header.length;i++){ if(keys.some(k=>header[i].includes(k))) return i; } return -1; };
  const col={
    name:find(['item name','name','الاسم','اسم']),
    model:find(['model','موديل']),
    company:find(['company','الشركة','شركة']),
    cat:find(['categor','التصنيف','تصنيف','الفئة','فئة']),
    qty:find(['num','qty','quantity','الكمية','كمية','العدد','عدد']),
    cost:find(['cost','wholesale','الجملة','التكلفة','تكلفة']),
    sale:find(['sale','price','البيع','سعر البيع']),
    barcode:find(['barcode','باركود']),
    min:find(['min','الحد','حد أدنى']),
    kind:find(['kind','النوع','نوع']),
    notes:find(['note','ملاحظ']),
  };
  if(col.name<0){ toast('مش لاقي عمود اسم المنتج (Item Name)','err'); document.getElementById('csvFile').value=''; return; }
  const num=(v)=>Number(toEnDigits(String(v||'').replace(/[^\d.\-٠-٩]/g,''))||0);
  const get=(f,idx)=> idx>=0 ? String(f[idx]||'').trim() : '';
  const kindMap={'اكسسوار':'accessory','accessory':'accessory','زيرو':'zero','zero':'zero','مستعمل':'used','used':'used'};

  let added=0,failed=0;
  toast('جارٍ الاستيراد...');
  for(let i=1;i<rows.length;i++){
    const f=rows[i];
    const name=get(f,col.name); if(!name) continue;
    let catId=null; const cn=get(f,col.cat);
    if(cn){ let c=INV.categories.find(x=>x.name===cn);
      if(!c){ try{ const{data}=await db.from('categories').insert({name:cn}).select().single(); if(data){c=data;INV.categories.push(data);} }catch(e){} }
      catId=c?c.id:null; }
    const extra=[]; const md=get(f,col.model), cmp=get(f,col.company), nt=get(f,col.notes);
    if(md) extra.push('موديل: '+md); if(cmp) extra.push('شركة: '+cmp); if(nt) extra.push(nt);
    const rec={ name, category_id:catId,
      quantity:num(get(f,col.qty)), min_stock:num(get(f,col.min)),
      wholesale_price:num(get(f,col.cost)), sale_price:num(get(f,col.sale)),
      barcode:get(f,col.barcode)||null, kind:kindMap[get(f,col.kind).toLowerCase()]||'accessory',
      notes:extra.join(' • ')||null };
    const { error } = await db.from('products').insert(rec);
    if(error){ failed++; console.warn(error); } else added++;
  }
  await logAudit('import','products','',{added,failed});
  toast(`تم استيراد ${added} منتج${failed?` (${failed} فشل)`:''}`, failed?'err':'ok');
  document.getElementById('csvFile').value='';
  await loadInventory();
}

function updateTotalsDisplay(){
  // الإجمالي قبل الخصم = على سعر القائمة الأصلي
  const subtotal=CART.reduce((s,i)=>s+i.qty*Number(i.list_price??i.unit_price),0);
  // خصم الأسعار = فرق (سعر القائمة − السعر النهائي) لكل صنف
  const itemsDisc=CART.reduce((s,i)=>s+i.qty*(Number(i.list_price??i.unit_price)-Number(i.unit_price)),0);
  const totalDisc=itemsDisc+Number(CASHIER.discount||0);
  const total=Math.max(0,subtotal-totalDisc);
  const set=(id,v)=>{ const e=document.getElementById(id); if(e) e.textContent=v; };

// حساب عمولات الوردية بالفرق — الأساس = قفل آخر وردية (استمرارية)
async function computeShiftClose(shift, cl){
  const sum=async(fn)=>{ try{ return await fn(); }catch(e){ console.warn(e); return 0; } };
  const accessory=await sum(async()=>{ const {data}=await db.from('sales').select('total').eq('shift_id',shift.id).eq('status','completed'); return (data||[]).reduce((s,r)=>s+Number(r.total||0),0); });
  const expenses =await sum(async()=>{ const {data}=await db.from('expenses').select('amount').gte('created_at',shift.opened_at).eq('status','active'); return (data||[]).reduce((s,r)=>s+Number(r.amount||0),0); });
  const maint    =await sum(async()=>{ const {data}=await db.from('repairs').select('total').eq('status','delivered').gte('delivered_at',shift.opened_at); return (data||[]).reduce((s,r)=>s+Number(r.total||0),0); });
  const prev=await getLastClosed();
  const mainBase = prev ? Number(prev.closing_cash||0)+Number(prev.closing_credit||0) : Number(shift.opening_cash||0)+Number(shift.opening_credit||0);
  const vfBase   = prev ? Number(prev.closing_vf_liquidity||0)+Number(prev.closing_vf_wallet||0) : Number(shift.opening_vf_liquidity||0)+Number(shift.opening_vf_wallet||0);
  const mainClose=cl.cash+cl.credit;
  const recharge=(mainClose-mainBase)-accessory-maint+expenses;
  const vf=(cl.vfLiq+cl.vfWallet)-vfBase;
  return { accessory, expenses, maint, recharge, vf };
}

async function doCloseShift(btn){
  if(btn){ btn.disabled=true; btn.textContent='جارٍ الحساب...'; }
  const v=id=>Number(toEnDigits(document.getElementById(id).value)||0);
  const cl={ cash:v('cCash'), credit:v('cCredit'), vfLiq:v('cVfLiq'), vfWallet:v('cVfWallet') };
  try{
    const r=await computeShiftClose(SHIFT,cl);
    const { error }=await db.from('cashier_shifts').update({
      status:'closed', closed_at:new Date().toISOString(),
      closing_cash:cl.cash, closing_credit:cl.credit,
      closing_vf_liquidity:cl.vfLiq, closing_vf_wallet:cl.vfWallet,
      recharge_commission:r.recharge, vf_commission:r.vf, accessory_sales:r.accessory

}

let SALE_BUSY=false;
async function confirmSale(){
  if(SALE_BUSY) return;
  if(!DAY){ toast('افتح اليوم الأول','err'); return; }
  if(!CART.length){ toast('السلة فاضية','err'); return; }
  SALE_BUSY=true;
  const btn=document.getElementById('confirmBtn'); if(btn){ btn.disabled=true; btn.textContent='جارٍ الحفظ...'; }
  const subtotal=CART.reduce((s,i)=>s+i.qty*Number(i.list_price??i.unit_price),0);
  const itemsDisc=CART.reduce((s,i)=>s+i.qty*(Number(i.list_price??i.unit_price)-Number(i.unit_price)),0);
  const discount=itemsDisc+Number(CASHIER.discount||0);
  const total=Math.max(0,subtotal-discount);
  const cogs=CART.reduce((s,i)=>s+i.qty*i.wholesale_price,0);
  const profit=total-cogs;
  try{
    const { data:sale, error }=await db.from('sales').insert({
      day_id:DAY.id, category:'mixed', subtotal, discount, total, cogs, profit,
      payment_method:'cash', status:'completed',
      user_id:CURRENT.user.id, user_name:CURRENT.profile.full_name
    }).select().single();
    if(error) throw error;
    const items=CART.map(i=>({ sale_id:sale.id, product_id:i.product_id, product_name:i.name,
      quantity:i.qty, unit_price:i.unit_price, wholesale_price:i.wholesale_price, line_total:i.qty*i.unit_price,
      kind:i.kind||'accessory' }));
    const { error:e2 }=await db.from('sale_items').insert(items); if(e2) throw e2;
    for(const i of CART){
      if(i.product_id==null) continue;
      const { data:p }=await db.from('products').select('quantity').eq('id',i.product_id).single();
      await db.from('products').update({ quantity:Number(p?.quantity||0)-i.qty }).eq('id',i.product_id);
    }
    logAudit('sale','sales',sale.id,{ invoice:sale.invoice_no, total, category:CASHIER.category });
    const receipt={ invoice_no:sale.invoice_no, created_at:sale.created_at, items:CART.slice(), subtotal, discount, total };
    CART=[]; CASHIER.discount=0;
    refreshCashierProducts();
    saleSuccessModal(receipt);
  }catch(e){ console.error(e); toast('خطأ في إتمام البيع: '+(e.message||''),'err');
    if(btn){ btn.disabled=false; btn.textContent='إتمام البيع'; }
  }finally{ SALE_BUSY=false; }
}

  const { data } = await db.from('products').select('id,name,barcode,sale_price,wholesale_price,quantity,image_url,kind').order('name');
  CASHIER.products=data||[];
}

async function returnSale(saleId){
  if(!confirm('تأكيد مرتجع الفاتورة؟ هيرجّع الكمية للمخزون ويخصم القيمة من الخزنة.')) return;
  try{
    const { data:sale }=await db.from('sales').select('*').eq('id',saleId).single();
    const { data:items }=await db.from('sale_items').select('*').eq('sale_id',saleId);
    // ترجيع المخزون
    for(const it of (items||[])){
      const { data:p }=await db.from('products').select('quantity').eq('id',it.product_id).single();
      if(p) await db.from('products').update({ quantity:Number(p.quantity)+Number(it.quantity) }).eq('id',it.product_id);
    }
    // خصم من الخزنة (خرج) + سجل مرتجع + تغيير الحالة
    await db.from('treasury').insert({ direction:'out', category:'مرتجع مبيعات', amount:Number(sale.total),
      description:`مرتجع فاتورة #${sale.invoice_no}`, reference_type:'return', reference_id:String(sale.id),
      user_id:CURRENT.user.id, user_name:CURRENT.profile.full_name });
    await db.from('sales_returns').insert({ sale_id:saleId, amount:Number(sale.total), reason:'مرتجع',
      user_id:CURRENT.user.id, user_name:CURRENT.profile.full_name });
    await db.from('sales').update({ status:'returned' }).eq('id',saleId);
    await logAudit('return','sales',saleId,{ invoice:sale.invoice_no, total:sale.total });
    toast('تم المرتجع','ok');
    await refreshCashierProducts();
    recentSalesModal();
  }catch(e){ console.error(e); toast('خطأ في المرتجع','err'); }
}

async function loadProfit(from,to){
  const el=document.getElementById('pfBody'); if(el) el.innerHTML=`<div class="empty"><div class="ic">${ic('clock',32)}</div>جارٍ الحساب...</div>`;
  const sum=async(fn)=>{ try{ return await fn(); }catch(e){ console.warn(e); return 0; } };
  const sales=await sum(async()=>{ const {data}=await db.from('sales').select('id').gte('created_at',from).lte('created_at',to).eq('status','completed'); return data||[]; })||[];
  const ids=sales.map(s=>s.id);
  let items=[];
  if(ids.length){ items=await sum(async()=>{ const {data}=await db.from('sale_items').select('kind,line_total,quantity,wholesale_price').in('sale_id',ids); return data||[]; })||[]; }
  const kindProfit=(k)=>items.filter(it=>(it.kind||'accessory')===k).reduce((s,it)=>s+(Number(it.line_total||0)-Number(it.quantity||0)*Number(it.wholesale_price||0)),0);
  const accProfit=kindProfit('accessory'), zeroProfit=kindProfit('zero'), usedProfit=kindProfit('used');
  const maintProfit=await sum(async()=>{ const {data}=await db.from('repairs').select('profit').gte('delivered_at',from).lte('delivered_at',to).eq('status','delivered'); return (data||[]).reduce((s,r)=>s+Number(r.profit||0),0); });
  const rechargeC=await sum(async()=>{ const {data}=await db.from('business_days').select('recharge_commission').gte('closed_at',from).lte('closed_at',to).eq('status','closed'); return (data||[]).reduce((s,r)=>s+Number(r.recharge_commission||0),0); });
  const expenses=await sum(async()=>{ const {data}=await db.from('expenses').select('amount').gte('created_at',from).lte('created_at',to).eq('status','active'); return (data||[]).reduce((s,r)=>s+Number(r.amount||0),0); });
  const net=accProfit+zeroProfit+usedProfit+maintProfit+rechargeC-expenses;
  if(!el) return;
  el.innerHTML=`
    <div class="pf-net"><div class="l">صافي الربح</div><div class="v num">${money(net)}</div></div>
    ${pfRow('bag','ربح الاكسسوارات',accProfit)}
    ${pfRow('phone','ربح الزيرو',zeroProfit)}
    ${pfRow('used','ربح المستعمل',usedProfit)}
    ${pfRow('wrench','ربح الصيانة',maintProfit)}
    ${pfRow('card','عمولة الرصيد',rechargeC)}
    ${pfRow('receipt','المصروفات',-expenses,true)}`;
}
function pfRow(icon,name,val,neg){
  return `<div class="pf-row"><div class="l"><span class="e">${ic(icon,18)}</span>${name}</div>
    <div class="am num" style="color:${neg?'var(--neg)':'var(--ink)'}">${money(val)}</div></div>`;
}

// أرباح/إجماليات اليوم (التقسيم حسب نوع كل صنف)
async function dayProfitData(day){
  const sum=async(fn)=>{ try{ return await fn(); }catch(e){ console.warn(e); return null; } };
  const sales=await sum(async()=>{ const {data}=await db.from('sales').select('id,total').eq('day_id',day.id).eq('status','completed'); return data||[]; })||[];
  const ids=sales.map(s=>s.id);
  let items=[];
  if(ids.length){ items=await sum(async()=>{ const {data}=await db.from('sale_items').select('kind,line_total,quantity,wholesale_price').in('sale_id',ids); return data||[]; })||[]; }
  const kindProfit=(k)=>items.filter(it=>(it.kind||'accessory')===k)
    .reduce((s,it)=>s+(Number(it.line_total||0)-Number(it.quantity||0)*Number(it.wholesale_price||0)),0);
  const win=day.closed_at||new Date().toISOString();
  const maintRows=await sum(async()=>{ const {data}=await db.from('repairs').select('total,profit').eq('status','delivered').gte('delivered_at',day.opened_at).lte('delivered_at',win); return data||[]; })||[];
  const expRows=await sum(async()=>{ const {data}=await db.from('expenses').select('amount').gte('created_at',day.opened_at).lte('created_at',win).eq('status','active'); return data||[]; })||[];
  return {
    accessory:kindProfit('accessory'), zero:kindProfit('zero'), used:kindProfit('used'),
    maint:maintRows.reduce((s,r)=>s+Number(r.profit||0),0),
    salesTotal:sales.reduce((s,r)=>s+Number(r.total||0),0),
    maintCollected:maintRows.reduce((s,r)=>s+Number(r.total||0),0),
    expenses:expRows.reduce((s,r)=>s+Number(r.amount||0),0)
  };
}

async function doCloseDay(btn){
  if(btn){ btn.disabled=true; btn.textContent='جارٍ الحساب...'; }
  try{
    const drawerClose=Number(toEnDigits(document.getElementById('dCloseDrawer').value)||0);
    const repPay=Number(toEnDigits(document.getElementById('dRepPay').value)||0);
    const closes=[...document.querySelectorAll('.mClose')].map(i=>({ bid:Number(i.dataset.bid), val:Number(toEnDigits(i.value)||0) }));
    const { data:mb }=await db.from('day_machine_balances').select('*').eq('day_id',DAY.id);
    let machineConsumed=0;
    for(const b of (mb||[])){
      const c=closes.find(x=>x.bid===b.id); const closing=c?c.val:Number(b.opening||0);
      machineConsumed += Number(b.opening||0)-closing;   // اللي اتصرف من الرصيد (دخل الدرج)
      await db.from('day_machine_balances').update({ closing }).eq('id',b.id);
    }
    const d=await dayProfitData({ ...DAY, closed_at:new Date().toISOString() });
    // الدرج المتوقع = درج البداية + المصروف من الرصيد + المبيعات الكاملة + الصيانة − مدفوع للمندوب − المصروفات
    const expected=Number(DAY.drawer_open||0)+machineConsumed+d.salesTotal+d.maintCollected-repPay-d.expenses;
    // العمولة = فرق الدرج (المعدود − المتوقع)
    const recharge=drawerClose-expected;
    const net=recharge + d.accessory + d.zero + d.used + d.maint - d.expenses;
    const { error }=await db.from('business_days').update({
      status:'closed', closed_at:new Date().toISOString(),
      drawer_close:drawerClose, drawer_expected:expected, drawer_diff:recharge,
      recharge_commission:recharge, accessory_profit:d.accessory, zero_profit:d.zero, used_profit:d.used,
      maint_profit:d.maint, expenses_total:d.expenses, net_profit:net
    }).eq('id',DAY.id);
    if(error) throw error;
    logAudit('close_day','business_days',DAY.id,{ net, recharge });
    const r={ recharge, ...d, net, expected, drawerClose, repPay, machineConsumed };
    DAY=null; closeModal(); renderDay(); daySummaryModal(r);
  }catch(e){ console.error(e); toast('خطأ في قفل اليوم','err'); if(btn){ btn.disabled=false; btn.textContent='اقفل واحسب'; } }
}

async function loadExpensesList(){
  const el=document.getElementById('expList'); if(!el||!DAY) return;
  const { data }=await db.from('expenses').select('*').gte('created_at',DAY.opened_at).eq('status','active').order('created_at',{ascending:false});
  if(!data||!data.length){ el.innerHTML=`<div style="text-align:center;color:var(--muted);padding:10px">مفيش مصروفات اليوم</div>`; return; }
  el.innerHTML=data.map(e=>`<div class="mini-row"><div class="t">${esc(e.description||'مصروف')}<span>${new Date(e.created_at).toLocaleTimeString('ar-EG',{hour:'2-digit',minute:'2-digit'})}</span></div>
    <b class="num" style="color:var(--neg)">${money(e.amount)}</b></div>`).join('');
}
async function doAddExpense(){
  const amount=Number(toEnDigits(document.getElementById('expAmount').value)||0);
  const note=document.getElementById('expNote').value.trim();
  if(amount<=0){ toast('اكتب مبلغ','err'); return; }
  try{
    await db.from('expenses').insert({ amount, description:note||'مصروف', category:'عام', status:'active',
      user_id:CURRENT.user.id, user_name:CURRENT.profile.full_name });
    logAudit('expense','expenses','',{amount});
    document.getElementById('expAmount').value=''; document.getElementById('expNote').value='';
    toast('اتسجّل المصروف','ok'); loadExpensesList();
  }catch(e){ console.error(e); toast('خطأ في تسجيل المصروف','err'); }
}

/* ---------- الماكينات ---------- */
async function machinesModal(){
  await loadMachines();
  openModal(`<div class="modal-head"><h3>${ic('gear',18)} ماكينات الرصيد</h3><button class="x" onclick="closeModal()">${ic('close',18)}</button></div>
    <div class="modal-body">
      <div class="inline-add"><input id="newMachine" placeholder="اسم ماكينة جديدة (مثال: فودافون)"><button onclick="addMachine()">${ic('plus',16)}</button></div>
      <div id="machineList" style="margin-top:12px">${MACHINES.map(m=>`<div class="mini-row"><div class="t">${esc(m.name)}</div>
        <button style="background:#FDECEA;color:var(--neg);border:none;border-radius:8px;padding:6px 10px" onclick="removeMachine(${m.id})">${ic('trash',15)}</button></div>`).join('')||'<div style="text-align:center;color:var(--muted)">مفيش ماكينات</div>'}</div>
    </div>`);
}
async function addMachine(){
  const name=document.getElementById('newMachine').value.trim(); if(!name) return;
  try{ await db.from('recharge_machines').insert({ name, sort_order:MACHINES.length+1 }); toast('اتضافت','ok'); machinesModal(); }
  catch(e){ console.error(e); toast('خطأ','err'); }
}
async function removeMachine(id){
  if(!confirm('حذف الماكينة؟')) return;
  try{ await db.from('recharge_machines').update({ active:false }).eq('id',id); toast('اتشالت','ok'); machinesModal(); }
  catch(e){ console.error(e); toast('خطأ','err'); }
}

/* ==================== سجل فواتير الموردين ==================== */
let PINV = { list:[] };
async function renderPurchaseInvoices(){
  const c=document.getElementById('content');
  c.innerHTML=`
    <div class="page-head"><h2>${ic('receipt',22)} ${nm('purchases')}</h2></div>
    <div id="pinvList"><div class="empty"><div class="ic">${ic('clock',32)}</div>جارٍ التحميل...</div></div>`;
  syncTopbar();
  try{
    const { data, error } = await db.from('purchases').select('*').order('created_at',{ascending:false}).limit(200);
    if(error) throw error;
    PINV.list=data||[]; cacheSet('purchases',PINV.list); renderPinvList();
  }catch(e){ console.error(e);
    const cached=cacheGet('purchases');
    if(cached){ PINV.list=cached; renderPinvList(); }
    else document.getElementById('pinvList').innerHTML=`<div class="empty"><div class="ic">${ic('warn',32)}</div>تعذّر تحميل الفواتير (محتاج نت)</div>`;
  }
}
function renderPinvList(){
  const el=document.getElementById('pinvList'); if(!el) return;
  if(!PINV.list.length){ el.innerHTML=`<div class="empty"><div class="ic">${ic('receipt',32)}</div>مفيش فواتير لسه — اعمل استلام جديد</div>`; return; }
  el.innerHTML=PINV.list.map(inv=>{
    const d=new Date(inv.created_at);
    const ds=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    return `<div class="pinv-card" onclick="openPurchaseInvoice(${inv.id})">
      <div class="pinv-top"><span class="pinv-sup">${ic('truck',14)} ${esc(inv.supplier_name||'مورد')}</span><span class="pinv-tot num">${money(inv.total)}</span></div>
      <div class="pinv-sub">#${inv.id} · ${ds} · ${esc(inv.user_name||'')}</div>
    </div>`;
  }).join('');
}
async function openPurchaseInvoice(id){
  const inv=PINV.list.find(x=>x.id===id); if(!inv) return;
  let items=[];
  try{ const { data } = await db.from('purchase_items').select('*').eq('purchase_id',id); items=data||[]; }catch(e){}
  const d=new Date(inv.created_at);
  const ds=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  const totalQty=items.reduce((s,it)=>s+Number(it.quantity||0),0);
  openSheet(`
    <div class="modal-head"><h3>${ic('receipt',18)} فاتورة #${inv.id}</h3><button class="x" onclick="closeSheet()">${ic('close',18)}</button></div>
    <div class="sheet-form">
      <div class="pinv-meta">
        <div class="pinv-meta-row"><span>${ic('truck',14)} المورد</span><b>${esc(inv.supplier_name||'—')}</b></div>
        <div class="pinv-meta-row"><span>${ic('clock',14)} التاريخ</span><b>${ds}</b></div>
        <div class="pinv-meta-row"><span>${ic('user',14)} أدخلها</span><b>${esc(inv.user_name||'')}</b></div>
        <div class="pinv-meta-row"><span>${ic('box',14)} الأصناف</span><b>${items.length} صنف · ${totalQty} قطعة</b></div>
      </div>
      <div class="pinv-items">
        ${items.map(it=>{
          const cost=Number(it.unit_cost)||0, old=Number(it.old_cost)||0;
          let badge='', cls='neutral';
          if(old>0 && cost>old){ cls='up'; badge=`▲ زيادة ${money(cost-old)}`; }
          else if(old>0 && cost<old){ cls='down'; badge=`▼ أقل ${money(old-cost)}`; }
          else { cls='ok'; badge='✓ نفس السعر'; }
          return `<div class="pir">
            <div class="pir-nm">${esc(it.product_name||'منتج')}</div>
            <div class="pir-line">
              <span class="pir-calc num">${it.quantity} × ${money(cost)}</span>
              <span class="pir-lt num">${money(it.line_total)}</span>
            </div>
            <div class="pir-badge ${cls}">${badge}${old>0?` · جملة قديم: ${money(old)}`:''}</div>
          </div>`;
        }).join('')||'<div style="color:var(--muted);text-align:center;padding:14px">مفيش أصناف</div>'}
      </div>
      <div class="pinv-grand"><span>الإجمالي</span><b class="num">${money(inv.total)}</b></div>
      <div class="ps-round" style="margin-top:18px">
        <div class="psr-item"><button class="psr b-pdf" onclick="purchasePDF(${inv.id})">${ic('receipt',24)}</button><span>PDF</span></div>
        <div class="psr-item"><button class="psr b-edit" onclick="editPurchaseInvoice(${inv.id})">${ic('edit',24)}</button><span>تعديل</span></div>
        <div class="psr-item"><button class="psr b-del" onclick="deletePurchaseInvoice(${inv.id})">${ic('trash',24)}</button><span>حذف</span></div>
        <div class="psr-item"><button class="psr b-close" onclick="closeSheet()">${ic('close',24)}</button><span>إغلاق</span></div>
      </div>
      <div style="height:18px"></div>
    </div>`);
}
async function editPurchaseInvoice(id){
  const inv=PINV.list.find(x=>x.id===id); if(!inv) return;
  let items=[];
  try{ const { data } = await db.from('purchase_items').select('*').eq('purchase_id',id); items=data||[]; }catch(e){ toast('محتاج نت عشان تعدّل','err'); return; }
  RECV.supplier = inv.supplier_id?String(inv.supplier_id):'';
  RECV.editId = id;
  RECV.origItems = items.map(it=>({ product_id:it.product_id, quantity:Number(it.quantity)||0 }));
  RECV.cart = items.map(it=>{
    const p=INV.products.find(x=>x.id===it.product_id);
    return { product_id:it.product_id, name:it.product_name||(p?p.name:'منتج'), image_url:p?p.image_url:'',
      qty:Number(it.quantity)||0, cost:Number(it.unit_cost)||0, old_cost:Number(it.old_cost)||0 };
  });
  closeSheet(); navigate('receiving');
  setTimeout(()=>{ fillRecvSuppliers(); renderRecvCart(); },150);
}
async function deletePurchaseInvoice(id){
  if(!confirm('حذف الفاتورة؟ هيترجّع الكميات اللي اتسجّلت منها من المخزون.')) return;
  let items=[];
  try{ const { data } = await db.from('purchase_items').select('*').eq('purchase_id',id); items=data||[]; }catch(e){}
  // ارجّع الكميات
  items.forEach(it=>{ if(it.product_id) applyStockDelta(it.product_id, -(Number(it.quantity)||0), null, null); });
  cacheSet('products',INV.products);
  try{
    await db.from('purchase_items').delete().eq('purchase_id',id);
    await db.from('purchases').delete().eq('id',id);
    PINV.list=PINV.list.filter(x=>x.id!==id); cacheSet('purchases',PINV.list);
    closeSheet(); renderPinvList(); toast('اتحذفت الفاتورة واترجّعت الكميات','ok'); flushOutbox();
  }catch(e){ console.error(e); toast('محتاج نت عشان تحذف الفاتورة','err'); }
}
function purchasePDF(id){
  const inv=PINV.list.find(x=>x.id===id); if(!inv) return;
  db.from('purchase_items').select('*').eq('purchase_id',id).then(({data})=>{
    const items=data||[];
    const d=new Date(inv.created_at);
    const ds=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    const rows=items.map(it=>{
      const cost=Number(it.unit_cost)||0, old=Number(it.old_cost)||0;
      let note='—';
      if(old>0 && cost>old) note=`زيادة ${money(cost-old)}`;
      else if(old>0 && cost<old) note=`أقل ${money(old-cost)}`;
      else if(old>0) note='نفس السعر';
      return `<tr><td>${esc(it.product_name||'منتج')}</td><td>${it.quantity}</td><td>${money(it.unit_cost)}</td><td>${note}</td><td>${money(it.line_total)}</td></tr>`;
    }).join('');
    const html=`<!doctype html><html dir="rtl" lang="ar"><head><meta charset="utf-8"><title>فاتورة شراء #${inv.id}</title>
      <style>@page{size:A4;margin:12mm}*{font-family:'Cairo','Arial',sans-serif;box-sizing:border-box;margin:0}
        body{color:#15263a;padding:6px}.store{font-size:26px;font-weight:800;color:#0C2A49;text-align:center}
        .rule{height:3px;background:#15406B;border-radius:3px;width:120px;margin:8px auto 14px}
        .h{font-size:16px;font-weight:700;margin-bottom:4px}.muted{color:#7a8796;font-size:13px;margin-bottom:14px}
        table{width:100%;border-collapse:collapse;margin-top:8px}th,td{border:1px solid #dde3ec;padding:9px 8px;text-align:center;font-size:13px}
        th{background:#15406B;color:#fff}.tot{margin-top:14px;text-align:left;font-size:18px;font-weight:800;color:#0d6b48}</style></head>
      <body><div class="store">Bondok Store</div><div class="rule"></div>
      <div class="h">فاتورة شراء #${inv.id}</div>
      <div class="muted">المورد: ${esc(inv.supplier_name||'—')} · التاريخ: ${ds} · أدخلها: ${esc(inv.user_name||'')}</div>
      <table><thead><tr><th>المنتج</th><th>الكمية</th><th>سعر الجملة</th><th>ملاحظة</th><th>الإجمالي</th></tr></thead><tbody>${rows}</tbody></table>
      <div class="tot">الإجمالي: ${money(inv.total)}</div></body></html>`;
    printHTML(html);
    toast('بيجهّز PDF الفاتورة','ok');
  });
}

/* ==================== استلام بضاعة ==================== */
let RECV = { supplier:'', search:'', cart:[], editId:null, origItems:[] };
let _recvSearchT=null;
function renderReceiving(){
  const c=document.getElementById('content');
  const sups = INV.suppliers||[];
  const supOpts = `<option value="">— اختر المورد —</option>` +
    sups.map(s=>`<option value="${s.id}" ${RECV.supplier===String(s.id)?'selected':''}>${esc(s.name)}</option>`).join('');
  c.innerHTML=`
    <div class="page-head"><h2>${ic('truck',22)} استلام بضاعة</h2></div>
    <div class="recv-sup-box">
      <label>المورد اللي جايب البضاعة</label>
      <div class="recv-sup-row">
        <select id="recvSup" onchange="RECV.supplier=this.value">${supOpts}</select>
        <button class="recv-add-sup" onclick="recvAddSupplier()">${ic('plus',16)} مورد</button>
      </div>
      <p class="recv-hint">اختار المورد الأول — كل اللي هتستلمه هيتسجّل تلقائيًا إنه من عنده.</p>
    </div>
    <div class="recv-search">
      <div class="toolbar">
        <div class="search-wrap">
          <span class="si">${ic('search',18)}</span>
          <input id="recvSearch" placeholder="دوّر على منتج بالاسم أو الباركود..." value="${esc(RECV.search)}" oninput="recvSearch(this.value)">
          <button class="search-clear" onclick="recvClearSearch()">${ic('close',14)}</button>
        </div>
        <button class="tool-btn" onclick="recvScan()" title="مسح بالكاميرا">${ic('camera',18)}</button>
      </div>
      <div id="recvList" class="cash-dropdown"></div>
    </div>
    <button class="btn primary" style="width:100%;justify-content:center;margin-bottom:10px" onclick="recvNewProduct()">${ic('box',16)} إدخال منتج جديد تمامًا</button>
    <button class="btn" style="width:100%;justify-content:center;background:var(--surface-2);color:var(--ink);margin-bottom:14px" onclick="navigate('purchases')">${ic('receipt',16)} سجل فواتير الموردين</button>
    <div id="recvCartBox"></div>`;
  syncTopbar();
  const needLoad = !(INV.suppliers&&INV.suppliers.length) || !(INV.products&&INV.products.length);
  if(needLoad) loadInventory().then(()=>{ fillRecvSuppliers(); renderRecvList(); renderRecvCart(); });
  else { renderRecvList(); renderRecvCart(); }
}
function fillRecvSuppliers(){
  const sel=document.getElementById('recvSup'); if(!sel) return;
  const sups=INV.suppliers||[];
  sel.innerHTML = `<option value="">— اختر المورد —</option>` +
    sups.map(s=>`<option value="${s.id}" ${RECV.supplier===String(s.id)?'selected':''}>${esc(s.name)}</option>`).join('');
}
function recvAddSupplier(){
  openModal(`
    <div class="modal-head"><h3>${ic('truck',18)} مورد جديد</h3><button class="x" onclick="closeModal()">${ic('close',18)}</button></div>
    <div class="modal-body">
      <div class="field"><label>اسم المورد *</label><input id="recvNewSup" placeholder="مثال: أحمد كينجستون"></div>
      <div class="field"><label>التليفون (اختياري)</label><input id="recvNewSupPhone" type="tel" inputmode="tel" dir="ltr" placeholder="اختياري"></div>
      <div class="modal-foot"><button class="cancel" onclick="closeModal()">إلغاء</button>
        <button class="save" onclick="recvSaveSupplier()">حفظ واختيار</button></div>
    </div>`);
  setTimeout(()=>{ const i=document.getElementById('recvNewSup'); if(i) i.focus(); },120);
}
async function recvSaveSupplier(){
  const name=document.getElementById('recvNewSup').value.trim();
  const phone=document.getElementById('recvNewSupPhone').value.trim()||null;
  if(!name){ toast('اكتب اسم المورد','err'); return; }
  const btn=document.querySelector('.modal-foot .save'); if(btn){ btn.disabled=true; btn.textContent='جارٍ الحفظ...'; }
  try{
    const { data, error } = await db.from('suppliers').insert({name,phone}).select().single();
    if(error) throw error;
    INV.suppliers.push(data); INV.suppliers.sort((a,b)=>(a.name||'').localeCompare(b.name||'','ar'));
    cacheSet('suppliers',INV.suppliers);
    RECV.supplier=String(data.id);
    closeModal(); fillRecvSuppliers(); toast('اتضاف المورد واتسجّل','ok');
  }catch(e){ console.error(e);
    toast(isNetErr(e)?'محتاج نت عشان تضيف مورد':'خطأ في الإضافة','err');
    if(btn){ btn.disabled=false; btn.textContent='حفظ واختيار'; }
  }
}
function recvSearch(v){ RECV.search=v; clearTimeout(_recvSearchT); _recvSearchT=setTimeout(renderRecvList,160); }
function recvClearSearch(){ const i=document.getElementById('recvSearch'); if(i){ i.value=''; i.focus(); } RECV.search=''; renderRecvList(); }
function renderRecvList(){
  const el=document.getElementById('recvList'); if(!el) return;
  const q=(RECV.search||'').trim();
  if(!q){ el.innerHTML=''; return; }
  const list=(INV.products||[]).filter(p=>smartMatch(p.name,q)||smartMatch(p.barcode,q)||smartMatch(p.barcode2,q)||smartMatch(p.barcode3,q)).slice(0,20);
  if(!list.length){
    el.innerHTML=`<div class="cash-results"><div class="r" style="flex-direction:column;align-items:stretch;gap:10px">
      <div class="nm" style="color:var(--muted)">مفيش منتج بالاسم/الباركود ده</div>
      <button class="btn primary" style="margin:0" onclick="recvNewProduct()">${ic('box',16)} ضيفه كمنتج جديد</button></div></div>`;
    return;
  }
  el.innerHTML=`<div class="cash-results">`+list.map(p=>{
    const img=p.image_url?`<img src="${esc(p.image_url)}" onerror="this.parentNode.textContent='📦'">`:'📦';
    return `<div class="r" onclick="openReceiveSheet(${p.id})">
      <div class="r-img">${img}</div>
      <div class="nm">${esc(p.name)}<div class="st">المتاح: ${Number(p.quantity)} · جملة: ${money(p.wholesale_price)}</div></div>
      <button onclick="event.stopPropagation();openReceiveSheet(${p.id})">${ic('plus',20)}</button>
    </div>`;}).join('')+`</div>`;
}
function recvScan(){
  openScanner(code=>{
    const p=(INV.products||[]).find(x=>[x.barcode,x.barcode2,x.barcode3].some(b=>(b||'')===code));
    if(p){ openReceiveSheet(p.id); }
    else {
      const i=document.getElementById('recvSearch'); if(i) i.value=code; RECV.search=code; renderRecvList();
      toast('مفيش منتج بالباركود ده — تقدر تضيفه جديد','ok');
      recvNewProduct(code);
    }
  });
}
function recvNewProduct(barcode){
  if(!RECV.supplier){ toast('اختار المورد الأول','err'); return; }
  productModal(null, { supplier_id: RECV.supplier, barcode: (typeof barcode==='string'?barcode:'') });
}
function openReceiveSheet(id){
  const p=INV.products.find(x=>x.id===id); if(!p) return;
  if(!RECV.supplier){ toast('اختار المورد الأول','err'); return; }
  const existing=RECV.cart.find(it=>it.product_id===id);
  const startQty = existing ? existing.qty : 1;
  const startCost = existing ? existing.cost : (p.wholesale_price??'');
  openSheet(`
    <div class="modal-head"><h3>${ic('truck',18)} ${existing?'تعديل في الفاتورة':'ضيف للفاتورة'}</h3><button class="x" onclick="closeSheet()">${ic('close',18)}</button></div>
    <div class="sheet-form">
      <div class="recv-prod">${esc(p.name)}</div>
      <div class="recv-cur">المتاح حاليًا: <b>${Number(p.quantity)}</b> · سعر الجملة الحالي: <b>${money(p.wholesale_price)}</b></div>

      <div class="field"><label>الكمية الجاية</label>
        <div class="qstep">
          <button type="button" class="st-minus" onclick="stepNum('recvQty',-1)">−</button>
          <input id="recvQty" type="text" inputmode="numeric" dir="ltr" value="${startQty}">
          <button type="button" class="st-plus" onclick="stepNum('recvQty',1)">+</button>
        </div></div>

      <div class="field"><label>سعر الجملة الجديد للقطعة</label>
        <input id="recvCost" class="inp-red" type="text" inputmode="decimal" dir="ltr"
          value="${startCost}" oninput="recvPriceCheck(${Number(p.wholesale_price)||0})">
        <div id="recvPriceMsg" style="font-size:12.5px;margin-top:6px;color:var(--muted)"></div></div>

      <button class="btn pos" style="width:100%;justify-content:center;font-size:16px;padding:14px;margin-top:6px"
        onclick="addRecvToCart(${p.id})">${ic('plus',18)} ${existing?'تحديث في الفاتورة':'ضيف للفاتورة'}</button>
      <div style="height:20px"></div>
    </div>`);
  setTimeout(()=>recvPriceCheck(Number(p.wholesale_price)||0),50);
}
function recvPriceCheck(oldCost){
  const el=document.getElementById('recvPriceMsg'); if(!el) return;
  const v=Number(toEnDigits(document.getElementById('recvCost').value||'')||0);
  if(v>oldCost && oldCost>0){ el.style.color='var(--neg)'; el.innerHTML=`${ic('warn',13)} السعر الجديد أعلى من القديم (كان ${money(oldCost)} وبقى ${money(v)})`; }
  else if(v<oldCost){ el.style.color='var(--pos)'; el.textContent=`السعر الجديد أقل من القديم (كان ${money(oldCost)})`; }
  else { el.style.color='var(--muted)'; el.textContent='نفس سعر الجملة الحالي'; }
}
function addRecvToCart(id){
  const p=INV.products.find(x=>x.id===id); if(!p) return;
  const num=v=>Number(toEnDigits(v||'')||0);
  const qty=num(document.getElementById('recvQty').value);
  if(qty<=0){ toast('اكتب الكمية الجاية','err'); return; }
  const cost=num(document.getElementById('recvCost').value);
  const ex=RECV.cart.find(it=>it.product_id===id);
  if(ex){ ex.qty=qty; ex.cost=cost; }
  else RECV.cart.push({ product_id:id, name:p.name, image_url:p.image_url||'', qty, cost, old_cost:Number(p.wholesale_price)||0 });
  closeSheet();

function cancelRecvEdit(){ RECV.cart=[]; RECV.editId=null; RECV.origItems=[]; renderRecvCart(); toast('اتلغى التعديل'); }

function registerInvoice(){
  if(!RECV.cart.length){ toast('الفاتورة فاضية','err'); return; }
  if(!RECV.supplier){ toast('اختار المورد','err'); return; }
  const sup = RECV.supplier;
  const supName = (INV.suppliers.find(s=>String(s.id)===String(sup))||{}).name || '';
  // 1) طبّق الفرق على المخزون (أوفلاين-أولًا)
  const origMap={}; (RECV.origItems||[]).forEach(o=>{ origMap[o.product_id]=Number(o.quantity)||0; });
  const touched=new Set();
  RECV.cart.forEach(it=>{
    touched.add(it.product_id);
    const delta = it.qty - (origMap[it.product_id]||0);
    applyStockDelta(it.product_id, delta, it.cost, sup);
  });
  // أصناف اتشالت في التعديل -> ارجّع كميتها
  (RECV.origItems||[]).forEach(o=>{ if(!touched.has(o.product_id)){ applyStockDelta(o.product_id, -(Number(o.quantity)||0), null, null); } });

  // 2) سجّل الفاتورة (عبر الطابور — بيشتغل أوفلاين)
  const total=RECV.cart.reduce((s,it)=>s+it.qty*it.cost,0);
  const purchase={ supplier_id: sup?Number(sup):null, supplier_name:supName, total,
    user_id:CURRENT.user.id, user_name:CURRENT.profile.full_name, updated_at:new Date().toISOString() };
  const items=RECV.cart.map(it=>({ product_id: (it.product_id>0?it.product_id:null), product_name:it.name,
    quantity:it.qty, unit_cost:it.cost, line_total:it.qty*it.cost, old_cost:Number(it.old_cost)||0 }));
  outboxAdd({ type:'purchase', editId:RECV.editId||null, payload:{ purchase, items } });

  logAudit(RECV.editId?'edit_purchase':'purchase','purchases',RECV.editId||'',{total,items:items.length});
  const wasEdit=RECV.editId;
  RECV.cart=[]; RECV.editId=null; RECV.origItems=[];
  cacheSet('products',INV.products);
  renderRecvCart(); renderRecvList();
  toast(wasEdit?'اتحفظ تعديل الفاتورة':'اتسجّلت الفاتورة واتضافت للمخزون','ok');
  flushOutbox();
}
// يطبّق فرق كمية على منتج + تحديث السعر/المورد (أوفلاين-أولًا)
function applyStockDelta(id, delta, newCost, sup){
  const i=INV.products.findIndex(x=>x.id===id); if(i<0) return;
  const rec={ quantity: Math.max(0, Number(INV.products[i].quantity||0)+delta), updated_at:new Date().toISOString() };
  if(newCost!=null) rec.wholesale_price=newCost;
  if(sup) rec.supplier_id=Number(sup);
  INV.products[i]={ ...INV.products[i], ...rec };
  const q=outboxGet();
  if(id<0){ const op=q.find(o=>o.type==='insert'&&o.tmpId===id); if(op){ const p2={...op.payload,...rec}; delete p2.updated_at; op.payload=p2; outboxSet(q); } else outboxAdd({type:'update',id,payload:rec}); }
  else { const op=q.find(o=>o.type==='update'&&o.id===id); if(op){ op.payload={...op.payload,...rec}; outboxSet(q); } else outboxAdd({type:'update',id,payload:rec}); }
}

  }catch(e){ if(!cached){ const el=document.getElementById('stkList'); if(el) el.innerHTML=`<div class="empty"><div class="ic">${ic('warn',32)}</div>مفيش نت ومفيش نسخة محفوظة</div>`; } }

function stkSearch(v){ STK.search=v; const b=document.getElementById('stkClear'); if(b) b.classList.toggle('show',!!v); renderStkList(); }
function stkClearSearch(){ const i=document.getElementById('stkSearch'); if(i){ i.value=''; i.focus(); } STK.search=''; const b=document.getElementById('stkClear'); if(b) b.classList.remove('show'); renderStkList(); }

function renderStkList(){
  let list=STK.products.slice();
  if(STK.search) list=list.filter(p=>smartMatch(p.name,STK.search)||smartMatch(p.barcode,STK.search)||smartMatch(p.barcode2,STK.search)||smartMatch(p.barcode3,STK.search));
  const el=document.getElementById('stkList'); if(!el) return;
  if(!list.length){ el.innerHTML=`<div class="empty"><div class="ic">${ic('box',32)}</div>مفيش أصناف</div>`; renderStkSummary(); return; }
  el.innerHTML=list.map(p=>{
    const sys=Number(p.quantity||0);
    const has=STK.entries[p.id]!==undefined;
    const act=has?STK.entries[p.id]:'';
    const diff=has?(Number(act)-sys):null;
    const dtxt=has?(diff===0?ic('check',16):(diff>0?'+'+diff:String(diff))):'';
    const dcol=diff>0?'var(--pos)':(diff<0?'var(--neg)':'var(--pos)');
    return `<div class="stk-row ${has?(diff===0?'ok':'diff'):''}" data-id="${p.id}">
      <div class="stk-nm">${esc(p.name)}<span>بالنظام: ${sys}</span></div>
      <input class="stk-in" type="text" inputmode="numeric" dir="ltr" value="${act}" placeholder="فعلي"
        oninput="stkSet(${p.id},this.value)">
      <div class="stk-diff" style="color:${dcol}">${dtxt}</div>
    </div>`;
  }).join('');
  renderStkSummary();
}

function stkSet(id,v){
  const val=String(v).trim();
  if(val===''){ delete STK.entries[id]; } else { STK.entries[id]=Number(toEnDigits(val))||0; }
  const p=STK.products.find(x=>String(x.id)===String(id)); if(!p) return;
  const sys=Number(p.quantity||0);
  const row=document.querySelector(`.stk-row[data-id="${id}"]`);
  if(row){ const has=STK.entries[id]!==undefined; const diff=has?STK.entries[id]-sys:null;
    row.classList.toggle('ok',has&&diff===0); row.classList.toggle('diff',has&&diff!==0);
    const dc=row.querySelector('.stk-diff');
    if(dc){ dc.innerHTML=has?(diff===0?ic('check',16):(diff>0?'+'+diff:String(diff))):'';
      dc.style.color = diff>0?'var(--pos)':(diff<0?'var(--neg)':'var(--pos)'); }
  }
  renderStkSummary();
}

function renderStkSummary(){
  const el=document.getElementById('stkSummary'); if(!el) return;
  const ids=Object.keys(STK.entries);
  let over=0,short=0;
  ids.forEach(id=>{ const p=STK.products.find(x=>String(x.id)===String(id)); if(!p) return;
    const d=STK.entries[id]-Number(p.quantity||0); if(d>0) over+=d; else if(d<0) short+=-d; });
  el.innerHTML=`<div class="stk-sum">
    <div><b>${ids.length}</b><span>اتجرد</span></div>
    <div style="color:var(--pos)"><b>+${over}</b><span>زيادة</span></div>
    <div style="color:var(--neg)"><b>-${short}</b><span>عجز</span></div>
    <button class="stk-apply" onclick="applyStocktake()" ${ids.length?'':'disabled'}>${ic('check',16)} طبّق الفروقات</button>
  </div>`;
}

async function applyStocktake(){
  const ids=Object.keys(STK.entries); if(!ids.length) return;
  const changes=ids.map(id=>{ const p=STK.products.find(x=>String(x.id)===String(id));
    return p?{p, actual:STK.entries[id], diff:STK.entries[id]-Number(p.quantity||0)}:null; }).filter(Boolean);
  const changed=changes.filter(c=>c.diff!==0);
  if(!changed.length){ toast('مفيش فروقات — كله مظبوط','ok'); return; }
  if(!confirm(`هيتم تعديل كمية ${changed.length} صنف حسب الجرد الفعلي. متأكد؟`)) return;
  let done=0;
  for(const c of changed){
    try{
      const { error }=await db.from('products').update({ quantity:c.actual }).eq('id',c.p.id);
      if(error) throw error;
      logAudit('stocktake','products',c.p.id,{ from:Number(c.p.quantity||0), to:c.actual, diff:c.diff });
      c.p.quantity=c.actual; done++;
    }catch(e){ console.error(e); }
  }
  // حدّث الكاش بالكميات الجديدة (من غير ما نفقد باقي الأعمدة)
  try{ const cached=cacheGet('products')||[];
    changed.forEach(c=>{ const cp=cached.find(x=>String(x.id)===String(c.p.id)); if(cp) cp.quantity=c.actual; });
    cacheSet('products',cached); }catch(e){}
  toast(`اتظبط ${done} صنف من الجرد`,'ok');
  STK.entries={}; renderStkList();
}

function rangeForDay(d){ const from=new Date(d+'T00:00:00'); const to=new Date(from); to.setDate(from.getDate()+1);
  return [from.toISOString(), to.toISOString()]; }
function rangeForMonth(m){ const from=new Date(m+'-01T00:00:00'); const to=new Date(from); to.setMonth(from.getMonth()+1);
  return [from.toISOString(), to.toISOString()]; }

function confirmDeleteDay(){
  const d=document.getElementById('delDay').value; if(!d) return;
  const [from,to]=rangeForDay(d);
  confirmDanger(`هتمسح كل سجلات يوم ${d} نهائيًا. متأكد؟`, ()=>deleteRange(from,to,`يوم ${d}`));
}
function confirmDeleteMonth(){
  const m=document.getElementById('delMonth').value; if(!m) return;
  const [from,to]=rangeForMonth(m);
  confirmDanger(`هتمسح كل سجلات شهر ${m} نهائيًا. متأكد؟`, ()=>deleteRange(from,to,`شهر ${m}`));
}
function confirmResetAll(){
  confirmDanger('هتمسح كل العمليات من البداية للنهاية نهائيًا. متأكد؟', ()=>deleteRange(null,null,'كل البيانات'));
}

function confirmDanger(msg, onYes){
  window._dangerYes = onYes;
  openModal(`<div class="modal-head"><h3>تأكيد الحذف</h3><button class="x" onclick="closeModal()">${ic('close',18)}</button></div>
    <div class="modal-body">
      <p style="font-size:15px;line-height:1.7;color:#9B2D20"><b>${ic('warn',18)} ${esc(msg)}</b></p>
      <p style="color:var(--muted);font-size:13px">الحذف نهائي. العملية نفسها هتتسجّل في سجل النشاط.</p>
      <div class="modal-foot">
        <button class="cancel" onclick="closeModal()">رجوع</button>
        <button class="save" style="background:var(--neg)" onclick="runDanger()">أكّد الحذف</button>
      </div>
    </div>`);
}
async function runDanger(){ const fn=window._dangerYes; window._dangerYes=null; closeModal(); if(fn) await fn(); }

async function deleteRange(from,to,label){
  toast('جارٍ الحذف...');
  let ok=0, fail=0;
  for(const [table,col] of TX_TABLES){
    try{
      let q=db.from(table).delete();
      if(from && to){ q=q.gte(col,from).lt(col,to); }
      else{ q=q.gte('id',0); }     // كل الصفوف
      const { error }=await q;
      if(error){ console.error(table,error); fail++; } else ok++;
    }catch(e){ console.error(table,e); fail++; }
  }
  await logAudit('delete_data','admin','',{ label, ok, fail });
  toast(fail? `اتمسح ${label} (مع ${fail} جدول فيه مشكلة)` : `اتمسح ${label}`, fail?'err':'ok');
}

/* ==================== الإعدادات / الوضع الليلي / الأسماء ==================== */
function getTheme(){ try{ return localStorage.getItem('theme')||'light'; }catch(e){ return 'light'; } }
function applyTheme(t){
  document.documentElement.setAttribute('data-theme', t==='dark'?'dark':'light');
  applyThemeColor(getThemeColor());   // ثبّت لون الثيم بعد تغيير الوضع
}
function setTheme(t){ try{ localStorage.setItem('theme',t); }catch(e){} applyTheme(t); }

/* ===== ثيمات الألوان (محلية لكل جهاز — مش بتأثر على باقي المستخدمين) ===== */
