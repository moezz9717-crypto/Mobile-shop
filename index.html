  classic:{ name:'كلاسيك', c:'#15406B', navy:'#15406B', n7:'#1C4E80', n9:'#0C2A49', gold:'#E39A0C' },
  indigo: { name:'نيلي',   c:'#4F46E5', navy:'#4F46E5', n7:'#4338CA', n9:'#312E81', gold:'#F59E0B' },
  violet: { name:'بنفسجي', c:'#7C3AED', navy:'#7C3AED', n7:'#6D28D9', n9:'#4C1D95', gold:'#F59E0B' },
  emerald:{ name:'زمردي',  c:'#059669', navy:'#059669', n7:'#047857', n9:'#064E3B', gold:'#F59E0B' },
  teal:   { name:'تركواز', c:'#0D9488', navy:'#0D9488', n7:'#0F766E', n9:'#134E4A', gold:'#F59E0B' },
  rose:   { name:'وردي',   c:'#E11D48', navy:'#E11D48', n7:'#BE123C', n9:'#881337', gold:'#FB923C' },
  sunset: { name:'غروب',   c:'#EA580C', navy:'#EA580C', n7:'#C2410C', n9:'#7C2D12', gold:'#FACC15' },
  slate:  { name:'فحمي',   c:'#475569', navy:'#475569', n7:'#334155', n9:'#1E293B', gold:'#38BDF8' },
};
function getThemeColor(){ try{ return localStorage.getItem('themeColor')||'classic'; }catch(e){ return 'classic'; } }
function applyThemeColor(key){
  const r=document.documentElement.style;
  const meta=document.querySelector('meta[name="theme-color"]');
  if(key==='classic' || !THEMES[key]){
    r.removeProperty('--navy'); r.removeProperty('--navy-700'); r.removeProperty('--navy-900'); r.removeProperty('--gold');
    if(meta) meta.setAttribute('content', getTheme()==='dark'?'#0E1621':'#0C2A49');
    return;
  }
  const t=THEMES[key];
  r.setProperty('--navy',t.navy); r.setProperty('--navy-700',t.n7); r.setProperty('--navy-900',t.n9); r.setProperty('--gold',t.gold);
  if(meta) meta.setAttribute('content', t.n9);
}
function setThemeColor(key){ try{ localStorage.setItem('themeColor',key); }catch(e){} applyThemeColor(key); }
function pickTheme(key){ setThemeColor(key); renderSettings(); toast('تم تغيير الثيم','ok'); }

const NAME_DEFAULTS={app:'بندق ستور',inventory:'المخزون',purchases:'فواتير الموردين',reps:'حساب المناديب',cashout:'فلوس بره',vodafone:'تقفيل فودافون كاش',users:'المستخدمين',settings:'الإعدادات'};
function getNames(){ try{ return JSON.parse(localStorage.getItem('appNames')||'{}'); }catch(e){ return {}; } }
function nm(k){ const o=getNames(); return o[k]||NAME_DEFAULTS[k]||k; }
function setNameVal(k,v){ const o=getNames(); if(v&&v!==NAME_DEFAULTS[k]) o[k]=v; else delete o[k]; try{ localStorage.setItem('appNames',JSON.stringify(o)); }catch(e){} }
function getAppName(){ return nm('app'); }
function applyAppName(){
  const n=getAppName();
  const a=document.getElementById('appTitle'); if(a) a.textContent=n;
  const b=document.getElementById('brandTitle'); if(b) b.textContent=n;
}

function renderSettings(){
  const isAdmin=CURRENT.profile.role==='admin';
  const dark=getTheme()==='dark';
  document.getElementById('content').innerHTML=`
    <div class="page-head"><h2>${ic('gear',22)} الإعدادات</h2></div>

    <div class="totals" style="margin-bottom:14px">
      <div class="set-row">
        <div><b style="font-size:15px">الوضع الليلي</b><div style="color:var(--muted);font-size:13px">مظهر غامق مريح لليل</div></div>
        <button class="switch ${dark?'on':''}" id="themeSwitch" onclick="toggleTheme()"><span class="knob"></span></button>
      </div>
    </div>

    <div class="totals" style="margin-bottom:14px">
      <h3 style="margin:0 0 4px;font-size:16px">لون الثيم</h3>
      <p style="color:var(--muted);font-size:12.5px;margin:0 0 12px">اختار اللون اللي يعجبك — الاختيار بيتسجّل على جهازك أنت بس.</p>
      <div class="theme-grid">
        ${Object.keys(THEMES).map(k=>{ const t=THEMES[k]; const on=getThemeColor()===k;
          return `<button class="theme-sw ${on?'on':''}" onclick="pickTheme('${k}')">
            <span class="sw-dot" style="background:${t.c}">${on?'<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>':''}</span>
            <span class="sw-nm">${t.name}</span>
          </button>`; }).join('')}
      </div>
    </div>

    ${isAdmin?`<div class="totals" style="margin-bottom:14px">
      <h3 style="margin:0 0 10px;font-size:16px">${ic('edit',16)} أسماء التطبيق والأقسام</h3>
      <p style="color:var(--muted);font-size:12.5px;margin:0 0 12px">عدّل أي اسم زي ما تحب، والتغيير بيظهر في الرئيسية والعناوين.</p>
      ${[['app','اسم التطبيق'],['inventory','المخزون'],['purchases','فواتير الموردين'],['reps','حساب المناديب'],['cashout','فلوس بره'],['vodafone','تقفيل فودافون كاش'],['users','المستخدمين'],['settings','الإعدادات']].map(([k,lbl])=>
        `<div class="field" style="margin-bottom:10px"><label style="font-size:12.5px;color:var(--muted)">${lbl}</label>
          <input id="nm_${k}" value="${esc(nm(k))}" placeholder="${lbl}"></div>`).join('')}
      <button class="save" style="margin-top:4px" onclick="saveAllNames()">حفظ الأسماء</button>
    </div>`:''}

    ${isAdmin?`<div class="totals" style="margin-bottom:14px">
      <h3 style="margin:0 0 10px;font-size:16px">التصنيفات والموردين</h3>
      <div class="btn-line">
        <button onclick="categoriesModal()">${ic('tag',16)} إدارة التصنيفات</button>
        <button onclick="suppliersModal()">${ic('truck',16)} إدارة الموردين</button>
      </div>
    </div>

    <div class="totals" style="margin-bottom:14px">
      <h3 style="margin:0 0 4px;font-size:16px">عمليات جماعية على المخزون</h3>
      <p style="color:var(--muted);font-size:12.5px;line-height:1.6;margin:0 0 10px">بتأثّر على كل المنتجات دفعة واحدة — خلي بالك.</p>
      <div class="btn-line" style="flex-direction:column">
        <button onclick="resetAllQuantities()" style="background:#FDECEA;color:#C0392B;border-color:#F1B7B0">${ic('refresh',16)} تصفير عداد كل المنتجات</button>
        <button onclick="setAllMinStock()">${ic('box',16)} وضع حد أدنى لكل المنتجات</button>
      </div>
    </div>`:''}

    <div class="totals">
      <h3 style="margin:0 0 4px;font-size:16px">عن البرنامج</h3>
      <p style="color:var(--muted);font-size:13px;line-height:1.7;margin:0">
        مستخدم: ${esc(CURRENT.profile.full_name||'')}<br>الصلاحية: ${esc(CURRENT.profile.role||'')}</p>
    </div>`;
}
async function resetAllQuantities(){
  if(!confirm('متأكد تصفّر عداد كل المنتجات لـ0؟ مش هينفع ترجع.')) return;
  try{
    const { error } = await db.from('products').update({ quantity:0 }).gt('id',0);
    if(error) throw error;
    INV.products.forEach(p=>p.quantity=0); cacheSet('products',INV.products);
    logAudit('bulk','products','',{op:'reset_qty'});
    toast('تم تصفير عداد كل المنتجات','ok');
  }catch(e){ console.error(e); toast('حصل خطأ','err'); }
}
async function setAllMinStock(){
  const v=prompt('اكتب رقم الحد الأدنى اللي عايزه لكل المنتجات:');
  if(v===null) return;
  const n=Number(toEnDigits(String(v).replace(/[^\d]/g,'')));
  if(isNaN(n)){ toast('رقم غير صحيح','err'); return; }
  if(!confirm(`هيتحط حد أدنى = ${n} لكل المنتجات. تمام؟`)) return;
  try{
    const { error } = await db.from('products').update({ min_stock:n }).gt('id',0);
    if(error) throw error;
    INV.products.forEach(p=>p.min_stock=n); cacheSet('products',INV.products);
    logAudit('bulk','products','',{op:'set_min',value:n});
    toast(`تم وضع حد أدنى ${n} لكل المنتجات`,'ok');
  }catch(e){ console.error(e); toast('حصل خطأ','err'); }
}
function toggleTheme(){
  const next=getTheme()==='dark'?'light':'dark';
  setTheme(next);
  const sw=document.getElementById('themeSwitch'); if(sw) sw.classList.toggle('on',next==='dark');
}
function saveAppName(){
  const v=(document.getElementById('setAppName').value||'').trim(); if(!v){ toast('اكتب اسم','err'); return; }
  setNameVal('app',v); applyAppName(); toast('اتحفظ الاسم','ok');
}
function saveAllNames(){
  ['app','inventory','purchases','reps','cashout','vodafone','users','settings'].forEach(k=>{
    const el=document.getElementById('nm_'+k); if(el) setNameVal(k,(el.value||'').trim());
  });
  applyAppName(); toast('اتحفظت الأسماء','ok');
}

// تحويل الأرقام العربي لإنجليزي تلقائيًا في أي خانة
document.addEventListener('input',e=>{
  const el=e.target;
  if(!el||(el.tagName!=='INPUT'&&el.tagName!=='TEXTAREA')) return;
  const v=el.value, c=toEnDigits(v);
  if(c!==v){ let p=null; try{p=el.selectionStart;}catch(_){}
    el.value=c; if(p!=null){ try{ el.setSelectionRange(p,p); }catch(_){} } }
},true);

/* ==================== التشغيل الأول: استعادة الجلسة ==================== */
(async function init(){
  applyTheme(getTheme()); applyThemeColor(getThemeColor()); applyAppName();
  if(SUPABASE_KEY.startsWith('ضع_')){
    authMsg('لسه محطّتش مفتاح Publishable في كود الصفحة','err'); return;
  }
  const { data:{ session } } = await db.auth.getSession();
  if(session){ await startApp(); }
})();
</script>
