.vrep-insight-item:last-child{border-bottom:none}
.vrep-insight-item .dot2{width:6px;height:6px;border-radius:50%;background:var(--navy-700);margin-top:6px;flex-shrink:0}

.vrep-smart-box{background:var(--surface);border:1.5px solid var(--line);border-radius:16px;padding:6px 14px;margin-bottom:16px;box-shadow:var(--shadow)}
.vrep-smart-item{font-size:12.5px;line-height:1.85;padding:10px 0;border-bottom:1px dashed var(--line)}
.vrep-smart-item:last-child{border-bottom:none}

.vrep-heat{display:grid;grid-template-columns:repeat(7,1fr);gap:5px}
.vrep-heat-cell{aspect-ratio:1;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--muted);
  background:var(--surface-2);border:1px solid var(--line)}

.vrep-size-legend{margin-top:12px;display:flex;flex-direction:column;gap:10px}
.vsl-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-top:1px solid var(--line)}
.vsl-row:first-child{border-top:none}
.vsl-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0}
.vsl-mid{flex:1;display:flex;flex-direction:column;gap:2px;min-width:0}
.vsl-mid b{font-size:13.5px}
.vsl-sub{font-size:11.5px;color:var(--muted)}
.vsl-end{text-align:left;display:flex;flex-direction:column;gap:2px;flex-shrink:0}
.vsl-end b{font-size:14px;color:var(--pos)}

<!-- ===================== شاشة الدخول ===================== -->
<section id="auth">
  <div class="signal"><i></i><i></i><i></i><i></i></div>
  <div class="auth-card">
    <div class="brand">
      <div class="mark"><svg width="38" height="38" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="6" y="2" width="12" height="20" rx="2"/><path d="M11 18h2"/></svg></div>
      <h1 id="brandTitle">تسجيل الدخول</h1>
      <p id="authSub">مرحبًا بعودتك! سجّل دخولك للمتابعة</p>
    </div>

    <div id="authMsg" class="msg"></div>

    <!-- تسجيل الدخول -->
    <div id="loginForm">

        <label>البريد الإلكتروني</label>

      </div>
      <div class="field">
        <label>كلمة المرور</label>
        <div class="inp-wrap">
          <span class="inp-ic"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></span>
          <input id="loginPass" type="password" placeholder="••••••••" autocomplete="current-password">
          <span class="inp-eye" onclick="togglePass('loginPass',this)"><svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg></span>

      </div>

      <div class="auth-or">أو</div>
      <button class="btn-ghost" onclick="showSignup()"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M19 8v6"/><path d="M22 11h-6"/></svg> إنشاء حساب جديد</button>

        <div class="inp-wrap">
          <span class="inp-ic"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-10 6L2 7"/></svg></span>
          <input id="suEmail" type="email" inputmode="email" placeholder="example@mail.com">
        </div>
      </div>
      <div class="field">
        <label>كلمة المرور</label>
        <div class="inp-wrap">
          <span class="inp-ic"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></span>
          <input id="suPass" type="password" placeholder="٦ حروف على الأقل">
          <span class="inp-eye" onclick="togglePass('suPass',this)"><svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg></span>
        </div>

<script>
/* ====================================================================

const SUPABASE_URL = "https://zcoqpfpxlgfqrurjzfzn.supabase.co";
const SUPABASE_KEY = "sb_publishable_UbfvZtgBPD3YDUR1fTHyGw_x5VSEXkN";

/* ==================== تهيئة ==================== */
/* fetch بمهلة زمنية: لو طلب فات 45 ثانية من غير رد خالص (يعني النت مقطوع فعلاً مش بس بطيء)
   نوقفه ونبلّغ المستخدم، بدل ما الشاشة تفضل معلّقة من غير أي رسالة. المهلة كبيرة عمدًا
   عشان ماتقفلش طلبات شغالة لسه على نت بطيء (زي رفع فاتورة فيها أصناف كتير) */
let _slowNetTimer=null;
function timeoutFetch(url, opts){
  const ctrl=new AbortController();
  const merged=Object.assign({}, opts, { signal: (opts&&opts.signal) || ctrl.signal });
  const t=setTimeout(()=>{ try{ ctrl.abort(); }catch(e){} }, 45000);
  clearTimeout(_slowNetTimer);
  _slowNetTimer=setTimeout(()=>{ try{ toast('البيانات بتترفع... النت شكله بطيء'); }catch(e){} }, 8000);
  return fetch(url, merged).then(r=>{ clearTimeout(t); clearTimeout(_slowNetTimer); return r; })
    .catch(err=>{ clearTimeout(t); clearTimeout(_slowNetTimer);
      if(err && err.name==='AbortError'){
        console.warn('timeoutFetch aborted:', url);
        try{ toast('محتاج نت أقوى — الاتصال بطيء جدًا حالياً','err'); }catch(e){}
        throw Object.assign(new Error('timeout: fetch aborted'), { isTimeout:true });
      }
      throw err;
    });
}
const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY, { global: { fetch: timeoutFetch } });
let CURRENT = { user:null, profile:null };

const ROLE_AR = { admin:'Manager', sales:'موظف مبيعات', technician:'فني صيانة', accountant:'محاسب' };
let ROLES = cacheGet('app_roles') || [{label:'بائع'},{label:'فني'},{label:'محاسب'}];
async function loadRoles(){
  try{
    const { data } = await db.from('app_roles').select('*').order('sort',{ascending:true}).order('id',{ascending:true});
    if(data){ ROLES=data; cacheSet('app_roles',ROLES); }
  }catch(e){ ROLES=cacheGet('app_roles')||ROLES; }
}
function roleLabel(r){ if(r==='admin') return ROLE_AR.admin; return ROLE_AR[r]||r||''; }

/* أقسام النظام + الصلاحيات المسموح لها */
const NAV = [
  { id:'dashboard', name:'لوحة التحكم', ic:'home', roles:['admin','sales','technician','accountant'] },
  { id:'inventory', name:'المخزون',     ic:'box', roles:['admin','sales','accountant'] },
  { id:'purchases', name:'فواتير الموردين', ic:'receipt', roles:['admin','sales','accountant'] },
  { id:'users',     name:'المستخدمين',  ic:'users', roles:['admin'] },
  { id:'settings',  name:'الإعدادات',   ic:'gear', roles:['admin','sales','technician','accountant'] },
];

/* ==================== أدوات مساعدة ==================== */
function money(n){ return new Intl.NumberFormat('en-US',{maximumFractionDigits:2}).format(n||0)+' ج.م'; }
function fmtTime12(d){ let h=d.getHours(); const m=String(d.getMinutes()).padStart(2,'0'); const ap=h<12?'ص':'م'; h=h%12; if(h===0) h=12; return `${h}:${m} ${ap}`; }
function todayStartISO(){ const d=new Date(); d.setHours(0,0,0,0); return d.toISOString(); }

// تحويل الأرقام العربي/الفارسي لإنجليزي
function toEnDigits(s){ return String(s==null?'':s)
  .replace(/[\u0660-\u0669]/g,d=>String(d.charCodeAt(0)-0x0660))
  .replace(/[\u06F0-\u06F9]/g,d=>String(d.charCodeAt(0)-0x06F0))
  .replace(/\u066B/g,'.').replace(/\u066C/g,'')
  .replace(/,/g,''); }
function groupThousands(v){
  v=String(v==null?'':v)
    .replace(/[\u0660-\u0669]/g,d=>String(d.charCodeAt(0)-0x0660))
    .replace(/[\u06F0-\u06F9]/g,d=>String(d.charCodeAt(0)-0x06F0))
    .replace(/\u066B/g,'.').replace(/\u066C/g,'')
    .replace(/[^\d.]/g,'');
  if(v==='') return '';
  const hadDot=v.indexOf('.')>=0;
  let [intp,...rest]=v.split('.');
  intp=intp.replace(/^0+(?=\d)/,'');
  if(intp==='') intp='0';
  intp=intp.replace(/\B(?=(\d{3})+(?!\d))/g,',');
  let dec=rest.join('').slice(0,2);
  return hadDot ? intp+'.'+dec : intp;
}
function fmtNumInputs(root){
  try{ (root||document).querySelectorAll('input[inputmode="decimal"],input[inputmode="numeric"]').forEach(inp=>{ if(inp.value) inp.value=groupThousands(inp.value); }); }catch(e){}
}
document.addEventListener('input', function(e){
  const t=e.target;
  if(t && t.matches && t.matches('input[inputmode="decimal"],input[inputmode="numeric"]')){
    const before=t.value, after=groupThousands(before);
    if(after!==before){ t.value=after; try{ t.setSelectionRange(after.length,after.length); }catch(_){} }
  }
}, true);

/* ============ كيبورد أرقام مخصص لكل خانات المبالغ/الكميات ============
   بدل الكيبورد العادي بتاع الجهاز، أي خانة inputmode="decimal" أو "numeric" بتفتح الكيبورد ده تلقائيًا */
let NUMPAD_EL=null, NUMPAD_VAL='', NUMPAD_ACC=null, NUMPAD_OP=null;
function numpadPatch(el){
  if(el.dataset.npDone) return;
  el.dataset.npDone='1';
  el.readOnly=true;   // يمنع كيبورد الجهاز الأصلي من الظهور، من غير ما يأثر على تنسيق فواصل الآلاف الحالي
  el.addEventListener('focus', ()=>openNumpad(el));
  el.addEventListener('click', ()=>openNumpad(el));
}
function numpadScan(root){
  try{ (root||document).querySelectorAll('input[inputmode="decimal"],input[inputmode="numeric"]').forEach(numpadPatch); }catch(e){}
}
function openNumpad(el){
  NUMPAD_EL=el;
  NUMPAD_VAL=(el.value||'').replace(/,/g,'');
  NUMPAD_ACC=null; NUMPAD_OP=null;
  const lbl = (el.previousElementSibling&&el.previousElementSibling.tagName==='LABEL') ? el.previousElementSibling.textContent
    : (el.closest('.field')&&el.closest('.field').querySelector('label')?el.closest('.field').querySelector('label').textContent
    : (el.placeholder||''));
  document.getElementById('numpadLabel').textContent=lbl||'';
  numpadRenderExpr();
  numpadRenderPreview();
  document.body.classList.add('numpad-open');
  document.getElementById('numpadOverlay').classList.add('show');
  setTimeout(()=>{ try{ el.scrollIntoView({block:'center',behavior:'smooth'}); }catch(e){} }, 120);
}
function closeNumpad(){
  document.getElementById('numpadOverlay').classList.remove('show');
  document.body.classList.remove('numpad-open');
  if(NUMPAD_EL){ const el=NUMPAD_EL; NUMPAD_EL=null; el.blur(); }
}
function numpadRenderExpr(){
  const e=document.getElementById('numpadExpr');
  e.textContent = (NUMPAD_ACC!==null && NUMPAD_OP) ? `${groupThousands(String(NUMPAD_ACC))} ${NUMPAD_OP}` : '';
}
function numpadRenderPreview(){
  const shown = NUMPAD_VAL===''?'0':groupThousands(NUMPAD_VAL);
  document.getElementById('numpadPreview').textContent=shown;
  if(NUMPAD_EL){
    NUMPAD_EL.value=NUMPAD_VAL;
    NUMPAD_EL.dispatchEvent(new Event('input',{bubbles:true}));
  }
}
function numpadPress(d){
  if(d==='.'){ if(NUMPAD_VAL.includes('.')) return; NUMPAD_VAL=(NUMPAD_VAL===''||NUMPAD_VAL==='-')?NUMPAD_VAL+'0.':NUMPAD_VAL+'.'; }
  else{
    if(NUMPAD_VAL==='0') NUMPAD_VAL=d;
    else if(NUMPAD_VAL==='-0') NUMPAD_VAL='-'+d;
    else NUMPAD_VAL+=d;
  }
  numpadRenderPreview();
}
function numpadBackspace(){ NUMPAD_VAL=NUMPAD_VAL.slice(0,-1); numpadRenderPreview(); }
function numpadClear(){ NUMPAD_VAL=''; NUMPAD_ACC=null; NUMPAD_OP=null; numpadRenderExpr(); numpadRenderPreview(); }
function numpadApplyOp(a,b,op){ return op==='+' ? a+b : a-b; }
// زرار + أو - : يجمع/يطرح الرقم الحالي مع الرصيد المتراكم، ويسيبك تدخل رقم جديد
function numpadOperator(op){
  const cur=parseFloat(NUMPAD_VAL||'0')||0;
  if(NUMPAD_ACC===null) NUMPAD_ACC=cur;
  else if(NUMPAD_OP) NUMPAD_ACC=numpadApplyOp(NUMPAD_ACC, cur, NUMPAD_OP);
  NUMPAD_OP=op;
  NUMPAD_VAL='';
  numpadRenderExpr();
  numpadRenderPreview();
}
// زرار = : يحسب الناتج النهائي ويقفل الكيبورد
function numpadEquals(){
  const cur=parseFloat(NUMPAD_VAL||'0')||0;
  const result = (NUMPAD_ACC!==null && NUMPAD_OP) ? numpadApplyOp(NUMPAD_ACC, cur, NUMPAD_OP) : cur;
  NUMPAD_ACC=null; NUMPAD_OP=null;
  NUMPAD_VAL = String(result);
  numpadRenderExpr();
  numpadRenderPreview();
  numpadDone();
}
function numpadDone(){
  if(NUMPAD_EL) NUMPAD_EL.dispatchEvent(new Event('change',{bubbles:true}));
  closeNumpad();
}
// راقب أي خانات أرقام جديدة بتتضاف للصفحة (شيتات/صفحات جديدة) وفعّل الكيبورد المخصص عليها تلقائيًا
new MutationObserver(muts=>{
  muts.forEach(m=>{ m.addedNodes.forEach(n=>{
    if(n.nodeType!==1) return;
    if(n.matches && n.matches('input[inputmode="decimal"],input[inputmode="numeric"]')) numpadPatch(n);
    if(n.querySelectorAll) numpadScan(n);
  }); });
}).observe(document.body, { childList:true, subtree:true });
document.addEventListener('DOMContentLoaded', ()=>numpadScan(document));
numpadScan(document);

// بحث ذكي: كل كلمة لازم تتواجد (بأي ترتيب)

  ['بطارية','battery'],['فلاشة','flash'],['فلاشة','usb'],['ميموري','memory'],['ميموري','sd'],['كارت','card'],
  ['باور','power'],['باوربانك','powerbank'],['محول','adapter'],['ادابتر','adapter'],['تايب','type'],['ساعة','watch'],['ساعه','watch'],
  ['تابلت','tablet'],['موبايل','mobile'],['تليفون','phone'],['ستاند','stand'],['حامل','holder'],['ايد','aux'],['ضوء','light'],['ليد','led'],
  ['سامسونج','samsung'],['ايفون','iphone'],['ابل','apple'],['شاومي','xiaomi'],['ريدمي','redmi'],['اوبو','oppo'],['ريلمي','realme'],
  ['هواوي','huawei'],['نوكيا','nokia'],['ايتل','itel'],['تكنو','tecno'],['انفنكس','infinix'],['فيفو','vivo'],['هونر','honor'],['ريلمي','realme']
];
function arNorm(s){ return String(s||'')
  .replace(/[أإآا]/g,'ا').replace(/[ىي]/g,'ي').replace(/ة/g,'ه').replace(/[ؤئء]/g,'ء')
  .replace(/[\u064B-\u0652]/g,''); }
function synExpand(text){
  let t=' '+text+' ';
  for(const [ar,en] of SYN_PAIRS){
    if(t.includes(ar)) t+=' '+en;
    if(t.includes(en)) t+=' '+ar;
  }
  return t;
}
function smartMatch(text, query){
  const base=arNorm(toEnDigits(text||'').toLowerCase());
  const t=synExpand(base);
  const q=arNorm(toEnDigits(query||'').toLowerCase()).trim();
  if(!q) return true;
  const tokens=q.split(/\s+/).filter(Boolean);
  return tokens.every(tok=>t.includes(tok));
}
/* ===== التصنيف التلقائي ===== */
const CAT_RULES=[
  ['شواحن',['شاحن','charger','charge','adapter','محول','ادابتر']],
  ['سماعات',['سماعة','سماعه','headphone','earphone','headset','airpods','اوكس']],
  ['كابلات',['كابل','cable','وصله','usb','تايب','type']],
  ['جرابات وكفرات',['جراب','كفر','case','cover','حافظه']],
  ['حماية شاشة',['حمايه','protector','لزقه','زجاج','glass']],
  ['شاشات',['شاشه','screen','اسكرين','lcd','تاتش','touch']],
  ['بطاريات',['بطاريه','battery']],
  ['فلاشات وميموري',['فلاشه','flash','ميموري','memory','كارت ميموري']],
  ['باور بانك',['باور','power','powerbank']],
  ['ساعات',['ساعه','watch']],
  ['اكسسوارات',['ستاند','stand','حامل','holder','ضوء','light','led']],
  ['موبايلات',['موبايل','mobile','تليفون','phone','iphone','ايفون','سامسونج','samsung','شاومي','xiaomi','ريدمي','اوبو','oppo','هواوي','نوكيا','تابلت','tablet']]
];
function guessCatName(name){
  const t=arNorm(toEnDigits(name||'').toLowerCase());
  for(const [cat,keys] of CAT_RULES){ if(keys.some(k=>t.includes(arNorm(k.toLowerCase())))) return cat; }
  return null;
}
function findCatIdByName(nm){ if(!nm) return null; const n=arNorm(nm.toLowerCase()); const c=(INV.categories||[]).find(x=>arNorm(String(x.name).toLowerCase())===n); return c?c.id:null; }
async function ensureCatId(nm){
  let id=findCatIdByName(nm); if(id) return id;
  try{ const { data, error }=await db.from('categories').insert({name:nm}).select().single(); if(error) throw error;
    INV.categories.push(data); cacheSet('categories',INV.categories); return data.id; }catch(e){ return null; }
}
async function ensureProductsLoaded(){
  if(INV.products && INV.products.length) return;
  INV.products=cacheGet('products')||[];
  if(!INV.products.length){ try{ const { data }=await db.from('products').select('*'); INV.products=data||[]; cacheSet('products',INV.products); }catch(e){} }
}
async function autoCategorizeAll(){
  await ensureProductsLoaded();
  const targets=INV.products.filter(p=>!p.category_id && p.id>0);
  if(!targets.length){ toast('كل المنتجات متصنّفة','ok'); return; }
  if(!confirm(`تصنيف ${targets.length} منتج تلقائيًا حسب الاسم؟`)) return;
  let done=0;
  for(const p of targets){
    const cn=guessCatName(p.name); if(!cn) continue;
    const cid=await ensureCatId(cn); if(!cid) continue;
    try{ await db.from('products').update({category_id:cid}).eq('id',p.id); p.category_id=cid; done++; }catch(e){}
  }
  cacheSet('products',INV.products);
  toast(`اتصنّف ${done} منتج`,'ok');
}
/* ===== الخصم الجماعي ===== */
function bulkDiscountInfo(){ try{ return JSON.parse(localStorage.getItem('bulkDiscount')||'null'); }catch(e){ return null; } }
async function applyBulkDiscount(){
  const type=document.getElementById('bdType').value;
  const val=Number(toEnDigits(document.getElementById('bdVal').value||'')||0);
  if(val<=0){ toast('اكتب قيمة الخصم','err'); return; }
  if(type==='percent' && val>=100){ toast('النسبة لازم أقل من 100','err'); return; }
  if(!confirm('تطبيق الخصم على سعر بيع كل المنتجات؟')) return;
  await ensureProductsLoaded();
  let n=0;
  for(const p of INV.products){
    if(p.id<0) continue;
    const orig=(p.orig_price!=null&&p.orig_price!=='')?Number(p.orig_price):(Number(p.sale_price)||0);
    let np = type==='percent' ? orig*(1-val/100) : orig-val;
    np=Math.max(0,Math.round(np));
    try{ const { error }=await db.from('products').update({orig_price:orig, sale_price:np}).eq('id',p.id); if(error) throw error; p.orig_price=orig; p.sale_price=np; n++; }catch(e){}
  }
  cacheSet('products',INV.products);
  if(n>0){ localStorage.setItem('bulkDiscount',JSON.stringify({type,val})); toast(`اتطبّق الخصم على ${n} منتج ✓`,'ok'); }
  else { toast('متطبّقش — تأكد إنك شغّلت كود orig_price','err'); }
  renderSettings();
}
async function removeBulkDiscount(){
  if(!confirm('رجوع كل الأسعار للأصل وإلغاء الخصم؟')) return;
  await ensureProductsLoaded();
  let n=0;
  for(const p of INV.products){
    if(p.id<0 || p.orig_price==null || p.orig_price==='') continue;
    try{ const { error }=await db.from('products').update({sale_price:Number(p.orig_price), orig_price:null}).eq('id',p.id); if(error) throw error; p.sale_price=Number(p.orig_price); p.orig_price=null; n++; }catch(e){}
  }
  cacheSet('products',INV.products);
  localStorage.removeItem('bulkDiscount');
  toast(`رجعت أسعار ${n} منتج`,'ok'); renderSettings();
}

/* ==================== الدخول / التسجيل / الخروج ==================== */
async function doLogin(){
  clearAuthMsg();
  const email=document.getElementById('loginEmail').value.trim();
  const pass=document.getElementById('loginPass').value;
  if(!email||!pass){ authMsg('اكتب البريد وكلمة المرور'); return; }
  const btn=document.getElementById('loginBtn'); btn.disabled=true; btn.textContent='جارٍ الدخول...';
  const { error } = await db.auth.signInWithPassword({ email, password:pass });
  btn.disabled=false; btn.textContent='دخول';
  if(error){ authMsg(translateAuthError(error.message)); return; }
  await startApp();
}

async function doSignup(){
  clearAuthMsg();
  const name=document.getElementById('suName').value.trim();
  const email=document.getElementById('suEmail').value.trim();
  const pass=document.getElementById('suPass').value;
  if(!name||!email||!pass){ authMsg('اكمل كل الخانات'); return; }
  if(pass.length<6){ authMsg('كلمة المرور لازم ٦ حروف على الأقل'); return; }
  const btn=document.getElementById('suBtn'); btn.disabled=true; btn.textContent='جارٍ الإنشاء...';
  const { data, error } = await db.auth.signUp({
    email, password:pass, options:{ data:{ full_name:name } }
  });
  btn.disabled=false; btn.textContent='إنشاء الحساب';
  if(error){ authMsg(translateAuthError(error.message)); return; }
  if(data.session){ await startApp(); }           // دخول مباشر (لو تأكيد الإيميل مقفول)
  else { showLogin(); authMsg('تم إنشاء الحساب سجّل دخولك دلوقتي','ok'); }
}

async function doForgot(){
  clearAuthMsg();
  const email=document.getElementById('loginEmail').value.trim();
  if(!email){ authMsg('اكتب بريدك في خانة البريد الأول'); return; }
  const { error } = await db.auth.resetPasswordForEmail(email,{ redirectTo:location.href });
  if(error){ authMsg(translateAuthError(error.message)); return; }
  authMsg('بعتنا رابط استعادة كلمة المرور على بريدك','ok');
}

async function doLogout(){
  if(!(await askConfirm('متأكد إنك عايز تسجّل خروج؟','نعم، خروج'))) return;
  try{ if(typeof AUTO_TIMER!=='undefined' && AUTO_TIMER) clearInterval(AUTO_TIMER); }catch(e){}
  try{ closeSheet(); }catch(e){}
  try{ closeModal(); }catch(e){}
  try{ db.auth.signOut({ scope:'local' }); }catch(e){}   // من غير انتظار السيرفر
  try{ Object.keys(localStorage).forEach(k=>{ if(k.indexOf('sb-')===0 || k.indexOf('supabase')>=0) localStorage.removeItem(k); }); }catch(e){}
  // ارجع لشاشة الدخول فورًا من غير إعادة تحميل التطبيق كله
  try{ document.getElementById('app').classList.add('hidden'); }catch(e){}
  try{ document.getElementById('auth').classList.remove('hidden'); showLogin(); }catch(e){}
  try{ const p=document.getElementById('loginPass'); if(p) p.value=''; }catch(e){}
  window.scrollTo(0,0);
}

function translateAuthError(m){
  m=(m||'').toLowerCase();
  if(m.includes('invalid login')) return 'البريد أو كلمة المرور غير صحيحة';
  if(m.includes('email not confirmed')) return 'لازم تأكيد البريد — أو اقفل تأكيد الإيميل من إعدادات Supabase';
  if(m.includes('already registered')) return 'البريد ده مسجّل قبل كده';
  if(m.includes('rate limit')) return 'محاولات كتير — استنى شوية وحاول تاني';
  return 'حصل خطأ: '+m;
}

/* ==================== بدء التطبيق بعد الدخول ==================== */
async function startApp(){
  const { data:{ user } } = await db.auth.getUser();
  if(!user) return;
  CURRENT.user = user;

  // جلب الملف الشخصي (الاسم + الصلاحية)
  let { data:profile } = await db.from('profiles').select('*').eq('id',user.id).single();
  if(!profile){ // احتياطي لو الـ trigger متأخر
    await db.from('profiles').insert({ id:user.id, full_name:user.email });
    profile = { id:user.id, full_name:user.email, role:'sales' };
  }
  CURRENT.profile = profile;

  // عرض بيانات المستخدم
  const nm = profile.full_name || user.email;
  const role = ROLE_AR[profile.role] || profile.role;
  document.getElementById('uName').textContent = nm;
  document.getElementById('uRole').textContent = role;
  document.getElementById('uAvatar').textContent = (nm[0]||'؟').toUpperCase();
  document.getElementById('dName').textContent = nm;
  document.getElementById('dRole').textContent = role;

  buildNav(profile.role);
  document.getElementById('auth').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  navigate('dashboard');
  startAutoRefresh();
  setupDebtRealtime();
  setupInvRealtime();
  setupPurchasesRealtime();
  setupSupCatRealtime();
  loadAppSettingsFromServer();
  setupAppSettingsRealtime();
}

/* تحديث تلقائي في الخلفية كل ١٢ ثانية (من غير ما يقاطعك) */
let AUTO_TIMER=null;
function startAutoRefresh(){ if(AUTO_TIMER) clearInterval(AUTO_TIMER); AUTO_TIMER=setInterval(()=>{ flushOutbox(); quietRefresh(); },25000); }

/* ===== Realtime: تزامن فوري لبيانات الزباين والموردين ===== */
/* ===== Realtime: تزامن فوري للمخزون وفواتير الموردين (لايف بين الأجهزة) ===== */
let _invRtDeb=null;
function setupInvRealtime(){
  try{
    db.channel('products_rt')
      .on('postgres_changes',{event:'*',schema:'public',table:'products'},()=>{
        clearTimeout(_invRtDeb); _invRtDeb=setTimeout(()=>{ quietReloadInventory(); }, 400);
      })
      .subscribe();
  }catch(e){ console.warn('Realtime products failed:',e); }
}
let _pinvRtDeb=null;
function setupPurchasesRealtime(){
  try{
    db.channel('purchases_rt')
      .on('postgres_changes',{event:'*',schema:'public',table:'purchases'},()=>{
        clearTimeout(_pinvRtDeb); _pinvRtDeb=setTimeout(refreshPurchasesQuiet, 500);
      })
      .on('postgres_changes',{event:'*',schema:'public',table:'purchase_items'},(payload)=>{
        clearTimeout(_pinvRtDeb); _pinvRtDeb=setTimeout(refreshPurchasesQuiet, 500);
        const row=payload.new||payload.old; const pid=row&&row.purchase_id;
        if(pid && PINV_OPEN.id===pid){
          db.from('purchase_items').select('*').eq('purchase_id',pid).then(({data})=>{
            if(data){ PINV_OPEN.items=data; cacheSet(pinvItemsKey(pid),data); renderPinvItemsList(); }
          });
        }
      })
      .subscribe();
  }catch(e){ console.warn('Realtime purchases failed:',e); }
}
async function refreshPurchasesQuiet(){
  if(CURRENT_PAGE!=='purchases') return;
  try{
    const { data, error } = await db.from('purchases').select('*').order('created_at',{ascending:false}).limit(200);
    if(!error && data){ PINV.list=data; cacheSet('purchases',PINV.list); renderPinvList(); }

function setupDebtRealtime(){
  try{
    db.channel('debt_people_rt')
      .on('postgres_changes',{event:'UPDATE',schema:'public',table:'debt_people'},({new:row})=>{
        // حدّث الكاش للكاتيجوريين
        ['cashout','reps'].forEach(cat=>{
          const ppl=cacheGet('debt_people_'+cat)||[];
          const i=ppl.findIndex(p=>p.id==row.id);
          if(i>=0){ ppl[i]=Object.assign({},ppl[i],row); cacheSet('debt_people_'+cat,ppl); }
        });
        // لو إحنا على صفحة الديون دلوقتي — حدّث العرض
        if(DEBT.people){
          const i=DEBT.people.findIndex(p=>p.id==row.id);
          if(i>=0){
            DEBT.people[i]=Object.assign({},DEBT.people[i],row);
            renderDebtList();
            // لو صفحة الشخص مفتوحة — حدّثها
            if(DEBT.person==row.id) openDebtPerson(row.id);
          }
        }
      })
      .on('postgres_changes',{event:'INSERT',schema:'public',table:'debt_people'},({new:row})=>{
        const cat=row.category||'cashout';
        const ppl=cacheGet('debt_people_'+cat)||[];
        if(!ppl.find(p=>p.id==row.id)){ ppl.push(row); cacheSet('debt_people_'+cat,ppl); }
        if(DEBT.cat===cat && !DEBT.people.find(p=>p.id==row.id)){
          DEBT.people.push(row); renderDebtList();
        }
      })
      .on('postgres_changes',{event:'DELETE',schema:'public',table:'debt_people'},({old:row})=>{
        ['cashout','reps'].forEach(cat=>{
          const ppl=cacheGet('debt_people_'+cat)||[];
          const f=ppl.filter(p=>p.id!=row.id);
          if(f.length!==ppl.length) cacheSet('debt_people_'+cat,f);
        });
        if(DEBT.people){
          DEBT.people=DEBT.people.filter(p=>p.id!=row.id);
          renderDebtList();
        }
      })
      .subscribe();
  }catch(e){ console.warn('Realtime setup failed:',e); }
}

function _sigOf(arr){ let s=''; for(const p of arr){ s+=p.id+':'+(p.updated_at||'')+':'+p.quantity+'|'; } return s; }
async function quietReloadInventory(){
  try{
    const { data:prods, error } = await db.from('products').select('*').order('name');
    if(error || !prods) return;                                  // خطأ/نت مقطوع -> ماتلمسش القايمة
    if(prods.length===0 && (INV.products.length>0 || outboxGet().length>0)) return;  // نتيجة فاضية مشبوهة -> تجاهل
    const merged=mergePending(prods);          // حافظ على اللي لسه بيترفع
    const sig=_sigOf(merged);
    INV.products=merged; cacheSet('products',merged);
    if(sig===_invSig) return;        // مفيش تغيير -> ماتعملش re-render (يمنع التقطيع كل شوية)
    _invSig=sig;
    if(INV.selectMode) return;        // متغيّرش وانت بتحدد
    const y=window.scrollY; renderProducts(); window.scrollTo(0,y);
  }catch(e){}

let _debtIdMap = {};               // temp id -> real id بعد الرفع

function debtTmpId(){ return -(Date.now()%1000000000*100 + (_debtTmpSeq++%100)); }
function debtCacheSave(){ cacheSet('debt_people_'+DEBT.cat,DEBT.people); cacheSet('debt_events_'+DEBT.cat,DEBT.events); }

function debtReconcile(kind, tmpId, data){
  if(kind==='person'){
    _debtIdMap[tmpId]=data.id;
    const i=DEBT.people.findIndex(x=>x.id===tmpId);
    if(i>=0) DEBT.people[i]=Object.assign({}, DEBT.people[i], data);
    if(DEBT.events[tmpId]){ DEBT.events[data.id]=DEBT.events[tmpId]; delete DEBT.events[tmpId]; (DEBT.events[data.id]||[]).forEach(ev=>ev.person_id=data.id); }
  } else {
    for(const k in DEBT.events){ const a=DEBT.events[k]; const j=a.findIndex(x=>x.id===tmpId); if(j>=0){ a[j]=data; break; } }
    _debtIdMap[tmpId]=data.id;   // عشان الأزرار اللي لسه شايلة الـID القديم
  }
  debtCacheSave();
  if(CURRENT_PAGE==='cashout'||CURRENT_PAGE==='reps'){
    renderDebtBody();
    // لو صفحة الزبون مفتوحة، أعِد رسمها عشان أزرار الحذف/التعديل تاخد الـID الجديد
    const _sb=document.getElementById('sheetBg');
    if(_sb && _sb.classList.contains('show') && DEBT.person!=null) openDebtPerson(DEBT.person);
  }
}

async function renderCashout(){ await loadDebt('cashout'); }
async function renderReps(){ await loadDebt('reps'); }
async function loadDebt(cat){
  DEBT.cat=cat; DEBT.sel=new Set(); DEBT.selMode=false; DEBT.search='';
  DEBT.sort = localStorage.getItem('debtSort_'+cat) || 'manual';
  const c=document.getElementById('content');
  const title = cat==='reps' ? nm('reps') : nm('cashout');
  const icon  = cat==='reps' ? 'users' : 'handcash';
  c.innerHTML=`<div class="page-head"><h2>${ic(icon,22)} ${title}</h2></div><div id="debtBody"></div>`;
  syncTopbar();
  // كاش أول (فوري) زي المخزون
  DEBT.people = cacheGet('debt_people_'+cat) || [];
  DEBT.events = cacheGet('debt_events_'+cat) || {};
  renderDebtBody();
  // تحديث في الخلفية
  try{
    const { data:allPeople } = await db.from('debt_people').select('*');
    const people=(allPeople||[]).filter(p=>(p.category||'cashout')===cat);
    const ids=people.map(p=>p.id);
    let events=[];
    if(ids.length){ const r=await db.from('debt_events').select('*').in('person_id',ids); events=r.data||[]; }
    DEBT.people=people; DEBT.events={};
    (events||[]).forEach(e=>{ (DEBT.events[e.person_id]=DEBT.events[e.person_id]||[]).push(e); });
    debtCacheSave();
    mergeDebtPending();
    renderDebtBody();
  }catch(e){ mergeDebtPending(); renderDebtBody(); }
}
function mergeDebtPending(){
  // ضمّ العمليات المعلّقة عشان متختفيش لو النت قطع
  outboxGet().filter(o=>o.type==='debt').forEach(o=>{
    if(o.action==='addPerson' && (o.payload.category||'cashout')===DEBT.cat && !DEBT.people.some(p=>p.id===o.tmpId)){ DEBT.people.unshift(Object.assign({id:o.tmpId},o.payload)); DEBT.events[o.tmpId]=DEBT.events[o.tmpId]||[]; }
    if(o.action==='addEvent'){ const pid=o.payload.person_id; if(DEBT.people.some(p=>p.id===pid) && !(DEBT.events[pid]||[]).some(x=>x.id===o.tmpId)){ (DEBT.events[pid]=DEBT.events[pid]||[]).push(Object.assign({id:o.tmpId},o.payload)); } }
  });
}
function debtSortedPeople(){
  let arr=DEBT.people.slice();
  const s = DEBT.sort;
  const lastEv=p=>{ const a=DEBT.events[p.id]||[]; return a.reduce((m,e)=>Math.max(m,new Date(e.created_at).getTime()||0),0); };
  if(s==='name') arr.sort((a,b)=>String(a.name).localeCompare(String(b.name),'ar'));
  else if(s==='high') arr.sort((a,b)=>debtBalance(b.id)-debtBalance(a.id));
  else if(s==='low') arr.sort((a,b)=>debtBalance(a.id)-debtBalance(b.id));
  else if(s==='edited') arr.sort((a,b)=>lastEv(b)-lastEv(a));
  else if(s==='color') arr.sort((a,b)=>String(a.color||'~').localeCompare(String(b.color||'~')));
  else arr.sort((a,b)=>(a.sort_order||0)-(b.sort_order||0) || (new Date(b.created_at)-new Date(a.created_at)));
  return arr;
}

async function debtMove(pid,dir){
  const arr=debtSortedPeople(); const i=arr.findIndex(p=>p.id===pid); const j=i+dir;
  if(j<0||j>=arr.length) return;
  // طبّق ترتيب رقمي على الكل
  arr.forEach((p,k)=>p.sort_order=k);
  const a=arr[i], b=arr[j]; const t=a.sort_order; a.sort_order=b.sort_order; b.sort_order=t;
  debtCacheSave(); renderDebtBody();
  try{ await db.from('debt_people').update({sort_order:a.sort_order}).eq('id',a.id); await db.from('debt_people').update({sort_order:b.sort_order}).eq('id',b.id); }
  catch(e){ debtQueue('updatePerson',{id:a.id,payload:{sort_order:a.sort_order}}); debtQueue('updatePerson',{id:b.id,payload:{sort_order:b.sort_order}}); }
}

/* ---------- صفحة الشخص ---------- */
function debtPeriodBounds(){
  const u=DEBT.fUnit, a=DEBT.fAnchor||new Date();
  if(u==='all') return {s:0,e:Infinity};
  if(u==='month'){ const s=new Date(a.getFullYear(),a.getMonth(),1).getTime(); const e=new Date(a.getFullYear(),a.getMonth()+1,1).getTime(); return {s,e}; }
  if(u==='year'){ const s=new Date(a.getFullYear(),0,1).getTime(); const e=new Date(a.getFullYear()+1,0,1).getTime(); return {s,e}; }
  if(u==='custom'){ const s=DEBT.fFrom?new Date(DEBT.fFrom).getTime():0; const e=DEBT.fTo?new Date(DEBT.fTo).getTime()+86400000:Infinity; return {s,e}; }
  return {s:0,e:Infinity};
}
function debtPeriodLabel(){
  const u=DEBT.fUnit, a=DEBT.fAnchor||new Date();
  if(u==='month') return a.toLocaleDateString('ar-EG',{month:'long',year:'numeric'});
  if(u==='year') return String(a.getFullYear());
  if(u==='custom') return 'مدة محددة';
  return 'كل الفترة';
}
function debtSetFUnit(v){ DEBT.fUnit=v; DEBT.fAnchor=new Date(); openDebtPerson(DEBT.person); }
function debtFStep(dir){ const a=new Date(DEBT.fAnchor); if(DEBT.fUnit==='month') a.setMonth(a.getMonth()+dir); else if(DEBT.fUnit==='year') a.setFullYear(a.getFullYear()+dir); DEBT.fAnchor=a; openDebtPerson(DEBT.person); }
function debtRunningRows(pid){
  // ترتيب زمني تصاعدي لحساب الرصيد الجاري، مع تخزين الرصيد بعد كل حركة
  const evs=(DEBT.events[pid]||[]).slice().sort((a,b)=>new Date(a.created_at)-new Date(b.created_at));
  let run=0; evs.forEach(e=>{ run += (e.type==='loan'?1:-1)*(Number(e.amount)||0); e._run=run; });
  return evs;
}

function _newClientId(){ try{ return crypto.randomUUID(); }catch(e){ return 'c_'+Date.now()+'_'+Math.random().toString(36).slice(2); } }
async function saveDebtEvent(pid,type,amountOverride,noteOverride){
  const amount = amountOverride!=null?amountOverride:Number(toEnDigits((document.getElementById('deAmt')||{}).value||'')||0);
  const note = noteOverride!=null?noteOverride:((document.getElementById('deNote')||{}).value||'').trim();
  if(amount<=0){ toast('اكتب المبلغ','err'); return; }
  let createdAt=new Date().toISOString();
  const dEl=document.getElementById('deDate');
  if(dEl&&dEl.value){ const now=new Date(); const d=new Date(dEl.value+'T00:00:00'); d.setHours(now.getHours(),now.getMinutes(),now.getSeconds()); if(!isNaN(d)) createdAt=d.toISOString(); }
  const clientId=_newClientId();
  const payload={ person_id:pid, type, amount, note:note||null, user_id:CURRENT.user.id,
    created_by_name:(CURRENT.profile&&CURRENT.profile.full_name)||'', created_at:createdAt, client_id:clientId };
  const tmp=debtTmpId();
  (DEBT.events[pid]=DEBT.events[pid]||[]).push(Object.assign({id:tmp},payload));
  debtCacheSave(); closeModal(); openDebtPerson(pid); renderDebtBody();
  try{
    // upsert بدل insert عشان لو الطلب اتبعت فعلاً بس الرد اتأخر (تايم آوت)، إعادة المحاولة
    // (سواء دلوقتي أو من الطابور offline) ما تعملش سطر مكرر — بترجع نفس السطر بتاع نفس الـ client_id
    const { data, error }=await db.from('debt_events').upsert(payload,{onConflict:'client_id'}).select().single();
    if(error) throw error; debtReconcile('event',tmp,data);
  }
  catch(e){ if(isNetErr(e)){ debtQueue('addEvent',{tmpId:tmp,payload}); toast('اتسجّل — هيترفع لما النت يرجع','ok'); } else { toast('تعذّر الحفظ','err'); } }
}

/* ==================== تقفيل فودافون كاش ==================== */
let VF = { unit:'daily', anchor:new Date(), from:'', to:'', base:0, all:[], ops:[], today:[], drawer:'', wallet:'', opType:'' };
/* لو إحنا في وضع "متابعة النهاردة" (يعني المستخدم ماغيّرش اليوم يدويًا) وفات نص الليل والتطبيق لسه فاتح،
   لازم نجيب النهاردة الحقيقي كل مرة بدل ما نفضل شايلين نسخة قديمة من التاريخ (وده كان بيسبب إن أي عملية
   بعد نص الليل تتسجّل بتاريخ إمبارح وتنزل آخر السجل) */
/* اليوم المعروض فوق في الصفحة يفضل زي ما اخترته بالظبط - من غير أي تبديل تلقائي،
   حتى لو الساعة عدّت نص الليل. التبديل لليوم الجديد بيحصل بس لما تقلب عليه إنت بنفسك. */
function vfEffectiveAnchor(){
  return VF.anchor||new Date();
}
function vfDrawerKey(){ const a=vfEffectiveAnchor(); return 'vfdraw:'+a.getFullYear()+'-'+(a.getMonth()+1)+'-'+a.getDate(); }
function vfLoadDrawer(){ try{ return localStorage.getItem(vfDrawerKey())||''; }catch(e){ return ''; } }
function vfSaveDrawer(v){ try{ localStorage.setItem(vfDrawerKey(), v||''); }catch(e){} }
function vfWalletKey(){ const a=vfEffectiveAnchor(); return 'vfwallet:'+a.getFullYear()+'-'+(a.getMonth()+1)+'-'+a.getDate(); }
function vfLoadWallet(){ try{ return localStorage.getItem(vfWalletKey())||''; }catch(e){ return ''; } }
function vfSaveWallet(v){ try{ localStorage.setItem(vfWalletKey(), v||''); }catch(e){} }
function vfRange(){
  const a=vfEffectiveAnchor(); const y=a.getFullYear(), m=a.getMonth(), d=a.getDate();
  let start, end;
  if(VF.unit==='daily'){ start=new Date(y,m,d); end=new Date(y,m,d+1); }
  else if(VF.unit==='monthly'){ start=new Date(y,m,1); end=new Date(y,m+1,1); }
  else if(VF.unit==='yearly'){ start=new Date(y,0,1); end=new Date(y+1,0,1); }
  else if(VF.unit==='custom'){ start=VF.from?new Date(VF.from+'T00:00:00'):new Date(y,m,d); end=VF.to?new Date(VF.to+'T23:59:59'):new Date(y,m,d+1); }
  else { start=new Date(y,m,d); end=new Date(y,m,d+1); }
  return { startISO:start.toISOString(), endISO:end.toISOString() };
}
function vfDayBounds(){ const a=vfEffectiveAnchor(); const s=new Date(a.getFullYear(),a.getMonth(),a.getDate()); const e=new Date(a.getFullYear(),a.getMonth(),a.getDate()+1); return { s:s.getTime(), e:e.getTime() }; }
function vfDayOps(){ const {s,e}=vfDayBounds(); return (VF.all||[]).filter(o=>{ const t=new Date(o.created_at).getTime(); return t>=s&&t<e; }); }
function vfDateLabel(){
  const a=vfEffectiveAnchor();
  if(VF.unit==='daily') return a.toLocaleDateString('ar-EG',{weekday:'long',day:'numeric',month:'long'});
  if(VF.unit==='monthly') return a.toLocaleDateString('ar-EG',{month:'long',year:'numeric'});
  if(VF.unit==='yearly') return a.toLocaleDateString('ar-EG',{year:'numeric'});
  return 'مدة محددة';
}
function vfStep(dir){
  const a=new Date(VF.anchor||new Date());
  if(VF.unit==='daily') a.setDate(a.getDate()+dir);
  else if(VF.unit==='monthly') a.setMonth(a.getMonth()+dir);
  else if(VF.unit==='yearly') a.setFullYear(a.getFullYear()+dir);
  VF.anchor=a;
  vfApplyFilter();
}
function vfSetUnit(v){ VF.unit=v; VF.anchor=new Date(); vfApplyFilter(); }
function vfIsToday(){ const a=vfEffectiveAnchor(); const n=new Date(); return a.getFullYear()===n.getFullYear()&&a.getMonth()===n.getMonth()&&a.getDate()===n.getDate(); }

async function vfLoadAll(){

function isCardAtm(t){ return t==='atm_khaled'||t==='atm_ezz'||t==='atm_vfcash'; }
function vfCardKey(t){ return isCardAtm(t)? t.slice(4) : ''; }
function isWithdraw(t){ return t==='withdraw'||t==='withdraw_wallet'||t==='withdraw_insta'; }
function isDeposit(t){ return t==='deposit'||t==='deposit_wallet'||t==='deposit_insta'; }

function vfSum(list){
  let comm=0, wd=0, dep=0, atmLegacy=0, atmFee=0, atmAmt=0;
  list.forEach(o=>{ const a=Number(o.amount)||0, cm=Number(o.commission)||0;
    if(isWithdraw(o.type)){ wd+=a; comm+=cm; }
    else if(isDeposit(o.type)){ dep+=a; comm+=cm; }
    else if(o.type==='atm'){ atmLegacy+=a; }               // نظام قديم: المبلغ كله بيتخصم من العمولة
    else if(isCardAtm(o.type)){ atmAmt+=a; atmFee+=cm; }    // نظام جديد: العمولة بس بتتخصم، والمبلغ بيتسجّل في حدود الكارت
  });
  const atm = atmLegacy + atmFee;   // إجمالي اللي بيتخصم من عمولات اليوم
  return { comm, wd, dep, atm, atmAmt, atmFee, net: comm-atm };
}

function vfRepBuckets(range){
  const {start,end,gran}=range;
  const ops=(VF.all||[]).filter(o=>{ const t=new Date(o.created_at).getTime(); return t>=start.getTime() && t<end.getTime(); });
  let n; if(gran==='hour') n=24; else if(gran==='month') n=12; else n=Math.max(1,Math.round((end-start)/86400000));
  const buckets=[];
  for(let i=0;i<n;i++){
    let lbl, d=null;
    if(gran==='hour'){ lbl=i; }
    else if(gran==='month'){ lbl=i+1; d=new Date(start.getFullYear(),i,1); }
    else { d=new Date(start); d.setDate(start.getDate()+i); lbl=d.getDate(); }
    buckets.push({ i, lbl, date:d, wd:0, dep:0, comm:0, _rawComm:0, _atmCost:0, count:0 });
  }
  ops.forEach(o=>{
    const t=new Date(o.created_at);
    let idx;
    if(gran==='hour') idx=t.getHours();
    else if(gran==='month') idx=t.getMonth();
    else idx=Math.floor((t-start)/86400000);
    const b=buckets[idx]; if(!b) return;
    const amt=Number(o.amount)||0, cm=Number(o.commission)||0;
    // نفس طريقة الحساب المتفق عليها في صفحة فودافون: عمولة السحب/الإيداع تتجمع عادي،
    // وعمليات الـ ATM (قديمة أو كارت) بتاخد من العمولة مش بتتضاف عليها
    if(isWithdraw(o.type)){ b.wd+=amt; b._rawComm+=cm; b.count++; }
    else if(isDeposit(o.type)){ b.dep+=amt; b._rawComm+=cm; b.count++; }
    else if(o.type==='atm'){ b._atmCost+=amt; b.count++; }        // نظام قديم: المبلغ كله بيتخصم
    else if(isCardAtm(o.type)){ b._atmCost+=cm; b.count++; }      // نظام جديد: العمولة بس بتتخصم
  });
  buckets.forEach(b=>{ b.comm = b._rawComm - b._atmCost; });
  return buckets;
}
function vfRepSizeBuckets(range){
  const {start,end}=range;
  const ops=(VF.all||[]).filter(o=>{ const t=new Date(o.created_at).getTime(); return t>=start.getTime() && t<end.getTime() && (isWithdraw(o.type)||isDeposit(o.type)); });
  const tiers=[
    { key:'small',  lbl:'صغيرة (أقل من 500)',      test:a=>a<500,              c:'#2563EB' },
    { key:'medium', lbl:'متوسطة (500 - 1500)',      test:a=>a>=500 && a<=1500,  c:'#E39A0C' },
    { key:'large',  lbl:'كبيرة (أكبر من 1500)',     test:a=>a>1500,             c:cssVar('--pos') },
  ];
  tiers.forEach(t=>{ t.count=0; t.amount=0; t.comm=0; });
  ops.forEach(o=>{
    const amt=Number(o.amount)||0, cm=Number(o.commission)||0;
    const t=tiers.find(x=>x.test(amt)); if(!t) return;
    t.count++; t.amount+=amt; t.comm+=cm;
  });
  return tiers;
}
function vfRepStats(buckets){
  const totalWd=buckets.reduce((s,b)=>s+b.wd,0), totalDep=buckets.reduce((s,b)=>s+b.dep,0), totalComm=buckets.reduce((s,b)=>s+b.comm,0);
  const totalCount=buckets.reduce((s,b)=>s+b.count,0);
  const activeDays=buckets.filter(b=>b.count>0).length||1;
  const maxWd=buckets.reduce((m,b)=>b.wd>m.wd?b:m, buckets[0]);
  const maxDep=buckets.reduce((m,b)=>b.dep>m.dep?b:m, buckets[0]);
  const maxComm=buckets.reduce((m,b)=>b.comm>m.comm?b:m, buckets[0]);
  const mostActive=buckets.reduce((m,b)=>b.count>m.count?b:m, buckets[0]);
  const activeOnly=buckets.filter(b=>b.count>0);
  const leastActive=activeOnly.reduce((m,b)=>(b.count<m.count?b:m), activeOnly[0]||buckets[0]);
  return { totalWd, totalDep, totalComm, totalCount, activeDays,
    avgWd:totalWd/activeDays, avgDep:totalDep/activeDays, avgComm:totalComm/activeDays,
    maxWd, maxDep, maxComm, mostActive, leastActive,
    ratio: totalDep>0 ? (totalWd/totalDep*100) : 0,
    avgCommPct: (totalWd+totalDep)>0 ? (totalComm/(totalWd+totalDep)*100) : 0 };
}

/* المساعد الذكي: بيحلل كل عمليات فودافون اللي دخلتها (كل الشهور المتاحة) عشان يطلع نمط تكرار
   حسب "رقم اليوم في الشهر" — مثلاً لو أول كل شهر بيبقى فيه سحب عالي (مرتبات)، يقولّك جهّز كاش أكتر بداية الشهر */
function vfSmartAnalyze(){
  const byDay={};   // 1..31 -> { wdSum, depSum, months:Set }
  (VF.all||[]).forEach(o=>{
    const t=new Date(o.created_at);
    const dom=t.getDate();
    const monthKey=t.getFullYear()+'-'+t.getMonth();
    if(!byDay[dom]) byDay[dom]={ wdSum:0, depSum:0, months:new Set() };
    const amt=Number(o.amount)||0;
    if(isWithdraw(o.type)) byDay[dom].wdSum+=amt;
    else if(isDeposit(o.type)) byDay[dom].depSum+=amt;
    byDay[dom].months.add(monthKey);
  });
  const rows=Object.keys(byDay).map(d=>{
    const b=byDay[d]; const n=b.months.size||1;
    return { day:Number(d), avgWd:b.wdSum/n, avgDep:b.depSum/n, months:n };
  }).filter(r=>r.months>=1);
  if(rows.length<4) return null;   // بيانات قليلة قوي، متكفيش لتحليل موثوق
  const topWd=rows.slice().sort((a,b)=>b.avgWd-a.avgWd).slice(0,3).filter(r=>r.avgWd>0);
  const topDep=rows.slice().sort((a,b)=>b.avgDep-a.avgDep).slice(0,3).filter(r=>r.avgDep>0);
  // مقارنة أول 10 أيام في الشهر بباقي الشهر
  const first10=rows.filter(r=>r.day<=10), rest=rows.filter(r=>r.day>10);
  const avgFirst10Wd=first10.length?first10.reduce((s,r)=>s+r.avgWd,0)/first10.length:0;
  const avgRestWd=rest.length?rest.reduce((s,r)=>s+r.avgWd,0)/rest.length:0;
  const monthsSeen=new Set(); (VF.all||[]).forEach(o=>{ const t=new Date(o.created_at); monthsSeen.add(t.getFullYear()+'-'+t.getMonth()); });
  return { topWd, topDep, avgFirst10Wd, avgRestWd, monthsCount:monthsSeen.size };
}
function vfSmartTips(sa){
  const tips=[];

  if(sa.topWd.length){
    const days=sa.topWd.map(r=>'يوم '+r.day).join('، ');
    tips.push(`📅 غالبًا السحب بيزيد في ${days} من الشهر — جهّز كاش (نقدية) أكتر في الأيام دي عشان متتعطلش عن عميل.`);
  }
  if(sa.topDep.length){
    const days=sa.topDep.map(r=>'يوم '+r.day).join('، ');
    tips.push(`💰 غالبًا الإيداع بيزيد في ${days} من الشهر — خلّي رصيد المحفظة (الفلوس الإلكترونية) عندك مرتفع قبلها بيوم.`);
  }
  if(sa.avgFirst10Wd>0 && sa.avgRestWd>0){
    const diff=((sa.avgFirst10Wd-sa.avgRestWd)/sa.avgRestWd*100);
    if(diff>15) tips.push(`🔺 أول 10 أيام من الشهر (زي أيام المرتبات) بيبقى فيها السحب أعلى بنسبة ${diff.toFixed(0)}% عن باقي الشهر — احتفظ بكاش احتياطي في بداية كل شهر.`);
    else if(diff<-15) tips.push(`🔻 السحب في أول 10 أيام من الشهر بيبقى أقل من باقي الشهر بـ ${Math.abs(diff).toFixed(0)}% — النشاط الأكبر بيتركّز في باقي الشهر.`);
  }
  tips.push('💡 لأعلى عمولة: حاول توازن بين عدد العمليات الصغيرة (نسبة عمولة أعلى) والعمليات الكبيرة فوق 3000 جنيه (مبلغ عمولة أكبر لكل عملية).');
  if(sa.monthsCount<3) tips.push(`ℹ️ التحليل ده مبني على ${sa.monthsCount} شهر بس لحد دلوقتي — كل ما تسجّل أكتر، التوقعات هتبقى أدق.`);
  return tips;
}

/* ============ التقويم الذكي (توقّع حالة السوق يوم بيوم) ============
   بيقارن نوعين من الأنماط في بيانات فودافون كاش المسجّلة فعليًا (VF.all):
   أ) نمط قصير: نفس يوم الأسبوع في آخر أسابيع (يكتشف قفزة/سحب مفاجئ متكرر)
   ب) نمط طويل: نفس رقم اليوم في الشهر عبر كل الشهور المسجّلة (مواعيد ثابتة زي المرتبات/الفواتير)
   ويطلع لون لكل يوم: أحمر=سحب متوقع كبير، أزرق=إيداع متوقع كبير، رمادي=هدوء */
function vfDateStr(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function vfCalBuildData(){
  const daily={};
  (VF.all||[]).forEach(o=>{
    const t=new Date(o.created_at); const ds=vfDateStr(t);
    if(!daily[ds]) daily[ds]={wd:0,dep:0};
    const amt=Number(o.amount)||0;
    if(isWithdraw(o.type)) daily[ds].wd+=amt; else if(isDeposit(o.type)) daily[ds].dep+=amt;
  });
  const keys=Object.keys(daily), n=keys.length||1;
  const avgWdAll=keys.reduce((s,k)=>s+daily[k].wd,0)/n;
  const avgDepAll=keys.reduce((s,k)=>s+daily[k].dep,0)/n;
  const byDow={0:[],1:[],2:[],3:[],4:[],5:[],6:[]}, byDom={};
  keys.forEach(ds=>{
    const d=new Date(ds+'T00:00:00'); const rec={date:d, wd:daily[ds].wd, dep:daily[ds].dep};
    byDow[d.getDay()].push(rec); (byDom[d.getDate()]=byDom[d.getDate()]||[]).push(rec);
  });
  Object.values(byDow).forEach(arr=>arr.sort((a,b)=>a.date-b.date));
  return { daily, avgWdAll, avgDepAll, byDow, byDom, opsCount:(VF.all||[]).length, daysCount:n };
}
function vfCalcTrend(hist,key){
  if(!hist.length) return {avg:0, recent:0, older:0, spikeRatio:1};
  const vals=hist.map(h=>h[key]);
  const avg=vals.reduce((a,b)=>a+b,0)/vals.length;
  const recentN=Math.min(3,vals.length);
  const recent=vals.slice(-recentN).reduce((a,b)=>a+b,0)/recentN;
  const olderVals=vals.slice(0,Math.max(0,vals.length-recentN));
  const older=olderVals.length?olderVals.reduce((a,b)=>a+b,0)/olderVals.length:avg;
  const spikeRatio= older>0.01 ? (recent/older) : (recent>0?1.6:1);
  return {avg, recent, older, spikeRatio};
}
function vfCalcDayInfo(cal,date){
  const ds=vfDateStr(date);
  const today=new Date(); today.setHours(0,0,0,0);
  const isPast = date.getTime()<today.getTime();
  const avgWd=cal.avgWdAll, avgDep=cal.avgDepAll;
  if(isPast){
    const rec=cal.daily[ds]||{wd:0,dep:0};
    let color='gray';
    if(avgWd>0 && rec.wd>avgWd*1.15 && rec.wd>=rec.dep) color='red';
    else if(avgDep>0 && rec.dep>avgDep*1.15 && rec.dep>rec.wd) color='blue';
    return { color, mode:'actual', wd:rec.wd, dep:rec.dep };
  }
  const dow=date.getDay(), dom=date.getDate();
  const wdDow=vfCalcTrend(cal.byDow[dow]||[],'wd'), depDow=vfCalcTrend(cal.byDow[dow]||[],'dep');
  const wdDom=vfCalcTrend(cal.byDom[dom]||[],'wd'), depDom=vfCalcTrend(cal.byDom[dom]||[],'dep');
  const wdScore=(wdDow.recent*0.6 + wdDom.avg*0.4) * Math.max(1,Math.min(1.6,wdDow.spikeRatio));
  const depScore=(depDow.recent*0.6 + depDom.avg*0.4) * Math.max(1,Math.min(1.6,depDow.spikeRatio));
  let color='gray';
  const wdSig = avgWd>0 && wdScore>avgWd*1.15;
  const depSig = avgDep>0 && depScore>avgDep*1.15;
  if(wdSig && wdScore>=depScore) color='red';
  else if(depSig && depScore>wdScore) color='blue';
  const seasonalWd = avgWd>0 && wdDom.avg>avgWd*1.2;
  const seasonalDep = avgDep>0 && depDom.avg>avgDep*1.2;
  const spike = wdDow.spikeRatio>=1.3 || depDow.spikeRatio>=1.3;
  return { color, mode:'predict', wdScore, depScore, seasonal: color==='red'?seasonalWd:(color==='blue'?seasonalDep:false), spike };
}
let VFCAL={ cal:null, cells:[], picked:null };
function vfSmartBuildCells(){

}

/* صافي العمولة (بنفس منطق vfRepBuckets) لأي قائمة عمليات - بيتستخدم لمقارنة الفترة الحالية بالسابقة */
function vfNetCommFromOps(ops){
  let rawComm=0, atmCost=0;
  (ops||[]).forEach(o=>{
    const amt=Number(o.amount)||0, cm=Number(o.commission)||0;
    if(isWithdraw(o.type)) rawComm+=cm;
    else if(isDeposit(o.type)) rawComm+=cm;
    else if(o.type==='atm') atmCost+=amt;
    else if(isCardAtm(o.type)) atmCost+=cm;
  });
  return rawComm-atmCost;
}
/* شارة صغيرة بسهم ونسبة نمو مقارنة بالفترة السابقة (أسبوع/شهر/سنة سابقة حسب الوحدة المختارة) */
function vfGrowthBadge(cur, prev, unit){
  const lbl = unit==='daily'?'عن اليوم السابق':unit==='weekly'?'عن الأسبوع الماضي':unit==='yearly'?'عن السنة الماضية':'عن الشهر الماضي';
  if(!prev){
    if(!cur) return `<span class="vc-grow neutral">— ${lbl}</span>`;
    return `<span class="vc-grow up">▲ جديد ${lbl}</span>`;
  }
  const pct=((cur-prev)/Math.abs(prev))*100;
  const up=pct>=0;
  return `<span class="vc-grow ${up?'up':'down'}">${up?'▲':'▼'} ${Math.abs(pct).toFixed(0)}% ${lbl}</span>`;
}
function vfRepInsights(st, buckets, prevWd, prevDep, gran){
  const out=[];
  if(prevWd>0){ const chg=((st.totalWd-prevWd)/prevWd*100); out.push(`السحب ${chg>=0?'ارتفع':'انخفض'} ${Math.abs(chg).toFixed(0)}% مقارنة بالفترة اللي فاتت.`); }
  if(prevDep>0){ const chg=((st.totalDep-prevDep)/prevDep*100); out.push(`الإيداع ${chg>=0?'ارتفع':'انخفض'} ${Math.abs(chg).toFixed(0)}% مقارنة بالفترة اللي فاتت.`); }
  if(st.maxComm && st.maxComm.comm>0) out.push(`أعلى عمولة كانت في ${vfRepDateLbl(st.maxComm,gran)} بقيمة ${money(st.maxComm.comm)}.`);
  if(st.totalDep>0) out.push(`نسبة السحب للإيداع ${st.ratio.toFixed(0)}%.`);
  const last5=buckets.slice(-5);
  if(last5.length>=4){
    const firstHalf=last5.slice(0,2).reduce((s,b)=>s+b.wd+b.dep,0)/2;
    const secondHalf=last5.slice(-2).reduce((s,b)=>s+b.wd+b.dep,0)/2;
    if(firstHalf>0 && secondHalf<firstHalf*0.7) out.push('فيه انخفاض واضح في النشاط في آخر الفترة دي.');
  }
  if(st.mostActive && st.mostActive.count>0) out.push(`أكثر وقت نشاطًا كان ${vfRepDateLbl(st.mostActive,gran)} بعدد ${st.mostActive.count} عملية.`);
  if(!out.length) out.push('مفيش بيانات كفاية في الفترة دي لعمل تحليل.');
  return out;
}

    const b=buckets[i];
    let bDate = b.date || (range.gran==='hour' ? new Date(range.start.getFullYear(),range.start.getMonth(),range.start.getDate(),b.i) : null);
    if(bDate && bDate.getTime()>now.getTime()){ keep=i; } else break;
  }
  return buckets.slice(0, Math.max(1,keep));
}
/* تكبير/تصغير بإصبعين + سحب لليمين والشمال في الرسم البياني (زي شاشات البورصة) */
let VCHART_ZOOM={ scale:1, offset:0 };
let VCHART_LAST=null, VCHART_TIP_T=null;
function vfChartResetZoom(){ VCHART_ZOOM={ scale:1, offset:0 }; vfChartHideTip(); }
function vfChartVisibleBuckets(buckets){
  const n=buckets.length;
  const scale=Math.max(1, Math.min(6, VCHART_ZOOM.scale));
  const visCount=Math.max(3, Math.min(n, Math.round(n/scale)));
  let start=Math.round(VCHART_ZOOM.offset);
  start=Math.max(0, Math.min(start, Math.max(0,n-visCount)));
  VCHART_ZOOM.offset=start;
  return buckets.slice(start, start+visCount);
}
function vfRepDrawChart(){
  const cv=document.getElementById('vrepLine'); if(!cv||!VREP._buckets) return;
  const trimmed=vfRepTrimFuture(VREP._buckets, VREP._range);
  const buckets=vfChartVisibleBuckets(trimmed);
  const { ctx, w, h } = vfSetupCanvas(cv);
  ctx.clearRect(0,0,w,h);
  const padL=34, padR=8, padT=10, padB=22;
  const plotW=w-padL-padR, plotH=h-padT-padB;
  const all=[]; buckets.forEach(b=>{ if(VREP.show.wd) all.push(b.wd); if(VREP.show.dep) all.push(b.dep); if(VREP.show.comm) all.push(b.comm); });
  const max=Math.max(...all,10);
  ctx.strokeStyle=cssVar('--line'); ctx.fillStyle=cssVar('--muted'); ctx.font='9.5px system-ui'; ctx.lineWidth=1;
  const gridLines=4;
  for(let i=0;i<=gridLines;i++){
    const y=padT+plotH-(plotH*i/gridLines);
    ctx.beginPath(); ctx.moveTo(padL,y); ctx.lineTo(w-padR,y); ctx.stroke();
    ctx.textAlign='left'; ctx.fillText(vfCompactNum(max*i/gridLines), 1, y+3);
  }
  const n=buckets.length, stepX = n>1 ? plotW/(n-1) : plotW;
  function drawSeries(key,color){
    const pts=buckets.map((b,i)=>({x:padL+i*stepX, y:padT+plotH-(b[key]/max)*plotH}));
    ctx.beginPath();
    pts.forEach((p,i)=>{
      if(i===0) ctx.moveTo(p.x,p.y);
      else{ const prev=pts[i-1]; const midX=(prev.x+p.x)/2, midY=(prev.y+p.y)/2; ctx.quadraticCurveTo(prev.x,prev.y,midX,midY); ctx.lineTo(p.x,p.y); }
    });
    ctx.strokeStyle=color; ctx.lineWidth=2.2; ctx.lineJoin='round'; ctx.lineCap='round'; ctx.stroke();
    ctx.fillStyle=color; pts.forEach(p=>{ ctx.beginPath(); ctx.arc(p.x,p.y,2.4,0,Math.PI*2); ctx.fill(); });
  }
  if(VREP.show.wd) drawSeries('wd', cssVar('--neg'));
  if(VREP.show.dep) drawSeries('dep', '#2563EB');
  if(VREP.show.comm) drawSeries('comm', cssVar('--pos'));
  ctx.textAlign='center'; ctx.fillStyle=cssVar('--muted');
  // لما نكبّر، اظهر تسميات أكتر تحت (أيام أوضح) بدل ما تتلخبط فوق بعض
  const labelEvery=Math.max(1, Math.round(n/(VCHART_ZOOM.scale>1.6?10:6)));
  buckets.forEach((b,i)=>{ if(i%labelEvery===0 || i===n-1){ ctx.fillText(String(b.lbl), padL+i*stepX, h-6); } });
  VCHART_LAST={ padL, padR, padT, padB, plotW, plotH, stepX, buckets };
  vfChartAttachEvents(cv);
}
function vfChartAttachEvents(cv){
  if(cv.dataset.chartBound) return;
  cv.dataset.chartBound='1';
  let pinchStartDist=0, pinchStartScale=1, panStartX=0, panStartOffset=0, gestured=false;
  const dist=(t1,t2)=>Math.hypot(t1.clientX-t2.clientX, t1.clientY-t2.clientY);
  cv.addEventListener('touchstart', e=>{
    gestured=false;
    if(e.touches.length===2){ pinchStartDist=dist(e.touches[0],e.touches[1]); pinchStartScale=VCHART_ZOOM.scale; vfChartHideTip(); }
    else if(e.touches.length===1){ panStartX=e.touches[0].clientX; panStartOffset=VCHART_ZOOM.offset; }
  }, {passive:true});
  cv.addEventListener('touchmove', e=>{
    if(e.touches.length===2){
      e.preventDefault();
      const d=dist(e.touches[0],e.touches[1]);
      VCHART_ZOOM.scale=Math.max(1, Math.min(6, pinchStartScale*(d/(pinchStartDist||1))));
      gestured=true; vfRepDrawChart();
    } else if(e.touches.length===1 && VCHART_ZOOM.scale>1 && VCHART_LAST){
      const dx=e.touches[0].clientX-panStartX;
      if(Math.abs(dx)>3){
        e.preventDefault();
        const perPointPx=VCHART_LAST.stepX||1;
        VCHART_ZOOM.offset=panStartOffset-(dx/perPointPx);
        gestured=true; vfRepDrawChart();
      }
    }
  }, {passive:false});
  cv.addEventListener('click', e=>{
    if(gestured){ gestured=false; return; }
    const rect=cv.getBoundingClientRect();
    vfChartShowTip(e.clientX-rect.left);
  });
}
function vfChartShowTip(clickX){
  if(!VCHART_LAST || !VCHART_LAST.buckets.length) return;
  const { padL, stepX, buckets } = VCHART_LAST;
  let idx=Math.round((clickX-padL)/(stepX||1));
  idx=Math.max(0, Math.min(buckets.length-1, idx));
  const b=buckets[idx];
  const cv=document.getElementById('vrepLine'); if(!cv) return;
  const wrap=cv.closest('.vrep-canvas-wrap'); if(!wrap) return;
  let tip=document.getElementById('vrepTip');
  if(!tip){ tip=document.createElement('div'); tip.id='vrepTip'; tip.className='vrep-tip'; wrap.appendChild(tip); }
  const lbl = VREP._range ? vfRepDateLbl(b, VREP._range.gran) : String(b.lbl);
  tip.innerHTML = `<b>${lbl}</b>
    <div class="vt-row t-wd">سحب: ${money(b.wd)}</div>
    <div class="vt-row t-dep">إيداع: ${money(b.dep)}</div>
    <div class="vt-row t-comm">عمولة: ${money(b.comm)}</div>`;
  tip.style.display='block';
  const px=padL+idx*stepX;
  const wrapW=wrap.clientWidth||260;
  tip.style.left = Math.max(4, Math.min(wrapW-134, px-64)) + 'px';
  tip.style.top='4px';
  clearTimeout(VCHART_TIP_T);
  VCHART_TIP_T=setTimeout(vfChartHideTip, 4000);
}
function vfChartHideTip(){ const tip=document.getElementById('vrepTip'); if(tip) tip.style.display='none'; }
function vfRepDrawBar(buckets, gran){
  const cv=document.getElementById('vrepBar'); if(!cv) return;
  let groups=[];
  if(gran==='day'){
    for(let i=0;i<buckets.length;i+=7){ const chunk=buckets.slice(i,i+7);
      groups.push({ lbl:'أسبوع '+(Math.floor(i/7)+1), wd:chunk.reduce((s,b)=>s+b.wd,0), dep:chunk.reduce((s,b)=>s+b.dep,0) }); }
  } else if(gran==='month'){
    groups=buckets.map(b=>({ lbl:(b.date||new Date()).toLocaleDateString('ar-EG',{month:'short'}), wd:b.wd, dep:b.dep }));
  } else {
    const qs=[[0,6,'00-06'],[6,12,'06-12'],[12,18,'12-18'],[18,24,'18-24']];
    groups=qs.map(([s,e,l])=>{ const chunk=buckets.slice(s,e); return { lbl:l, wd:chunk.reduce((s2,b)=>s2+b.wd,0), dep:chunk.reduce((s2,b)=>s2+b.dep,0) }; });
  }
  const { ctx, w, h } = vfSetupCanvas(cv); ctx.clearRect(0,0,w,h);
  const padL=8,padR=8,padT=8,padB=20, plotW=w-padL-padR, plotH=h-padT-padB;
  const max=Math.max(...groups.map(g=>Math.max(g.wd,g.dep)),10);
  const gW=plotW/(groups.length||1), barW=Math.min(22, gW/2.6);
  ctx.font='9.5px system-ui'; ctx.textAlign='center';
  groups.forEach((g,i)=>{
    const cx=padL+i*gW+gW/2;
    const wdH=(g.wd/max)*plotH, depH=(g.dep/max)*plotH;
    ctx.fillStyle=cssVar('--neg');
    if(ctx.roundRect){ ctx.beginPath(); ctx.roundRect(cx-barW-2, padT+plotH-wdH, barW, wdH, 3); ctx.fill(); }
    else ctx.fillRect(cx-barW-2, padT+plotH-wdH, barW, wdH);
    ctx.fillStyle='#2563EB';
    if(ctx.roundRect){ ctx.beginPath(); ctx.roundRect(cx+2, padT+plotH-depH, barW, depH, 3); ctx.fill(); }
    else ctx.fillRect(cx+2, padT+plotH-depH, barW, depH);
    ctx.fillStyle=cssVar('--muted'); ctx.fillText(g.lbl, cx, h-4);
  });
}
function vfRepDrawDoughnut(st){
  const cv=document.getElementById('vrepDough'); if(!cv) return;
  const { ctx, w, h } = vfSetupCanvas(cv); ctx.clearRect(0,0,w,h);
  const total=st.totalWd+st.totalDep+st.totalComm || 1;
  const cx=w/2, cy=h/2, r=Math.min(w,h)/2-6, rIn=r*0.6;
  const parts=[ {v:st.totalWd,c:cssVar('--neg')}, {v:st.totalDep,c:'#2563EB'}, {v:st.totalComm,c:cssVar('--pos')} ];
  let start=-Math.PI/2;
  parts.forEach(p=>{
    const ang=(p.v/total)*Math.PI*2;
    ctx.beginPath(); ctx.moveTo(cx,cy); ctx.arc(cx,cy,r,start,start+ang); ctx.closePath(); ctx.fillStyle=p.c; ctx.fill();
    start+=ang;
  });
  ctx.globalCompositeOperation='destination-out';
  ctx.beginPath(); ctx.arc(cx,cy,rIn,0,Math.PI*2); ctx.fill();
  ctx.globalCompositeOperation='source-over';
  ctx.fillStyle=cssVar('--ink'); ctx.textAlign='center'; ctx.font='bold 13px system-ui';
  ctx.fillText(vfCompactNum(total), cx, cy-2);
  ctx.font='9.5px system-ui'; ctx.fillStyle=cssVar('--muted'); ctx.fillText('ج.م إجمالي', cx, cy+13);
}
function vfRepDrawSizeDoughnut(tiers){
  const cv=document.getElementById('vrepSizeDough'); if(!cv) return;
  const { ctx, w, h } = vfSetupCanvas(cv); ctx.clearRect(0,0,w,h);
  const totalComm=tiers.reduce((s,t)=>s+t.comm,0);
  const cx=w/2, cy=h/2, r=Math.min(w,h)/2-6, rIn=r*0.6;
  if(totalComm<=0){
    ctx.fillStyle=cssVar('--muted'); ctx.textAlign='center'; ctx.font='12px system-ui';
    ctx.fillText('مفيش عمولة مسجّلة في الفترة دي', cx, cy);
  } else {
    let start=-Math.PI/2;
    tiers.forEach(t=>{
      if(t.comm<=0) return;
      const ang=(t.comm/totalComm)*Math.PI*2;
      ctx.beginPath(); ctx.moveTo(cx,cy); ctx.arc(cx,cy,r,start,start+ang); ctx.closePath(); ctx.fillStyle=t.c; ctx.fill();
      start+=ang;
    });
    ctx.globalCompositeOperation='destination-out';
    ctx.beginPath(); ctx.arc(cx,cy,rIn,0,Math.PI*2); ctx.fill();
    ctx.globalCompositeOperation='source-over';
    ctx.fillStyle=cssVar('--ink'); ctx.textAlign='center'; ctx.font='bold 13px system-ui';
    ctx.fillText(vfCompactNum(totalComm), cx, cy-2);
    ctx.font='9.5px system-ui'; ctx.fillStyle=cssVar('--muted'); ctx.fillText('ج.م عمولة', cx, cy+13);
  }

// عمولة حسب النوع + الطريقة (١.٥٪ بتنزل لأقرب ٥ / ١٪ بتتقرّب لأقرب ٥)
// جدول عمولة السحب من المحفظة / إيداع الانستا (١.٥٪) — مبني على أرقام مو الحقيقية
const VF_WALLET_TABLE = [[0,5],[450,10],[950,15],[1200,20],[1500,25],[2000,30],[2300,35],[2600,40]];
function vfWalletComm(amount){
  amount=Number(amount)||0; if(amount<=0) return 0;
  if(amount>=3000) return Math.round(amount*0.015/5)*5;   // من 3000 فأكتر: 1.5% مقرّبة لأقرب 5
  let c=5; for(const [t,v] of VF_WALLET_TABLE){ if(amount>=t) c=v; else break; } return c;
}
function vfCommission2(type, method, amount){
  amount=Number(amount)||0; if(amount<=0) return 0;
  const is15 = (type==='withdraw'&&method==='wallet') || (type==='deposit'&&method==='insta'); // جدول الشرائح
  const is1  = (type==='withdraw'&&method==='insta')  || (type==='deposit'&&method==='wallet'); // 1%
  if(is15) return vfWalletComm(amount);
  if(is1)  return Math.max(5, Math.round(amount*0.01/5)*5);   // 1% مقرّبة لأقرب 5
  return 0;
}
function vfAutoComm2(){
  const amtEl=document.getElementById('vfAmt'), commEl=document.getElementById('vfComm');
  if(!amtEl||!commEl||!VF.opType||!VF.opMethod) return;
  const amount=Number(toEnDigits(amtEl.value||'')||0);
  commEl.value = vfCommission2(VF.opType, VF.opMethod, amount);
}
// (قديمة — مستخدمة في أماكن تانية لو لزم)
function vfCommission(type, amount){
  amount=Number(amount)||0; if(amount<=0) return 0;
  let c=0;
  if(type==='withdraw') c=Math.round(amount*0.015/5)*5;
  else if(type==='deposit') c=Math.round(amount/500)*5;
  else return 0;
  return Math.max(5, c);
}
function vfAutoComm(amtId, commId, type){
  const amtEl=document.getElementById(amtId), commEl=document.getElementById(commId);
  if(!amtEl||!commEl||!type) return;
  const amount=Number(toEnDigits(amtEl.value||'')||0);
  commEl.value = vfCommission(type, amount);
}

const VF_CARDS = {
  khaled: { name:'كارت خالد', tone:'c-gold', limited:true },

function getVfLimits(){ try{ const s=JSON.parse(localStorage.getItem('vf_limits')||'{}'); return { day: s.day||60000, month: s.month||200000 }; }catch(e){ return { day:60000, month:200000 }; } }
function saveVfLimits(day,month){ try{ localStorage.setItem('vf_limits',JSON.stringify({day,month})); }catch(e){} }
function vfLimitDay(){ return getVfLimits().day; }
function vfLimitMonth(){ return getVfLimits().month; }
// عمولة السحب: كارت = 0.57% + 15ج / VF كاش = 1%
function vfCardComm(card, amount){
  amount=Number(amount)||0; if(amount<=0) return 0;
  if(card==='vfcash') return Math.round(amount*0.01);
  return Math.round(amount*0.0057 + 15);
}
// مجموع السحب لكارت في نطاق (يوم/شهر) حسب الوقت الحقيقي الحالي (عشان الليمت بيتصفّر فعليًا)
function vfCardUsed(card, scope){
  const now=new Date(); let s,e;
  if(scope==='day'){ s=new Date(now.getFullYear(),now.getMonth(),now.getDate()).getTime(); e=s+86400000; }
  else { s=new Date(now.getFullYear(),now.getMonth(),1).getTime(); e=new Date(now.getFullYear(),now.getMonth()+1,1).getTime(); }
  const t='atm_'+card;
  return (VF.all||[]).filter(o=>o.type===t).reduce((sum,o)=>{ const tm=new Date(o.created_at).getTime(); return (tm>=s&&tm<e)? sum+(Number(o.amount)||0): sum; },0);
}
function vfCardRemaining(card){
  const usedDay=vfCardUsed(card,'day'), usedMonth=vfCardUsed(card,'month');
  return { usedDay, usedMonth, remDay:vfLimitDay()-usedDay, remMonth:vfLimitMonth()-usedMonth };
}

function vfOpDate(){
  const a=vfEffectiveAnchor();
  const dayStart=new Date(a.getFullYear(),a.getMonth(),a.getDate());
  const dayEnd=new Date(a.getFullYear(),a.getMonth(),a.getDate()+1);
  const n=new Date();
  let candidate=new Date(a.getFullYear(),a.getMonth(),a.getDate(),n.getHours(),n.getMinutes(),n.getSeconds());
  // العملية الجديدة لازم تبقى أحدث من كل العمليات المسجّلة في نفس اليوم المختار فوق في الصفحة
  // (بيحصل لو الساعة الحقيقية عدّت نص الليل وانت لسه واقف على نفس اليوم القديم من غير ما تقلب لليوم الجديد)
  const dayOps=(VF.all||[]).filter(o=>{ const t=new Date(o.created_at).getTime(); return t>=dayStart.getTime() && t<dayEnd.getTime(); });
  if(dayOps.length){
    const maxT=Math.max(...dayOps.map(o=>new Date(o.created_at).getTime()));
    if(candidate.getTime()<=maxT) candidate=new Date(maxT+1000);
  }
  if(candidate.getTime()>=dayEnd.getTime()) candidate=new Date(dayEnd.getTime()-1000);   // يفضل جوه حدود نفس اليوم المختار
  return candidate.toISOString();
}
function vfQueueOp(o){
  const tmpId=-Date.now();
  const created_at=vfOpDate();   // التاريخ المختار فوق + وقت دلوقتي
  const payload={ ...o, user_id:CURRENT.user.id, user_name:CURRENT.profile.full_name, created_at };
  const row={ ...payload, id:tmpId };
  VF.all.unshift(row);
  outboxAdd({ type:'vf', tmpId, payload });
  cacheSet('vf_all',VF.all);
  logAudit('vf_'+o.type,'vf_ops',tmpId,{amount:o.amount,commission:o.commission});
  vfApplyFilter(); flushOutbox();
}

async function loadStats(){
  const t0 = todayStartISO();
  const set=(id,v)=>{ const el=document.getElementById(id); if(el) el.textContent=v; };
  const sum=async(fn)=>{ try{ return await fn(); }catch(e){ console.warn(e); return 0; } };
  try{
    // مبيعات + ربح الاكسسوارات اليوم
    const { data:sales=[] } = await db.from('sales').select('total,profit')
      .gte('created_at',t0).eq('status','completed');
    const salesSum = sales.reduce((s,r)=>s+Number(r.total||0),0);
    const accProfit = sales.reduce((s,r)=>s+Number(r.profit||0),0);
    set('kSales',money(salesSum)); set('kProfit',money(accProfit));

    // عدد عمليات الصيانة اليوم
    const maintCount = await sum(async()=>{ const {count}=await db.from('repairs').select('id',{count:'exact',head:true}).gte('received_at',t0); return count||0; });
    set('kMaint', maintCount+' عملية');

    // عمولات الرصيد اليوم من اليوم المقفول النهارده
    const rechargeC = await sum(async()=>{ const {data}=await db.from('business_days').select('recharge_commission').gte('closed_at',t0).eq('status','closed'); return (data||[]).reduce((s,r)=>s+Number(r.recharge_commission||0),0); });
    set('kRecharge',money(rechargeC));

    // مصروفات اليوم
    const expSum = await sum(async()=>{ const {data}=await db.from('expenses').select('amount').gte('created_at',t0).eq('status','active'); return (data||[]).reduce((s,r)=>s+Number(r.amount||0),0); });
    set('kExp',money(expSum));

    // ربح الصيانة اليوم (المسلّمة) للصافي
    const maintProfit = await sum(async()=>{ const {data}=await db.from('repairs').select('profit').gte('delivered_at',t0).eq('status','delivered'); return (data||[]).reduce((s,r)=>s+Number(r.profit||0),0); });
    set('kVoda',money(maintProfit));

    // قيمة المخزون
    const { data:prods=[] } = await db.from('products').select('quantity,wholesale_price');
    const stockVal = prods.reduce((s,r)=>s+Number(r.quantity||0)*Number(r.wholesale_price||0),0);
    set('kStock',money(stockVal));

    // الدرج من اليوم المفتوح أو آخر يوم
    const drawer = await sum(async()=>{
      const o=await getOpenDay(); if(o) return Number(o.drawer_open||0);
      const l=await getLastClosedDay(); return l?Number(l.drawer_close||0):0;
    });
    set('kTreasury',money(drawer)); set('kVfBal',money(rechargeC));

    // صافي ربح اليوم
    const net = accProfit + maintProfit + rechargeC - expSum;
    set('kNet',money(net));

    loadChart();
  }catch(e){
    console.error(e);
    ['kSales','kProfit','kRecharge','kVoda','kExp','kStock','kTreasury','kVfBal','kNet']
      .forEach(id=>set(id,'—'));
    set('kMaint','—');
  }
}

async function loadChart(){
  const days=[]; const now=new Date();
  for(let i=6;i>=0;i--){ const d=new Date(now); d.setDate(now.getDate()-i); d.setHours(0,0,0,0); days.push(d); }
  const startISO = days[0].toISOString();
  const { data:sales=[] } = await db.from('sales').select('total,created_at')
    .gte('created_at',startISO).eq('status','completed');
  const totals = days.map(d=>{
    const next=new Date(d); next.setDate(d.getDate()+1);
    return sales.filter(s=>{ const t=new Date(s.created_at); return t>=d && t<next; })
               .reduce((sum,s)=>sum+Number(s.total||0),0);
  });
  const max=Math.max(...totals,1);
  const names=['الأحد','الإثنين','الثلاثاء','الأربعاء','الخميس','الجمعة','السبت'];
  document.getElementById('bars').innerHTML = days.map((d,i)=>{
    const h=Math.round((totals[i]/max)*100);
    return `<div class="bar-col">
      <div class="a">${totals[i]?Math.round(totals[i]):''}</div>
      <div class="bar" style="height:${totals[i]?Math.max(h,4):4}%"></div>
      <div class="d">${names[d.getDay()]}</div></div>`;
  }).join('');
}

let _lockCount=0, _lockY=0;
function lockScroll(){
  if(_lockCount++>0) return;
  _lockY = window.scrollY || window.pageYOffset || 0;
  document.body.style.position='fixed';
  document.body.style.top=`-${_lockY}px`;
  document.body.style.left='0'; document.body.style.right='0'; document.body.style.width='100%';
  document.documentElement.style.overflow='hidden';
}
function unlockScroll(){
  if(_lockCount>0) _lockCount--;
  if(_lockCount>0) return;
  document.body.style.position=''; document.body.style.top='';
  document.body.style.left=''; document.body.style.right=''; document.body.style.width='';
  document.documentElement.style.overflow='';
  window.scrollTo(0,_lockY);
}

// يدمج التعديلات المعلّقة (اللي لسه بترفع) فوق بيانات السيرفر عشان متختفيش
function mergePending(list){
  list = list ? list.slice() : [];
  const del=deletedIdsGet();
  for(const op of outboxGet()){
    if(op.type==='insert'){ if(!list.some(p=>p.id===op.tmpId)) list.push({ ...op.payload, id:op.tmpId }); }
    else if(op.type==='update'){ const i=list.findIndex(p=>p.id===op.id); if(i>=0) list[i]={ ...list[i], ...op.payload }; }
    else if(op.type==='delete'){ del.add(op.id); }
  }
  list=list.filter(p=>!del.has(p.id));
  list.sort((a,b)=>(a.name||'').localeCompare(b.name||'','ar'));
  return list;
}
async function loadInventory(){
  // 1) اعرض فورًا من الكاش لو موجود (بدون انتظار النت)
  const cp=cacheGet('products');
  if(cp){ INV.products=cp; INV.categories=cacheGet('categories')||[]; INV.suppliers=cacheGet('suppliers')||[]; fillInvFilters(); renderProducts(); }
  // 2) حدّث من النت في الخلفية
  try{
    const [cRes,sRes,pRes] = await Promise.all([
      db.from('categories').select('*').order('name'),
      db.from('suppliers').select('*').order('name'),
      db.from('products').select('*').order('name'),
    ]);
    if(!cRes.error && cRes.data){ INV.categories=cRes.data; cacheSet('categories',INV.categories); }
    if(!sRes.error && sRes.data){ INV.suppliers=sRes.data; cacheSet('suppliers',INV.suppliers); }
    // المنتجات: ماتمسحش القايمة بنتيجة فيها خطأ أو فاضية مشبوهة
    if(!pRes.error && pRes.data && !(pRes.data.length===0 && ((cp&&cp.length)||outboxGet().length))){
      INV.products = mergePending(pRes.data);
      cacheSet('products',INV.products);
    }
    fillInvFilters(); renderProducts();
  }catch(e){ console.error(e);
    const elErr=document.getElementById('invList');
    if(!cp && elErr) elErr.innerHTML=`<div class="empty"><div class="ic">${ic('warn',32)}</div>مفيش نت ومفيش نسخة محفوظة</div>`;
  }
}

function _invObserveMore(){
  if(_invMoreObs) _invMoreObs.disconnect();
  const s=document.getElementById('invSentinel'); if(!s) return;
  _invMoreObs=new IntersectionObserver(es=>{
    if(es.some(e=>e.isIntersecting)){ INV._shown=(INV._shown||INV_PAGE)+INV_PAGE; renderProducts(); }

  _invMoreObs.observe(s);
}

let _sheetDrag=null;
function initSheetDrag(){
  const s=document.getElementById('sheet'); if(!s||s._dragInit) return; s._dragInit=true;
  s.addEventListener('touchstart',e=>{
    if(s.scrollTop>0) return;
    if(e.target.closest('button, input, select, textarea, a, label, [onclick]')) return;  // ماتبدأش سحب من فوق زرار/خانة عشان الضغطة متتلغيش
    _sheetDrag={y:e.touches[0].clientY}; s.style.transition='none';
  },{passive:true});
  s.addEventListener('touchmove',e=>{
    if(!_sheetDrag) return;
    const dy=e.touches[0].clientY-_sheetDrag.y;
    if(dy>0){ s.style.transform=`translateY(${dy}px)`; if(e.cancelable) e.preventDefault(); }
  },{passive:false});
  s.addEventListener('touchend',e=>{
    if(!_sheetDrag) return;
    const dy=e.changedTouches[0].clientY-_sheetDrag.y;
    if(dy>110){ closeSheet(); }
    else { s.style.transition='transform .28s cubic-bezier(.22,.61,.36,1)'; s.style.transform='translateY(0)'; }
    _sheetDrag=null;
  });
}

  s.style.transform='translateY(100%)';

    s.removeEventListener('transitionend',onEnd);

  const onEnd=(ev)=>{ if(ev && ev.propertyName && ev.propertyName!=='transform') return; finish(); };
  s.addEventListener('transitionend',onEnd);
  setTimeout(finish,430);
}

function squareImage(file,size,q){
  return new Promise((res,rej)=>{
    const img=new Image(); const url=URL.createObjectURL(file);
    img.onload=()=>{
      const cv=document.createElement('canvas'); cv.width=size; cv.height=size;
      const ctx=cv.getContext('2d');
      ctx.imageSmoothingEnabled=true; ctx.imageSmoothingQuality='high';
      // قص أكبر مربع من نص الصورة فتملا الخانة بالكامل (zero فراغ)
      const s=Math.min(img.width,img.height);
      const sx=(img.width-s)/2, sy=(img.height-s)/2;
      ctx.drawImage(img, sx,sy,s,s, 0,0,size,size);
      cv.toBlob(b=>{ URL.revokeObjectURL(url); b?res(b):rej(new Error('blob')); },'image/jpeg',q||0.85);
    };
    img.onerror=()=>{ URL.revokeObjectURL(url); rej(new Error('img')); };
    img.src=url;
  });
}
function resizeImage(file,max,q){
  return new Promise((res,rej)=>{
    const img=new Image(); const url=URL.createObjectURL(file);
    img.onload=()=>{ let w=img.width,h=img.height;
      if(w>h && w>max){ h=Math.round(h*max/w); w=max; }
      else if(h>=w && h>max){ w=Math.round(w*max/h); h=max; }
      const cv=document.createElement('canvas'); cv.width=w; cv.height=h;
      cv.getContext('2d').drawImage(img,0,0,w,h);
      cv.toBlob(b=>{ URL.revokeObjectURL(url); b?res(b):rej(new Error('blob')); },'image/jpeg',q);
    };
    img.onerror=()=>{ URL.revokeObjectURL(url); rej(new Error('img')); };
    img.src=url;
  });
}

/* ---------- مسح الباركود بالكاميرا ----------
   على آيفون الكاميرا الحيّة بتبوظ أحيانًا (خصوصًا في التطبيق المثبّت)،
   فبنوفّر بديل مضمون: «صوّر الباركود» ويتقرا من الصورة.            */
let SCAN_CB = null;
let SCAN_DONE = false;

// تحقق من صحة الباركود (خانة المراجعة) — يرفض القراءات الغلط
function validBarcode(code){
  if(!/^\d+$/.test(code)) return true;             // أكواد غير رقمية (Code128) نقبلها
  if([8,12,13].includes(code.length)){
    const digits = code.split('').map(Number);
    const check = digits.pop();
    let sum = 0;
    digits.reverse().forEach((n,i)=> sum += n * (i%2===0 ? 3 : 1));
    return ((10 - (sum % 10)) % 10) === check;
  }
  return code.length >= 6;                          // أرقام بأطوال تانية: نقبل لو طولها معقول
}
