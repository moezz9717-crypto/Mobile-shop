          onclick="document.getElementById('snapInput').click()">${ic('camera',16)} صوّر الباركود بدل الحي</button>
        <input type="file" id="snapInput" accept="image/*" capture="environment" class="hidden" onchange="snapDecode(this)">
      </div>
    </div>`;
  document.getElementById('scanBg').classList.add('show');
  startLiveScan();
}

async function startLiveScan(){
  if(typeof zbarWasm==='undefined'){ liveFallback(); return; }
  const v=document.getElementById('scanVid'); if(!v) return;
  try{
    _scanStream = await navigator.mediaDevices.getUserMedia({
      video:{ facingMode:{ ideal:'environment' }, width:{ideal:1280}, height:{ideal:720} }, audio:false });
    v.srcObject=_scanStream; _scanVideo=v;
    await v.play().catch(()=>{});
    setTimeout(applyCameraZoom, 600);
    _scanCanvas=document.createElement('canvas');
    _scanTick();
  }catch(e){ console.error('cam',e); liveFallback(); }
}

async function _scanTick(){
  if(SCAN_DONE) return;
  const v=_scanVideo, cv=_scanCanvas;
  if(v && cv && v.readyState>=2 && !_scanBusy){
    _scanBusy=true;
    try{
      const w=v.videoWidth, h=v.videoHeight;
      if(w && h){
        // نقرأ منطقة وسط الكادر (أسرع وأدق)
        const cw=Math.round(w*0.92), ch=Math.round(h*0.6);
        const sx=Math.round((w-cw)/2), sy=Math.round((h-ch)/2);
        cv.width=cw; cv.height=ch;
        const ctx=cv.getContext('2d',{ willReadFrequently:true });
        ctx.drawImage(v, sx,sy,cw,ch, 0,0,cw,ch);
        const img=ctx.getImageData(0,0,cw,ch);
        const symbols=await zbarWasm.scanImageData(img);
        if(symbols && symbols.length){
          const raw = symbols[0].decode ? symbols[0].decode() : (symbols[0].rawData||'');
          const c = String(raw||'').trim();
          if(c && validBarcode(c)){
            if(c===SCAN_LAST){ SCAN_LASTCOUNT++; } else { SCAN_LAST=c; SCAN_LASTCOUNT=1; }
            if(SCAN_LASTCOUNT>=2){
              if(navigator.vibrate){ try{ navigator.vibrate(40); }catch(_){} }
              _scanBusy=false; onScanResult(c); return;
            }
          }
        }
      }
    }catch(e){ /* تجاهل أخطاء الفريم */ }
    _scanBusy=false;
  }
  _scanTimer=setTimeout(_scanTick, 70);   // ~14 فريم/ث
}

function applyCameraZoom(){
  try{
    const track=_scanStream && _scanStream.getVideoTracks()[0]; if(!track) return;
    const caps=track.getCapabilities?track.getCapabilities():{};
    const adv=[];
    if(caps && caps.focusMode && caps.focusMode.includes && caps.focusMode.includes('continuous')) adv.push({ focusMode:'continuous' });
    if(adv.length) track.applyConstraints({ advanced:adv }).catch(()=>{});
    // زرار الفلاش يظهر بس لو مدعوم
    const tb=document.getElementById('torchBtn');
    if(tb) tb.style.display = (caps && caps.torch) ? 'flex' : 'none';
  }catch(e){}
}

async function toggleTorch(){
  try{
    const track=_scanStream && _scanStream.getVideoTracks()[0]; if(!track) return;
    const caps=track.getCapabilities?track.getCapabilities():{};
    if(!caps || !caps.torch){ toast('الفلاش مش مدعوم في المتصفح ده','err'); return; }
    _torchOn=!_torchOn;
    await track.applyConstraints({ advanced:[{ torch:_torchOn }] });
    const b=document.getElementById('torchBtn'); if(b) b.classList.toggle('on',_torchOn);
  }catch(e){ console.error(e); }
}

function liveFallback(){
  const r=document.getElementById('reader');
  if(r) r.innerHTML = `<div style="color:#fff;text-align:center;padding:34px 16px;font-size:14px;line-height:1.8">
    ${ic('camera',18)} الكاميرا الحيّة مش متاحة هنا<br>
    <span style="color:#cdd6e4;font-size:13px">اضغط «صوّر الباركود» تحت — بيشتغل ١٠٠٪</span></div>`;
}

function onScanResult(text){
  if(SCAN_DONE) return; SCAN_DONE=true;
  stopScanner();
  const cb=SCAN_CB; SCAN_CB=null;
  hideScanBg();
  if(cb) cb(text);
}

async function snapDecode(input){
  const file = input.files && input.files[0]; if(!file) return; input.value='';
  if(typeof zbarWasm==='undefined'){ toast('مكتبة الباركود مش محمّلة — اتأكد من النت وافتح الصفحة تاني','err'); return; }
  toast('جارٍ قراءة الباركود...');
  SCAN_DONE=true; stopScanner();
  try{
    let bmp;
    try{ bmp = await createImageBitmap(file, { imageOrientation:'from-image' }); }
    catch(e){ bmp = await createImageBitmap(file); }
    let w=bmp.width, h=bmp.height; const maxW=1600;
    if(Math.max(w,h)>maxW){ const s=maxW/Math.max(w,h); w=Math.round(w*s); h=Math.round(h*s); }
    const cv=document.createElement('canvas'); cv.width=w; cv.height=h;
    const ctx=cv.getContext('2d',{ willReadFrequently:true }); ctx.drawImage(bmp,0,0,w,h);
    const img=ctx.getImageData(0,0,w,h);
    const symbols=await zbarWasm.scanImageData(img);   // ZBar بيقرا أي اتجاه لوحده
    if(symbols && symbols.length){
      const c=String((symbols[0].decode?symbols[0].decode():symbols[0].rawData)||'').trim();
      if(c && validBarcode(c)){ SCAN_DONE=false; onScanResult(c); return; }
    }
    toast('مقدرش يقرا الباركود — قرّب الباركود يملا الصورة بإضاءة كويسة','err');
    SCAN_DONE=false; startLiveScan();
  }catch(e){ console.error('snap error',e);
    toast('حصل خطأ في قراءة الصورة — جرّب تاني','err');
    SCAN_DONE=false; startLiveScan(); }
}

function stopScanner(){
  if(_scanTimer){ clearTimeout(_scanTimer); _scanTimer=null; }
  _scanBusy=false; _torchOn=false;
  if(_scanStream){ try{ _scanStream.getTracks().forEach(t=>t.stop()); }catch(e){} _scanStream=null; }
  _scanVideo=null; SCANNER=null;
}

function outboxGet(){ try{ return JSON.parse(localStorage.getItem('outbox')||'[]'); }catch(e){ return []; } }
function outboxSet(q){ try{ localStorage.setItem('outbox', JSON.stringify(q)); }catch(e){} updateSyncBadge(); }
function outboxAdd(op){ const q=outboxGet(); q.push(op); outboxSet(q); }

/* معرّفات المنتجات المحذوفة محلياً — تفضل محذوفة حتى لو رجعت من السيرفر */
function deletedIdsGet(){ try{ return new Set(JSON.parse(localStorage.getItem('deleted_prods')||'[]')); }catch(e){ return new Set(); } }
function deletedIdAdd(id){ try{ const s=deletedIdsGet(); s.add(id); localStorage.setItem('deleted_prods',JSON.stringify([...s])); }catch(e){} }
function deletedIdRemove(id){ try{ const s=deletedIdsGet(); s.delete(id); localStorage.setItem('deleted_prods',JSON.stringify([...s])); }catch(e){} }
function isNetErr(e){ return !!e && /load failed|failed to fetch|fetch|network|timeout|offline/i.test(e.message||String(e)); }
function updateSyncBadge(){
  const el=document.getElementById('syncBadge'); if(!el) return;
  const n=outboxGet().length;
  if(n>0){ el.innerHTML=`${ic('refresh',15)} ${n} في انتظار الرفع — اضغط للمحاولة`; el.classList.add('show'); }
  else el.classList.remove('show');
}
let _flushing=false;
async function flushOutbox(){
  if(_flushing) return;
  let q=outboxGet(); if(!q.length){ updateSyncBadge(); return; }
  _flushing=true; let processed=0; let purchaseDone=false;
  try{
    while(q.length){
      const op=q[0];
      try{
        if(op.type==='update'){ const { error }=await db.from('products').update(op.payload).eq('id',op.id); if(error) throw error; }
        else if(op.type==='delete'){
          // امسح السجلات المرتبطة الأول عشان مفيش foreign key error
          await db.from('purchase_items').delete().eq('product_id',op.id);
          await db.from('stock_adjustments').delete().eq('product_id',op.id);
          const { error }=await db.from('products').delete().eq('id',op.id);
          if(error) throw error;
          deletedIdRemove(op.id);
        }
        else if(op.type==='insert'){ const { data, error }=await db.from('products').insert(op.payload).select().single(); if(error) throw error;
          const i=INV.products.findIndex(x=>x.id===op.tmpId);
          if(i>=0){ INV.products[i]=data; } else { INV.products.push(data); }
          cacheSet('products',INV.products);
          reconcileProductIdRefs(op.tmpId, data.id);
        }
        else if(op.type==='vf'){
          if(op.tmpId){ const { data, error }=await db.from('vf_ops').insert(op.payload).select().single(); if(error) throw error;
            const k=(VF.all||[]).findIndex(x=>x.id===op.tmpId); if(k>=0) VF.all[k]=data;
            const i=(VF.ops||[]).findIndex(x=>x.id===op.tmpId); if(i>=0) VF.ops[i]=data;
          } else { const { error }=await db.from('vf_ops').insert(op.payload); if(error) throw error; }
        }
        else if(op.type==='vfdel'){ const { error }=await db.from('vf_ops').delete().eq('id',op.id); if(error) throw error; }
        else if(op.type==='vfupd'){ const { error }=await db.from('vf_ops').update(op.payload).eq('id',op.id); if(error) throw error; }
        else if(op.type==='vfconfig'){
          const { error }=await db.from('vf_config').update({ base_amount:op.payload.base_amount, updated_at:new Date().toISOString() }).eq('id',1); if(error) throw error;
        }
        else if(op.type==='purchase'){
          if(op.editId){
            const { error }=await db.from('purchases').update(op.payload.purchase).eq('id',op.editId); if(error) throw error;
            await db.from('purchase_items').delete().eq('purchase_id',op.editId);
            const items=op.payload.items.map(it=>({ ...it, purchase_id:op.editId }));
            const { error:e2 }=await db.from('purchase_items').insert(items); if(e2) throw e2;
            await pinvSyncItemsFromServer(op.editId);
          } else {
            const { data, error }=await db.from('purchases').insert(op.payload.purchase).select().single(); if(error) throw error;
            const items=op.payload.items.map(it=>({ ...it, purchase_id:data.id }));
            const { error:e2 }=await db.from('purchase_items').insert(items); if(e2) throw e2;
            await pinvSyncItemsFromServer(data.id);
          }
        }
        else if(op.type==='purchase_edit'){
          // بيرفع الفرق بس: المُضاف / المُعدَّل / المحذوف — مش كل بنود الفاتورة من الأول
          const { error }=await db.from('purchases').update(op.payload.purchase).eq('id',op.editId); if(error) throw error;
          const { toInsert, toUpdate, toDeleteIds } = op.payload;
          if(toDeleteIds && toDeleteIds.length){
            const { error:eDel }=await db.from('purchase_items').delete().in('id', toDeleteIds); if(eDel) throw eDel;
          }
          if(toUpdate && toUpdate.length){
            // upsert مرة واحدة بدل ما نستنى رد لكل صنف لوحده — ده اللي كان بيسبب اللاج والتعليق وقت الحفظ
            const rows=toUpdate.map(u=>({ id:u.id, ...u }));
            const { error:eUp }=await db.from('purchase_items').upsert(rows,{onConflict:'id'}); if(eUp) throw eUp;
          }
          if(toInsert && toInsert.length){
            const items=toInsert.map(it=>({ ...it, purchase_id:op.editId }));
            const { error:eIns }=await db.from('purchase_items').insert(items); if(eIns) throw eIns;
          }
          await pinvSyncItemsFromServer(op.editId);
        }
        else if(op.type==='debt'){
          if(op.action==='addPerson'){ const { data, error }=await db.from('debt_people').insert(op.payload).select().single(); if(error) throw error; debtReconcile('person',op.tmpId,data); }
          else if(op.action==='addEvent'){ const pl=Object.assign({},op.payload); if(pl.person_id<0){ const real=_debtIdMap[pl.person_id]; if(real) pl.person_id=real; else { const hasPerson=q.some(o=>o.type==='debt'&&o.action==='addPerson'&&o.tmpId===pl.person_id); if(hasPerson) throw { _pending:true }; else { q.shift(); outboxSet(q); continue; } } } const { data, error }=await db.from('debt_events').upsert(pl,{onConflict:'client_id'}).select().single(); if(error) throw error; debtReconcile('event',op.tmpId,data); }
          else if(op.action==='updatePerson'){ if(op.id>0){ const { error }=await db.from('debt_people').update(op.payload).eq('id',op.id); if(error) throw error; } }
          else if(op.action==='updateEvent'){ if(op.id>0){ const { error }=await db.from('debt_events').update(op.payload).eq('id',op.id); if(error) throw error; } }
          else if(op.action==='delPerson'){ if(op.id>0){ await db.from('debt_events').delete().eq('person_id',op.id); const { error }=await db.from('debt_people').delete().eq('id',op.id); if(error) throw error; } }
          else if(op.action==='delEvent'){ if(op.id>0){ const { error }=await db.from('debt_events').delete().eq('id',op.id); if(error) throw error; } }
        }
        q.shift(); outboxSet(q); processed++;
        if(op.type==='purchase'||op.type==='purchase_edit') purchaseDone=true;
      }catch(e){
        if(isNetErr(e) || (e&&e._pending)){ break; }   // النت لسه مش راجع أو شخص لسه مترفعش — نأجل
        else { console.warn('outbox drop',e);      // خطأ دائم — نتخطّى العملية
          if(op.type==='purchase'||op.type==='purchase_edit') toast('تعذّر حفظ فاتورة الاستلام — تأكد إنك شغّلت كود SQL','err');
          q.shift(); outboxSet(q); }
      }
    }
  } finally {
    _flushing=false;
    if(processed && CURRENT_PAGE==='inventory') renderProducts();   // تحديث المعرّفات المؤقتة للحقيقية
    if(processed && CURRENT_PAGE==='vodafone') vfApplyFilter();      // تحديث معرّفات عمليات فودافون بعد الرفع عشان تتفتح من أول ضغطة
    if(purchaseDone) toast('الفاتورة اتحفظت فعليًا ✓','ok');
    updateSyncBadge();
  }
}

let _tmpSeq=0;
function _nextTmpId(){ return -(Date.now()) - (_tmpSeq++); }   // معرّف مؤقت سالب فريد للمنتج الجديد
function saveProduct(id){
  const name=document.getElementById('pName').value.trim();
  if(!name){ toast('اكتب اسم المنتج','err'); return; }
  const num=v=>Number(toEnDigits(v||'')||0);
  const rec = {
    name,
    category_id: null,
    quantity: num(document.getElementById('pQty').value),
    min_stock: num(document.getElementById('pMin').value),
    wholesale_price: num(document.getElementById('pCost').value),
    sale_price: num(document.getElementById('pSale').value),
    barcode: document.getElementById('pBar').value.trim() || null,
    barcode2: document.getElementById('pBar2').value.trim() || null,
    barcode3: document.getElementById('pBar3').value.trim() || null,
    supplier_id: document.getElementById('pSup').value || null,
    kind: document.getElementById('pKind').value || 'accessory',
    image_url: PROD_IMG || null,
    notes: document.getElementById('pNotes').value.trim() || null,
  };
  // ===== حفظ محلي فوري (من غير انتظار السيرفر) =====
  if(id){
    rec.updated_at = new Date().toISOString();
    const i=INV.products.findIndex(x=>x.id===id);
    if(i>=0) INV.products[i]={ ...INV.products[i], ...rec };
    const q=outboxGet();
    if(id<0){
      // منتج جديد لسه ماترفعش -> عدّل بيانات إضافته نفسها
      const op=q.find(o=>o.type==='insert'&&o.tmpId===id);
      if(op){ const p2={...op.payload,...rec}; delete p2.updated_at; op.payload=p2; outboxSet(q); }
      else { outboxAdd({ type:'update', id, payload:rec }); }
    }else{
      // لو فيه تعديل معلّق لنفس المنتج ادمجه
      const op=q.find(o=>o.type==='update'&&o.id===id);
      if(op){ op.payload={...op.payload,...rec}; outboxSet(q); }
      else { outboxAdd({ type:'update', id, payload:rec }); }
    }
    toast('تم حفظ التعديل','ok');
  }else{
    const tmpId=_nextTmpId();
    INV.products.push({ ...rec, id:tmpId });
    INV.products.sort((a,b)=>(a.name||'').localeCompare(b.name||'','ar'));
    outboxAdd({ type:'insert', tmpId, payload:rec });
    if(PROD_CTX_RECV){
      // منتج جديد تمامًا اتضاف من صفحة الاستلام -> يتسجّل كصنف في الفاتورة الجارية فورًا
      RECV.cart.push({ product_id:tmpId, name:rec.name, image_url:rec.image_url||'', qty:rec.quantity||0, cost:rec.wholesale_price||0, old_cost:0 });
      // نسجّل الكمية دي في origItems عشان الكمية متتضافش مرتين وقت تسجيل الفاتورة (الكمية اتحطت أصلاً وقت إنشاء المنتج)
      RECV.origItems.push({ product_id:tmpId, quantity:rec.quantity||0, unit_cost:Number(rec.wholesale_price)||0 });
      saveRecvDraft();
      toast('تم إضافة المنتج الجديد وتسجيله في الفاتورة تلقائيًا','ok');
    } else {
      toast('تم حفظ المنتج','ok');
    }
  }
  cacheSet('products',INV.products);
  closeSheet(); renderProducts();
  if(PROD_CTX_RECV){ renderRecvCart(); renderRecvList(); }
  PROD_CTX_RECV=false;
  flushOutbox();   // الرفع في الخلفية لوحده
}

// قراءة الصفوف من CSV أو Excel
async function rowsFromFile(file){
  const nameL=(file.name||'').toLowerCase();
  if(nameL.endsWith('.xlsx')||nameL.endsWith('.xls')){
    if(typeof XLSX==='undefined') throw new Error('مكتبة Excel مش محمّلة — افتح الصفحة والنت شغّال');
    const buf=await file.arrayBuffer();
    const wb=XLSX.read(buf,{type:'array'});
    const ws=wb.Sheets[wb.SheetNames[0]];
    return XLSX.utils.sheet_to_json(ws,{header:1,blankrows:false,defval:''}).map(r=>r.map(c=>String(c==null?'':c)));
  }
  // CSV
  const text=await file.text();
  const lines=text.replace(/^\uFEFF/,'').split(/\r?\n/).filter(l=>l.trim());
  const parseLine=(l)=>{ const out=[]; let cur='',q=false;
    for(let i=0;i<l.length;i++){ const ch=l[i];
      if(q){ if(ch==='"'){ if(l[i+1]==='"'){cur+='"';i++;} else q=false; } else cur+=ch; }
      else { if(ch==='"') q=true; else if(ch===','){ out.push(cur); cur=''; } else cur+=ch; } }
    out.push(cur); return out; };
  return lines.map(parseLine);
}

async function importCSV(file){
  if(!file) return;
  let rows;
  try{ rows=await rowsFromFile(file); }
  catch(e){ console.error(e); toast(e.message||'مش قادر أقرا الملف','err'); document.getElementById('csvFile').value=''; return; }
  if(!rows||rows.length<2){ toast('الملف فاضي','err'); document.getElementById('csvFile').value=''; return; }

  // التعرّف على الأعمدة من صف العناوين
  const header=rows[0].map(h=>String(h||'').trim().toLowerCase());
  const find=(keys)=>{ for(let i=0;i<header.length;i++){ if(keys.some(k=>header[i].includes(k))) return i; } return -1; };
  const col={
    name:find(['item name','name','الاسم','اسم']),
    model:find(['model','موديل']),
    company:find(['company','الشركة','شركة']),
    cat:find(['categor','التصنيف','تصنيف','الفئة','فئة']),
    qty:find(['num','qty','quantity','الكمية','كمية','العدد','عدد']),
    cost:find(['cost','wholesale','الجملة','التكلفة','تكلفة']),
    sale:find(['sale','price','البيع','سعر البيع']),
    barcode:find(['barcode','باركود']),
    min:find(['min','الحد','حد أدنى']),
    kind:find(['kind','النوع','نوع']),
    notes:find(['note','ملاحظ']),
  };
  if(col.name<0){ toast('مش لاقي عمود اسم المنتج (Item Name)','err'); document.getElementById('csvFile').value=''; return; }
  const num=(v)=>Number(toEnDigits(String(v||'').replace(/[^\d.\-٠-٩]/g,''))||0);
  const get=(f,idx)=> idx>=0 ? String(f[idx]||'').trim() : '';
  const kindMap={'اكسسوار':'accessory','accessory':'accessory','زيرو':'zero','zero':'zero','مستعمل':'used','used':'used'};

  let added=0,failed=0;
  toast('جارٍ الاستيراد...');
  for(let i=1;i<rows.length;i++){
    const f=rows[i];
    const name=get(f,col.name); if(!name) continue;
    let catId=null;
    const extra=[]; const md=get(f,col.model), cmp=get(f,col.company), nt=get(f,col.notes);
    if(md) extra.push('موديل: '+md); if(cmp) extra.push('شركة: '+cmp); if(nt) extra.push(nt);
    const rec={ name, category_id:catId,
      quantity:num(get(f,col.qty)), min_stock:num(get(f,col.min)),
      wholesale_price:num(get(f,col.cost)), sale_price:num(get(f,col.sale)),
      barcode:get(f,col.barcode)||null, kind:kindMap[get(f,col.kind).toLowerCase()]||'accessory',
      notes:extra.join(' • ')||null };
    const { error } = await db.from('products').insert(rec);
    if(error){ failed++; console.warn(error); } else added++;
  }
  await logAudit('import','products','',{added,failed});
  toast(`تم استيراد ${added} منتج${failed?` (${failed} فشل)`:''}`, failed?'err':'ok');
  document.getElementById('csvFile').value='';
  await loadInventory();
}

let RECV = { supplier:'', search:'', cart:[], editId:null, origItems:[] };
const RECV_DRAFT_KEY='recv_draft';
function reconcileProductIdRefs(tmpId, realId){
  let touched=false;
  (RECV.cart||[]).forEach(it=>{ if(it.product_id===tmpId){ it.product_id=realId; touched=true; } });
  (RECV.origItems||[]).forEach(it=>{ if(it.product_id===tmpId){ it.product_id=realId; touched=true; } });
  if(touched){ saveRecvDraft(); const box=document.getElementById('recvCartBox'); if(box) renderRecvCart(); }
  // لو فيه فاتورة (تسجيل/تعديل) اتبعتت للطابور قبل ما المنتج الجديد يخلص رفعه، صحّح المعرّف فيها كمان
  try{
    const q=outboxGet(); let changed=false;
    q.forEach(op=>{
      if(op.type==='purchase' && op.payload && Array.isArray(op.payload.items)){
        op.payload.items.forEach(it=>{ if(it.product_id===tmpId){ it.product_id=realId; changed=true; } });
      }
      if(op.type==='purchase_edit' && op.payload){
        ['toInsert','toUpdate'].forEach(k=>{ (op.payload[k]||[]).forEach(it=>{ if(it.product_id===tmpId){ it.product_id=realId; changed=true; } }); });
      }
    });
    if(changed) outboxSet(q);
  }catch(e){ console.warn('reconcileProductIdRefs outbox fix failed:',e); }
}
function saveRecvDraft(){
  try{
    if(RECV.cart && RECV.cart.length){
      cacheSet(RECV_DRAFT_KEY, { supplier:RECV.supplier, cart:RECV.cart, editId:RECV.editId, origItems:RECV.origItems });
    } else {
      localStorage.removeItem('cache:'+RECV_DRAFT_KEY);
    }
  }catch(e){}
}
let _recvDraftNotified=false;
function restoreRecvDraftIfAny(){
  if(RECV.cart && RECV.cart.length) return;   // فيه شغل شغّال بالفعل، ماتلمسوش
  const d=cacheGet(RECV_DRAFT_KEY);
  if(d && d.cart && d.cart.length){
    if(d.editId && !d.cart.every(it=>it.pi_id!==undefined)){
      // مسودة تعديل قديمة اتحفظت قبل تحديث نظام الفرق — هنجيب الفاتورة من جديد لضمان دقة البيانات
      try{ localStorage.removeItem('cache:'+RECV_DRAFT_KEY); }catch(e){}
      editPurchaseInvoice(d.editId);
      return;
    }
    RECV.supplier=d.supplier||''; RECV.cart=d.cart||[]; RECV.editId=d.editId||null; RECV.origItems=d.origItems||[];
    if(!_recvDraftNotified){ _recvDraftNotified=true;

}

function registerInvoice(){
  if(!RECV.cart.length){ toast('الفاتورة فاضية','err'); return; }
  if(!RECV.supplier){ toast('اختار المورد','err'); return; }
  const sup = RECV.supplier;
  const supName = (INV.suppliers.find(s=>String(s.id)===String(sup))||{}).name || '';
  // 1) طبّق الفرق على المخزون (أوفلاين-أولًا) — بس للأصناف اللي اتغيّرت فعلاً
  const origMap={}, origCostMap={}, origPresent=new Set();
  (RECV.origItems||[]).forEach(o=>{ origMap[o.product_id]=Number(o.quantity)||0; origCostMap[o.product_id]=Number(o.unit_cost)||0; origPresent.add(o.product_id); });
  const touched=new Set();
  RECV.cart.forEach(it=>{
    touched.add(it.product_id);
    const wasPresent = origPresent.has(it.product_id);
    const prevQty = wasPresent ? origMap[it.product_id] : 0;
    const delta = it.qty - prevQty;
    const costChanged = !wasPresent || origCostMap[it.product_id]!==it.cost;
    if(delta!==0 || costChanged){
      applyStockDelta(it.product_id, delta, costChanged?it.cost:null, sup);
    }
  });
  // أصناف اتشالت في التعديل -> ارجّع كميتها
  (RECV.origItems||[]).forEach(o=>{ if(!touched.has(o.product_id)){ applyStockDelta(o.product_id, -(Number(o.quantity)||0), null, null); } });

  // 2) سجّل الفاتورة (عبر الطابور — بيشتغل أوفلاين)
  const total=RECV.cart.reduce((s,it)=>s+it.qty*it.cost,0);
  const purchase={ supplier_id: sup?Number(sup):null, supplier_name:supName, total,
    user_id:CURRENT.user.id, user_name:CURRENT.profile.full_name, updated_at:new Date().toISOString() };
  if(RECV.editId){
    // تعديل فاتورة موجودة: نرفع الفرق بس (المُضاف / المُعدَّل / المحذوف) مش كل البنود من الأول
    const origByPi={}; (RECV.origItems||[]).forEach(o=>{ if(o.pi_id) origByPi[o.pi_id]=o; });
    const toInsert=[], toUpdate=[], keptPi=new Set();
    RECV.cart.forEach(it=>{
      if(it.pi_id){
        keptPi.add(it.pi_id);
        const orig=origByPi[it.pi_id];
        const oldCost=Number(it.old_cost)||0;
        if(!orig || orig.quantity!==it.qty || orig.unit_cost!==it.cost || orig.old_cost!==oldCost){
          toUpdate.push({ id:it.pi_id, quantity:it.qty, unit_cost:it.cost, line_total:it.qty*it.cost, old_cost:oldCost, product_name:it.name });
        }
      } else {
        toInsert.push({ product_id: it.product_id, product_name:it.name,
          quantity:it.qty, unit_cost:it.cost, line_total:it.qty*it.cost, old_cost:Number(it.old_cost)||0 });
      }
    });
    const toDeleteIds=(RECV.origItems||[]).filter(o=>o.pi_id && !keptPi.has(o.pi_id)).map(o=>o.pi_id);
    outboxAdd({ type:'purchase_edit', editId:RECV.editId, payload:{ purchase, toInsert, toUpdate, toDeleteIds } });
  } else {
    const items=RECV.cart.map(it=>({ product_id: it.product_id, product_name:it.name,
      quantity:it.qty, unit_cost:it.cost, line_total:it.qty*it.cost, old_cost:Number(it.old_cost)||0 }));
    outboxAdd({ type:'purchase', editId:null, payload:{ purchase, items } });
  }

  logAudit(RECV.editId?'edit_purchase':'purchase','purchases',RECV.editId||'',{total,items:RECV.cart.length});
  const wasEdit=RECV.editId;
  RECV.cart=[]; RECV.editId=null; RECV.origItems=[];
  saveRecvDraft();
  cacheSet('products',INV.products);
  renderRecvCart(); renderRecvList();
  toast(wasEdit?'جاري حفظ تعديل الفاتورة…':'جاري تسجيل الفاتورة…','ok');
  flushOutbox();
}
// يطبّق فرق كمية على منتج + تحديث السعر/المورد (أوفلاين-أولًا)
function applyStockDelta(id, delta, newCost, sup){
  const i=INV.products.findIndex(x=>x.id===id); if(i<0) return;
  const rec={ quantity: Math.max(0, Number(INV.products[i].quantity||0)+delta), updated_at:new Date().toISOString() };
  if(newCost!=null) rec.wholesale_price=newCost;
  if(sup) rec.supplier_id=Number(sup);
  INV.products[i]={ ...INV.products[i], ...rec };
  const q=outboxGet();
  if(id<0){ const op=q.find(o=>o.type==='insert'&&o.tmpId===id); if(op){ const p2={...op.payload,...rec}; delete p2.updated_at; op.payload=p2; outboxSet(q); } else outboxAdd({type:'update',id,payload:rec}); }
  else { const op=q.find(o=>o.type==='update'&&o.id===id); if(op){ op.payload={...op.payload,...rec}; outboxSet(q); } else outboxAdd({type:'update',id,payload:rec}); }
}

async function saveUser(uid){
  const u=USERS.find(x=>x.id===uid); if(!u) return;
  const isSelf = u.id===CURRENT.user.id;
  const role = isSelf ? u.role : (document.getElementById('uRoleSel').value||u.role);
  const active = isSelf ? (u.active!==false) : document.getElementById('uActive').checked;
  const perms={};
  document.querySelectorAll('.perm-chk').forEach(ch=>{ perms[ch.dataset.pg]=ch.checked; });
  const upd={ role, active, permissions:perms };
  const btn=document.querySelector('.modal-foot .save'); if(btn){ btn.disabled=true; btn.textContent='جارٍ الحفظ...'; }
  try{
    const { error } = await db.from('profiles').update(upd).eq('id',uid);
    if(error) throw error;
    Object.assign(u, upd);
    logAudit('update','profiles',uid,{role,active});
    closeModal(); renderUsersList(); toast('تم حفظ صلاحيات المستخدم','ok');
    if(isSelf){ CURRENT.profile=Object.assign(CURRENT.profile,upd); buildNav(CURRENT.profile.role); }
  }catch(e){ console.error(e); toast('خطأ في الحفظ: '+(e.message||''),'err');
    if(btn){ btn.disabled=false; btn.textContent='حفظ'; } }
}

/* ==================== الإعدادات / الوضع الليلي / الأسماء ==================== */
function getTheme(){ return 'light'; }   // الوضع الليلي اتلغى نهائيًا — التطبيق دايمًا فاتح
function applyTheme(t){
  document.documentElement.setAttribute('data-theme', 'light');

}
function setTheme(t){ try{ localStorage.setItem('theme','light'); }catch(e){} applyTheme('light'); }

function getThemeColor(){ try{ return localStorage.getItem('themeColor')||'classic'; }catch(e){ return 'classic'; } }
function applyThemeColor(key){
  // الثيمات اللونية اتشالت — التركواز هو الأساسي دايمًا
  const r=document.documentElement.style;
  const meta=document.querySelector('meta[name="theme-color"]');
  r.removeProperty('--navy'); r.removeProperty('--navy-700'); r.removeProperty('--navy-900'); r.removeProperty('--gold');
  if(meta) meta.setAttribute('content', '#000000');
}
function setThemeColor(key){ try{ localStorage.setItem('themeColor',key); }catch(e){} applyThemeColor(key); }
function pickTheme(key){ setThemeColor(key); renderSettings(); toast('تم تغيير الثيم','ok'); }

const NAME_DEFAULTS={app:'بندق ستور',brand:'Bondk Store',inventory:'المخزون',purchases:'فواتير الموردين',reps:'حساب المناديب',cashout:'فلوس بره',vodafone:'تقفيل فودافون كاش',users:'المستخدمين',settings:'إعدادات الأدمن'};
function getNames(){ try{ return JSON.parse(localStorage.getItem('appNames')||'{}'); }catch(e){ return {}; } }
function nm(k){ const o=getNames(); return o[k]||NAME_DEFAULTS[k]||k; }
function setNameVal(k,v){ const o=getNames(); if(v&&v!==NAME_DEFAULTS[k]) o[k]=v; else delete o[k]; try{ localStorage.setItem('appNames',JSON.stringify(o)); }catch(e){} }
function getAppName(){ return nm('app'); }
function getFooter(){ try{ const o=JSON.parse(localStorage.getItem('appNames')||'{}'); return o.footer||''; }catch(e){ return ''; } }

/* ===== مزامنة أسماء التطبيق/الأقسام لايف بين كل المستخدمين (جدول app_settings + Realtime) =====
   ده بيحل مشكلة إن تغيير اسم صفحة من الأدمن كان بيتخزن في الجهاز بتاعه بس (localStorage)
   ومش بيوصل لباقي المستخدمين إلا لما يفتحوا التطبيق من الأول. دلوقتي بيتخزن على السيرفر
   وبينزل لكل الأجهزة فورًا عن طريق Realtime. */
function applyFooter(){
  const t=getFooter();
  ['authFooter','dashFooter'].forEach(id=>{
    const el=document.getElementById(id);
    if(el){ el.textContent=t; el.style.display = t? 'block':'none'; }
  });
}
function applyAllNamesToUI(){
  applyAppName(); applyFooter();
  const bb=document.getElementById('brandBadge'); if(bb) bb.textContent=nm('brand');
  if(CURRENT.profile) buildNav(CURRENT.profile.role);
  const tEl=document.getElementById('appTitle');
  if(tEl && CURRENT_PAGE) tEl.textContent = (CURRENT_PAGE==='dashboard') ? tEl.textContent : pageTitle(CURRENT_PAGE);
  // حدّث محتوى الصفحة المفتوحة دلوقتي لو عنوانها بيستخدم nm() من غير ما نقفل حاجة مفتوحة
  const renderers={ dashboard:renderDashboard, inventory:renderInventory, purchases:renderPurchaseInvoices, users:renderUsers, settings:renderSettings, vodafone:renderVodafone };
  const r=renderers[CURRENT_PAGE]; if(r){ try{ r(); }catch(e){} }
}
async function loadAppSettingsFromServer(){
  try{
    const { data, error } = await db.from('app_settings').select('value').eq('key','appNames').maybeSingle();
    if(error) throw error;
    if(data && data.value){ try{ localStorage.setItem('appNames', JSON.stringify(data.value)); }catch(e){} applyAllNamesToUI(); }
  }catch(e){ console.warn('تعذّر جلب إعدادات الأسماء من السيرفر:',e); }
}
async function saveAppSettingsToServer(){
  const payload={ key:'appNames', value:getNames(), updated_at:new Date().toISOString() };
  try{ const { error }=await db.from('app_settings').upsert(payload,{onConflict:'key'}); if(error) throw error; return true; }
  catch(e){ console.warn('تعذّر حفظ إعدادات الأسماء على السيرفر:',e); return false; }
}
let _appSettingsRtDeb=null;
function setupAppSettingsRealtime(){
  try{
    db.channel('app_settings_rt')
      .on('postgres_changes',{event:'*',schema:'public',table:'app_settings'},()=>{
        clearTimeout(_appSettingsRtDeb); _appSettingsRtDeb=setTimeout(loadAppSettingsFromServer, 300);
      })
      .subscribe();
  }catch(e){ console.warn('Realtime app_settings failed:',e); }
}
function applyAppName(){
  const n=getAppName();
  const a=document.getElementById('appTitle'); if(a) a.textContent=n;
}

async function resetAllQuantities(){
  if(!confirm('متأكد تصفّر عداد كل المنتجات لـ0؟ مش هينفع ترجع.')) return;
  try{
    const { error } = await db.from('products').update({ quantity:0 }).gt('id',0);
    if(error) throw error;
    INV.products.forEach(p=>p.quantity=0); cacheSet('products',INV.products);
    logAudit('bulk','products','',{op:'reset_qty'});
    toast('تم تصفير عداد كل المنتجات','ok');
  }catch(e){ console.error(e); toast('حصل خطأ','err'); }
}
async function setAllMinStock(){
  const v=prompt('اكتب رقم الحد الأدنى اللي عايزه لكل المنتجات:');
  if(v===null) return;
  const n=Number(toEnDigits(String(v).replace(/[^\d]/g,'')));
  if(isNaN(n)){ toast('رقم غير صحيح','err'); return; }
  if(!confirm(`هيتحط حد أدنى = ${n} لكل المنتجات. تمام؟`)) return;
  try{
    const { error } = await db.from('products').update({ min_stock:n }).gt('id',0);
    if(error) throw error;
    INV.products.forEach(p=>p.min_stock=n); cacheSet('products',INV.products);
    logAudit('bulk','products','',{op:'set_min',value:n});
    toast(`تم وضع حد أدنى ${n} لكل المنتجات`,'ok');
  }catch(e){ console.error(e); toast('حصل خطأ','err'); }
}

function saveAppName(){
  const v=(document.getElementById('setAppName').value||'').trim(); if(!v){ toast('اكتب اسم','err'); return; }
  setNameVal('app',v); applyAppName(); toast('اتحفظ الاسم','ok');

function saveVfLimitsFromSettings(){
  const day=parseInt(toEnDigits(document.getElementById('vfLimDay')?.value||''))||0;
  const month=parseInt(toEnDigits(document.getElementById('vfLimMonth')?.value||''))||0;
  if(!day||!month||day<1000||month<day){ toast('تأكد من القيم — اليومي لازم يكون أقل من الشهري','err'); return; }
  saveVfLimits(day,month);
  toast('تم حفظ الحدود الجديدة ✓','ok');
}
function saveAllNames(){
  ['brand','app','inventory','purchases','reps','cashout','vodafone','users','settings','footer'].forEach(k=>{

    toast(ok?'اتحفظت وهتظهر لكل المستخدمين فورًا':'اتحفظت على جهازك بس — محتاج نت عشان تتزامن مع باقي المستخدمين', ok?'ok':'err');
  });
}

// تحويل الأرقام العربي لإنجليزي تلقائيًا في أي خانة
document.addEventListener('input',e=>{
  const el=e.target;
  if(!el||(el.tagName!=='INPUT'&&el.tagName!=='TEXTAREA')) return;
  if(el.matches&&el.matches('input[inputmode="decimal"],input[inputmode="numeric"]')) return; // الأرقام بتتظبط بالفاصلة في مستمع تاني
  const v=el.value, c=toEnDigits(v);
  if(c!==v){ let p=null; try{p=el.selectionStart;}catch(_){}
    el.value=c; if(p!=null){ try{ el.setSelectionRange(p,p); }catch(_){} } }
},true);

/* ==================== التشغيل الأول: استعادة الجلسة ==================== */
(async function init(){

  }
  const { data:{ session } } = await db.auth.getSession();
  if(session){ await startApp(); }
})();
</script>
